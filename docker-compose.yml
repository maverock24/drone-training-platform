version: '3.8'

services:
  # The actual Drone/MLOps Edge Training Platform
  training-platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - edge-ai-network

  # Simulated Triton Inference Server (Edge AI MLOps payload)
  # This provides the curriculum a real endpoint to test against locally
  triton-inference-edge:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    command: tritonserver --model-repository=/models
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # GRPC
      - "8002:8002" # Metrics
    volumes:
      - ./models:/models
    # Requires NVIDIA Container Toolkit on host for GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - edge-ai-network
    restart: unless-stopped

networks:
  edge-ai-network:
    driver: bridge
