            - listitem [ref=e63]: Sijoitusrahasto-osuudet
        - article [ref=e66]:
          - heading "Sijoitusrahasto-osuudet" [level=1] [ref=e67]
          - generic [ref=e68]:
            - paragraph [ref=e69]: Sijoitusrahasto perustuu siihen, että rahastoyhtiö kerää sijoittajilta rahaa, jotka se sijoittaa useisiin eri kohteisiin, esimerkiksi osakkeisiin. Nuo kohteet yhdessä siis muodostavat sijoitusrahaston. Sijoitusrahasto jakautuu rahasto-osuuksiin, jotka ovat keskenään yhtä suuria. Voit ostaa osuuksia haluamallasi summalla.
            - heading "Miten sijoitusrahasto-osuuksia verotetaan?" [level=2] [ref=e70]
            - paragraph [ref=e71]: Rahasto-osuuksista saamistasi tuloista maksat veroa pääomatulojen veroprosentin mukaan.
            - paragraph [ref=e72]: "Rahasto-osuuksia on kahdenlaisia:"
            - list [ref=e73]:
              - listitem [ref=e74]: tuotto-osuuksia
              - listitem [ref=e75]: kasvuosuuksia.
            - paragraph [ref=e76]: Tuotto-osuudellesi maksetusta tuotosta sinun tulee maksaa veroa joka vuosi. Käytännössä veron maksu tapahtuu siten, että rahastoyhtiö tekee tuotosta 30 %:n ennakonpidätyksen tuoton maksun yhteydessä ja tilittää sen Verohallinnolle.
            - paragraph [ref=e77]: Kasvuosuudesta taas maksat veroa vasta rahasto-osuuden myynnin yhteydessä. Muutoin se pysyy koko ajan rahaston pääomana.
            - paragraph [ref=e78]: Voit halutessasi vaihtaa tuotto-osuuksia kasvuosuuksiksi ja päinvastoin verottomasti. Se onnistuu kuitenkin vain saman sijoitusrahaston sisällä. Jos haluat vaihtaa rahasto-osuutesi toisen rahaston rahasto-osuudeksi, sitä pidetään osuuden myyntinä ja joudut maksamaan mahdollisesta myyntivoitosta pääomatuloveroa.
            - heading "Selvitä myyntivoitto tai -tappio laskemalla" [level=2] [ref=e79]
            - paragraph [ref=e80]: Kun myyt sijoitusrahasto-osuutesi, siitä koituu yleensä joko voittoa tai tappiota. Sen määrän saat selville, kun vähennät osuuksien myyntihinnasta
            - list [ref=e81]:
              - listitem [ref=e82]: niiden ostohinnan
              - listitem [ref=e83]: voiton hankkimiskulut, kuten välityspalkkiot ja toimitusmaksut.
            - paragraph [ref=e84]: Jos olet saanut sijoitusrahasto-osuudet lahjaksi tai perinnöksi, voit vähentää myyntihinnasta lahjaverotuksessa tai perintöverotuksessa käytetyn verotusarvon.
            - paragraph [ref=e85]: "Vaihtoehtoisesti voit vähentää osuuksien myyntihinnasta hankintameno-olettaman:"
            - list [ref=e86]:
              - listitem [ref=e87]: Jos olet omistanut rahasto-osuuden alle 10 vuotta, hankintameno-olettama on 20 % rahasto-osuuden myyntihinnasta.
              - listitem [ref=e88]: Jos olet omistanut rahasto-osuuden vähintään 10 vuotta, hankintameno-olettama on 40 % rahasto-osuuden myyntihinnasta.
            - paragraph [ref=e89]:
              - text: Huomaa, että jos käytät hankintameno-olettamaa, et enää saa vähentää rahasto-osuuksien myyntihinnasta niiden ostohintaa ja voiton hankkimiskuluja.
              - text: "Kyseessä on siis kaksi eri vaihtoehtoa:"
              - text: joko
              - strong [ref=e90]: ostohinta + voiton hankkimiskulut
              - text: (tai perintö- tai lahjaverotuksen verotusarvo)
              - text: tai
              - strong [ref=e91]: hankintameno-olettama.
            - paragraph [ref=e92]:
              - text: Lue lisää voiton ja tappion laskemisesta syventävän vero-ohjeen
              - link "Arvopaperien luovutusten verotus kohdasta Luovutusvoiton ja -tappion laskeminen" [ref=e93] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: .
            - paragraph [ref=e94]:
              - text: Lue lisää hankintameno-olettamasta syventävän vero-ohjeen
              - link "Arvopaperien luovutusten verotus kohdasta Hankintameno-olettama ja omistusaika" [ref=e95] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: .
            - heading "Voitosta maksat veroa, tappiosta saat vähennyksiä" [level=2] [ref=e96]
            - paragraph [ref=e97]: Jos saat rahasto-osuuksiesi myymisestä voittoa, se on sinulle pääomatuloa. Sinun tulee siis maksaa siitä pääomatuloveroa.
            - paragraph [ref=e98]:
              - link "Näin maksat rahasto-osuuksien myyntivoittojen veron" [ref=e99] [cursor=pointer]:
                - /url: /henkiloasiakkaat/omaisuus/sijoitukset/maksa-vero-sijoituksista/
            - paragraph [ref=e100]: Jos rahasto-osuuksiesi myynnistä tulee tappiota, se vähennetään kaikista pääomatuloistasi. Jos sinulla ei ole lainkaan pääomatuloja tai niitä on vähemmän kuin vähennettäviä myyntitappioita, vähennys siirtyy seuraaville 5 vuodelle.
            - heading "Osuuksien myynnissä sovelletaan usein FIFO-periaatetta" [level=2] [ref=e101]
            - paragraph [ref=e102]: Sijoitusrahasto-osuuksien myynnissä sovelletaan yleensä FIFO-periaatetta (First In – First Out). Tällöin jokaisen erän myyntihinnasta vähennetään siihen kuuluvien osuuksien ostohinnat siinä järjestyksessä kuin olet hankkinut osuudet.
            - paragraph [ref=e103]: Rahasto-osuuksien tapauksessa FIFO-periaatteesta on kuitenkin mahdollista poiketa. Rahastoyhtiön on pidettävä kaikista osuuksista rahasto-osuusrekisteriä, johon sen on merkittävä osuustodistuksen tai rahasto-osuusmerkinnän järjestysnumero. Voit halutessasi pyytää rahastoyhtiötä lunastamaan tietyn osuustodistuksen tarkoittamat tai tietyllä järjestysnumerolla hankkimasi rahasto-osuudet.
            - heading "Ulkomaisen sijoitusrahaston voitto-osuuden vero hyvitetään Suomessa" [level=2] [ref=e104]
            - paragraph [ref=e105]: Jos olet sijoittanut ulkomaiseen rahastoon, kyseinen valtio saattaa periä sinulta veroa rahaston tuotto-osuuksista maksettavista voitto-osuuksista. Syynä on yleensä se, että voitto-osuus rinnastetaan kyseisessä maassa osinkotuloon. Tällaisessa tapauksessa vero hyvitetään sinulle Suomen verotuksessa.
            - paragraph [ref=e106]:
              - text: Lue lisää veron hyvittämisestä syventävän vero-ohjeen
              - link "Osinkotulojen verotus kohdasta Lähdeveron hyvittäminen" [ref=e107] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/47901/
              - text: .
            - heading "Tarkista esitäytetty veroilmoitus" [level=2] [ref=e108]
            - paragraph [ref=e109]: Tarkista, että tiedot rahasto-osuuksiesi myynneistä ja tuotto-osuuksista saamistasi tuotoista näkyvät oikein keväällä saamassasi esitäytetyssä veroilmoituksessa. Ilmoita puuttuvat ja korjaa virheelliset tiedot.
            - paragraph [ref=e110]: Jos olet myynyt sijoitusrahasto-osuuksia tai muita arvopapereita ulkomaisen etävälittäjän kautta, ilmoita voitot tai tappiot myös näistä kaupoista. Verohallinto saa tietoja myös ulkomailla tapahtuneista arvopaperikaupoista ja valvoo näiden tietojen ilmoittamista verotuksessa.
            - paragraph [ref=e111]:
