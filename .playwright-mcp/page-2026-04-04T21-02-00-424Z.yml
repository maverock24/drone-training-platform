              - listitem [ref=e99]:
                - text: •
                - link "OP Sijoitusvakuutus" [ref=e100] [cursor=pointer]:
                  - /url: https://www.op.fi/henkiloasiakkaat/saastot-ja-sijoitukset/vakuutussaastaminen/op-sijoitusvakuutus
                - text: on sijoitussidonnainen säästöhenkivakuutus, jonka säästöt muodostuvat siihen tekemistäsi maksuista ja valitsemiesi sijoituskohteiden mahdollisen arvonnousun muodostamasta tuotosta.
              - listitem [ref=e101]: • Sijoitusvakuutus on vakuutuskuori, jonka sisälle voit valita erilaisia sijoituskohteita. Vakuutuskuoren ansiosta voit vaihtaa sijoituskohteita vakuutuksen sisällä ilman tuoton verotusta.
              - listitem [ref=e102]: • Säästöhenkivakuutus sisältää myös henkivakuutuksen. Tämä tarkoittaa, että kuolemantapauksessa säästösi maksetaan valitsemallesi edunsaajalle ja hän voi käyttää vakuutuskorvauksen haluamallaan tavalla esimerkiksi perintöveroihin tai lainojen lyhentämiseen.
            - paragraph
          - generic [ref=e104]:
            - heading "Säästöhenkivakuutuksen verotus – Tuotto verotetaan aina pääomatulona varoja nostaessasi" [level=2] [ref=e105]
            - paragraph [ref=e106]: Sijoitusvakuutus on vakuutuskuori, jonka sisällä voit vaihtaa sijoituskohteita ilman tuoton verotusta vaihdon yhteydessä. Säästäminen sijoitusvakuutukseen on siis joustavaa ja korkoa korolle -ilmiön ansiosta säästösi saavat parhaan mahdollisuuden tuottaa, kun tuottoa verotetaan vasta noston yhteydessä. Kun nostat varoja, säästövakuutuksen eli säästöhenkivakuutuksen verotus määräytyy sen mukaan, paljonko nostettavasta summasta on tuottoa.
            - paragraph [ref=e107]: Pääoma eli vakuutukseen maksetut maksut ovat verottomia, kun säästöt maksetaan vakuutetulle itselleen. Veroa maksat ainoastaan tuotosta. Sijoitusvakuutuksen tuotto verotetaan pääomatulona. Säästöhenkivakuutuksen tuotto on kuitenkin veronalaista pääomatuloa vasta siinä vaiheessa, kun nostat varoja vakuutuksestasi.
            - paragraph [ref=e108]: Sijoitusvakuutuksesta voit nostaa säästöjäsi tekemällä joko osittaisen tai kokonaisen takaisinoston. Osittainen takaisinosto muodostuu aina pääomasta ja tuotosta. Vakuutukseen maksamasi maksut eivät ole yksityishenkilön verotuksessa vähennyskelpoisia.
            - paragraph
          - generic [ref=e110]:
            - heading "Sijoitusvakuutuksen erääntyminen - Edunsaajana lähiomaiset" [level=2] [ref=e111]
            - paragraph [ref=e112]: Sijoitusvakuutuksen erääntyessä pääoma verotetaan lahjaveron mukaan, jos se maksetaan edunsaajamääräyksen mukaisesti lähiomaisellesi. Lahjaveroa ei tarvitse maksaa, mikäli vakuutuksen pääoma ja muut samalta antajalta saadut lahjat eivät ylitä 7 499 euroa kolmen vuoden aikana. Kertynyt tuotto on veronalaista pääomatuloa myös lähiomaiselle.
            - paragraph [ref=e113]: Lähiomaisia ovat
            - list [ref=e114]:
              - listitem [ref=e115]: • vakuutetun aviopuoliso,
              - listitem [ref=e116]: • vakuutetun perilliset,
              - listitem [ref=e117]: • adoptiolapsi ja tämän rintaperillinen,
              - listitem [ref=e118]: • kasvattilapsi ja puolison lapsi.
            - paragraph [ref=e119]: Avopuolisoa kohdellaan verolainsäädännössä puolisona, jos avopuolisot ovat aikaisemmin olleet avioliitossa keskenään tai heillä on tai on ollut yhteinen lapsi.
            - paragraph [ref=e120]: Jos vakuutussäästö maksetaan muulle henkilölle kuin sinulle itsellesi tai lähiomaisellesi, vakuutussäästö on kokonaan veronalaista pääomatuloa.
            - paragraph
          - generic [ref=e122]:
            - heading "Kuolintapauskorvauksen verotus" [level=2] [ref=e123]
            - paragraph [ref=e124]: Sijoitusvakuutukseen sisältyy myös henkivakuutus. Jos kuolet vakuutuksen voimassaoloaikana, koko säästösumma maksetaan valitsemallesi edunsaajalle kuolintapauskorvauksena. Edunsaajamääräys ohittaa testamentin, jos edunsaajana ei ole kuolinpesä, ja vaikuttaa siihen, maksetaanko sijoitusvakuutuksesta perintöveroa vai pääomatuloveroa. Kuolintapauskorvaus maksetaan vakuutetun kuolinpesälle, jos edunsaajaksi on määrätty kuolinpesä, tai edunsaajamääräys on rauennut edunsaajien puuttumisen vuoksi.
            - paragraph [ref=e125]: "Kuolintapauskorvauksen osalta säästöhenkivakuutuksen verotus riippuu edunsaajasta seuraavasti:"
            - list [ref=e126]:
              - listitem [ref=e127]: • Jos edunsaaja on vakuutetun lähiomainen, kuolintapauskorvaus on perintöverotettavaa.
              - listitem [ref=e128]: • Jos edunsaaja ei ole vakuutetun lähiomainen, kuolintapauskorvaus on veronalaista pääomatuloa.
              - listitem [ref=e129]: • Jos kuolintapauskorvaus maksetaan vakuutetun kuolinpesälle, siitä tulee osa kuolinpesän varallisuutta. Kuolinpesästä saatu omaisuus on perintöverotettavaa omaisuutta perittävän ja perillisen tai testamentinsaajan sukulaisuussuhteesta riippumatta.
          - generic [ref=e131]:
            - heading "Sijoitusvakuutus ja perintövero" [level=2] [ref=e132]
            - paragraph [ref=e133]: Kun vakuutuksenottaja on valinnut edunsaajaksi lähiomaisen, edunsaajalle maksettava osuus sijoitusvakuutuksesta on perintöverotettavaa. Tämä tarkoittaa, että edunsaaja maksaa perintöveroa vakuutuksesta saadusta korvauksesta. Perintöveron suuruus riippuu edunsaajan sukulaisuussuhteesta vakuutuksenottajaan sekä korvauksen määrästä.
          - generic [ref=e135]:
            - heading "Vakuutussäästämisen tappion vähentäminen verotuksessa" [level=2] [ref=e136]
            - paragraph [ref=e137]: Sijoituksen arvo voi sekä nousta että laskea ja näin ollen vakuutuksenottaja voi menettää sijoittamansa pääoman sekä tuoton osittain tai kokonaan. Mikäli vakuutuksesi päättyy tappiollisena, voit vähentää säästöhenkivakuutuksen tappion vakuutussopimuksen päättymisvuoden verotuksessa. Tappiota syntyy, jos vakuutukseen maksamiesi maksujen määrä on suurempi kuin sopimusaikana maksettujen suoritusten määrä. Tappio vähennetään veronalaisesta pääomatulosta ja se otetaan huomioon pääomatulolajin tappiota vahvistettaessa. Tappio on vähennettävissä seuraavan 10 vuoden aikana sitä mukaa kuin pääomatuloa syntyy. Tappiota ei kuitenkaan oteta huomioon pääomatulolajin alijäämää vahvistettaessa.
          - generic [ref=e139]:
            - paragraph [ref=e140]
            - paragraph [ref=e141]: Verotuksesta annetut tiedot perustuvat 1.1.2025 voimassa olleeseen verolainsäädäntöön. Vakuutusten verotus voi muuttua ja noudattaa kulloinkin voimassa olevaa verolainsäädäntöä.
