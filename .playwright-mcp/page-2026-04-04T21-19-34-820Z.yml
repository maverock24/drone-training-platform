      - heading "Indeksirahastot" [level=1] [ref=e35]
      - paragraph [ref=e36]: Indeksirahastot seuraavat kohdemarkkinansa kehitystä ilman salkunhoitajan aktiivisia valintoja tai aktiivista kaupankäyntiä. Niiden tavoitteena on rahaston vertailuindeksin mukainen tuotto.
      - paragraph [ref=e37]: Indeksisijoittaminen on kustannustehokas tapa muodostaa kansainvälinen osakerahastosalkku, joka on erinomaisesti hajautettu.
      - paragraph [ref=e38]: Indeksirahastot Eurooppa, Pohjois-Amerikka, Aasia ja Suomi määrittelevät markkinansa maantieteellisesti.
      - paragraph [ref=e39]: OMX Helsinki 25 on pörssinoteerattu indeksirahasto, joka sijoittaa Helsingin pörssin vaihdetuimpiin osakkeisiin. Sen osuuksilla voi käydä kauppaa arvopaperivälittäjien kautta.
