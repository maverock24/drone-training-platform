        - generic [ref=e2623]:
          - paragraph [ref=e2624]:
            - text: "Note: Error ranges shown are measured as plus or minus the root mean squared error of projections for 2006 through 2025 that were released in the spring by various private and government forecasters. As described in the box \"Forecast Uncertainty,\" under certain assumptions, there is about a 70 percent probability that actual outcomes for real GDP, unemployment, consumer prices, and the federal funds rate will be in ranges implied by the average size of projection errors made in the past. For more information, see David Reifschneider and Peter Tulip (2017), \"Gauging the Uncertainty of the Economic Outlook Using Historical Forecasting Errors: The Federal Reserve's Approach,\" Finance and Economics Discussion Series 2017-020 (Washington: Board of Governors of the Federal Reserve System, February),"
            - link "https://dx.doi.org/10.17016/FEDS.2017.020" [ref=e2625] [cursor=pointer]:
              - /url: https://dx.doi.org/10.17016/FEDS.2017.020
            - text: .
          - paragraph [ref=e2626]:
            - text: 1. Definitions of variables are in the general note to table 1.
            - link "Return to table" [ref=e2627] [cursor=pointer]:
              - /url: "#t2f1r"
          - paragraph [ref=e2628]:
            - text: 2. Measure is the overall consumer price index, the price measure that has been most widely used in government and private economic forecasts. Projections are percent changes on a fourth quarter to fourth quarter basis.
            - link "Return to table" [ref=e2629] [cursor=pointer]:
              - /url: "#t2f2r"
          - paragraph [ref=e2630]:
            - text: 3. For Federal Reserve staff forecasts, measure is the federal funds rate. For other forecasts, measure is the rate on 3-month Treasury bills. Projection errors are calculated using average levels, in percent, in the fourth quarter.
            - link "Return to table" [ref=e2631] [cursor=pointer]:
              - /url: "#t2f3r"
      - heading "Forecast Uncertainty" [level=4] [ref=e2632]
      - paragraph [ref=e2633]: The economic projections provided by the members of the Board of Governors and the presidents of the Federal Reserve Banks inform discussions of monetary policy among policymakers and can aid public understanding of the basis for policy actions. Considerable uncertainty attends these projections, however. The economic and statistical models and relationships used to help produce economic forecasts are necessarily imperfect descriptions of the real world, and the future path of the economy can be affected by myriad unforeseen developments and events. Thus, in setting the stance of monetary policy, participants consider not only what appears to be the most likely economic outcome as embodied in their projections, but also the range of alternative possibilities, the likelihood of their occurring, and the potential costs to the economy should they occur.
      - paragraph [ref=e2634]:
        - text: Table 2 summarizes the average historical accuracy of a range of forecasts, including those reported in past
        - emphasis [ref=e2635]: Monetary Policy Reports
        - text: and those prepared by the Federal Reserve Board's staff in advance of meetings of the Federal Open Market Committee (FOMC). The projection error ranges shown in the table illustrate the considerable uncertainty associated with economic forecasts. For example, suppose a participant projects that real gross domestic product (GDP) and total consumer prices will rise steadily at annual rates of, respectively, 3 percent and 2 percent. If the uncertainty attending those projections is similar to that experienced in the past and the risks around the projections are broadly balanced, the numbers reported in table 2 would imply a probability of about 70 percent that actual GDP would expand within a range of 1.5 to 4.5 percent in the current year, 1.0 to 5.0 percent in the second year, and 0.8 to 5.2 percent in the third year. The corresponding 70 percent confidence intervals for overall inflation would be 0.6 to 3.4 percent in the current year, 0.3 to 3.7 percent in the second year, and 0.2 to 3.8 percent in the third year. Figures 4.A through 4.C illustrate these confidence bounds in "fan charts" that are symmetric and centered on the medians of FOMC participants' projections for GDP growth, the unemployment rate, and inflation. However, in some instances, the risks around the projections may not be symmetric. In particular, the unemployment rate cannot be negative; furthermore, the risks around a particular projection might be tilted to either the upside or the downside, in which case the corresponding fan chart would be asymmetrically positioned around the median projection.
      - paragraph [ref=e2636]: Because current conditions may differ from those that prevailed, on average, over history, participants provide judgments as to whether the uncertainty attached to their projections of each economic variable is greater than, smaller than, or broadly similar to typical levels of forecast uncertainty seen in the past 20 years, as presented in table 2 and reflected in the widths of the confidence intervals shown in the top panels of figures 4.A through 4.C. Participants' current assessments of the uncertainty surrounding their projections are summarized in the bottom-left panels of those figures. Participants also provide judgments as to whether the risks to their projections are weighted to the upside, are weighted to the downside, or are broadly balanced. That is, while the symmetric historical fan charts shown in the top panels of figures 4.A through 4.C imply that the risks to participants' projections are balanced, participants may judge that there is a greater risk that a given variable will be above rather than below their projections. These judgments are summarized in the lower-right panels of figures 4.A through 4.C.
      - paragraph [ref=e2637]: As with real activity and inflation, the outlook for the future path of the federal funds rate is subject to considerable uncertainty. This uncertainty arises primarily because each participant's assessment of the appropriate stance of monetary policy depends importantly on the evolution of real activity and inflation over time. If economic conditions evolve in an unexpected manner, then assessments of the appropriate setting of the federal funds rate would change from that point forward. The final line in table 2 shows the error ranges for forecasts of short-term interest rates. They suggest that the historical confidence intervals associated with projections of the federal funds rate are quite wide. It should be noted, however, that these confidence intervals are not strictly consistent with the projections for the federal funds rate, as these projections are not forecasts of the most likely quarterly outcomes but rather are projections of participants' individual assessments of appropriate monetary policy and are on an end-of-year basis. However, the forecast errors should provide a sense of the uncertainty around the future path of the federal funds rate generated by the uncertainty about the macroeconomic variables as well as additional adjustments to monetary policy that would be appropriate to offset the effects of shocks to the economy.
      - paragraph [ref=e2638]: If at some point in the future the confidence interval around the federal funds rate were to extend below zero, it would be truncated at zero for purposes of the fan chart shown in figure 5; zero is the bottom of the lowest target range for the federal funds rate that has been adopted by the Committee in the past. This approach to the construction of the federal funds rate fan chart would be merely a convention; it would not have any implications for possible future policy decisions regarding the use of negative interest rates to provide additional monetary policy accommodation if doing so were appropriate. In such situations, the Committee could also employ other tools, including forward guidance and asset purchases, to provide additional accommodation.
      - paragraph [ref=e2639]: While figures 4.A through 4.C provide information on the uncertainty around the economic projections, figure 1 provides information on the range of views across FOMC participants. A comparison of figure 1 with figures 4.A through 4.C shows that the dispersion of the projections across participants is much smaller than the average forecast errors over the past 20 years.
