    - generic [ref=e86]:
      - 'heading "March 18, 2026: FOMC Projections materials, accessible version" [level=3] [ref=e87]'
      - heading "Accessible version" [level=3] [ref=e88]
      - paragraph [ref=e89]: For release at 2:00 p.m., EDT, March 18, 2026
      - heading "Summary of Economic Projections" [level=4] [ref=e90]
      - paragraph [ref=e91]: In conjunction with the Federal Open Market Committee (FOMC) meeting held on March 17–18, 2026, meeting participants submitted their projections of the most likely outcomes for real gross domestic product (GDP) growth, the unemployment rate, and inflation for each year from 2026 to 2028 and over the longer run. Each participant’s projections were based on information available at the time of the meeting, together with her or his assessment of appropriate monetary policy—including a path for the federal funds rate and its longer-run value—and assumptions about other factors likely to affect economic outcomes. The longer-run projections represent each participant’s assessment of the value to which each variable would be expected to converge, over time, under appropriate monetary policy and in the absence of further shocks to the economy. “Appropriate monetary policy” is defined as the future path of policy that each participant deems most likely to foster outcomes for economic activity and inflation that best satisfy his or her individual interpretation of the statutory mandate to promote maximum employment and price stability.
