              - heading "State of the Drone Industry 2025 - Survey Demographics" [level=1] [ref=e69]
              - generic [ref=e71]:
                - paragraph [ref=e72]:
                  - text: The state of the drone industry report is the result of the Drone Industry Survey 2025. With polls closed in the summer, the results of the 8th annual survey are in, analyzed, and presented in the free
                  - link "Global State of Drones 2025 report" [ref=e73] [cursor=pointer]:
                    - /url: https://droneii.com/project/global-state-of-drones-2025-2
                  - text: .
                - paragraph [ref=e74]: This year, 768 completed survey forms were submitted from 87 countries. The majority of answers came from Europe (46%), followed by North America (19%) and Asia (18%).
                - paragraph [ref=e75]: Just as last year, the service sector remains the largest, accounting for 68% (-6% from 2024), followed by hardware companies at 24% (+6%), and software companies at 8% (+/-0%).
            - generic [ref=e79]:
              - link "How Drones are Being Used" [ref=e80] [cursor=pointer]:
                - /url: "#heading_1"
                - heading "How Drones are Being Used" [level=2] [ref=e81]
              - generic [ref=e83]:
                - paragraph [ref=e84]: Mapping and surveying remain the primary methods for drone applications, used by 35% of all drone operators, followed by inspection (26%) and photography and filming (18%). Growing shares are also reported for methods like spraying and dispensing (7%), delivery (7%), and localization and tracking (5%).
                - paragraph [ref=e85]: In 2025, the top reason for using drones is “saving time,” followed by improving quality. This marks a major shift from the previous year, when “improving work safety” was almost always the top reason. This could indicate that drone solutions need to deliver on their promises, and streamlining the whole process (not just data collection) becomes more crucial.
              - figure [ref=e87]:
                - link "State of the Drone Industry infographic" [ref=e88] [cursor=pointer]:
                  - /url: https://droneii.com/project/global-state-of-drones-2025-infographic
                  - img "State of the Drone Industry infographic" [ref=e89]
            - generic [ref=e93]:
              - link "Drone Industry Priorities and Primary Concerns" [ref=e94] [cursor=pointer]:
                - /url: "#heading_2"
                - heading "Drone Industry Priorities and Primary Concerns" [level=2] [ref=e95]
              - generic [ref=e98]:
                - paragraph [ref=e99]: Regulatory obstacles remain the top challenge for the drone industry in 2025, marking the third consecutive year.
                - paragraph [ref=e100]:
                  - text: "Example USA: Drone regulation remains one of the most persistent challenges in the industry due to the high costs and complexity of achieving and maintaining airworthiness. While FAA Part 107 provided a regulatory foundation, its reliance on individual waivers created an inefficient and resource-intensive approval process. The newly proposed FAA Part 108 aims to address these issues"
                  - link "for BVLOS operation" [ref=e101] [cursor=pointer]:
                    - /url: https://www.faa.gov/newsroom/beyond-visual-line-sight-bvlos
                  - text: by introducing risk-based flexibility, shifting certain responsibilities to industry standards, and better aligning with international frameworks such as those of EASA and Japan. Although expectations are high, it remains uncertain whether Part 108 will fully resolve the regulatory bottlenecks that have long hindered the industry’s growth.
                - paragraph [ref=e102]:
                  - text: However, notable shifts have occurred in other areas. While client acquisition stays in 2
                  - superscript [ref=e103]: nd
                  - text: "place, acquiring additional funding is becoming a real problem. With regulations limiting operational scalability and clients hard to onboard, additional funding is the only way to occupy certain niches and outperform competitors. With funds drying up, the challenge is only increasing – just as the ranking this year has moved to third position (2023: rank 8)."
                - paragraph [ref=e104]: Some challenges have decreased over the years, like public awareness and inflation, which is somewhat reassuring. The main question is, what impact will these challenges have on the industry, how will drone companies respond, and what will the drone landscape look like in 2-3 years?
            - generic [ref=e112]:
              - figure [ref=e117]:
                - link "global state of drones report 2025" [ref=e118] [cursor=pointer]:
                  - /url: https://droneii.com/project/global-state-of-drones-2025-2
                  - img "global state of drones report 2025" [ref=e119]
