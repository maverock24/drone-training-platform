                - list [ref=e127]:
                  - listitem [ref=e128]: Direct feedback from 768 companies in 87 countries
                  - listitem [ref=e129]: Data on the top application methods and reasons to use drones
                  - listitem [ref=e130]: Expectations vs Reality 2018-2025, including breakdown by segment
