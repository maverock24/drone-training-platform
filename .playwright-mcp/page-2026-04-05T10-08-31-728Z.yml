            - generic [ref=e142]:
              - link "Drone Market Expectations and Drivers" [ref=e143] [cursor=pointer]:
                - /url: "#heading_3"
                - heading "Drone Market Expectations and Drivers" [level=2] [ref=e144]
              - generic [ref=e147]:
                - paragraph [ref=e148]: Expectations and perceived reality have steadily improved despite the challenges mentioned. The survey reports a score of 6.8 for market expectations in 2025, indicating a generally positive outlook for the industry. More importantly, it shows that the drone industry remains cautious yet optimistic, not pessimistic or overly optimistic.
                - paragraph [ref=e149]: This optimism varies across the main sectors. Drone hardware and software are very optimistic for the next 12 months compared to services and have also performed well over the past year. Additional background information can be found in the free Global State of Drones 2025.
                - paragraph [ref=e150]: Similar to the challenges, the main market-driving factor is rule-making authorities, with another increase for the fourth year in a row, rising all the way to 61%. As more rules are implemented globally, rule-makers set the pace at which the market can develop, making them both the key enabler and restrictor simultaneously.
                - paragraph [ref=e151]:
                  - text: Furthermore, it is important to recognize the difference between “necessary regulations being in place” (which is necessary and important) and the
                  - emphasis [ref=e152]: process
                  - text: of regulatory approval (which can be slow and inefficient).
            - generic [ref=e156]:
              - link "State of the Drone Industry White Paper - More Insights Waiting for You!" [ref=e157] [cursor=pointer]:
