            - paragraph [ref=e90]: Veron maksaminen tapahtuu käytännössä siten, että osingon maksava yhtiö tekee osingon kokonaismäärästä 25,5 %:n ennakonpidätyksen ennen kuin maksaa osingon sinulle. Yhtiö myös tilittää ennakonpidätyksen Verohallinnolle.
            - paragraph [ref=e91]: Pörssiosakkeiden omistamisesta aiheutuu usein voiton hankkimiskuluja, kuten omaisuudenhoitopalkkioita. Ne vähennetään veronalaisesta osinkotulosta ja muista pääomatuloista, jolloin verotettava pääomatulosi pienenee. Ensin omaisuudenhoitopalkkioista kuitenkin vähennetään 50 euron omavastuuosuus.
            - paragraph [ref=e92]:
              - strong [ref=e93]: "Esimerkki:"
              - text: Aleksi on sijoittanut pörssiosakkeisiin. Vuonna 2025 hän saa niistä osinkoa 10 000 euroa eikä hänellä ole muita tuloja samana vuonna. Hän on maksanut 110 euron omaisuudenhoitopalkkion, joka kuuluu voiton hankkimiskuluihin.
              - text: "Aleksin verotettavan pääomatulon määrä lasketaan seuraavasti:"
              - text: 8 500 € (veronalainen osinkotulo 10 000 € × 85 %)
              - text: − 60 € (omaisuudenhoitopalkkio 110 € − omavastuuosuus 50 €)
              - text: = 8 440 € (verotettava pääomatulo).
              - text: Aleksi maksaa pääomatulostaan veroa 8 440 € × 30 % = 2 532 €.
              - text: Osinkoa maksaneen yhtiön tekemä ennakonpidätys on 10 000 € × 25,5 % = 2 550 €.
              - text: Näin ollen Aleksi saa osinkotulojen perusteella veronpalautusta 18 euroa (2 550 € − 2 532 €).
            - heading "Tarkista esitäytetty veroilmoitus" [level=2] [ref=e94]
