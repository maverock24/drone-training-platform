                  - heading "Milloin pääomatuloista voi tehdä työhuonevähennyksen?" [level=4] [ref=e100]:
                    - strong [ref=e101]: Milloin pääomatuloista voi tehdä työhuonevähennyksen?
                  - paragraph [ref=e102]: Jos työskentelet kotona pääomatulojen hankkimiseksi, voi vaatia myös työhuonevähennystä pääomatuloista.
                  - list [ref=e103]:
                    - listitem [ref=e104]: Jos työskentelet kotona jatkuvasti ja kokopäiväisesti pääomatulojen hankkimiseksi, voit vaatia 980 euron suuruista kaavamaista työhuonevähennystä.
                    - listitem [ref=e105]: Jos työskentelet kotona satunnaisesti pääomatulojen hankkimiseksi, voit vaatia 245 euron suuruista kaavamaista työhuonevähennystä. Esimerkiksi pelkkä passiivinen osakeomistus ei kuitenkaan ole sellaista työskentelyä kotona, jonka perusteella olisi oikeus työhuonevähennykseen.
                  - paragraph [ref=e106]:
                    - strong [ref=e107]: "Huomaa:"
                    - text: eri tuloista tehtävien kaavamaisten työhuonevähennysten yhteismäärä kalenterivuodessa voi olla enintään 980 euroa (vuonna 2025).
                  - paragraph [ref=e108]:
                    - strong [ref=e109]: Esimerkki 1.
                    - text: Ossi on palkansaaja ja hän käy päätoimisesti ansiotyössä. Ossi seuraa aktiivisesti talouselämää ja pörssikurssien kehitystä. Hänellä on kuukausittain vain muutama osakkeiden osto- tai myyntitapahtuma. Tämän lisäksi Ossilla on joitakin pitkään omistettuja osakkeita, joista hän saa vuosittain osinkotuloja.
                    - text: Ossin sijoitustoiminta on luonteeltaan pitkäaikaista ja passiivista osakeomistusta. Ossin vuosittain käymä arvopaperikauppa on sivutoimista ja vähäistä. Ossin työskentely kotona pääomatulojen hankkimiseksi on niin vähäistä, että hän ei voi vaatia pääomatuloistaan vähennettäväksi kaavamaista työhuonevähennystä.
                  - paragraph [ref=e110]:
                    - strong [ref=e111]: Esimerkki 2.
                    - text: Sirje omistaa kaksi asuinhuoneistoa. Sirje asuu itse toisessa asunnossa ja vuokraa toista asuntoa internetalustan kautta matkailijoiden lyhytaikaiseen käyttöön. Vuokralaiset vaihtuvat useita kertoja kuukaudessa.
                    - text: Sirje tekee kotonaan asunnon vuokraamiseen liittyviä töitä useita kertoja viikossa. Sirje voi vaatia pääomatuloista vähennettäväksi 245 euron suuruisen kaavamaisen työhuonevähennyksen, koska hän työskentelee kotonaan jatkuvasti, mutta ei kuitenkaan kokopäiväisesti eikä osapäiväisesti.
                  - paragraph [ref=e112]:
                    - strong [ref=e113]: Esimerkki 3.
                    - text: Sami on palkkatöissä ja työskentelee yli 50 % työajastaan kotona etätyössä. Hän saa
                    - strong [ref=e114]: vuonna 2025
                    - text: palkkatulosta 980 euron työhuonevähennyksen. Tämän lisäksi Sami ei voi enää tehdä työhuonevähennystä pääomatuloista.
                    - strong [ref=e115]: Vuonna 2026
                    - text: palkkatuloista ei voi enää tehdä työhuonevähennystä, jos työskentelee kotona tai vapaa-ajan asunnossa. Pääomatuloista voi tehdä kaavamaisen työhuonevähennyksen, jos vähennyksen edellytykset täyttyvät.
                    - link "Lue lisää työhuonevähennyksestä." [ref=e116] [cursor=pointer]:
