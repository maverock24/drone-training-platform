                  - paragraph [ref=e143]: Tulonhankkimisvelan korot vähennetään ensisijaisesti pääomatuloista, esimerkiksi vuokratuloista tai luovutusvoitosta. Velkapääoman lyhennyksiä ei voi vähentää verotuksessa.
