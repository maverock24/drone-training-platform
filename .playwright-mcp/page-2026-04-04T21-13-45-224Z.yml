              - paragraph [ref=e46]: Verotuksessa ETF-rahastoja käsitellään samalla tavalla kuin muitakin sijoitusrahastoja. ETF-sijoittaja maksaa pääomaveron ETF:stä saamastaan tuotosta ja osuuksien myynnistä saamistaan myynti- eli luovutusvoitoista.
              - paragraph [ref=e47]: Jos sijoittaja on yleisesti verovelvollinen Suomessa, hänen myyntivoittonsa verotetaan täällä. Jos käyttää Suomessa toimivaa välittäjää, kauppatietojen pitäisi kulkea suoraan verottajalle ja esitäytettyyn veroilmoitukseen. Sijoittajan vastuulle jää ilmoituksen tarkistaminen ja korjaaminen.
