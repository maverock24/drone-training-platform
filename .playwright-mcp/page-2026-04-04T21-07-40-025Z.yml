                - strong [ref=e125]: Arvo-osuustilille ja osakesäästötilille edulliset kaupankäyntipalkkiot
                - text: Arvo-osuustilillä käyt kauppaa ensimmäisen kuluvan kalenterineljänneksen ajan 0,10 % (min. 5 €) kaupankäyntipalkkiolla. Osakesäästötilillä käyt kauppaa ilman kaupankäyntipalkkioita ensimmäiset 30 päivää. Tämän jälkeen osakekaupat arvo-osuustilillä alkaen 0,05 % (min. 3 €) ja osakesäästötilillä alkaen 0,08 % (min 3 €). Arvo-osuustilille saat myös 1 %:n palkkiokaton kotimaisiin osakekauppoihin.
