      - generic [ref=e255]:
        - paragraph [ref=e256]: Tämä on mainos. Sijoittamisen palvelut tarjoaa osuuspankki. OP-rahastoja hallinnoi OP-Rahastoyhtiö Oy. Omistaja-asiakkuus edellyttää osuuspankin jäsenosuusmaksun maksamista, useimmiten maksu on 100 euroa. Tutustu op.fi/omistaja-asiakkuus. OP-bonuksia ei kerrytä OP-Euro-sijoitusrahasto, instituutiosarjat ja kolmansien osapuolten rahastot.
        - paragraph [ref=e257]: "OP Sijoitusvakuutuksen ja OP Kapitalisaatiosopimuksen myöntää OP-Henkivakuutus, jonka asiamiehenä osuuspankki toimii. Sijoitussidonnaiset vakuutukset kerryttävät OP-bonuksia, pois lukien yksilölliset sijoitusvakuutukset ja yksilölliset sijoitussopimukset. Vakuutussäästöihin liitettyjen rahastojen OP-bonusten kertymisen periaatteita yhdenmukaistetaan suorien sijoitusten kanssa. Seuraavat vakuutussäästöihin liitetyt rahastot eivät kerrytä OP-bonuksia: kolmansien osapuolten rahastot kuten JP Morganin rahastot, strukturoidut lainat ja instituutiosarjan rahastot."
