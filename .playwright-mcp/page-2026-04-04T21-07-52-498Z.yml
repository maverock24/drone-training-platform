            - paragraph [ref=e55]: Käy osakekauppaa aina edullisesti, sijoititpa sitten pienillä tai suuremmilla summilla. Maksat digikanavissa osakekaupankäynnistä Helsingin pörssissä aina enintään 1 prosentin kaupankäyntipalkkion.
        - generic [ref=e66]:
          - paragraph [ref=e67]: Mitä enemmän käyt kauppaa, sitä alhaisemmat ovat kaupankäyntikulusi. Hinnastossa on neljä tasoa. Hinnat kaupankäynnille määräytyvät edellisen kalenterineljänneksen osakekauppojesi palkkioiden summan perusteella.
          - heading "Uuden asiakkaan etu" [level=2] [ref=e68]
          - paragraph [ref=e69]: Kun avaat arvo-osuustilin, käyt kauppaa kuluvan kalenterineljänneksen ajan hinnaston tasolla kolme (0,10 %, min. 5 €). Esimerkiksi jos avaat arvo-osuustilin helmikuussa, saat tason kolme hinnat maaliskuun loppuun asti. Tämän jälkeen tasosi määräytyy osakekauppojesi palkkioiden summan perusteella.
          - paragraph [ref=e70]: Etu koskee digikanavassa avattua arvo-osuustiliä. Etua ei voi hyödyntää, jos sinulla on tai on ollut viimeisen vuoden aikana arvo-osuustili OP:lla.
