          - region "Artikkelin sisältö" [ref=e38]:
            - paragraph [ref=e40]: Mikä on vakuutuskuori? Kannattaako sijoitusvakuutuksiin tai kapitalisaatiosopimuksiin sijoittaminen? Hyödyt, haitat, kulut ja riskit yhdessä artikkelissa.
            - complementary "Kirjoittajan tiedot" [ref=e41]:
