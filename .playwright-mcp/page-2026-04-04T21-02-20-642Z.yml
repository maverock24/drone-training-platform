                - heading "Kapitalisaatiosopimus" [level=2] [ref=e71]
                - paragraph [ref=e72]: Kapitalisaatiosopimus poikkeaa muista vakuutustuotteista kuten säästö- ja sijoitusvakuutuksista siten, että kapitalisaatiosopimuksessa ei vakuuteta ketään. Kapitalisaatiosopimus on aina määräaikainen, koska ei ole mitään vakuutustapahtumaa, joka muutoin päättäisi sopimuksen. Kapitalisaatiosopimuksia markkinoidaan joskus myös esimerkiksi sijoitussopimuksina, säästösopimuksina tai varainhoitosopimuksina.
                - paragraph [ref=e73]: Kapitalisaatiosopimukset tulivat markkinoille 90-luvulla ensin yritysten ja yhteisöjen sijoitustoimintaan. Varainhoito on usein yksinkertaisin tehdä kapitalisaatiosopimuksen avulla. Kapitalisaatiosopimus näkyy yrityksen taseessa ostohintaan, eikä sijoitustoiminnasta tarvitse tehdä erillisiä kirjauksia taseeseen ennen rahojen nostoa ulos. Yksityisten eläkevakuutusten ja PS-tilien ehtojen heikennyttyä kapitalisaatiosopimukset ovat nousseet viime vuosina myös yksityisten sijoittajien suosioon.
                - heading "Vakuutuskuoren hyödyt" [level=2] [ref=e74]
                - paragraph [ref=e75]: Sijoitustoiminta vakuutuskuoren sisällä on verovapaata, joten osakekauppaa voi tehdä kuoren sisällä huoletta miettimättä verojen maksua. Verot maksetaan vasta siinä vaiheessa, kun rahat nostaa vakuutuskuoresta ulos.
                - paragraph [ref=e76]:
                  - text: Hyöty syntyy
                  - link "korkoa korolle -ilmiöstä" [ref=e77] [cursor=pointer]:
                    - /url: https://www.sijoittaja.fi/53597/korkoa-korolle/
                  - text: ": vuosittaiset verot, jotka normaalisti maksettaisiin osingoista ja luovutusvoitoista, voidaan vakuutuskuoren sisällä sijoittaa uudelleen ja jättää kasvamaan ns. korkoa korolle. Mitä pidempi sijoitusaika ja suuremmat tuotot, sitä suurempi hyöty vakuutuskuoresta saadaan."
                - paragraph [ref=e78]: Vakuutuskuoret antavat varakkaalle sijoittajalle mahdollisuuden piilottaa osakeomistuksensa julkisuudesta ja pörssiyhtiöiden omistajalistauksista. Suomessa suorissa osakeomistuksissa tavallisesti on hyvä läpinäkyvyys – osakkeet ja niiden määrä ovat julkista tietoa. Vakuutuskuoressa vakuutusyhtiö omistaa sijoituskohteet. Sijoittaja omistaa vain vakuutusyhtiön kanssa tehdyn sopimuksen, ja tuon sopimuksen sisältö ei ole julkista tietoa.
                - heading "Vakuutuskuoren kulut" [level=2] [ref=e79]
                - paragraph [ref=e80]: Useimmat sijoitusvakuutukset ja kapitalisaatiosopimukset tarjoavat sijoittajalle hyvin rajalliset ja usein myös kalliit sijoituskohteet. Sellaiset kapitalisaatiosopimukset tai vakuutuskuoret, joiden sisällä voi käydä kauppaa (lähes) yhtä vapaasti kuin omalla sijoitussalkulla, ovat mahdollisesti kannattavia yleensä vain kymmeniä tai satoja tuhansia sijoittaville. Tällöinkin sijoittajan kannattaa olla tarkkana vakuutuskuoresta maksamistaan kuluista ja tehdä omat laskelmat ennen sijoituspäätöksen tekoa.
                - paragraph [ref=e81]:
                  - text: Kilpailu sijoitusvakuutuksissa ja kapitalisaatiosopimuksissa on lisääntynyt, mikä on laskenut kuluja. Esimerkiksi
                  - link "Nordnetin Sijoitusvakuutus" [ref=e82] [cursor=pointer]:
                    - /url: https://www.sijoittaja.fi/399218/analyysissa-nordnetin-sijoitusvakuutus/
                  - text: on hyvä esimerkki matalakuluisesta vaihtoehdosta, jossa on laaja sijoitusvalikoima.
                - paragraph [ref=e83]: Kapitalisaatiosopimuksista ja sijoitusvakuutuksista saatetaan periä kuluja ja palkkioita monessa muodossa. Finanssivalvonnan mukaan tyypillisiä kuluja ovat mm. maksuista perittävät palkkiot (maksupalkkiot, kuormituspalkkiot), säästöistä perittävät palkkiot (hoitopalkkiot, hoitokulut), varainhoitokulut ja toimenpidepalkkiot (esim. säästöjen ennenaikaisesta nostamisesta) sekä säästö- ja sijoitusvakuutuksiin usein liitettävästä kuolemanvaraturvasta maksettava vakuutusmaksu. Lisäksi kuluja peritään sopimukseen liitetyistä sijoituskohteista kuten sijoitusrahastoista.
                - paragraph [ref=e84]: Ennen sopimuksen tekoa kannattaa pyytää vakuutusyhtiöltä tarjouslaskelma ns. nollatuottolaskelmana. Nollatuottolaskelmassa sijoitetuista varoista vähennetään kaikki sopimuksen kulut sillä oletuksella, että säästöjen tuotto on nolla. Nollatuottolaskelmasta on helppo nähdä kapitalisaatiosopimuksen kokonaiskulut.
                - heading "Vakuutuskuoren haitat ja riskit" [level=2] [ref=e85]
                - paragraph [ref=e86]: Vakuutuskuorien ehdottomasti huonoimpia puolia on niiden usein korkeat kustannukset, jotka varsinkin lyhyellä sijoitushorisontilla ja pienillä pääomilla ovat usein jopa suurempia kuin sopimuksesta saatavat verosäästöt. Lisäksi kapitalisaatiosopimuksessa tai sijoitusvakuutuksessa tehtyjen sijoitusten tappiot eivät ole millään tavoin verovähennyskelpoisia.
                - paragraph [ref=e87]: Vakuutuskuorien sisällä tehtäviin sijoituksiin liittyvät kaikki tavalliset sijoituksiin liittyvät riskit kuten markkinariski, korkoriski ja valuuttariski. Näiden lisäksi vakuutuskuorisijoittamisen riskeihin voidaan lukea ainakin vastapuoliriski ja poliittinen riski sekä likviditeettiriski.
                - paragraph [ref=e88]: Kapitalisaatiosopimuksilla tai sijoitusvakuutuksilla ei ole olemassa talletussuojaa vastaavaa järjestelyä, joten niihin liittyy aina vastapuoliriski eli riski siitä, että säästöt voidaan menettää, jos vakuutusyhtiö menee nurin. Vakuutusyhtiöiden konkurssit ovat kuitenkin harvinaisia, sillä Finanssivalvonta valvoo jatkuvasti vakuutusyhtiöiden vakavaraisuutta.
                - paragraph [ref=e89]: Merkittäviä riskejä pitkällä säästöajalla ovat poliittiset riskit ja sopimuksiin liitettävien sijoituskohteiden valikoiman muuttuminen sijoitusaikana. Viime vuosina vakuutuskuorten veroetuja on leikattu ilman varoitusta ja koskien myös vanhoja sopimuksia. On siis mahdollista, että tulevaisuudessa nähdään lisää näiden sijoitusinstrumenttien verotukseen liittyviä muutoksia.
                - paragraph [ref=e90]: Kolmas suuri riski on sijoittajan henkilökohtaiseen likviditeetin tarpeeseen liittyvä likviditeettiriski. Vakuutuskuoret ovat yleensä itsessään likvidejä, ja niistä on mahdollista nostaa rahat ulos milloin tahansa. Sijoittajalta saatetaan periä huomattaviakin kuluja rahojen ennenaikaisesta nostamisesta, jos sijoittajalle iskee esimerkiksi työttömyyden tai jonkin muun äkillisen tapahtuman seurauksena suunniteltua aiemmin tarve nostaa rahat ulos vakuutuskuoresta.
