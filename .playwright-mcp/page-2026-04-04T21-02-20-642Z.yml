              - article [ref=e47]:
                - heading "Vakuutuskuoret lyhyesti" [level=2] [ref=e48]
                - paragraph [ref=e49]: Vakuutusyhtiöt tarjoavat useita erilaisia vakuutuskuoria pitkäaikaissäästämiseen, joita yksityiset sijoittajat voivat käyttää verosuunnittelun apuvälineenä ja yritykset lisäksi kirjanpidon keventämiseen. Tyypillisimmät vakuutuskuoret ovat kapitalisaatiosopimus (myydään myös nimillä sijoitussopimus, säästämissopimus tai varainhoitosopimus), sijoitusvakuutus ja säästövakuutus.
                - paragraph [ref=e50]: Vakuutuskuori mahdollistaa verotuksen siirtämisen tulevaisuuteen, kun sijoitukset joskus nostetaan kuoresta ulos. Lainsäädännön muutokset ovat viime vuosina merkittävästi kaventaneet vakuutuskuorien verosuunnittelullisia etuja. Esimerkiksi lahja- ja perintösuunnittelussa niiden käyttömahdollisuudet ovat enää vähäisiä.
                - paragraph [ref=e51]: Vakuutuskuorisopimukset soveltuvat parhaiten ”avaimet käteen”-tyyppisiin yritysten tai yhteisöjen varainhoitoratkaisuihin sekä kymmeniä tai satoja tuhansia euroja sijoittavalle yksityishenkilölle pitkäaikaiseen (yli 10 vuoden) säästämiseen. Ennen sopimuksen tekoa kannattaa tinkiä ja kilpailuttaa sopimus tarkasti, koska sopimusten kulut syövät helposti koko verohyödyn. Ammattimaisesti suurella salkulla sijoittavalle suoraan sijoitusyhtiön kautta sijoittaminen tulee usein sijoitusvakuutusta tai kapitalisaatiosopimusta edullisemmaksi ratkaisuksi. Sijoitusyhtiö mahdollistaa myös monipuolisemmat sijoitusstrategiat ja sijoitusinstrumentit.
                - heading "Sijoitusvakuutus ja säästövakuutus" [level=2] [ref=e52]
                - paragraph [ref=e53]: Säästö- ja sijoitusvakuutukset ovat säästöhenkivakuutuksia, joilla voi säästää verotehokkaasti varoja tulevaisuuden varalle – esimerkiksi eläkettä varten. Verotus realisoituu vasta varojen nostovaiheessa, mikä mahdollistaa tuottojen kertymisen korkoa korolle -efektin avulla. Säästövakuutuksen voi yleensä keskeyttää ja nostaa varat käyttöön jo ennen sopimuksen päättymistä.
                - paragraph [ref=e54]: Vakuutussäästöjä voidaan kerryttää myös toisen henkilön hyväksi. Voit valita omaan sijoitusvakuutukseesi säästöjen edunsaajaksi lapsen. Säästöt siirtyvät edunsaajaksi valitulle lapselle sopimuksen päätyttyä. Lapselle voi myös avata oman sijoitusvakuutuksen.
                - paragraph [ref=e55]: Sijoitusvakuutukset eroavat muista säästömuodoista siinä, että ne ovat vakuutussopimuksia, joissa on nimetty vakuutettu ja usein myös edunsaaja. Näihin liitetään tyypillisesti pieni kuolemanvaraturva, jotta sopimus täyttää henkivakuutuksen tunnusmerkit. Kuolemantapauksessa säästöt voidaan maksaa nimetylle edunsaajalle, mikä mahdollistaa perintösuunnittelun hallitusti – tosin ilman aiempia verovapauksia.
