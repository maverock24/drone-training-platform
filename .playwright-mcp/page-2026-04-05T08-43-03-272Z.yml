        - generic [ref=e67]:
          - heading "Mitä taloyhtiön putkiremontti maksaa?" [level=2] [ref=e68]
          - paragraph [ref=e69]: Perinteinen linjasaneeraus maksaa taloyhtiön osakkaalle keskimäärin 50 000 euroa asuntoa kohden. Neliöhinnat liikkuvat yleensä 500–1500 eurossa.
          - paragraph [ref=e70]:
            - text: ”Huoneistokohtainen hinta antaa realistisemman kuvan putkiremontin hinnasta. Esimerkiksi 60 ja 40 neliön asunnolle kokonaiskustannus on lähes sama, mikäli kummassakin asunnossa on kylpyhuoneita vain yksi”, sanoo Susteran taloyhtiöpalveluiden osastonjohtaja
            - strong [ref=e71]: Jarno Nurminen
            - text: .
          - 'heading "Putkiremontin kustannukset: mikä sisältyy ja mikä ei?" [level=2] [ref=e72]'
          - paragraph [ref=e73]: Taloyhtiön putkiremontin hinta pitää sisällään urakka- ja asiantuntijapalveluista syntyvät kulut. Myös rakennuslupamaksut, tiedotus, rahoituskulut ja mahdolliset lisätyöt lasketaan mukaan budjettiin. Urakkaan kuuluvia maksuja ovat työvoima-, materiaali- ja työmaakulut. Asiantuntijapalveluita taas suunnittelusta, projektinjohdosta, kuntotutkimuksista ja valvonnasta syntyvät kustannukset.
          - paragraph [ref=e74]: Osakkaalle syntyy myös taloyhtiön yhteisten kulujen lisäksi muita kustannuksia. Taloyhtiön remontin hintaan ei sisälly erikoislaatat, lattialämmitykset tai muut peruspakettiin kuulumattomat ratkaisut. Lisäksi remontti vaatii usein tilapäismajoitusta, josta syntyy osakkaalle lisäkustannuksia.
          - heading "Eniten hintaan vaikuttaa remontin sisältö" [level=3] [ref=e75]
          - paragraph [ref=e76]: Taloyhtiön putkiremontteja toteutetaan hyvin erilaisilla laajuuksilla. Putkiremonttiin voi kuulua viemäri- ja vesiputkien, ilmanvaihto-, tele- ja sähköjärjestelmien sekä märkätilojen kunnostamista tai uusimista. Remontti voidaan myös laajentaa huoneistoista talon yleisiin tiloihin, kuten saunaan tai pesutupaan.
          - paragraph [ref=e77]:
            - text: ”Erilaisten järjestelmien ja tilojen remontoiminen yhtä aikaa on suositeltavaa. Kun esimerkiksi
            - link "perinteisessä putkiremontissa" [ref=e78] [cursor=pointer]:
              - /url: https://sustera.fi/ajankohtaista/blogi/perinteinen-putkiremontti-vai-sukittaminen-nain-valitset-oikean-menetelman-putkiremontin-toteuttamiseen/
            - text: uusitaan LVISA-järjestelmien lisäksi märkätilat, se tulee 20 % erillisiä remontteja halvemmaksi”.
          - paragraph [ref=e79]:
            - text: ”Kaikkea kannattaa harvoin kuitenkaan remontoida kerralla. Me
            - link "projektipäälliköt" [ref=e80] [cursor=pointer]:
              - /url: https://sustera.fi/palvelu/yritykset/rakennuttaminen-ja-valvonta/projektinjohto-ja-rakennuttaminen/
            - text: autamme taloyhtiöitä järkevän kokonaisuuden valinnassa”.
          - heading "Talolla on väliä" [level=3] [ref=e81]
          - paragraph [ref=e82]: Putkiremontin hintaan vaikuttaa paitsi sisältö se, millainen talo on remontin kohteena. Esimerkiksi kiinteistön koolla, iällä, rakenneratkaisuilla ja huoneistojen määrällä on merkitystä.
          - paragraph [ref=e83]: ”Suuremmassa talossa hinta on asuntoa kohden usein edullisempi, koska kustannukset jakautuvat useamman osakkaan kesken.”
          - paragraph [ref=e84]: Monimuotoinen jugend-rakennus on kalliimpi kuin suoralinjainen elementtitalo, jossa työt ovat usein suoraviivaisempia ja nopeampia. Saman ikäisissä rakennuksissa voi myös olla vaihtelua.
          - paragraph [ref=e85]: ”Esimerkiksi osassa 1960–70-luvulla rakennetuista kerrostaloista on tehdasvalmisteiset, suoraan paikalleen nostetut peltikylpyhuoneet. Ratkaisussa putket kulkevat niin sanotun kopin rakenteiden sisällä, mikä tekee rakenteisiin pääsyn haastavammaksi ja siten remontoinnin kalliimmaksi”.
          - heading "Laatutasolla on yllättävän pieni merkitys hintaan" [level=3] [ref=e86]
          - paragraph [ref=e87]: Putkiremontin laatutaso koostuu huoneistojen ja yleisten tilojen materiaali- kaluste- ja viimeistelyvalinnoista. Yleensä se jaetaan perus-, keski- ja korkeatasoisiin ratkaisuihin. Perustasolla tarkoitetaan edullisia ja toimivia perusratkaisuja, keskitasolla hieman laadukkaampia materiaaleja ja kalusteita, ja korkealla tasolla kylpylämäisiä ratkaisuja.
          - paragraph [ref=e88]: ”Laattojen ja kalusteiden vaikutus remontin hintaan on luultua vähäisempi. Kustannus on tyypillisesti satasia huoneistoa kohti”.
