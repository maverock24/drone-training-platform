                  - generic [ref=e814]: "Core Architecture: How Vision Transformers Process Images"
                - generic [ref=e815]:
                  - paragraph [ref=e816]:
                    - text: The Vision Transformer architecture, introduced as
                    - button "ViT" [ref=e817]
                    - text: ", reimagines how neural networks process visual information by borrowing the sequence-to-sequence paradigm from natural language processing. Understanding this architecture in detail is essential for any drone"
                    - button "AI" [ref=e818]
                    - text: engineer because every subsequent optimization, deployment, and fine-tuning decision depends on grasping how data flows through the model.
                  - paragraph [ref=e819]: The process begins with patch embedding. An input image of dimensions H by W with C color channels is divided into a regular grid of non-overlapping patches, each of size P by P pixels. For a standard configuration with 224 by 224 pixel images and 16 by 16 pixel patches, this produces a sequence of 196 patches. Each patch is then flattened into a one-dimensional vector and projected through a learnable linear layer (equivalently implemented as a convolution operation with kernel size and stride both equal to P) to produce a fixed-dimensional embedding vector. If the embedding dimension is 768, then each of the 196 patches becomes a 768-dimensional token, and the entire image is represented as a matrix of shape (196, 768).
                  - paragraph [ref=e820]:
                    - text: This flattening and projection step is conceptually simple but computationally elegant. By using a convolutional layer with stride equal to the patch size, the network simultaneously extracts and projects all patches in a single operation, avoiding the computational overhead of manually slicing and reshaping the image tensor. This is a critical implementation detail that directly affects
                    - button "inference" [ref=e821]
                    - button "latency" [ref=e822]
                    - text: on edge devices like the Jetson Orin.
                  - paragraph [ref=e823]:
                    - text: After patch embedding, the architecture introduces positional encodings. Unlike convolutional networks, which inherently encode spatial relationships through the structure of their filters, transformers process tokens as unordered sets. Without additional information, the model would have no way to distinguish a patch from the top-left corner of the image from one in the bottom-right. Positional encodings, which are learnable vectors added element-wise to each patch embedding, provide this spatial context. The model learns during
                    - button "training" [ref=e824]
                    - text: that certain positions correspond to certain regions of the visual field, enabling it to reason about spatial relationships.
                  - paragraph [ref=e825]: "The augmented sequence of patch embeddings is then prepended with a special classification token, commonly referred to as the CLS token. This is a learnable embedding that does not correspond to any specific image patch. Instead, it serves as an aggregation point: as the sequence passes through the transformer encoder layers, the CLS token accumulates information from all patches through the attention mechanism. At the output of the final encoder layer, the representation of the CLS token is extracted and passed through a classification head (typically a simple multi-layer perceptron) to produce the final prediction."
                  - paragraph [ref=e826]: "The transformer encoder itself consists of a stack of identical layers, each containing two sub-layers. The first is a multi-head self-attention mechanism. Self-attention computes three projections for each token: a query, a key, and a value. The attention score between any two tokens is the dot product of their query and key vectors, normalized by the square root of the key dimension and passed through a softmax function. This produces attention weights that determine how much each token should attend to every other token. The weighted sum of value vectors produces the attention output. Multi-head attention runs this process multiple times in parallel with different learned projections, allowing the model to capture different types of relationships simultaneously."
                  - paragraph [ref=e827]: The second sub-layer is a position-wise feed-forward network, which applies two linear transformations with a GELU activation function in between to each token independently. This component, controlled by the mlp_ratio parameter, expands the representation to a higher dimension (typically four times the embedding dimension) before projecting it back, allowing the network to learn complex non-linear transformations of each token representation.
                  - paragraph [ref=e828]:
                    - text: Both sub-layers employ residual connections and layer normalization. The residual connections add the input of each sub-layer to its output, preventing gradient degradation in deep networks. Layer normalization normalizes the activations across the feature dimension for each token independently, stabilizing the
                    - button "training" [ref=e829]
                    - text: process and enabling faster convergence. This pre-norm or post-norm placement is a design choice that affects
                    - button "training" [ref=e830]
                    - text: dynamics.
                  - paragraph [ref=e831]:
                    - text: For drone applications, the key insight is that after just one encoder layer, every patch token has already been influenced by the content of every other patch in the image. This is fundamentally different from a
                    - button "CNN" [ref=e832]
                    - text: ", where achieving a comparable receptive field requires stacking many layers of convolutions. For aerial imagery where relevant context can be spatially distributed across the entire frame, this global connectivity from the very first layer is transformative."
              - generic [ref=e833]:
                - generic [ref=e835]:
                  - img [ref=e836]
                  - text: Key Takeaways
                - list [ref=e839]:
                  - listitem [ref=e840]: Patch embedding converts image patches into token sequences using a convolution with stride equal to patch size, creating an efficient bridge between image data and transformer processing
                  - listitem [ref=e842]: Positional encodings are essential because transformers have no inherent spatial awareness, and they enable the model to learn spatial relationships between patches
                  - listitem [ref=e844]: The CLS token aggregates global information through attention layers and serves as the single representation from which classification decisions are made
                  - listitem [ref=e846]: Multi-head self-attention allows every patch to attend to every other patch from the first layer, providing immediate global context
