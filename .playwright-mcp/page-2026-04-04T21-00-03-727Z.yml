            - paragraph [ref=e92]: Osakesäästötilin sisällä voit ostaa ja myydä pörssiosakkeita niin, ettei sinun tarvitse maksaa veroa yksittäisistä myynneistä. Myöskään osinkoja ja korkotuloja ei veroteta vielä siinä vaiheessa, kun ne tulevat osakesäästötilille. Osakesäästötilin tuotto verotetaan vasta silloin, kun nostat sieltä rahaa.
            - heading "Miten osakesäästötili toimii?" [level=2] [ref=e93]
            - paragraph [ref=e94]:
              - text: Osakesäästötilissä on erikseen
              - strong [ref=e95]: rahatili
              - text: ja
              - strong [ref=e96]: osakkeiden säilytystili.
            - paragraph [ref=e97]: Osakesäästötilille voi sijoittaa enintään 100 000 euroa rahaa. Voit laittaa rahat tilille kaikki yhdellä kertaa tai useampana talletuksena. Osakesäästötilille voit sijoittaa vain rahaa – et siis voi siirtää sinne omistamiasi osakkeita.
            - paragraph [ref=e98]:
              - text: Osakesäästötilillä voi kuitenkin olla samaan aikaan sekä rahaa että osakkeita. Voit ostaa ja myydä osakkeita tilin sisällä ilman veroja. Voit myös sijoittaa saamiasi osinkoja tai korkoja uusiin osakkeisiin.
              - strong [ref=e99]: Osakesäästötilin tuotto verotetaan vasta siinä vaiheessa, kun nostat sieltä varoja pois.
            - paragraph [ref=e100]: Osakesäästötililtä voit nostaa vain rahaa, joten sinun tulee myydä mahdolliset osakkeet ennen varojen nostamista. Voit nostaa tililtä rahaa milloin tahansa. Nostoja ei siis ole rajattu mihinkään tiettyyn talletusaikaan.
            - paragraph [ref=e101]:
              - strong [ref=e102]: Jos osakesäästötilisi tuottaa tappiota, voit vähentää tappion pääomatuloistasi ainoastaan sinä vuonna, kun lopetat osakesäästötilin.
              - text: Tappiota ei siis vähennetä vielä siinä vaiheessa, kun nostat varoja tililtä.
            - heading "Pankki hoitaa ennakonpidätyksen – tarkista esitäytetty veroilmoituksesi" [level=2] [ref=e103]
            - paragraph [ref=e104]:
              - text: Kun nostat varoja osakesäästötililtä, varat jaetaan
              - strong [ref=e105]: tuottoon
              - text: ja
              - strong [ref=e106]: pääomaan
              - text: . Tuotto on veronalaista tuloa, pääoma taas verotonta. Pankki tai muu palveluntarjoaja laskee tuoton puolestasi ja perii ennakonpidätyksen, joka on 30 % tuotosta.
            - paragraph [ref=e107]: Jos olet nostanut varoja osakesäästötililtä verovuoden aikana, tuoton määrä ja ennakonpidätys siirtyvät esitäytettyyn veroilmoitukseesi automaattisesti. Sinun ei siis tarvitse ilmoittaa tietoja erikseen – riittää, että tarkistat tiedot, kun saat esitäytetyn veroilmoituksen. Osakesäästötilin tuotto näkyy veroilmoituksen kohdassa "Osakesäästötilin tuotto ja tappio".
            - paragraph [ref=e108]: Jos et ole nostanut varoja osakesäästötililtä verovuoden aikana, veroilmoituksen kohdassa "Osakesäästötilin tuotto ja tappio" ei näy tuottoa. Osakesäästötilin tiedot ja tilillä olevien varojen käypä arvo näkyvät kuitenkin kohdassa "Varat".
            - paragraph [ref=e109]: Palveluntarjoaja yleensä vähentää palvelumaksunsa tai muut kulut osakesäästötilisi rahatililtä. Silloin et voi vähentää niitä muista pääomatuloistasi.
            - paragraph [ref=e110]: Jos otat velkaa sijoittaaksesi rahaa osakesäästötilille, kyseinen velka on tulonhankkimisvelkaa. Tulonhankkimisvelan korot vähennetään kaikista pääomatuloista täysimääräisinä. Tarkista, että velan käyttötarkoitus on merkitty oikein esitäytettyyn veroilmoitukseesi.
            - heading "Miten tuotto lasketaan?" [level=2] [ref=e111]
            - paragraph [ref=e112]: "Voit määrittää osakesäästötilisi tuoton seuraavalla tavalla:"
            - list [ref=e113]:
