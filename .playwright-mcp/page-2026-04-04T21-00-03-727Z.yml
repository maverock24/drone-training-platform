                - text: ": Sari on tallettanut osakesäästötilille 10 000 euroa, joilla hän on ostanut suomalaisen pörssiyhtiön osakkeita. Osakkeiden arvo on noussut 5 000 euroa. Tällöin tilin varojen käypä arvo on 15 000 euroa ja voitto 5 000 euroa."
                - text: "Sari myy tilillään olevia osakkeita ja nostaa tililtä rahaa 1 500 euroa. Tästä summasta on veronalaista pääomatuloa 500 euroa:"
                - text: 5 000 euroa (voitto) / 15 000 euroa (käypä arvo) × 1 500 euroa (nostettu määrä) = 500 euroa.
                - text: Tililtä nostetun rahamäärän loppuosa eli 1 000 euroa (1 500 € − 500 €) on verovapaata pääoman nostoa. Sarin tallettaman pääoman määräksi jää 9 000 euroa (10 000 € − 1 000 €).
              - paragraph [ref=e121]: Esimerkki päättyy
