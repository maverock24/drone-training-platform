                - text: Keijo sijoittaa osakesäästötilille 10 000 euroa ja ostaa koko summalla osakkeita. Osakkeiden arvo laskee vuoden aikana 7 000 euroon. Keijo nostaa osakesäästötililtä 2 000 euroa. Summasta ei mene veroa, koska osakesäästötili on tappiolla. Tappion voi vähentää verotuksessa vasta sinä vuonna, kun Keijo lopettaa tilin.
              - paragraph [ref=e126]: Esimerkki päättyy
            - paragraph [ref=e127]: Osakesäästötilin käypään arvoon lasketaan tilillä olevat rahavarat ja osakkeiden arvo nostohetkellä. Pörssiosakkeiden arvona käytetään nostopäivää edeltävän päivän päätöskurssia.
            - heading "Osakesäästötilejä voi olla vain yksi" [level=2] [ref=e128]: Osakesäästötilejä voi olla vain yksi
            - paragraph [ref=e129]: Sinulla voi olla kerrallaan vain yksi osakesäästötili. Tämä on tärkeää huomata, koska jos sinulla on samaan aikaan käytössäsi useita osakesäästötilejä, Verohallinto määrää jokaiselle niistä 10 euron veronkorotuksen päivää kohti.
            - paragraph [ref=e130]: Jos haluat vaihtaa pankkia, voit siirtää osakesäästötilillesi kertyneet varat suoraan toiseen pankkiin. Sinun ei siis tarvitse myydä osakkeita eikä maksaa veroa siirron yhteydessä. Siinä tapauksessa sinun pitää irtisanoa sopimus aiemmasta osakesäästötilistäsi vanhan pankkisi kanssa ja tehdä sopimus uudesta osakesäästötilistä uuden pankkisi kanssa. Varasi siirretään uudelle tilille heti aiemman sopimuksesi päättyessä.
