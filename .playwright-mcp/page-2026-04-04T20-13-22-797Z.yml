                    - img [ref=e905]
                - paragraph [ref=e907]:
                  - text: Pyportfolioopt supports Black-Litterman asset allocation, which allows you to combine a prior estimate of returns (e.g the market-implied returns) with your own views to form a posterior estimate. This results in much better estimates of expected returns than just using the mean historical return. Check out the
                  - link "docs" [ref=e908] [cursor=pointer]:
