                    - img [ref=e944]
                - list [ref=e946]:
                  - listitem [ref=e947]: Includes both classical methods (Markowitz 1952 and Black-Litterman), suggested best practices (e.g covariance shrinkage), along with many recent developments and novel features, like L2 regularisation, shrunk covariance, hierarchical risk parity.
                  - listitem [ref=e948]: "Native support for pandas dataframes: easily input your daily prices data."
                  - listitem [ref=e949]: Extensive practical tests, which use real-life data.
