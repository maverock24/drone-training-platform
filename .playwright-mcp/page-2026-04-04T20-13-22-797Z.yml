                - paragraph [ref=e880]:
                  - text: One issue with mean-variance optimization is that it leads to many zero-weights. While these are "optimal" in-sample, there is a large body of research showing that this characteristic leads mean-variance portfolios to underperform out-of-sample. To that end, I have introduced an objective function that can reduce the number of negligible weights for any of the objective functions. Essentially, it adds a penalty (parameterised by
                  - code [ref=e881]: gamma
                  - text: ) on small weights, with a term that looks just like L2 regularisation in machine learning. It may be necessary to try several
                  - code [ref=e882]: gamma
                  - text: values to achieve the desired number of non-negligible weights. For the test portfolio of 20 securities,
                  - code [ref=e883]: gamma ~ 1
                  - text: is sufficient
                - generic [ref=e884]:
                  - generic [ref=e885]:
                    - text: "from pypfopt import objective_functions ef = EfficientFrontier(mu, S) ef.add_objective(objective_functions.L2_reg, gamma=1) for name, value in ef.max_sharpe().items(): print("
