                - list [ref=e840]:
                  - listitem [ref=e841]: "Long/short: by default all of the mean-variance optimization methods in PyPortfolioOpt are long-only, but they can be initialised to allow for short positions by changing the weight bounds:"
                - generic [ref=e842]:
