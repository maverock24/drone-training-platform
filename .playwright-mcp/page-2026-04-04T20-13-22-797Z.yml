                - generic [ref=e741]:
                  - heading "An overview of classical portfolio optimization methods" [level=2] [ref=e742]
                  - 'link "Permalink: An overview of classical portfolio optimization methods" [ref=e743] [cursor=pointer]':
                    - /url: "#an-overview-of-classical-portfolio-optimization-methods"
                    - img [ref=e744]
                - paragraph [ref=e746]:
                  - text: Harry Markowitz's 1952 paper is the undeniable classic, which turned portfolio optimization from an art into a science. The key insight is that by combining assets with different expected returns and volatilities, one can decide on a mathematically optimal allocation which minimises the risk for a target return – the set of all such optimal portfolios is referred to as the
                  - strong [ref=e747]: efficient frontier
                  - text: .
                - paragraph [ref=e748]:
                  - link [ref=e749] [cursor=pointer]:
                    - /url: https://github.com/PyPortfolio/PyPortfolioOpt/blob/main/media/efficient_frontier_white.png?raw=true
                    - img [ref=e750]
                - paragraph [ref=e751]: Although much development has been made in the subject, more than half a century later, Markowitz's core ideas are still fundamentally important and see daily use in many portfolio management firms. The main drawback of mean-variance optimization is that the theoretical treatment requires knowledge of the expected returns and the future risk-characteristics (covariance) of the assets. Obviously, if we knew the expected returns of a stock life would be much easier, but the whole game is that stock returns are notoriously hard to forecast. As a substitute, we can derive estimates of the expected return and covariance based on historical data – though we do lose the theoretical guarantees provided by Markowitz, the closer our estimates are to the real values, the better our portfolio will be.
                - paragraph [ref=e752]: Thus this project provides four major sets of functionality (though of course they are intimately related)
                - list [ref=e753]:
                  - listitem [ref=e754]: Estimates of expected returns
                  - listitem [ref=e755]: Estimates of risk (i.e covariance of asset returns)
                  - listitem [ref=e756]: Objective functions to be optimized
                  - listitem [ref=e757]: Optimizers.
                - paragraph [ref=e758]:
                  - text: A key design goal of PyPortfolioOpt is
                  - strong [ref=e759]: modularity
                  - text: – the user should be able to swap in their components while still making use of the framework that PyPortfolioOpt provides.
                - generic [ref=e760]:
                  - heading "Features" [level=2] [ref=e761]
                  - 'link "Permalink: Features" [ref=e762] [cursor=pointer]':
                    - /url: "#features"
                    - img [ref=e763]
                - paragraph [ref=e765]:
                  - text: In this section, we detail some of PyPortfolioOpt's available functionality. More examples are offered in the Jupyter notebooks
                  - link "here" [ref=e766] [cursor=pointer]:
                    - /url: https://github.com/pyportfolio/pyportfolioopt/tree/main/cookbook
                  - text: . Another good resource is the
                  - link "tests" [ref=e767] [cursor=pointer]:
                    - /url: https://github.com/pyportfolio/pyportfolioopt/tree/main/tests
                  - text: .
                - paragraph [ref=e768]:
                  - text: A far more comprehensive version of this can be found on
                  - link "ReadTheDocs" [ref=e769] [cursor=pointer]:
                    - /url: https://pyportfolioopt.readthedocs.io/en/latest/
                  - text: ", as well as possible extensions for more advanced users."
                - generic [ref=e770]:
                  - heading "Expected returns" [level=3] [ref=e771]
                  - 'link "Permalink: Expected returns" [ref=e772] [cursor=pointer]':
                    - /url: "#expected-returns"
                    - img [ref=e773]
                - list [ref=e775]:
                  - listitem [ref=e776]:
                    - text: "Mean historical returns:"
                    - list [ref=e777]:
                      - listitem [ref=e778]: the simplest and most common approach, which states that the expected return of each asset is equal to the mean of its historical returns.
                      - listitem [ref=e779]: easily interpretable and very intuitive
                  - listitem [ref=e780]:
                    - text: "Exponentially weighted mean historical returns:"
                    - list [ref=e781]:
                      - listitem [ref=e782]: similar to mean historical returns, except it gives exponentially more weight to recent prices
                      - listitem [ref=e783]: it is likely the case that an asset's most recent returns hold more weight than returns from 10 years ago when it comes to estimating future returns.
                  - listitem [ref=e784]:
                    - text: "Capital Asset Pricing Model (CAPM):"
                    - list [ref=e785]:
                      - listitem [ref=e786]: a simple model to predict returns based on the beta to the market
                      - listitem [ref=e787]: this is used all over finance!
                - generic [ref=e788]:
                  - heading "Risk models (covariance)" [level=3] [ref=e789]
                  - 'link "Permalink: Risk models (covariance)" [ref=e790] [cursor=pointer]':
                    - /url: "#risk-models-covariance"
                    - img [ref=e791]
                - paragraph [ref=e793]: The covariance matrix encodes not just the volatility of an asset, but also how it correlated to other assets. This is important because in order to reap the benefits of diversification (and thus increase return per unit risk), the assets in the portfolio should be as uncorrelated as possible.
                - list [ref=e794]:
                  - listitem [ref=e795]:
                    - text: "Sample covariance matrix:"
                    - list [ref=e796]:
                      - listitem [ref=e797]: an unbiased estimate of the covariance matrix
                      - listitem [ref=e798]: relatively easy to compute
                      - listitem [ref=e799]: the de facto standard for many years
                      - listitem [ref=e800]: however, it has a high estimation error, which is particularly dangerous in mean-variance optimization because the optimizer is likely to give excess weight to these erroneous estimates.
                  - listitem [ref=e801]: "Semicovariance: a measure of risk that focuses on downside variation."
                  - listitem [ref=e802]: "Exponential covariance: an improvement over sample covariance that gives more weight to recent data"
                  - listitem [ref=e803]:
                    - text: "Covariance shrinkage: techniques that involve combining the sample covariance matrix with a structured estimator, to reduce the effect of erroneous weights. PyPortfolioOpt provides wrappers around the efficient vectorised implementations provided by"
                    - code [ref=e804]: sklearn.covariance
                    - text: .
                    - list [ref=e805]:
                      - listitem [ref=e806]: manual shrinkage
                      - listitem [ref=e807]:
                        - text: "Ledoit Wolf shrinkage, which chooses an optimal shrinkage parameter. We offer three shrinkage targets:"
                        - code [ref=e808]: constant_variance
                        - text: ","
                        - code [ref=e809]: single_factor
                        - text: ", and"
                        - code [ref=e810]: constant_correlation
                        - text: .
                      - listitem [ref=e811]: Oracle Approximating Shrinkage
                  - listitem [ref=e812]:
                    - text: "Minimum Covariance Determinant:"
                    - list [ref=e813]:
                      - listitem [ref=e814]: a robust estimate of the covariance
                      - listitem [ref=e815]:
                        - text: implemented in
                        - code [ref=e816]: sklearn.covariance
                - paragraph [ref=e817]:
                  - link [ref=e818] [cursor=pointer]:
                    - /url: https://github.com/PyPortfolio/PyPortfolioOpt/blob/main/media/corrplot_white.png?raw=true
                    - img [ref=e819]
                - paragraph [ref=e820]:
                  - text: (This plot was generated using
                  - code [ref=e821]: plotting.plot_covariance
                  - text: )
                - generic [ref=e822]:
                  - heading "Objective functions" [level=3] [ref=e823]
                  - 'link "Permalink: Objective functions" [ref=e824] [cursor=pointer]':
                    - /url: "#objective-functions"
                    - img [ref=e825]
                - list [ref=e827]:
                  - listitem [ref=e828]:
                    - text: "Maximum Sharpe ratio: this results in a"
                    - emphasis [ref=e829]: tangency portfolio
                    - text: because on a graph of returns vs risk, this portfolio corresponds to the tangent of the efficient frontier that has a y-intercept equal to the risk-free rate. This is the default option because it finds the optimal return per unit risk.
                  - listitem [ref=e830]:
                    - text: Minimum volatility. This may be useful if you're trying to get an idea of how low the volatility
                    - emphasis [ref=e831]: could
                    - text: be, but in practice it makes a lot more sense to me to use the portfolio that maximises the Sharpe ratio.
                  - listitem [ref=e832]: Efficient return, a.k.a. the Markowitz portfolio, which minimises risk for a given target return – this was the main focus of Markowitz 1952
                  - listitem [ref=e833]: "Efficient risk: the Sharpe-maximising portfolio for a given target risk."
                  - listitem [ref=e834]: Maximum quadratic utility. You can provide your own risk-aversion level and compute the appropriate portfolio.
                - generic [ref=e835]:
