                    - code [ref=e851]: efficient_risk
                    - text: and
                    - code [ref=e852]: efficient_return
                    - text: "methods, PyPortfolioOpt provides an option to form a market-neutral portfolio (i.e weights sum to zero). This is not possible for the max Sharpe portfolio and the min volatility portfolio because in those cases because they are not invariant with respect to leverage. Market neutrality requires negative weights:"
