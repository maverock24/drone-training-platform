                - paragraph [ref=e178]:
                  - text: PTT:n ennuste poikkeaa monen muuan asuntomarkkinoita seuraavan tahon näkemyksestä. Esimerkiksi
                  - link "Danske Bank ennustaa" [ref=e179] [cursor=pointer]:
                    - /url: https://yle.fi/a/74-20199268
                  - text: tälle vuodelle vajaan prosentin hintojen nousua,
                  - link "Hypo odottaa" [ref=e180] [cursor=pointer]:
                    - /url: https://yle.fi/a/74-20198933
                  - text: prosentin nousua ja
                  - link "Nordea arvioi" [ref=e181] [cursor=pointer]:
                    - /url: https://yle.fi/a/74-20189707
                  - text: hintojen nousevan puolitoista prosenttia. Myös
                  - link "kiinteistövälittäjät" [ref=e182] [cursor=pointer]:
                    - /url: https://yle.fi/a/74-20207147
                  - text: ovat olleet toiveikkaita.
                - paragraph [ref=e183]:
                  - text: PTT:n vanhempi ekonomisti
                  - strong [ref=e184]: Veera Holappa
                  - text: arvioi, että varovaisena pysyvä talouskasvu ei riitä kääntämään asuntomarkkinoita nopeaan nousuun.
                - paragraph [ref=e185]: – Asteittainen elpyminen on todennäköistä, mutta selkeämpi piristyminen edellyttää vahvempaa talouskasvua, työllisyyden kohenemista ja kuluttajien luottamuksen vahvistumista. Kotitalouksien epävarmuudesta on tullut tehokas jarru asuntokaupan palautumiselle, Holappa sanoo tiedotteessa.
                - paragraph [ref=e186]: Hintojen laskua selittää kotitalouksien epävarman talousluottamuksen lisäksi toinenkin syy eli runsas asuntojen tarjonta. Se on osaltaan johtanut vuokrien heikkoon kehitykseen.
                - paragraph [ref=e187]: Viime vuonna vuokrat nousivat aavistuksen, mutta tänä vuonna PTT ennustaa niiden taas laskevan hiukan.
                - paragraph [ref=e188]: Tämä on omiaan pitämään asuntosijoittajia poissa markkinoilta.
                - heading "Hinnat matelevat, kauppamäärät viriävät" [level=2] [ref=e189]
                - paragraph [ref=e190]: Orastavasta asuntomarkkinoiden käänteestä kertoo kuitenkin se, että viime vuonna kauppamäärät kasvoivat jo selvästi.
                - paragraph [ref=e191]: Kiinteistönvälittäjien kautta tehtyjen asuntokauppojen määrä kasvoi koko maassa viime vuonna yli kymmenen prosenttia. Kasvu painottui selvästi pääkaupunkiseudulle, jossa vanhojen kerrostaloasuntojen kauppamäärät nousivat 19 prosenttia. Koko maan tasolla vanhoja kerrostaloasuntoja myytiin keskimäärin noin 2 300 kappaletta kuukaudessa, PTT:n ennusteessa sanotaan.
                - paragraph [ref=e192]: Myyntiaikojen tasaantuminen viittaa siihen, että kysyntä on kääntymässä vähitellen parempaan, vaikka markkina toimii edelleen vaisulla tasolla. Tänä vuonna myyntiaikojen lyhentymisen ennakoidaan jatkuvan ja kauppamäärien kasvavan jonkin verran.
                - figure [ref=e193]
                - paragraph [ref=e195]: Holappa arvioi, että rakennusalalla käänne parempaan nähdään aikaisintaan ensi vuonna. Vaisua rakentamista ennakoi se, että myönnettyjen rakennuslupien määrä jatkaa laskussa.
                - paragraph [ref=e196]: Holapan mukaan asuntorakentamisen lamasta ei ole helppoa tietä ylös, vaan toipuminen tapahtuu hitaasti.
                - paragraph [ref=e197]: – Alan suhdannevaihtelut ovat viime vuosina muuttuneet yhä rajummiksi, ja ne heijastuvat vahvasti talouskasvuun ja kotitalouksien hyvinvointiin. Pitkällä aikavälillä vaihteluja olisi tärkeää pystyä tasapainottamaan, PTT:n ennusteessa sanotaan.
                - paragraph [ref=e198]: PTT:n mukaan valtion tukemaa asuntorahoitusta pitäisi jatkaa, koska sen avulla asuntorakentamista voitaisiin tasapainottaa eri suhdanteissa. Hallitus lakkautti Valtion asuntorahaston viime vuoden loppuussa.
