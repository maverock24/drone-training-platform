                - paragraph [ref=e119]: Asuntomarkkinoiden käännettä parempaa on turha odottaa vielä tänäkään vuonna. Pellervon taloustutkimuksen (PTT) ennusteen mukaan asuntojen hintojen lasku jatkuu myös tämän vuoden eli jo viidettä vuotta peräkkäin.
                - paragraph [ref=e120]: PTT:n mukaan vanhojen kerrostaloasuntojen hinnat laskevat tänä vuonna koko maassa prosentin. Lasku on kuitenkin hidastunut viime vuoteen verrattuna, jolloin laskua on selvästi yli kaksi prosenttia.
                - paragraph [ref=e121]: Suurista kaupungeista suurinta hintojen laskua on odotettavissa Vantaalla ja muuallakin pääkaupunkiseudulla. Ainoastaan Oulussa hinnat nousevat, joskin varsin hitaasti.
