      - heading "Työtulovähennyksen lapsikorotus nousee" [level=4] [ref=e68]:
        - strong [ref=e69]: Työtulovähennyksen lapsikorotus nousee
      - paragraph [ref=e70]: Työtulovähennyksen lapsikorotusta nostetaan 55 eurolla 105 euroon per huollettava lapsi. Yksinhuoltajille lapsikorotus myönnetään kaksinkertaisena. Työtulovähennykseen on oikeutettu palkkatulojen ja muiden työtulojen perusteella. Vähennys tehdään suoraan verosta, jolloin 55 euron nosto merkitsee 55 euroa aiempaa enemmän nettona käteen vuodessa.
