        - text: on vahvistettu arvot myös muille yleisimmille luontoiseduille, kuten asuntoedulle, autoedulle, ravintoedulle ja puhelinedulle. Ravintoedun yläraja nousee 13,70 eurosta 14,00 euroon vuodelle 2026.
