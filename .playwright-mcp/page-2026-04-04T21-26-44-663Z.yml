          - /url: /globalassets/5-medialle/50-lehdistotiedotteet/budjettiriihi-20250902/palkansaajan_marginaaliveroprosenttien_muutos_2026.pdf
      - paragraph [ref=e64]:
        - text: Palkansaajan työeläkemaksu muuttuu vuonna 2026, kun 53–62-vuotiaiden vakuutusmaksun
        - link "korotusosuus poistuu" [ref=e65] [cursor=pointer]:
