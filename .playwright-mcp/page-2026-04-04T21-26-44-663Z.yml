      - heading "Eläkkeensaajan verotus ja eläketulon lisävero" [level=3] [ref=e102]:
        - strong [ref=e103]: Eläkkeensaajan verotus ja eläketulon lisävero
      - paragraph [ref=e104]: Hallituksen tuloverokevennykset ja verovähennysten leikkaukset on suunnattu lähtökohtaisesti työtuloihin. Eläketulojen verotukseen sen sijaan kohdistuu vähemmän muutoksia. Työeläkkeet nousevat indeksitarkituksen myötä 0,88 % vuonna 2026. Kansaneläkeindeksi nousee 0,47 %.
      - paragraph [ref=e105]: Korkeimpien marginaaliverojen alennukseen liittyvät muutokset koskevat myös eläketuloja. Samalla eläketulon lisävero kevenee sen alarajan noustessa 47 000 euron eläketulosta 60 000 euroon. Lisäveron kevennys on kuitenkin vain kompensoiva toimi sille, että valtion tuloveroasteikkoon ehdotetut parametrimuutokset kiristävät eläkeverotusta. Jollei tämän vastapainoksi kevennettäisi eläketulon lisäveroa, eläkeverotus kiristyisi paikoitellen huomattavasti.
      - paragraph [ref=e106]: Kokonaisuudessaan suurimmalle osalle eläkkeensaajista ei isoja muutoksia eläkeverotukseen ole tulossa. Noin 70 000–100 000 euroa vuodessa ansaitsevan eläkkeensaajan verotus on kuitenkin kiristymässä eläketulon lisäveron kevennyksestä huolimatta. Yli 100 000 euroa ansaitseva eläkeläinen taasen hyötyy marginaaliverojen alennuksesta, joten kaikkein suurimmilla eläketasoilla verotus kevenee.
      - paragraph [ref=e107]: Palkkatuloja ansaitsevan eläkeläisen verotus voi keventyä jo pienemmillä tulotasoilla laajemman työn verotuksen kevennyksen takia.
      - paragraph [ref=e108]:
        - link "Työeläkkeensaajan indeksitarkistus ja veromuutos, esimerkkejä eri eläketasoilla 2026 (pdf, päivitetty 1.12.2025)" [ref=e109] [cursor=pointer]:
