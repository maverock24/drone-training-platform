      - paragraph [ref=e141]: Virvoitusjuomaverotuksessa otetaan käyttöön uusi verotuottoneutraaliksi mitoitettu veroporrastus. Uusi porrastus jaottelee veronalaisia juomia aiempaa hienojakoisemmin sokeripitoisuuden mukaan.
      - paragraph [ref=e142]: Tämän ohella virvoitusjuomaveroon toteutetaan hallitusohjelmassa sekä keväiden 2024 & 2025 kehysriihissä päätetyt yhteensä noin 110 miljoonan euron veronkiristys.
