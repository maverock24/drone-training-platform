      - heading "Bensiinin ja dieselin verotaso laskee" [level=2] [ref=e122]:
        - strong [ref=e123]: Bensiinin ja dieselin verotaso laskee
      - paragraph [ref=e124]: "Liikennepolttoaineiden valmisteverotasot alenevat kahdessa osassa: 1.1.2026 ja 1.1.2027. Alennus toteutetaan alentamalla polttoaineiden hiilidioksidiverokomponenttia."
      - paragraph [ref=e125]: Molempien muutosten yhteisvaikutus polttoaineiden arvonlisäverolliseen kuluttajahintaan arvioidaan olevan bensiinille 3 senttiä litralta ja dieselille 3,3 senttiä litralta. 1.1.2026 veromuutos olisi suunnilleen puolet tästä, eli noin 1,5 senttiä litralta.
