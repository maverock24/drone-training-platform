      - paragraph [ref=e88]:
        - text: Suomeen töihin tulevien avainhenkilöiden lähdevero alenee 32 prosentista 25 prosenttiin. Lisäksi lain soveltamisala laajenee kotimaahan palaaviin Suomen kansalaisiin. Hallituksen esityksessä Suomen kansalaisiin ehdotettiin 24 kuukauden soveltamisaikaa, mutta eduskuntakäsittelyssä se muuttui
        - generic [ref=e89]:
