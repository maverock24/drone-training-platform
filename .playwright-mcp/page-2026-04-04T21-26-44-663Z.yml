      - heading "Luontoisedut - latausetu, lataushybridit, lounasetu..." [level=4] [ref=e92]
      - paragraph [ref=e93]: Auton latausetu ei ole enää verovapaa 1.1.2026 alkaen. Muutos koskee työntekijän oman auton tai käyttöetuauton lataamista työpaikalla ja julkisissa latauspisteissä. Täyssähköauton latausedun raha-arvo on tammikuun alusta lähtien 30 euroa ja lataushybridin 20 euroa kuukaudessa. Vapaassa autoedussa lataus sisältyy edun arvoon.
      - paragraph [ref=e94]: Autoedun osalta lataushybrideihin määräajan sovellettu 85 euron alennus kuukausiarvosta poistuu.
      - paragraph [ref=e95]:
        - link "Verohallinon luontoisetupäätöksessä" [ref=e96] [cursor=pointer]:
