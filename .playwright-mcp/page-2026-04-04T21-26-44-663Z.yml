      - heading "Metsävähennys" [level=2] [ref=e157]:
        - strong [ref=e158]: Metsävähennys
      - paragraph [ref=e159]: Metsävähennyksen vuotuinen vähennysoikeus sekä enimmäismäärä nousevat verovuodelle 2026. Metsävähennys nousee 60 prosentista 75 prosenttiin verovuoden metsätalouden pääomatuloista.
      - paragraph [ref=e160]:
        - text: "Lue tarkemmin Taloustaito Bonuksesta (vain jäsenille):"
        - link "Metsävähennyksen korotus kannustaa puukaupoille" [ref=e161] [cursor=pointer]:
          - /url: https://www.taloustaito.fi/bonus/verotus/metsavahennyksen-korotus-kannustaa-puukaupoille/
      - heading "Osakevaihdot" [level=2] [ref=e162]
      - paragraph [ref=e163]: Etuyhteydessä olevien osapuolten välisissä osakevaihdoissa omistusta vaihtavat osakkeet arvostetaan jatkossa hankkivan yhtiön nettovarallisuutta laskettaessa osakevaihtoa edeltävään matemaattiseen arvoon. Lisäksi osakkeita hankkivan osakeyhtiön verotuksessa osakkeiden hankintamenona pidetään osakevaihtoa edeltävää yhteenlaskettua matemaattista arvoa lisättynä hankinnasta aiheutuneilla menoilla. Muutoksia sovelletaan 1.1.2026 tai sen jälkeen nostetavissa oleviin osinkoihin ja 1.1.2017 tai sen jälkeen toteutettuihin osakevaihtoihin.
      - heading "Ehdollinen lisäkauppahinta" [level=2] [ref=e164]
      - paragraph [ref=e165]: Ehdollisen lisäkauppahinnan luovutusvoittovero ja varainsiirtovero perustuvat jatkossa ehdollisen lisäkauppahinnan määrän vahvistumisajankohtaan.
      - heading "Finanssialan bonukset" [level=2] [ref=e166]:
        - strong [ref=e167]: Finanssialan bonukset
      - paragraph [ref=e168]: Asiakasbonus, -hyvitys, -alennus tai muu vastaava asiakkuuteen perustuva rahanarvoinen etu on vuodesta 2026 alkaen veronalaista pääomatuloa, jos etu kertyy tai muodostuu yksityistalouden luottojen, talletusten, sijoitusten, sijoitusvakuutusten tai kapitalisaatiosopimusten määrän tai arvon perusteella. Etu on kuitenkin verovapaata tuloa siltä osin, kuin etu käytettään tai se kohdistuu edellä mainittuihin samoihin eriin liittyviin palveluihin, palvelumaksuihin tai luoton korkoihin eikä etua makseta rahana tai siihen verrattavalla tavalla.
      - paragraph [ref=e169]:
        - text: Lue tarkemmin Taloustaidosta
        - link "OP-bonukset kohta verolle – miten ottaa kaikki irti vielä verottomasta bonustilistä?" [ref=e170] [cursor=pointer]:
          - /url: https://www.taloustaito.fi/Rahat/op-bonukset-kohta-verolle--miten-ottaa-kaikki-irti-viela-verottomasta-bonustilista/
      - heading "Kaivosten ja datakeskusten sähkövero" [level=2] [ref=e171]:
        - strong [ref=e172]: Kaivosten ja datakeskusten sähkövero
      - paragraph [ref=e173]: Kaivosten verotuki poistuu 1.1.2026, kun ne siirtyvät yleiseen sähköveroluokkaan I. Käytännössä energiavero nousee 0,05 sentistä 2,24 senttiin kilowattitunnilta. Hallitus linjasi kaivosten ja datakeskusten sähköverotuen poistosta luovuttuaan makeisten ja suklaan arvonlisäveron korotuksesta. Datakeskusten osalta verotuen poisto on suunniteltu 1.7.2026 alkaen.
      - heading "Kaivosvero" [level=2] [ref=e174]
      - paragraph [ref=e175]: Kaivosmineraalien vero nousee nykyisestä 0,6 prosentista 2,5 prosenttiin rikastukseen toimitetun malmin sisältämän metallin verotusarvosta.
      - heading "Tappioiden vähentäminen" [level=2] [ref=e176]
      - paragraph [ref=e177]: Hallituksen sopi kevään 2025 kehysriihen kasvupaketissa tappioiden vähennysoikeuden pidentämisestä 10 vuodesta 25 vuoteen. Muutos tulisi voimaan verovuodelta 2026 vahvistetuista tappioista lukien.
      - heading "Viranomaisposti" [level=2] [ref=e178]
      - paragraph [ref=e179]: Vireillä olevan lainsäädäntömuutoksen mukaan viranomaisposti toimitettaisiin 12.1.2026 alkaen sähköisesti kaikille niille, jotka käyttävät viranomaisten sähköisiä asiointipalveluja. Jokaisella olisi kuitenkin mahdollista ilmoittaa, ettei käytä Omaveroa tai muuta sähköistä palvelua ja saada postinsa jatkossakin paperilla. Asian käsittely eduskunnassa on kesken.
      - heading "Hallituksen myöhempiä verohankkeita:" [level=2] [ref=e180]:
        - strong [ref=e181]: "Hallituksen myöhempiä verohankkeita:"
      - heading "Kiinteistöverotuksen arvostamisuudistus" [level=4] [ref=e182]:
        - strong [ref=e183]: Kiinteistöverotuksen arvostamisuudistus
      - paragraph [ref=e184]: Hallitusohjelman mukaan kiinteistöverotukseen toteutetaan uudistus, jolla korjataan kiinteistöjen verotusarvojen ja käypien arvojen eriytyminen toisistaan. Aikataulu ja toteutus eivät ole selvillä.
      - heading "Yhteisövero alenee 2027" [level=4] [ref=e185]:
        - strong [ref=e186]: Yhteisövero alenee 2027
      - paragraph [ref=e187]: Hallitus sopi kevään kehysriihessä yhteisöveron alentamisesta 20 prosentista 18 prosenttiin vuoden 2027 alusta. Veromuutos käsitellään eduskunnassa vasta myöhemmin vuonna 2026.
