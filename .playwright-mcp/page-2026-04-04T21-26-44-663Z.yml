      - heading "Alkoholivero" [level=2] [ref=e133]:
        - strong [ref=e134]: Alkoholivero
      - paragraph [ref=e135]: Kaikkien alkoholijuomien verotasoihin tehdään kuluttajahintojen nousua vastaava indeksitarkistus vuodelle 2026, minkä ohella verotasot sidottaisiin vastaisuudessa pysyvästi indeksiin. Toisin sanoen verotasot nousisivat vuosittain automaattisesti suhteessa kuluttajahintojen toteutuneeseen muutokseen.
      - paragraph [ref=e136]: Lisäksi viineihin ja muihin käymisteitse valmistettuihin alkoholijuomien kategoriaan toteutetaan indeksikorotuksen päälle erillinen veronkorotus, joka tulee voimaan 1.1.2026. Korotuksen tarkoitus on osittain kompensoida makeisten ja suklaan arvonlisäveron korotuksen toteuttamatta jättämisestä aiheutuvaa verotulojen menetystä.
