      - heading "Perintö- ja lahjaveron alarajat nousevat" [level=2] [ref=e116]:
        - strong [ref=e117]: Perintö- ja lahjaveron alarajat nousevat
      - paragraph [ref=e118]: Verotettavan perintöosuuden alaraja nousee 20 000 eurosta 30 000 euroon ja verotettavan lahjan alaraja 5 000 eurosta 7 500 euroon 1.1.2026 alkaen. Lisäksi perintö- ja lahjaverosta vapaan tavanomaisen koti-irtaimiston arvoa korotetaan 4 000 eurosta 7 500 euroon.
      - paragraph [ref=e119]: Perintöveron kymmenen vuoden maksuajalta perittävän koron marginaali alenee 3,5 prosentista kahteen prosenttiin.
      - paragraph [ref=e120]:
