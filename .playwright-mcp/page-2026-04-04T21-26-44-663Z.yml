      - paragraph [ref=e47]: Miten verotus muuttuu vuonna 2026? Kooste perustuu pääministeri Petteri Orpon hallituksen budjettiesitykseen sekä loppuvuoden 2025 aikana vahvistettuihin muutoksiin.
      - paragraph [ref=e48]:
        - img "2026-veromuutokset-ei-otsikkoa-820x328.png" [ref=e49]
      - heading "Ansiotulojen verotus" [level=2] [ref=e50]:
        - strong [ref=e51]: Ansiotulojen verotus
      - paragraph [ref=e52]: Vuodelle 2026 on luvassa hallituksen kevään 2025 puoliväliriiheen ja hallitusohjelmaan perustuvia kevennyksiä työn verotukseen. Toisaalta tulonhankkimiseen liittyviä vähennyksiä leikataan.
      - heading "Palkansaajan verotus" [level=3] [ref=e53]:
        - strong [ref=e54]: Palkansaajan verotus
      - paragraph [ref=e55]: Palkansaajan veromuutokset riippuvat vuonna 2026 paitsi tulotasosta, iästä ja huollettavien lasten lukumäärästä myös mm. siitä, paljonko on maksanut työmarkkinajärjestöille jäsenmaksuja tai käyttänyt etätyöhön liittyvää työhuonevähennystä.
      - paragraph [ref=e56]:
        - strong [ref=e57]: Yleisesti palkkaverotus
        - text: (ml. tuloverot ja veronluonteiset sosiaalivakuutusmaksut) kevenee hallituksen puoliväliriiheen ja hallitusohjelmaan perustuvien tuloverokevennysten myötä. Pieni- ja keskituloisten palkkaverotusta keventää työtulovähennyksen kasvattaminen.
      - paragraph [ref=e58]: Osin palkkaverotuksen kevennystä syö sosiaalivakuutusmaksujen muutokset, kun esim. palkansaajan veronluonteinen työttömyysvakuutusmaksu nousee 0,3 prosenttiyksikköä.
      - paragraph [ref=e59]: Palkansaajan korkeimpien marginaaliverojen alentaminen noin 52 prosenttiin keventää suurituloisimpien palkansaajien verotusta, kun marginaalivero on ollut aiemmin jopa 59 prosenttia hieman vajaan 100 000 euron vuositulosta alkaen.
      - paragraph [ref=e60]:
        - link "Arvioita palkansaajan veroprosentin muutoksesta eri tulotasoilla 2026 (pdf, päivitetty 1.12.2025)" [ref=e61] [cursor=pointer]:
