      - heading "Kunnallisverot 2026" [level=3] [ref=e110]:
        - strong [ref=e111]: Kunnallisverot 2026
      - paragraph [ref=e112]: Vuonna 2026 kunnallisveroprosentti nousee 36 Manner-Suomen kunnassa ja laskee vastaavasti neljässä kunnassa. Keskimääräinen kunnallisveroprosentti nousee 7,57 prosenttiin (+0,04 %-yks. vuodesta 2025). Oheisissa kuvissa on esitetty veroprosenttiaan muuttaneet kunnat sekä muutoksen vaikutuksia keskituloiselle palkansaajalle sekä eläkkeensaajalle.
      - paragraph [ref=e113]:
