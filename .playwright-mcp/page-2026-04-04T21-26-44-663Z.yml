          - /url: /globalassets/5-medialle/50-lehdistotiedotteet/budjettiriihi-20250902/tyotulovahennyksen_lapsikorotuksen_noston_vaikutus_2026.pdf?_gl=1*h0qzqt*_up*MQ..*_ga*MTg4NDYzMDM4Ni4xNzU4MTkzOTMz*_ga_MYTTQFQN21*czE3NTgxOTM5MzIkbzEkZzEkdDE3NTgxOTM5MzkkajUzJGwwJGgw
      - heading "Työmarkkinajärjestöjen jäsenmaksujen verovähennysoikeus poistuu" [level=4] [ref=e73]:
        - strong [ref=e74]: Työmarkkinajärjestöjen jäsenmaksujen verovähennysoikeus poistuu
      - paragraph [ref=e75]: Jäsenmaksut tahoille, joilla sääntöjensä mukaan voisi olla työmarkkinatoimintaan liittyviä tavoitteita, säädetään vähennyskelvottomiksi. Vähennysoikeus poistuu sekä työntekijä- ja työnantajapuolelta. Työttömyyskassalle menevä maksu(osuus) olisi jatkossa entiseen tapaan vähennyskelpoinen.
      - paragraph [ref=e76]:
        - link "Työmarkkinajärjestöjen jäsenmaksuvähennyksen poiston vaikutus 2026 (pdf)" [ref=e77] [cursor=pointer]:
          - /url: /globalassets/5-medialle/50-lehdistotiedotteet/budjettiriihi-20250902/tyomarkkinajarjestojen_jasenmaksuvahennyksen_poiston_vaikutus_2026.pdf?_gl=1*q2vcig*_up*MQ..*_ga*MTg4NDYzMDM4Ni4xNzU4MTkzOTMz*_ga_MYTTQFQN21*czE3NTgxOTM5MzIkbzEkZzEkdDE3NTgxOTM5MzkkajUzJGwwJGgw
      - heading "Työhuonevähennys palkkatuloista" [level=4] [ref=e78]:
        - strong [ref=e79]: Työhuonevähennys palkkatuloista
      - paragraph [ref=e80]: Omassa tai perheen käytössä olevan asunnon tai vapaa-ajan asunnon kustannukset eivät enää verovuodesta 2026 alkaen olisi palkkatulon hankkimisesta tai säilyttämisestä johtuvia vähennyskelpoisia menoja.
      - heading "Työsuhdepolkupyörien verovapaus poistuu siirtymäajalla" [level=4] [ref=e81]:
        - strong [ref=e82]: Työsuhdepolkupyörien verovapaus poistuu siirtymäajalla
      - paragraph [ref=e83]: Verovapaus poistuu uusilta polkupyöräeduilta, joiden käyttöönotosta työnantaja ja työntekijä ovat sopineet 24.4.2025 tai sen jälkeen. Ennen tätä sovitut polkupyöräedut ovat verovapauden piirissä sopimuskauden loppuun saakka tai jos kyse on työnantajan ostamasta polkupyörästä, viiden vuoden ajan edun käyttöönotosta.
      - heading "Työnantajan kustantama oikeudellinen neuvonta" [level=4] [ref=e84]
      - paragraph [ref=e85]: Työnantajan työntekijälle kustantama oikeudellinen neuvonta on jatkossa verovapaata työtehtävistä aiheutuneissa asioissa.
      - heading "Suomeen tulevien avainhenkilöiden lähdeveron kevennys ja laajennus" [level=4] [ref=e86]:
