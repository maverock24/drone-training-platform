          - heading "Hypo-konserni" [level=2] [ref=e147]
          - paragraph [ref=e148]: Suomen Hypoteekkiyhdistys on Suomen vanhin valtakunnallinen ja yksityinen luottolaitos, perustettu 1860. Hypo-konserni on kaikista pankki- ja vakuutusyhtiöistä riippumaton, jäsentensä hallinnoima keskinäinen yhtiö, joka toiminnassaan on erikoistunut asuntorahoitukseen. Konserniin kuuluu myös vuonna 2002 perustettu talletuspankki, Suomen AsuntoHypoPankki Oy.
          - paragraph [ref=e149]: Tilinpäätöstiedotteen 1.1.–31.12.2025 mukaan Hypo-konsernin tase oli 3,6 miljardia euroa, ydinvakavaraisuus 22,9 %, luottokanta 2,8 miljardia euroa, talletukset 1,5 miljardia euroa, järjestämättömät luotot 0,3 % ja liikevoitto 9,0 miljoonaa euroa. Asiakkaita konsernilla on yli 22 000.
          - paragraph [ref=e150]:
            - strong [ref=e151]: Suomen Hypoteekkiyhdistys • Suomen Asuntohypopankki Oy
          - paragraph [ref=e152]: Yrjönkatu 9 A, 00120 HELSINKI • puh./tel. +358 (0)9 228 361 • faksi/fax +358 (0)9 647 443
          - paragraph [ref=e153]:
            - emphasis [ref=e154]: Tähän katsaukseen sisältyvät ja sen yhteydessä suullisesti tai muutoin annetut tiedot, kannanotot, analyysit, arviot ja suositukset (”Tiedot”) perustuvat julkisiin lähteisiin ja katsauksen laatijan omiin näkemyksiin ja mielipiteisiin. Katsauksen laatija voi muuttaa Tietoja sekä omia näkemyksiään ja mielipiteitään ilman ennakkoilmoitusta. Tietojen hyödyntäminen tapahtuu kaikilta osin hyödyntäjän omalla vastuulla. Suomen Hypoteekkiyhdistyksen konserniin kuuluvat yhtiöt eivät takaa Tietojen oikeellisuutta tai täydellisyyttä eivätkä vastaa vahingoista, joita Tietojen käyttämisestä voi käyttäjälle tai kolmannelle taholle seurata. Tietoja ei ole tarkoitettu sijoitusneuvoksi taikka suositukseksi tai kehotukseksi ostaa tai myydä kiinteistö, asunto-osake tai rahoitusväline. Kiinteistöjen arvoon ja arvostukseen vaikuttavat monet seikat. Hypon Asuntoluottoluokitus (”Hypo-luokitus”) on Suomen Hypoteekkiyhdistyksen tietyn hetken markkinanäkemys, jonka oikeellisuudesta Suomen Hypoteekkiyhdistys ei vastaa; Suomen Hypoteekkiyhdistys ei myöskään ota vastuuta mahdollisista Hypon Asuntoluottoluokituksen aiheuttamista vahingoista. Tietoja lainatessa tulee mainita lähteenä Hypo ja katsauksen laatijan nimi.
