          - paragraph [ref=e42]: Hypon asuntomarkkinakatsaus – Asuntojen hinnat ovat laskeneet yhtäjaksoisesti jo 3,5 vuoden ajan eli yhtä pitkään kuin 1990-luvun laman pahimpaan aikaan. Hintakäänne näyttää yhä siirtyvän vuoden loppupuolelle eli tälle vuodelle Hypo ennustaa yleisesti pientä laskua. ”Keskihinnat laskevat vielä alkuvuonna. Alkuvuosi oli odotuksia heikompi asuntokaupalle, mutta ostajien ja myyjien hintanäkemykset ovat lähentyneet”, Hypon pääekonomisti Juho Keskinen sanoo.
