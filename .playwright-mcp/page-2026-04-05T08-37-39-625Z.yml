          - list [ref=e50]:
            - listitem [ref=e51]:
              - strong [ref=e52]: Asuntojen keskihinnat
              - text: laskevat vielä alkuvuonna. Tammi-helmikuu oli odotuksia heikompi myös asuntokaupalle, mutta ostajien ja myyjien hintanäkemykset ovat lähentyneet, mikä on näkynyt jo pidemmän aikaa kohonneena kauppana. Asuntokaupan luvuissa ja hintaindekseissä näkyy nyt myös yritysten tekemiä nippukauppoja ja niihin liittyviä volyymialennuksia, jotka voivat hämätä tilastoja tuijottavaa asunnonostajaa.
            - listitem [ref=e53]:
              - strong [ref=e54]: Asuntomarkkinoilta
              - text: "kuuluu kaikuja 1990-luvulta, mutta eri mittakaavassa. Hintojen yhtäjaksoinen lasku on kestänyt jo 3,5 vuotta – yhtä pitkään kuin 1990-luvun lamasyklin pahin laskuvaihe. Silti nykytilanne on kokonaisuutena selvästi parempi: talouskasvun tilanne, korkotaso ja työttömyys eivät ole lähelläkään 1990-luvun äärilukuja. Kotitaloudet ovat kestäneet shokin paremmin ja pakkomyynneiltä on vältytty. Hinnat ovat silti laskeneet pisimmän yhtäjaksoisen ajan vuodesta 1947 saatavilla olevassa tilastohistoriassa."
          - heading "Asuntojen hintaennuste koko maassa:" [level=3] [ref=e55]
          - paragraph [ref=e56]: "2026: -1,0% 2027: +2,0%"
          - heading "Pääkaupunkiseudun hinnat:" [level=3] [ref=e57]
          - paragraph [ref=e58]: "2026: -1,0% 2027: +3,0%"
          - list [ref=e59]:
            - listitem [ref=e60]:
              - strong [ref=e61]: Hintahuipuille
              - strong [ref=e62]: palataan
              - text: 2030-luvun puolella. Kasvukeskukset määräävät indeksien suunnan yhä vahvemmin. Yhä suurempi osa toteutuneista kaupoista tehdään isoissa kaupungeissa, kun heikomman kysynnän alueilla kauppoja jää syntymättä. Keskittyminen kohottaa kasvukeskusten painoa koko maan hintaindeksissä, koska toteutumattomat kaupat eivät tule mukaan painamaan julkaistavia hintalukuja.
            - listitem [ref=e63]:
              - strong [ref=e64]: Kuuteen suurimpaan kaupunkiin
              - text: "rakennettiin 10 vuoden aikana 35 000 asuntoa yli asuntokuntien kasvun. Tarjontaa riittää yhä: valmistuneiden asuntojen määrä painui viime vuonna historiallisen pieneksi, mutta myös asuntokuntien kasvu hidastui poikkeuksellisesti. Yksinasumisen buumi kääntyi – maahanmuutto näkyy suurempien asuntokuntien kasvuna ja opiskelijoiden paluu kimppa- ja soluasumiseen lisää pienten vuokra-asuntojen tarjontaa sekä heikentää kysyntää. Helsingin väestö kasvoi viime vuonna 11 500 hengellä eli koviten sitten 1960-luvun – valmistuneiden uudisasuntojen määrä ylitti silti asuntokuntien määrän kasvun."
            - listitem [ref=e65]:
              - strong [ref=e66]: Asuntolaina-ajan enimmäismäärän
              - text: pidennys 35 vuoteen tuo huhtikuusta joustoa kuukausittaisiin lainamenoihin ja valinnanvapautta velallisille. Noin kolmannes Suomen asuntolainakannasta on kestoltaan yli 25-vuotisia, ja suurin osa lainanhakijoista valitsee lyhyemmän laina-ajan jatkossakin. Sääntelymuutokset eivät kuitenkaan yksin käännä asuntomarkkinoita nousukiitoon, kun kodeissa puntaroidaan yhä korkojen ja työttömyyden tulevaa kehityssuuntaa.
            - listitem [ref=e67]:
              - strong [ref=e68]: Vuokralaisen markkinat
              - text: jatkuvat tänäkin vuonna. Vapaarahoitteisten vuokrien indeksi kääntyi loppuvuonna laskuun poikkeuksellisen laajasti, mutta indeksi kuvaa parhaiten olemassa olevien sopimusten vuokrankehitystä. Uusissa vuokrasuhteissa pk-seudulla lähtövuokrat ovat laskeneet jo usean vuoden jaksolla, ja runsas tarjonta sekä tyhjilläänolo toimivat yhä vuokralaisen valttikortteina neuvotteluissa.
            - listitem [ref=e69]:
              - strong [ref=e70]: Rakentaminen
              - text: jumittaa ja geopoliittiset riskit heiluttavat korkoja. Asuntoaloitukset ja rakennusluvat ovat yhä poikkeuksellisen matalia, ja kauppa kohdistuu vanhaan asuntokantaan. Instituutioiden myynnit painavat uudiskysyntää ja korkotukivaltuusleikkaukset vähentävät tuettua tuotantoa. Iran-riskit kohottivat energiahinta- ja inflaatio-odotuksia – 12 kuukauden euriborkorossa nähtiin maaliskuussa suurin yhden päivän nousu liki 18 vuoteen. Korkoepävarmuus kasvaa ja markkinaodotukset ovat kääntyneet hetkellisesti jopa kahden koronnoston kannalle tänä vuonna, mutta keskuspankki pitäytynee kuluvan vuoden tarkkailuasemissa. Iranin tilanteen pitkittyminen ratkaisee paljon. Samoin se, millä tavoin sota Ukrainassa jatkuu.
          - paragraph [ref=e71]
          - heading "Myyjät tulevat viimein vastaan hintapyynnöissään" [level=2] [ref=e72]
          - paragraph [ref=e73]: "Asuntojen hinnat jatkavat laskuaan vielä alkuvuoden ajan, vaikka asuntokauppa käy yhä vilkkaammin. Ostajien ja myyjien käsitykset asuntojen hintatasosta ovat lähentyneet, mutta asuntokaupan mittareissa näkyy nyt myös yritysten tekemiä nippukauppoja. Näihin kauppoihin liittyvät volyymialennukset painavat osin myös hintaindeksejä, vaikka sijoittajien väliset transaktiot eivät käytännössä määritäkään tavallisen asunnonostajan kohtaamaa hintaa. Samalla sijoittajakysynnän piristyminen viestii kansainvälisen luottamuksen vahvistumisesta Suomen asuntomarkkinoihin. Lähi-idän levottomuudet heijastuvat kuluttajien luottamukseen ja korkokehitykseen, ja Iranin kriisin kesto tulee lopulta ratkaisemaan suorien talous- ja inflaatiovaikutusten suuruuden. Lähi-idän tilanteen ja alkuvuoden tilastojen valossa vuoden 2026 hintaennustetta on laskettu viime vuoden lopusta. Asuntojen hintojen lasku tasaantuu tänä vuonna, mutta varovainen nousukäänne vuoden aikana tuottaa vielä miinuksen vuosimuutoksiin. Samalla nousupainetta sysätään vahvemmin ensi vuodelle. Asuntolainan enimmäistakaisinmaksuaika pitenee huhtikuussa 35 vuoteen, mikä tuo joustoa velallisen arkeen: mahdollisuus ylimääräisiin lyhennyksiin säilyy oman taloustilanteen salliessa. Samalla on kaavailtu asuntolainan enimmäisluototusasteen mahdollista nostoa 95 prosenttiin nykyisestä 90 prosentista. Sääntelyn keventämiselle on perusteensa, kun kotitalouksien velkaantuminen on laskenut, ja asuntovelat ovat lyhentyneet viime vuosinakin tavalliseen tahtiin. Kansantalouden kurssia ei kuitenkaan käännetä kabineteissa, sillä luottamus palaa vasta iloisempien talousuutisten myötä."
          - heading "Hypo-indeksit jatkavat matalaliidossa" [level=3] [ref=e74]:
            - emphasis [ref=e75]: Hypo-indeksit jatkavat matalaliidossa
          - figure [ref=e76]:
            - link [ref=e77] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image.png
          - paragraph [ref=e78]: Pääkaupunkiseudun ja Turun Hypo-indeksit hiipuivat viime vuoden viimeisen neljänneksen tilastotiedoilla pistelukuun 119, kun Tampereen indeksi asettui astetta korkeammalle 122 pisteeseen. Vaikka asuntokauppa kasvoi pk-seudulla vuoden takaa noin kymmenellä prosentilla, laskivat hinnat yhä 3,6 prosentilla. Asuntokauppa käy pk-seudulla yhä reilut 10 prosenttia hitaammin, kuin vuosina 2015–2019 keskimäärin, kun koko maan vaje on noin 9 prosenttia. Suurista kaupungeista hinnat laskivat eniten Turussa (-5,6 %), kun Tampereella lasku oli maltillisempaa (-1,8 %). Asuntokauppa piti pintansa Turussa ja Tampereella, mutta runsas tarjonta on yhä lykännyt hintojen nousukäännettä kauppamäärien trendikasvusta huolimatta. Loka–joulukuussa hinnat kohosivat yli 7 prosentilla Rovaniemellä, kun suurimmat laskut nähtiin Mikkelissä (-13 %), Porvoossa (-11 %) ja Lahdessa (-7 %). Oulu erottuu tasaisuudellaan, kun taas Vantaan hinnat ovat hiipuneet huippuhetkiltään liki neljänneksellä.
          - heading "Hintojen lasku sitkeintä sitten 1990-luvun" [level=2] [ref=e79]
          - figure [ref=e80]:
            - link [ref=e81] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-1.png
          - paragraph [ref=e82]: "Asuntojen hinnat ovat nyt laskeneet yhtäjaksoisesti kesästä 2022 alkaen eli kolmen ja puolen vuoden ajan. Lasku on siis kestänyt yhtä kauan, kuin pohjien saavuttamiseen meni aikaa 1990-luvun laman voimakkaimmassa hintojen laskusyklissä kesästä 1989 vuoden 1992 loppuun. Asuntomarkkinoiden nykyasento on monella tapaa historiallinen, muttei silti lähellekään yhtä synkkä, kuin reilut 30 vuotta sitten nähdyssä sukelluksessa. Ero löytyy yhdistävien tekijöiden suuruudesta: 1990-luvun alkuvuosina bkt laski kaksinumeroisin prosentein, asuntokauppojen määrä puolittui, hinnat laskivat yhteensä 40 prosentilla, asuntolainakorot huitelivat 12–15 prosentissa ja työttömyysaste kohosi korkeimmillaan liki 20 prosenttiin. Nyt talouskasvu on polkenut paikallaan, asuntokaupasta leikkaantui huippuvuodesta 2021 vuoteen 2023 kolmannes, hintahuipuilta on laskettu 14 prosenttia, lainakorot kävivät yli neljässä ja työttömyysaste on kivunnut yli 10 prosenttiin. 1990-luvun pakkomyyntien sijaan kotitaloudet ovat kestäneet nykyshokin, mikä on näkynyt myyjien haluttomuutena laskea hintapyyntöjään todelliselle nykymarkkinahinnalle. Hintojen nousu käynnistyi 1990-luvun loppupuoliskolla, ja lamaa edeltänyt taso saavutettiin 2000-luvun alussa. Nyt nimellishintojen huipputasolle voidaan ajatella päästävän 2030-luvun alkupuoliskolla. Pitkällä aikavälillä nimellishinnat yleensä kohoavat jo inflaationkin nostaessa yleistä hintatasoa. Samalla kasvukeskusten merkitys koko maan hintaindeksille kasvaa: yhä suurempi osa kaupoista tehdään isoissa kaupungeissa, kun taas heikomman kysynnän ja matalien tai laskevien hintojen alueilla kauppoja jää tekemättä. Kun nämä toteutumattomat kaupat eivät näy tilastoissa, niiden mahdollinen hintaa laskeva vaikutus ei myöskään paina koko maan hintaindeksiä alaspäin."
          - heading "Uusien asuntojen tarjonta sulaa yhä hitaasti" [level=2] [ref=e83]
          - figure [ref=e84]:
            - link [ref=e85] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-2-scaled.png
          - paragraph [ref=e86]: "Maahanmuuton voimistuminen näkyy vuodesta 2022 eteenpäin suurempien asuntokuntien osuuden kasvuna. Opiskelijoiden paluu henkilökohtaisesti määräytyvälle opintotuen asumislisälle taas näkyy viime vuoden 2025 tilastoissa voimakkaasti: asuntokuntien määrä kasvoi koko maassa vain alle 4000:lla, mikä on alhaisin määrä vuodesta 1985 alkavassa tilastohistoriassa. Samaan aikaan Suomen väestö kasvoi noin 21 000 hengellä – kasvu jäi kahta edellisvuotta matalammaksi, mutta oli niitä edeltävän ajan korkein sitten vuoden 2013. Oulussa, Tampereella ja Vantaalla yhden hengen kotien määrä laski ja suurempien kasvoi vuoden takaa. Muissakin suurissa kaupungeissa isommat perheet kannattelivat asuntokuntien kasvua. Vaikka valmistuneiden asuntojen määrä putosi viime vuonna tilastohistorian alimmilleen, hidastui asuntokuntien kasvu vähintään samassa suhteessa."
          - heading "Kimppakämpät ja perheet kasvattavat nyt koteja" [level=3] [ref=e87]:
            - emphasis [ref=e88]: Kimppakämpät ja perheet kasvattavat nyt koteja
          - figure [ref=e89]:
            - link [ref=e90] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-3.png
          - paragraph [ref=e91]: Kun opiskelijat siirrettiin vuonna 2017 yleisen asumistuen piiriin, muuttui asumistuki ruokakuntakohtaiseksi, mikä kannusti yksinasumiseen ja kasvatti yhden hengen kotitalouksien määrää. Ennen uudistusta noin 40 prosenttia itsenäisesti asuvista päätoimisista korkeakouluopiskelijoista asui yksin, mutta vuoteen 2022 mennessä osuus oli kasvanut yli 60 prosenttiin. Yksinasuminen lisääntyi samaan aikaan nuorilla aikuisilla yleisestikin, mutta opiskelijoilla kasvu oli yli 10 prosenttiyksikköä suurempi. Vuosina 2017–2023 suurimpien kaupunkien kasvu nojasikin vahvasti yhden hengen kotitalouksien kasvuun. Uudistuksen jälkeen vanhempien luota muuttaneet opiskelijat päätyivät aiempaa useammin asumaan yksin kimppa-asumisen sijaan. Vielä 2010-luvun alussa noin 30 prosenttia ensimmäisen vuoden opiskelijoista asui kimppakämpässä, mutta vuonna 2022 osuus oli pudonnut noin 10 prosenttiin. Opiskelijoiden muutot solu- ja kimppa-asuntoihin ovat osaltaan vähentäneet kysyntää ja toisaalta lisänneet pienten vuokra-asuntojen tarjontaa, mikä näkyy vaimeana hinta- ja vuokrakehityksenä. Vapaarahoitteisten vuokrien indeksi laskikin loppuvuonna ensi kertaa koko maassa ja kaikissa suurissa sekä keskisuurissa kaupungeissa Kotkaa, Kouvolaa ja Rovaniemeä lukuun ottamatta.
          - heading "Vuokramarkkinoiden asento eroaa alueittain" [level=2] [ref=e92]
          - figure [ref=e93]:
            - link [ref=e94] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-7.png
          - paragraph [ref=e95]: Todellinen markkinavuokrataso on kuitenkin laskenut jo enemmän ja aiemmin, sillä vuokraindeksi perustuu asumistukirekisteriin ja vuokrataloyhtiöiden tietoihin, joiden vuokrausasteet ovat viime vuosina olleet poikkeuksellisen matalia. Indeksi kuvaa parhaiten muutosta voimassaolevissa vuokrasopimuksissa. Uudet vuokrasuhteet (yllä) kertovat indikatiivisesti paremmin markkinan tilasta, kun katsotaan valikoitua asuntotyyppiä. Uusien vapaarahoitteisten vuokrasuhteiden lähtövuokrat ovat suuntaa antavasti laskeneet pk-seudulla 3–4 prosenttia kolmen vuoden ajanjaksolla sekä kerrostaloyksiöissä että ‑kolmioissa. Asuntojen tyhjilläänolo ja runsas tarjonta uusissa, laadultaan paremmissa kohteissa peittää osin laskua myös tässä mittaustavassa. Vuokralainen onkin voinut saada alennusta vuokraansa ”kilpailuttamalla” oman sopimuksensa hakemalla vastaavaa asuntoa uudelleen. Runsas tarjonta heijastuu vuokrakehitykseen voimakkaimmin pk-seudulla, kun vuokratasot ovat lähtökohtaisesti nousseet vastaavana aikana muissa kaupungeissa.
          - heading "Rakentaminen ei toivu vieläkään" [level=2] [ref=e96]
          - figure [ref=e97]:
            - link [ref=e98] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-5.png
          - paragraph [ref=e99]: Asuntorakentamisen vuodesta tulee jälleen vaisu. Asuntoaloitukset jäivät viime vuonna alle 17 000 asunnon, mikä on koko pitkän tilastohistorian matalin määrä. Rakennuslupia haetaan edelleen niukasti, ja asuntokaupan piristyminen kohdistuu ensisijaisesti vanhoihin osakeasuntoihin, mikä ei vielä käänny uudistuotannon kasvuksi. Uudiskohteiden kysyntää painaa myös se, että sijoittajakysyntä on kohdistunut viime aikoina nippukauppoina olemassa olevaan asuntokantaan ja työeläkeyhtiöt ovat asuntorahastojen ohella myyneet asunto-omistuksiaan. Vuokrien odotetaan kehittyvän kuluvana vuonna maltillisesti, ja asuntojen hintojen mahdollinen lievä nousu ei vielä riitä palauttamaan rakennusyhtiöiden kannattavuutta. Rakennusalan luottamus on kuitenkin vähitellen kohenemassa, ja väestönkasvu kasvukeskuksissa tukee kysyntää sekä vuokra- että omistusasunnoille. Valtion korkotukivaltuuksia leikataan aiheellisesti suhdanteen parantuessa, mutta lyhyellä aikavälillä leikkaus vähentää tuotantoa useilla tuhansilla asunnoilla. Suhdanteen elpyessä tuetun rakentamisen leikkaukset kuitenkin tekevät tilaa vapaarahoitteiselle tuotannolle, joka toipuu asuntojen hintojen nousukäänteen vanavedessä kasvukeskuksissa.
          - heading "Sota heiluttaa korko-odotuksia" [level=2] [ref=e100]
          - figure [ref=e101]:
            - link [ref=e102] [cursor=pointer]:
              - /url: https://www.hypo.fi/wp-content/uploads/2026/03/image-8.png
          - paragraph [ref=e103]: "Iranin tilanne näkyy korkomarkkinoilla ennen kaikkea energiahinnan ja inflaatio-odotusten kautta: öljyn ja kuljetuskustannusten nousu on kohottanut markkinoiden hinnoittelemaa inflaatioriskiä, mikä on nostanut korkoja. Samalla korkokäyrissä ja rahapolitiikkahinnoissa on nähty lisääntynyttä epävarmuutta: sijoittajat ovat alkaneet varautua siihen, että EKP ja Fed voivat joutua hyväksymään kasvun heikkenemisen ja reagoimaan, jos energialähtöinen inflaatiopaine pitkittyy. Epävarmuuden kasvu heikentää jälleen talouskasvuodotuksia ja kohottaa volatiliteettia, mutta paljon riippuu kriisin lopullisesta kestosta. EKP:n ohjauskoron pysyminen kahdessa on yhä varsin mahdollinen kehityskulku kuluvalle vuodelle."
          - paragraph [ref=e104]
          - heading "Hypon näkemys asuntomarkkinoista" [level=2] [ref=e105]
          - list [ref=e106]:
            - listitem [ref=e107]: Asuntomarkkinoiden shokista toivutaan viiveellä – kauppa elpyy ja hintapohjia haetaan tänä vuonna
            - listitem [ref=e108]: Hintahuipulle päästään vasta ensi vuosikymmenellä – kauppa keskittyy kasvukeskuksiin
            - listitem [ref=e109]: Perhekoon kasvu ja opiskelijoiden asumistukien muutokset hidastavat asuntojen kysynnän kasvua
            - listitem [ref=e110]: Asuntorakentamisen hankaluudet jatkuvat vieläkin – sijoittajakysyntäkin kohdistuu vanhaan kantaan
            - listitem [ref=e111]: Korot pysyvät kahden päällä, vaikka odotukset tulevasta poukkoilevat politiikan myllerryksessä
          - paragraph [ref=e112]:
            - strong [ref=e113]: Mahdollisuudet
          - list [ref=e114]:
            - listitem [ref=e115]: Venäjä vetäytyy Ukrainasta, kauppasota kammetaan ja Iranin kriisi jää lyhyeksi – luottamus palaa
            - listitem [ref=e116]: Asuntojen hinnat mahdollistavat muuttoliikkeen ja asuntokauppoja solmitaan oman elämän tarpeisiin
            - listitem [ref=e117]: Energiakriisit ovat ohi ja uusi tarjonta laskee asumismenoja – ympäristö ja kuluttajat kiittävät
            - listitem [ref=e118]: Syntyvyys toipuu ja työperäinen maahanmuutto pitää pintansa – optimistiset ennusteet ovat oikeassa
            - listitem [ref=e119]: Rakentaminen toipuu ja asuntotarjonta auttaa kaupunkiasunnon etsijöitä myös vuosien päästä
          - paragraph [ref=e120]:
            - strong [ref=e121]: Riskit
          - list [ref=e122]:
            - listitem [ref=e123]: Korot kohoavat, inflaatio kiihtyy, kauppasodat eskaloituvat ja tullimaksut tuovat stagflaation
            - listitem [ref=e124]: Suuret asuntosijoittajat ja rakennusyhtiöt kaatuvat – uudet asunto-osakeyhtiöt ajautuvat vaikeuksiin
            - listitem [ref=e125]: Taantuma pahenee, työttömyyden kasvu ei vaan taitu ja taloudellinen ahdinko kasvaa kodeissa
            - listitem [ref=e126]: Väestönkasvu tyssää täysin, kun syntyvyyden sakkaus jatkuu ja maahanmuutto tyrehtyy tyystin
            - listitem [ref=e127]: Rakentaminen ei palaudu vuosikausiin ja asuntojen hinnat karkaavat käsistä kasvukolmion kärjissä
          - paragraph [ref=e128]
          - paragraph [ref=e129]: "*Hypon Asuntoindeksin taustaa"
          - paragraph [ref=e130]: Hypon Asuntoindeksi yhdistää asuntojen hinnat ja kauppamäärät yhteen arvoon. Indeksin kehitys kertoo asuntomarkkinoiden tilanteesta Tilastokeskuksen asuntojen hintatietoja kattavammin. Asuntomarkkinoilla kysynnän piristyminen näkyy ensin kauppamäärien kasvuna ja myyntiaikojen lyhentymisenä. Asuntojen myyjät havahtuvat muuttuneeseen markkinatilanteeseen vasta viiveellä, joten hintataso reagoi muutoksiin hitaasti. Vastaavasti kysynnän laskiessa myyntiajat pitenevät ja kauppamäärät supistuvat ennen kuin myyjät tarkistavat pyyntihintojaan vastaamaan ostajien maksukykyä ja -halua.
          - paragraph [ref=e131]: Hypon Asuntoindeksi kykenee siis myös ennakoimaan suurimpia taitekohtia asuntojen hintakehityksessä. Hypo on rakentanut indeksin pääkaupunkiseudulle, Tampereelle ja Turulle. Indeksi on simuloitu Tilastokeskuksen aineistojen pohjalta vuodesta 1987 alkaen koskien vanhoja vapaarahoitteisia osakeasuntoja.
          - paragraph [ref=e132]
          - heading "Hypon ajankohtainen asuntomarkkinakatsaus" [level=3] [ref=e133]
          - list [ref=e134]:
            - listitem [ref=e135]: Katsaus ottaa riippumattoman erikoistoimijan osaamisella rohkeasti ja kansantajuisesti kantaa asuntomarkkinoiden tilaan ja suuntaan
            - listitem [ref=e136]: Katsaus sisältää Hypon asuntoindeksin pk-seudulle, Tampereelle ja Turulle
            - listitem [ref=e137]: Hypo julkistaa asuntomarkkinakatsauksen neljä kertaa vuodessa, nyt käsillä 96. tilanneanalyysi
