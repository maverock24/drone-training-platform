        - strong [ref=e478]: Cookies
        - text: This website uses cookies. These cookies ensure that we can provide you with information as optimally as possible and occasionally display an advertisement on other websites - as a reminder to us, so to speak. If you continue to browse our website, we assume that you do not mind this.
        - strong [ref=e479]: Cookies at Drone Class B.V.
        - text: Like many other websites, we use cookies and weblog files to track website usage and trends, to improve the quality of our service, to customize your experience at Drone Class B.V., and to showcase featured client portfolio content based on your search criteria, industry, or area of work.
        - strong [ref=e480]: What are cookies?
        - text: Cookies are small data files that the website you visit can store on your hard drive. They typically contain an anonymous, unique identification code. A cookie cannot obtain other data from your hard drive or transmit computer viruses.
        - text: You can delete or block cookies using the settings in your browser. However, in some cases, this may cause the website of Drone Class B.V. to not function fully.
        - text: We also use Google Analytics to help us understand how users use our website and our mobile applications. Google Analytics cookies do not provide Drone Class B.V. with personal, identifiable information. They can tell us how you arrived at the Drone Class B.V. website, whether you have visited the website before, how long you stay on the website, and which web pages you have visited.
        - text: They can also provide us with general information about where in the world the user is located. This information helps us understand how people use our website and provides us with information about the type of experience people have on our website. This way, we learn how to improve the experience on the Drone Class B.V. website.
