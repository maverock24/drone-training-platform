              - generic [ref=e79]:
                - list [ref=e80]:
                  - listitem [ref=e81]:
                    - strong [ref=e82]: Asuntojen hinnat vaihtelevat Helsingissä voimakkaasti kaupungin eri osien välillä.
                  - listitem [ref=e83]:
                    - strong [ref=e84]: Vanhojen kerrostalo- ja rivitaloasuntojen keskimääräinen neliöhinta oli 4 985 euroa vuonna 2025.
                  - listitem [ref=e85]:
                    - strong [ref=e86]: Asuntojen hinnat ovat yli kaksinkertaistuneet Helsingissä 2000-luvun alusta.
                - paragraph [ref=e87]: Asuntokauppojen määrä kuvastaa asuntojen kysyntää Helsingissä. Kova kysyntä on ylläpitänyt puolestaan asuntojen hintojen nousua viime vuosiin saakka. Helsingin asuntomarkkinoille on tunnusomaista asuntojen hintojen suuri alueellinen vaihtelu. Helsingin keskustassa, rannan tuntumassa, on niukasti asuntorakentamiseen soveltuvaa maata tarjolla. Asuntojen korkea kysyntä ja niukka tarjonta keskustassa ja sen liepeillä onkin ajanut asuntomarkkinat jatkuvaan ylikysyntään. Asuntojen hinnat ovatkin nousseet tällä alueella merkittävästi yli rakennuskustannusten.
                - paragraph [ref=e88]: Helsingin kalleimmat asunnot ovatkin kaupungin ytimessä. Kaupunki jaetaan neljään kalleusalueeseen, ja keskusta-aluetta kutsutaan kalleusalueeksi 1. Seuraavaksi kalleimmat asunnot ovat ulommassa kantakaupungissa ja sen ympärysalueilla sijaitsevalla kalleusalueella 2, jossa myös asuntotuotanto on voimakkainta. Edullisimmilla alueilla, etenkin kalleusalueella 4, asuntojen hinnat vertautuvat Helsingin sijaan seudun pienempiin kuntiin (kuten Keski-Uudenmaan hintatasoon), joissa asuminen on huomattavasti edullisempaa. Tilastokeskuksen ennakkotietojen mukaan vanhojen kerrostalo- ja rivitaloasuntojen keskineliöhinta oli vuonna 2025 Helsingissä 4 985 euroa.
                - paragraph [ref=e89]:
                  - 'link "Avaa kartta: Helsingin kalleusalueet (Linkki johtaa ulkoiseen palveluun)" [ref=e90] [cursor=pointer]':
                    - /url: https://infogram.com/helsingin-kalleusalueet-1h984wor7wlwz6p?live
                    - strong [ref=e91]: "Avaa kartta: Helsingin kalleusalueet"
                    - generic [ref=e93]: (Linkki johtaa ulkoiseen palveluun)
                - paragraph [ref=e94]: Asuntokaupan heikko tila on vaikuttanut Helsingissäkin asuntojen hintojen laskuun. Positiivinen hintakehitys muuttui vuonna 2022 viimeisellä neljänneksellä laskuun, joskin asuntokaupan vilkas alkuvuosi nosti koko vuoden myytyjen asuntojen hinnat aiempien vuosien tasolle. Vuonna 2025 asuntojen hinnat laskivat Tilastokeskuksen ennakkotietojen mukaan edelleen Helsingissä kahdella prosentilla. Asuntojen hintojen laskua voidaan pitää merkittävänä siihen nähden, että hintojen laskua edeltävinä koronavuosina 2020–2021 asuntojen hinnat nousivat merkittävästi ja keskimäärin asuntojen hinnat ovat kasvaneet koko 2000-luvun ajan kolme prosenttia vuodessa.
                - paragraph [ref=e95]: Asuntojen hinnat ovat kuitenkin yli kaksinkertaistuneet vuoden 2000 hintatasosta, ja hintakehitys on ollut huomattavasti nopeampaa kuin muualla Suomessa. Asuntojen hintakehitys on toisaalta eriytynyt Helsingissä ja on erityisesti seurausta keskusta-alueen eli kalleusalueen 1 hintojen merkittävästi lähiövyöhykettä nopeammasta kasvusta, eikä kalleusalueen 2 hintakehitys jää juurikaan siitä jälkeen. Lähiövyöhykkeen kalleusalueilla 3 ja 4, asuntojen hintojen nousu on ollut hitaampaa. Asuntojen hintojen lasku ei myöskään ole jakautunut tasan kaupungin eri kalleusalueiden välillä. Tilastokeskuksen ennakkotietojen mukaan vuonna 2025 kalleusalueen 4 vanhojen osakeasuntojen hinnat laskivat 4,6 prosentilla ja kalleusalueen 2 vanhojen osakeasuntojen hinnat laskivat 2,9 prosentilla. Kalleusalueiden 1 ja 3 vanhojen osakeasuntojen hinnoissa ei ollut vuonna 2025 nähtäviä muutoksia. Asuntojen hintojen lasku on kuitenkin hidastunut vuodesta 2023 huomattavasti. Ainoastaan kalleusalueen 4 vanhojen osakehuoneistojen hinta on painunut alle vuoden 2010 hintatason.
