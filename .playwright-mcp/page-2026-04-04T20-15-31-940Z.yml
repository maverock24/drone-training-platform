          - generic [ref=e906]:
            - img "Warning" [ref=e908]
            - generic [ref=e910]:
              - generic [ref=e911]:
                - text: RAG applications are susceptible to
                - strong [ref=e912]: indirect prompt injection
                - text: . Retrieved documents may contain text that resembles instructions (e.g., “respond in JSON format” or “ignore previous instructions”). Because the retrieved context shares the same context window as your system prompt, the model may inadvertently follow instructions embedded in the data rather than your intended prompt.
              - generic [ref=e913]:
                - text: For example, the blog post indexed in this tutorial contains text describing an
                - link "Auto-GPT" [ref=e914] [cursor=pointer]:
                  - /url: https://lilianweng.github.io/posts/2023-06-23-agent/#case-studies
                - text: JSON response format. If a user query retrieves that chunk, the model may output JSON instead of a natural-language answer.
          - generic [ref=e915]: "To mitigate this:"
          - list [ref=e916]:
            - listitem [ref=e917]:
              - strong [ref=e918]: Use defensive prompts
              - text: ": Explicitly instruct the model to treat retrieved context as data only and to ignore any instructions within it. The prompts in this tutorial include such instructions."
            - listitem [ref=e919]:
              - strong [ref=e920]: Wrap context with delimiters
              - text: ": Use clear structural markers (e.g., XML tags like"
              - code [ref=e921]: <context>...</context>
              - text: ) to separate retrieved data from instructions, making it easier for the model to distinguish between them.
            - listitem [ref=e922]:
              - strong [ref=e923]: Validate responses
              - text: ": Check that the model’s output matches the expected format (e.g., plain text) and handle unexpected formats gracefully."
          - generic [ref=e924]:
            - text: No mitigation is foolproof — this is an inherent limitation of current LLM architectures where instructions and data share the same context window. For more on this topic, see research on
            - link "prompt injection" [ref=e925] [cursor=pointer]:
              - /url: https://simonwillison.net/series/prompt-injection/
            - text: .
