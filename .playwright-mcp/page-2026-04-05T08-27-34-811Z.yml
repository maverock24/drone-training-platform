    - generic [ref=e293]:
      - generic [ref=e294]:
        - heading "Löydä unelmiesi kerrostaloasunto Oikotien avulla" [level=2] [ref=e295]
        - paragraph [ref=e296]: Oikotie on tukenasi unelmien kerrostaloasunnon etsinnässä. Tältä sivulta löydät kaikki myytävät kerrostaloasunnot. Voit etsiä vapaita kerrostaloasuntoja rajaamalla hakuasi sijainnin, ominaisuuksien, hinnan, asuin pinta-alan ja ilmoituksen iän mukaan. Näet kaikki hakuasi vastaavat myytävät kerrostaloasunnot klikkaamalla "Hae kohteet". Löytäessäsi sinua kiinnostavat kerrostaloasunnot, voit ottaa yhteyttä myyjään kohdesivun yhteydenottolomakkeen kautta. Tutustu myös asunnon osto-oppaaseen. Etsimäsi unelmien kerrostaloasunto voi olla vain muutaman klikkauksen päässä!
        - heading "Uusimmat myytävät kerrostaloasunnot Oikotiellä" [level=2] [ref=e297]
        - paragraph [ref=e298]: Jos et löydä heti itsellesi sopivaa kerrostaloasuntoa, voit tallentaa Oikotien hakuvahdin. Hakuvahti ilmoittaa sinulle sähköpostitse uusimmat hakuehtojasi vastaavat myytävät kerrostaloasunnot. Näe uusimmat myytävät kerrostaloasunnot ensimmäisenä ja nappaa unelmiesi koti.
