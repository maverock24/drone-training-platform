        - article [ref=e68]:
          - heading "Korko tuloverotuksessa" [level=1] [ref=e69]
          - generic [ref=e70]:
            - paragraph [ref=e71]: Korkoja voi vähentää verotuksessa vain, jos velka on tulonhankkimisvelka. Korkomenot vähennetään pääomatuloista. Vähennys tehdään sen kalenterivuoden verotuksessa, jona korot on maksettu. Yleensä vain verovelvollinen itse voi vähentää velkansa korot.
            - heading "Mitä korkoja voi vähentää verotuksessa?" [level=2] [ref=e72]
            - paragraph [ref=e73]: Lainan korkoja voi vähentää, jos kyseessä on tulonhankkimisvelka, joka kohdistuu veronalaisen tulon hankkimiseen. Tulonhankkimistoimintaa on esimerkiksi asunnon vuokraaminen, osakesäästäminen ja muu sellainen toiminta, jonka tarkoituksena on tuottaa veronalaista tuloa. Tulonhankkimisvelan korot vähennetään kaikista pääomatuloista täysimääräisinä.
            - paragraph [ref=e74]:
              - strong [ref=e75]: Huomaa, että asuntolainan korkoja ei ole enää voinut vähentää verovuodesta 2023 alkaen.
            - paragraph [ref=e76]: Lainan todellinen käyttötarkoitus ratkaisee, onko kyseessä asunto- tai tulonhankkimisvelka.
            - heading "Takausvelan koroista voi saada vähennyksen" [level=2] [ref=e77]
            - paragraph [ref=e78]: Myös takausvelasta maksettavaksi tulleet korot voivat olla vähennyskelpoisia. Edellytyksenä on, että alkuperäisellä velallisella olisi ollut oikeus vähentää korot sillä perusteella, että ne kohdistuvat elinkeinotoimintaan tai maatalouteen.
            - paragraph [ref=e79]: Takaaja voi vähentää koroista sen osan, joka on kertynyt sen jälkeen, kun alkuperäinen velallinen on todettu maksukyvyttömäksi. Maksukyvyttömyys on todettu esimerkiksi silloin, jos velallinen on todettu ulosotossa varattomaksi.
            - heading "Kulutusluottojen korkoja ei voi vähentää" [level=2] [ref=e80]
            - paragraph [ref=e81]: Kulutusluottojen korkoja ei voi vähentää verotuksessa. Velka on kulutusluotto, jos se on otettu elämisen rahoittamiseen tai muita henkilökohtaisia menoja varten. Kulutusluottoja ovat esimerkiksi kodin sisustamista, auton, veneen tai vapaa-ajan asunnon hankintaa varten otetut velat.
            - heading "Muita korkoja ei voi vähentää" [level=2] [ref=e82]
            - paragraph [ref=e83]: "Muiden kuin tulonhankkimisvelkojen korkoja ei voi vähentää. Esimerkiksi seuraavia korkoja ei voi vähentää:"
            - list [ref=e84]:
              - listitem [ref=e85]: asuntolainan korko
              - listitem [ref=e86]: opintolainan korko
              - listitem [ref=e87]: korko, joka on maksettu avustuksena valtion varoista (opintotukilain tai sotilasavustuslain perusteella)
              - listitem [ref=e88]: huojennettu viivästyskorko
              - listitem [ref=e89]: veron viivästyskorko
              - listitem [ref=e90]:
                - text: korko lainasta, jonka käyttötarkoitus on
                - list [ref=e91]:
                  - listitem [ref=e92]: verottoman tulon hankinta
                  - listitem [ref=e93]: korkotulon lähdeveron alaisen tulon hankinta
                  - listitem [ref=e94]: vapaaehtoisen yksilöllisen eläkevakuutuksen hankinta.
            - heading "Lainan liitännäiskulut eivät kuulu korkoon" [level=2] [ref=e95]
            - paragraph [ref=e96]: Lainan liitännäiskuluja ovat esimerkiksi järjestelypalkkio ja toimitusmaksu. Näitä kuluja ei pidetä korkoina. Tulonhankkimisvelan liitännäiskulut voi vähentää tulonhankkimiskuluina. Muiden lainojen, esimerkiksi opinto- tai asuntolainan, liitännäiskuluja ei voi vähentää verotuksessa.
            - heading "Mistä, milloin ja miten korot vähennetään?" [level=2] [ref=e97]
            - paragraph [ref=e98]: Korkomenot vähennetään pääomatuloista. Lainan korkokulut voidaan ottaa huomioon jo verokortin ennakonpidätysprosentissa.
            - heading "Korot verokortilla" [level=3] [ref=e99]
            - paragraph [ref=e100]: Jos verotuksessa on jo otettu huomioon vähennettäviä korkoja, ne otetaan automaattisesti huomioon seuraavan verokortin ennakonpidätysprosentissa.
            - paragraph [ref=e101]: Jos korkojen määrä muuttuu vuoden aikana huomattavasti, kannattaa hakea uusi verokortti. Jos korkojen määrä vähenee huomattavasti verovuoden aikana, voi vuoden alussa laskettu ennakonpidätysprosentti olla liian pieni. Jos ennakonpidätys tehdään tämän liian pienen veroprosentin mukaan, saattaa maksettavaksi tulla jäännösveroja.
            - paragraph [ref=e102]:
              - link "Lue lisää verokortin muuttamisesta" [ref=e103] [cursor=pointer]:
                - /url: /henkiloasiakkaat/verokortti-ja-veroilmoitus/verokortti/
              - text: .
            - paragraph [ref=e104]:
              - link "Laske korkojen vaikutus veroprosenttilaskurilla" [ref=e105] [cursor=pointer]:
                - /url: /henkiloasiakkaat/verokortti-ja-veroilmoitus/verokortti/veroprosenttilaskuri/
              - text: .
            - heading "Korot veroilmoituksella" [level=3] [ref=e106]
            - paragraph [ref=e107]:
              - text: Korkomenot vähennetään sen kalenterivuoden verotuksessa, jona ne on maksettu. Pankki ilmoittaa lainan ja lainan korot Verohallintoon lopullista verotusta varten, ja tiedot näkyvät esitäytetyllä veroilmoituksella. Tarkista korkotiedot ja lainan käyttötarkoitus. Jos velan käyttötarkoitus on merkitty veroilmoitukseen väärin, korjaa tiedot
              - generic [ref=e108]:
                - link "OmaVerossa" [ref=e109] [cursor=pointer]:
                  - /url: /sahkoiset-asiointipalvelut/omavero/
                - text: tai lomakkeella
              - link "50B Pääomatulot ja niistä tehtävät vähennykset" [ref=e110] [cursor=pointer]:
                - /url: /tietoa-verohallinnosta/yhteystiedot-ja-asiointi/lomakkeet/kuvaus/50b-p%C3%A4%C3%A4omatulot-ja-niist%C3%A4-teht%C3%A4v%C3%A4t-v%C3%A4hennykset/
              - text: .
            - generic [ref=e112]:
              - paragraph [ref=e113]:
                - strong [ref=e114]: "Esimerkki:"
                - text: Armi on ottanut helmikuussa pankista velkaa, jolla hän on heti ostanut sijoitusasunnon. Armi on vuokrannut asunnon maaliskuusta alkaen. Armin ottama velka on tulonhankkimisvelka.
              - paragraph [ref=e115]: Armi on saanut sijoitusasunnosta vuokratuloa 5 000 euroa ja maksanut asunnon hoitovastikkeita 1 000 euroa maaliskuun ja joulukuun väliseltä ajalta. Armi on maksanut pankille tulonhankkimislainasta korkoja yhteensä 1 500 euroa.
              - paragraph [ref=e116]: Armi ilmoittaa seuraavana keväänä OmaVerossa vuokratulot ja erittelee asunnon vuokraamisesta aiheutuneet kulut. Lainan korkoja hän ei vähennä tässä kohdassa vaan ne vähennetään tulonhankkimisvelan korkoina.
              - paragraph [ref=e117]: Armi tarkistaa, onko pankki antanut kyseisen velan koroista oikeat tiedot kohdassa Tulonhankkimisvelan korot. Koska laina on uusi, tiedot näkyvät veroilmoituksella muuna velkana. Armi korjaa OmaVerossa lainan käyttötarkoituksen tulonhankkimisvelaksi ja kertoo lisätiedoissa ostaneensa lainalla asunnon, josta saa vuokratuloja.
              - paragraph [ref=e118]: Armi voisi vaihtoehtoisesti ilmoittaa tiedot paperilomakkeilla. Silloin hänen olisi täytettävä ja palautettava koroista lomake 50B "Pääomatulot ja niistä tehtävät vähennykset" ja vuokratuloista lomake 7H "Vuokratulot - osakehuoneistot".
            - heading "Miten korot vähennetään, jos pääomatuloja ei ole?" [level=2] [ref=e119]
            - paragraph [ref=e120]: Henkilön ja kuolinpesän korkomenot vähennetään ensisijaisesti pääomatuloista. Jos pääomatulot eivät riitä vähennysten tekemiseen (esimerkiksi tulonhankkimisvelan korot ovat suuremmat kuin pääomatulot), syntyy alijäämä. Alijäämästä 30 % vähennetään alijäämähyvityksenä ansiotulojen veroista. Prosenttiosuus vastaa pääomatulojen veroprosenttia. Alijäämähyvitykseen liittyy rajoituksia.
            - paragraph [ref=e121]:
              - link "Lue lisää sivulta Alijäämähyvitys" [ref=e122] [cursor=pointer]:
                - /url: /henkiloasiakkaat/vahennykset/mita-voi-vahentaa/alijaamahyvitys/
              - text: .
            - heading "Kuka korot voi vähentää?" [level=2] [ref=e123]
            - paragraph [ref=e124]: Yleensä vain verovelvollinen itse voi vähentää velkansa korot. Poikkeuksellisesti myös takaaja tai muu vakuuden asettaja voi vähentää maksamiaan korkoja.
            - heading "Puolisot" [level=3] [ref=e125]
            - paragraph [ref=e126]:
              - text: "Kumpikin puoliso voi vähentää pääomatuloistaan vain oman velkansa korot. Korkoja ei voi siirtää vähennettäväksi toisen puolison pääomatuloista. Korkovähennys on siis henkilökohtainen, ei perhekohtainen. Puolisoiden alijäämähyvityksen käsittelyssä on kuitenkin perhekohtaisia piirteitä:"
              - link "lue lisää sivulta Alijäämähyvitys" [ref=e127] [cursor=pointer]:
                - /url: /henkiloasiakkaat/vahennykset/mita-voi-vahentaa/alijaamahyvitys/
              - text: .
            - paragraph [ref=e128]: Puolisoilla voi olla yhteistä velkaa, josta he ovat yhteisvastuussa. Tällaisen velan korot vähentää verotuksessaan se puoliso, joka korot on maksanut. Jos korkojen maksajaa ei ole ilmoitettu Verohallintoon tai puolisoiden vaatimukset ovat ristiriitaiset, vähennetään kummaltakin puolisolta puolet maksettujen korkojen määrästä.
            - paragraph [ref=e129]:
              - text: Jos avopuolisoita pidetään verotuksessa puolisoina, myös korot käsitellään kuten aviopuolisoiden korot.
              - link "Lue tarkemmin, mitä verotuksessa tarkoitetaan puolisolla." [ref=e130] [cursor=pointer]:
                - /url: /henkiloasiakkaat/verokortti-ja-veroilmoitus/omat-tiedot/avioliitto__avioero/
            - paragraph [ref=e131]: Jos yhteisvelalliset eivät ole puolisoita, velan korot vähentää jokainen velallinen itse.
