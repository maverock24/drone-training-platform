                              - generic:
                                - paragraph: Automaattinen veroraportointi säästää aikaasi. Nordnet on saanut riippumattomassa Välittäjä-tutkimuksessa korkeat pisteet raportoinnin kaikilla osa-alueilla, kuten virheettömyydessä ja kattavuudessa.
