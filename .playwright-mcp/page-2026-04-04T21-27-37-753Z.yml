                                  - img
                              - generic:
                                - heading [level=3]: "2. Uusasiakastarjous: käy kauppaa 2 kk alk. 3 € Helsingin pörssissä"
                              - generic:
                                - paragraph: "Uutena asiakkaana käyt kauppaa osakesäästötilillä vähintään kaksi ensimmäistä kalenterikuukautta hinnaston parhaalla tasolla 1: 0,06 % min. 3 €/toimeksianto Helsingin pörssissä. Jos avaat osakesäästötilisi nykyisenä asiakkaana, sama etu on käytössäsi kuluvan kuun/tilinavauskuukauden ajan."
