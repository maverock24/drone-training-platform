                                - heading [level=3]: 1. Tili, verkkopalvelu, säilytys ja striimaavat kurssit 0 €
                              - generic:
                                - paragraph: Ei avaus-, kuukausi-, verkkopankkitunnus- tai säilytysmaksuja. Asiakkuuden ja osakesäästötilin hinta on siis 0 €. Käytössäsi on myös reaaliaikaisesti striimaavat kurssit pohjoismaisille osakkeille maksutta.
                          - generic:
