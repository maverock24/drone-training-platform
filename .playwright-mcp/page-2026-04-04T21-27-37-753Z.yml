                                - heading [level=3]: 6. Pääomaa salkkua vastaan
                              - generic:
                                - paragraph: Nordnetistä saat lainarahoitusta omistuksiasi vastaan. Korkoa maksat vain käyttämästäsi luotosta, eli silloin, kun salkkusi saldo on negatiivinen. Luottoa voit käyttää luottorajasi (limiittisi) puitteissa niin paljon kuin haluat, milloin haluat ja mihin haluat. Vaikka osakesäästötilisijoituksiin.
