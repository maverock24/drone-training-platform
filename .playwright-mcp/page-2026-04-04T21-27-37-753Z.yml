                                      - generic:
                                        - generic:
                                          - generic:
                                            - paragraph: Osakesäästötili (OST) on verotehokas sijoitustili, jolle voit tallettaa rahaa korkeintaan 100 000 €, kerralla tai erissä. Voit sijoittaa osakesäästötilin kautta koti- ja ulkomaisiin pörssiosakkeisiin ja maksat mahdollisesta voitosta veroa vasta siirtäessäsi rahaa ulos osakesäästötililtäsi.
                                    - generic:
                                      - generic:
                                        - paragraph: Nordnetin osakesäästötili on Suomen suosituin. Ei avaus- tai säilytysmaksuja. Osakekaupat alk. 3 €/kpl.
                                  - generic:
                                    - link:
                                      - /url: /info/turvallisuus
                                      - generic: Lue lisää talletussuojasta
                                  - generic:
                                    - generic:
                                      - paragraph: Tili on Ruotsin valtiovarainministeriön (Riksgälden) päätöksellä ruotsalaisen talletustakuun piirissä. Jokaisella asiakkaalla on oikeus saada enimmäismäärältään 100 000 euron korvaus Nordnetissä olevien tiliensä kokonaissaldosta. Tämän summan lisäksi tilinomistaja voi lain mukaan saada tietyin edellytyksin korkeintaan 5 miljoonaa Ruotsin kruunua korvausta sellaisten talletusten osalta, jotka liittyvät tiettyihin Ruotsin laissa määriteltyihin elämäntapahtumiin. Riksgälden maksaa korvauksen seitsemän arkipäivän kuluessa siitä, kun pankki asetettiin konkurssiin tai kun Ruotsin Finansinspektionen on antanut päätöksen talletustakuun astumisesta voimaan. Lisätietoja on osoitteessa www.riksgalden.se.
                                      - paragraph: Säilytystilillä olevat rahoitusvälineet ovat Ruotsin sijoittajansuojalain (1999:158) mukaisen sijoittajansuojan piirissä. Asiakkaalla on oikeus saada enintään 250 000 kruunun suuruinen erityiskorvaus, jos hän ei Nordnet Bank AB:n konkurssin sattuessa pystyisi saamaan rahoitusvälineitään takaisin säilytystililtään. Asiakkaan, joka haluaa korvausta, on viimeistään vuoden kuluessa konkurssipäätöksestä esitettävä vaatimus Riksgäldenille, joka harkinnan jälkeen maksaa korvauksen. Lisätietoja on osoitteessa www.riksgalden.se.
