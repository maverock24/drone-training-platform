                              - generic:
                                - paragraph: Tilin avaaminen on maksutonta ja vie vain muutaman minuutin. Osakesäästötili voidaan avata myös lapselle.
                                - paragraph: Lainsäädännössä olevan rajoituksen mukaan sinulla voi olla ainoastaan yksi voimassa oleva osakesäästötili kerrallaan, lukuun ottamatta palveluntarjoajan vaihtamisesta johtuvaa väliaikaista tilannetta. Jos osakesäästötilin avaa useampaan kuin yhteen pankkiin, verottaja voi periä takautuvasti lisäveroa jokaisesta tilistä 10 euroa päivässä.
