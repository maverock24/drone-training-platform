                                          - generic:
                                            - paragraph: Osakesäästötili tarkoittaa tiliä, jonka sisällä voit käydä kauppaa osakkeilla verovapaasti. Myöskään mahdollisista osingoista ei peritä veroa niin kauan, kun raha pysyy tilin sisällä. Verotettavaa tuottoa syntyy vasta, kun teet tililtä noston tai kun lakkautat osakesäästötilisi.
