              - text: .
            - heading "Hankintameno-olettamaa voi käyttää ostohinnan ja voiton hankkimiskulujen sijaan" [level=3] [ref=e110]
            - paragraph [ref=e111]: Voiton määrää laskiessasi voit halutessasi vähentää osakkeiden myyntihinnasta hankintameno-olettaman sen sijaan, että vähentäisit siitä osakkeiden ostohinnan ja voiton hankkimiskulut tai perintö- ja lahjaverotuksen verotusarvon.
            - list [ref=e112]:
              - listitem [ref=e113]: Jos olet omistanut myymäsi osakkeet alle 10 vuotta, hankintameno-olettama on 20 % osakkeiden myyntihinnasta.
              - listitem [ref=e114]: Jos olet omistanut myymäsi osakkeet vähintään 10 vuotta, hankintameno-olettama on 40 % osakkeiden myyntihinnasta.
            - paragraph [ref=e115]:
              - text: Lue lisää hankintameno-olettamasta syventävän vero-ohjeen
              - link "Arvopaperien luovutusten verotus kohdasta 4.2.2 Hankintameno-olettama ja omistusaika" [ref=e116] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/arvopaperien-luovutusten-verotus2/#4.2.2-hankintameno-olettama-ja-omistusaika
              - text: .
            - paragraph [ref=e117]:
              - text: Huomaa, että jos käytät hankintameno-olettamaa, et enää saa vähentää osakkeiden myyntihinnasta niiden ostohintaa ja voiton hankkimiskuluja.
              - text: "Kyseessä on siis kaksi eri vaihtoehtoa:"
              - strong [ref=e118]: joko
              - text: ostohinta + voiton hankkimiskulut (tai verotusarvo)
              - strong [ref=e119]: tai
              - text: hankintameno-olettama.
            - paragraph [ref=e120]:
              - strong [ref=e121]: "Esimerkki:"
              - text: Antti osti 1 000 kappaletta Yhtiö Oy:n osakkeita vuonna 1994. Osakkeiden ostohinta oli 4 markkaa osakkeelta eli yhteensä 4 000 markkaa. Antti maksoi osakkeiden ostosta välityspalkkiota 40 markkaa. Osakkeiden hankintahinta on siis 4 040 markkaa eli 679,47 euroa.
              - text: Antti myy kyseiset osakkeet vuonna 2025. Myyntihinta on 2,50 euroa osakkeelta eli yhteensä 2 500 euroa. Voiton hankkimiskuluiksi luettavat myyntikulut ovat 25 euroa.
              - text: Antti on omistanut Yhtiö Oy:n osakkeet myyntihetkellä vähintään 10 vuoden ajan. Niinpä hankintameno-olettama on 40 % myyntihinnasta eli 2 500 euroa × 40 % = 1 000 euroa.
              - text: Myyntihinnasta vähennettävä määrä on siis suurempi hankintameno-olettaman (1 000 €) mukaan kuin todellisen ostohinnan ja voiton hankkimiskulujen yhteismäärän (679,47 € + 25 € = 704,47 €) mukaan. Myyntivoitto kannattaa siis verotuksen kannalta laskea vähentämällä myyntihinnasta hankintameno-olettama. Tällöin verotettava myyntivoitto jää pienemmäksi eli 1 500 euroon (2 500 € – 1 000 €).
              - text: "Jos Antti olisi hankkinut osakkeet vasta vuonna 2016 mutta myynyt ne jo vuonna 2024, hän olisi omistanut ne alle 10 vuotta. Tällöin hankintameno-olettama olisi ollut 20 % myyntihinnasta eli 2 500 euroa × 20 % = 500 euroa. Tässä tapauksessa Antille olisi ollut verotuksellisesti edullisempaa käyttää hankintameno-olettaman (500 €) sijaan todellisen ostohinnan ja voiton hankkimiskulujen yhteismäärää (704,47 €). Kun se olisi vähennetty myyntihinnasta, verotettava myyntivoitto olisi ollut pienempi: 1 795,33 euroa (2 500 € − 704,47 €)."
            - heading "Myyntivoitto on yleensä verollista tuloa" [level=2] [ref=e122]
            - paragraph [ref=e123]: Kun myyt osakkeita voitolla, maksat myyntivoitosta veroa pääomatulojen veroprosentin mukaan.
