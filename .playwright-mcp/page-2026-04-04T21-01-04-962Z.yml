              - text: .
            - heading "Tarkista esitäytetty veroilmoitus" [level=2] [ref=e149]
            - paragraph [ref=e150]: Tarkista, että tiedot osakkeiden myynneistä ja osinkotuotoista näkyvät oikein keväällä saamassasi esitäytetyssä veroilmoituksessa. Ilmoita puuttuvat ja korjaa virheelliset tiedot.
            - paragraph [ref=e151]: Jos olet myynyt osakkeita tai muita arvopapereita ulkomaisen etävälittäjän kautta, ilmoita voitot tai tappiot myös näistä kaupoista. Verohallinto saa tietoja myös ulkomailla tapahtuneista arvopaperikaupoista ja valvoo näiden tietojen ilmoittamista verotuksessa.
            - paragraph [ref=e152]:
