            - paragraph [ref=e104]: Kun myyt osakkeita, sinulle tulee niistä yleensä joko myyntivoittoa eli luovutusvoittoa tai myyntitappiota eli luovutustappiota. Kun lasket voiton tai tappion määrää, vähennä osakkeiden myyntihinnasta
