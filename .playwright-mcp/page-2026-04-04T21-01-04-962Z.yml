            - paragraph [ref=e108]:
              - text: Jos olet saanut osakkeet lahjaksi tai perinnöksi, voit vähentää myyntihinnasta lahjaverotuksessa tai perintöverotuksessa käytetyn verotusarvon. Lue lisää voiton ja tappion laskemisesta syventävän vero-ohjeen
