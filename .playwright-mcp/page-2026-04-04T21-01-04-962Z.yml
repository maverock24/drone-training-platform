            - paragraph [ref=e135]:
              - strong [ref=e136]: Jos kuitenkin olet myynyt osakkeita kalenterivuoden aikana yhteensä enintään 1 000 eurolla
              - text: ", sinun ei tarvitse maksaa myyntivoitosta veroa. 1 000 euron myyntihintaan luetaan kaikki vuoden aikana tehdyt myynnit, ei pelkästään osakemyynnit. Verovapaita myyntejä ei lasketa mukaan."
            - paragraph [ref=e137]:
              - text: Lisätietoa saat syventävästä vero-ohjeesta
