              - text: ", kohdasta 3.2 Pienet luovutukset."
            - heading "Myyntitappio vähennetään pääomatuloistasi" [level=2] [ref=e139]
            - paragraph [ref=e140]: Jos osakkeiden myynnistä koituu sinulle tappiota, se vähennetään ensisijaisesti luovutusvoitoista ja jos niitä ei ole niin vähennys tehdään kaikista pääomatuloistasi.
            - paragraph [ref=e141]: Jos sinulla ei ole lainkaan pääomatuloja tai niitä on vähemmän kuin vähennettäviä myyntitappioita, vähennys siirtyy seuraaville 5 vuodelle.
            - paragraph [ref=e142]: Myyntitappioita ei kuitenkaan vähennetä lainkaan, jos kalenterivuoden aikana myymiesi osakkeiden ostohinta oli yhteensä enintään 1 000 euroa.
            - paragraph [ref=e143]: Huomaa myös, että osakkeista syntynyt myyntitappio ei vaikuta ansiotulojesi verotukseen. Et siis voi saada sen perusteella alijäämähyvitystä.
            - heading "Arvo-osuustilin osakkeiden myynnissä käytetään FIFO-periaatetta" [level=2] [ref=e144]
            - paragraph [ref=e145]: "Arvo-osuustililtä myytyjen osakkeiden myynnissä tulee aina noudattaa FIFO-periaatetta: First In – First Out. Jos sinulla on siis eri aikaan ostettuja saman yhtiön osakkeita, ne myydään samassa järjestyksessä kuin ostit ne – vanhimmat ensin."
            - paragraph [ref=e146]: FIFO-periaate on kuitenkin arvo-osuustilikohtainen. Jos sinulla on saman yhtiön osakkeita useammassa sähköisessä osakesalkussa, voit halutessasi myydä niitä uudemmasta salkusta aikaisemmin kuin vanhasta.
