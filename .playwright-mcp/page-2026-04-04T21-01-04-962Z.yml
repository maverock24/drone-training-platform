            - heading "Onko kauppakirjassa sovittu lisäkauppahinnasta?" [level=2] [ref=e156]:
              - strong [ref=e157]: Onko kauppakirjassa sovittu lisäkauppahinnasta?
            - paragraph [ref=e158]: Kun myyt omaisuutta, kauppakirjassa voi olla ehto, että kauppahinta täsmennetään tai tarkistetaan myöhemmin. Silloin voit saada myöhemmin lisäkauppahintaa peruskauppahinnan lisäksi. Lisäkauppahintaa voidaan kutsua myös ehdolliseksi lisäkauppahinnaksi, lisävastikkeeksi tai ehdolliseksi vastikkeeksi.
            - paragraph [ref=e159]: Lisäkauppahinta voi olla ehtona esimerkiksi yritys- tai kiinteistökaupoissa. Lisäkauppahinta voi olla sidottu esimerkiksi yrityksen liiketoiminnan kehitykseen tai kiinteistön arvon nousuun. Lisäkauppahinnasta ei ole kyse silloin, jos ostaja maksaa kauppakirjassa sovitun kauppahinnan osissa myyjälle.
            - paragraph [ref=e160]:
              - text: Jos lisäkauppahinnan määrä selviää vasta myöhemmin, lisäkauppahinnan osuus verotetaan vuodesta 2026 alkaen
              - strong [ref=e161]: sen verovuoden tulona, jolloin lisäkauppahinta varmistuu.
              - text: Sillä ei ole merkitystä, minä vuonna lisäkauppahinta maksetaan.
            - list [ref=e162]:
              - listitem [ref=e163]: Ilmoita peruskauppahinta kaupantekovuoden veroilmoituksessa, kohdassa Luovutusvoitot tai -tappiot – Myyntihinta.
              - listitem [ref=e164]: Ilmoita lisäkauppahinta sen vuoden veroilmoituksessa, jolloin määrä vahvistuu. Merkitse lisäkauppahinta kohtaan Luovutusvoitot tai -tappiot – Myyntihinta.
