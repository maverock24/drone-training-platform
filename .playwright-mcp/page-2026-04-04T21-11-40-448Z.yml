    - generic [ref=e132]:
      - heading "Kannattaako osakesäästötili ja kenelle se sopii?" [level=2] [ref=e133]
      - paragraph [ref=e134]: Osakesäästötili sopii kaikille kiinnostuneille, myös aloitteleville sijoittajille, jotka haluavat oppia lisää osakesijoittamisesta. Erityisen hyvin osakesäästötili sopii pitkäaikaiselle sijoittajalle, joka on kiinnostunut sijoittamaan osingot uudestaan ja haluaa itse aika ajoin päivittää sijoitussalkkunsa sisältöä. Käytännössä, mitä aktiivisempi sijoittaja olet, sitä hyödyllisempi osakesäästötili sinulle on verrattuna sijoittamiseen osakesäästötilin ulkopuolella.
    - generic [ref=e140]:
      - heading "”Osta ja pidä” -tyyli ei osakesäästötilin kohdalla toimi" [level=2] [ref=e141]
      - paragraph [ref=e142]: Täysin passiivinen osakesijoittaja ei saa osakesäästötilistä täyttä hyötyä irti. Jos esimerkiksi osingot haluaa ohjata suoraan kulutukseen, kannattaa sijoittaa osakesäästötilin ulkopuolella perinteisellä arvo-osuustilillä.
      - paragraph [ref=e143]:
        - link "Tutustu Danske Kaupankäynti Onlineen" [ref=e144] [cursor=pointer]:
          - /url: /sinulle/saastaminen-ja-sijoittaminen/palvelut/kaupankaynti-online
    - generic [ref=e146]:
      - generic [ref=e149]:
        - heading "Miten osakesäästötili toimii ja miten se eroaa perinteisestä arvo-osuustilistä?" [level=2] [ref=e150]
        - paragraph [ref=e151]: Osakesäästötilille voi siirtää rahaa 100 000 euroon asti, mutta tilin arvo voi nousta yli 100 000 euron. Osakesäästötilillä voi käydä kauppaa vain osakkeilla, eli tilin sisällä ei voi käydä kauppaa esimerkiksi pörssinoteeratuilla rahastoilla (ETF:llä). Arvo-osuustilistä osakesäästötilin erottaa se, että maksat veroja mahdollisista tuotoista vasta, kun nostat rahaa pois osakesäästötililtä. Voit siis myydä ja ostaa osakkeita ilman välittömiä veroseuraamuksia.
        - paragraph [ref=e152]: Osingot ovat myös verovapaita osakesäästötilin sisällä ja voit sijoittaa ne uudestaan. Verot maksetaan osingoista vasta kun nostat rahaa pois osakesäästötililtä. Tämä tarkoittaa, että osakesäästötilillä ei ole mahdollista hyötyä osinkojen verovapaasta osasta, vaan nostoista peritään aina normaali pääomavero. Osakesäästötilin verotuksessa on hyvä myös huomioida, että ulkomaalaisten yritysten osakkeiden osingoista voidaan periä lähdemaan verotuksen mukainen vero jo ennen kuin nostat varoja pois osakesäästötililtä. Ulkomaisia osakkeita ostettaessa sijoittajan kannattaakin etsiä ulkomailta ensisijaisesti osakkeita, jotka ovat todennäköisemmin kasvuyhtiöitä kuin osinkonimiä.
        - paragraph [ref=e153]: Huomioithan myös, että sinulla voi olla kerralla vain yksi osakesäästötili. Myyntitappiot voit vähentää, jos lopetat osakesäästötilin ja kaikki varat nostetaan tililtä.
