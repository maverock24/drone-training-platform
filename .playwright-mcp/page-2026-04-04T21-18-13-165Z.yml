          - heading "PS-tilien maksut ja verotus" [level=1] [ref=e102]
          - complementary [ref=e104]:
            - button "Kuuntele" [ref=e107] [cursor=pointer]:
              - img [ref=e109]
              - generic [ref=e111]: Kuuntele
          - paragraph [ref=e112]: Lisäturvaa eläkevuosiin voi kartuttaa sijoittamalla ps-tilin (pitkäaikaissäästötili) kautta esimerkiksi talletuksiin, osakkeisiin tai rahasto-osuuksiin tai hankkimalla vapaaehtoisen eläkevakuutuksen.
          - paragraph [ref=e113]: Verottaja tukee eläkesäästäjää verovähennyksellä, joka alentaa maksettavia veroja enimmillään 1 700 euroa vuodessa. Maksimivähennyksen saa, jos on vuoden aikana säästänyt ps-tilille ja/tai vapaaehtoiseen eläkevakuutuksen yhteensä 5 000 euroa ja verotettavat pääomatulot ovat yli 30 000 euroa.
          - paragraph [ref=e114]: Verovähennyksen edellytyksenä on, että eläkesäästöjä ryhdytään nostamaan vasta, kun säästäjä on eläkeiässä. Vähimmäiseläkeikä riippuu syntymävuodesta ja siitä, onko ps-tili aloitettu ennen 1.1.2013 vai sen jälkeen.
          - heading "Säästäminen ps-tilille" [level=2] [ref=e115]
          - paragraph [ref=e116]: Laki ps-tilistä tuli voimaan vuoden 2010 alussa. Ps-tiliä käytettäessä säästäjä tekee säästämissopimuksen esimerkiksi pankin, rahastoyhtiön tai sijoituspalveluyrityksen kanssa. Sopimuksessa määritellään muun muassa, kuinka maksuja maksetaan, mihin varoja sijoitetaan sekä minkälaisia riskejä sijoituksissa otetaan.
          - paragraph [ref=e117]: Sopimuksen teon jälkeen säästäjä maksaa maksut sopimuksessa määritellylle säästämistilille, ps-tilille, josta palveluntarjoaja siirtää ja sijoittaa varat sovitulla tavalla erilaisiin sijoituskohteisiin.
          - paragraph [ref=e118]:
            - img "Laki ps-tilistä tuli voimaan vuoden 2010 alussa." [ref=e119]
          - paragraph [ref=e120]: Sijoitetuille varoille kertyvä tuotto maksetaan ps-tilille, josta palveluntarjoaja siirtää varat sovittujen periaatteiden mukaan eri sijoituskohteisiin. Tuottoa ei veroteta säästämisaikana. Näin on mahdollisuus saada ”korkoa korolle”.
          - paragraph [ref=e121]: Ps-sopimuksen varat ovat säästäjän omaisuutta, mutta niiden nostaminen on pääsäännön mukaan mahdollista vasta, kun säästäjä on eläkeiässä. Käyttöoikeus ps-sopimuksen varoihin on säästämisaikana yksin palveluntarjoajalla. Riski sijoitusten epäonnistumisesta on kuitenkin säästäjällä. Lisäksi pitkäaikaissäästämissopimuksen perusteella hallittujen varojen hoitokuluja tai tappioita ei voi vähentää säästäjän muun sijoitustoiminnan mahdollisista tuloista.
          - heading "Maksujen vähentäminen verotuksessa" [level=2] [ref=e122]
          - paragraph [ref=e123]: Eläkesäästäjä voi vähentää kaikista vuoden aikana tekemistään eläkesäästöistä (ps-tili ja vapaaehtoinen eläkevakuutus yhdessä) enintään 5 000 euroa. Maksut vähennetään pääomatuloista. 5 000 euron vähennys merkitsee yleensä 1 500 euroa vähemmän maksettavia veroja. Koska pääomaveroprosentti 30 000 euroa ylittävistä pääomatuloista on 34, voi verohyöty olla jopa 1 700 euroa vuodessa.
          - paragraph [ref=e124]: Maksut vähennetään varoihin oikeutetun henkilön verotuksessa, vaikka säästösopimuksen olisi tehnyt ja maksut maksanut tämän puoliso. Jos henkilöllä ei ole pääomatuloja tai pääomatulot eivät riitä maksujen vähentämiseen, 30 prosenttia vähentämättä jääneestä määrästä voidaan vähentää erityisenä alijäämähyvityksenä ansiotulosta menevästä verosta. Alijäämähyvitys vähennetään automaattisesti puolison verotuksessa, ellei vakuutetulla itsellään ole riittävästi ansiotuloista määrättyjä veroja.
          - heading "Maksettavan eläkkeen nostaminen ja verotus" [level=2] [ref=e125]
          - paragraph [ref=e126]: Ps-tilille säästetyt varat verotetaan pääomatuloina, kun niitä aikanaan nostetaan tililtä omaan käyttöön.
          - paragraph [ref=e127]: Ps-sopimuksen varojen nostaminen on mahdollista vasta, kun säästäjä on eläkeiässä. Säästöjä voi alkaa nostaa laissa tarkemmin määrätyn iän saavuttamisen jälkeen. Ennen vuotta 2013 tehdyissä sopimuksissa nostot voi aloittaa säästäjän syntymävuodesta riipuen 63–68-vuotiaana ja uudemmissa sopimuksissa 68–70-vuotiaana. Lisäksi edellytetään, että säästetyt varat nostetaan aikanaan 10 vuoden tai sitä pitemmän ajan kuluessa.
          - paragraph [ref=e128]: Vaikka säästäjä haluaisi nostaa varat ennen eläkeikäänsä, se on mahdollista ilman korotettuja veroseuraamuksia vain erityistapauksissa. Säästöt voidaan nostaa kriisitilanteessa, jollainen on vähintään vuoden kestänyt työttömyys tai säästäjän joutuminen pysyvästi työkyvyttömäksi tai osatyökyvyttömäksi. Säästöjen nostaminen on mahdollista myös puolison kuollessa sekä avioerotilanteessa.
          - heading "Ps-tilin siirto" [level=2] [ref=e129]
          - paragraph [ref=e130]: Ps-sopimuksen tehnyt voi ilman veroseuraamuksia siirtää säästönsä yhdeltä palveluntarjoajalta toiselle. Siirto on mahdollista irtisanomalla vanha sopimus ja tekemällä uusi säästösopimus toisen palvelutarjoajan kanssa. Tämän jälkeen irtisanottu palveluntarjoaja siirtää säästövarat uuden palvelutarjoajan hallintaan. Sitä, minkälaisia kuluja palveluntarjoajat näistä siirroista veloittavat, ei ole säädelty.
          - heading "Verotus kuolemantapauksissa" [level=2] [ref=e131]
          - paragraph [ref=e132]: Eläkesäästäjän kuollessa verottaja verottaa säästöt sekä tulona että perintönä.
          - paragraph [ref=e133]: Nostamattomat säästövarat verotetaan kuolinhetken mukaisen arvon mukaan kuolinpesän tai testamentinsaajaan pääomatulona. Pääomatulon veroprosentti on ollut vuoden 2016 alusta lähtien 30 ja 30 000 euroa ylittävältä osalta 34. Loppuosa varoista verotetaan perintöverotuksessa perintönä. Perintövero on noin 7–19 prosenttia, jos perilliset ovat säästäjän lapsia.
          - paragraph [ref=e134]
          - paragraph [ref=e135]:
            - strong [ref=e136]: Vapaaehtoisen yksilöllisen eläkevakuutuksen ja ps-sopimusten maksujen vähennyskelpoisuuden poistoa koskeva laki tulee voimaan 1.1.2027.
          - paragraph [ref=e137]: Vuoden 2027 alusta eläke- ja pitkäaikaissäästäjän veroetu poistuu. Edun poistaminen kohdistuu sekä olemassa oleviin sopimuksiin, että mahdollisiin uusiin sopimuksiin. Muutos on merkittävä, koska nämä eläkesijoitussopimukset ovat tarkoituksellisesti pitkäkestoisia.
