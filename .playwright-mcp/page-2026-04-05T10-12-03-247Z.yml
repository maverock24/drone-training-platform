          - heading "Specific Category — Civil Drones" [level=1] [ref=e92]:
            - text: 
            - generic [ref=e93]: Specific Category — Civil Drones
        - article [ref=e96]:
          - generic [ref=e101]: Popular
          - generic [ref=e103]:
            - text:  
            - generic [ref=e105]:
              - generic [ref=e108]:
                - paragraph [ref=e109]: "In this site you can find:"
                - list [ref=e110]:
                  - listitem [ref=e111]:
                    - link "What is a specific UAS (drone) operation?" [ref=e112] [cursor=pointer]:
                      - /url: "#What is a specific UAS (drone) operation?"
                  - listitem [ref=e113]:
                    - link "Registration of drone operators" [ref=e114] [cursor=pointer]:
                      - /url: "#Registration of drone operators"
                  - listitem [ref=e115]:
                    - link "This is what is needed to operate in the specific category" [ref=e116] [cursor=pointer]:
                      - /url: "#Registration of drone operators"
                  - listitem [ref=e117]:
                    - link "If you are planning a drone operation under the specific category…." [ref=e118] [cursor=pointer]:
                      - /url: "#If you are planning a drone operation under the specific category…."
                  - listitem [ref=e119]:
                    - link "Do I need to apply for an operational authorization before each flight?" [ref=e120] [cursor=pointer]:
                      - /url: "#Do I need to apply for an operational authorization before each flight?"
                  - listitem [ref=e121]:
                    - link "Geographical zones" [ref=e122] [cursor=pointer]:
                      - /url: "#Geographical zones"
                  - listitem [ref=e123]:
                    - link "Stay informed" [ref=e124] [cursor=pointer]:
                      - /url: "#Stay informed"
                - heading "What is a specific UAS (drone) operation?" [level=2] [ref=e125]
                - paragraph [ref=e126]:
                  - text: A drone can be operated in the ‘specific’ category when it is operated outside of the operational limitations laid out under the
                  - link "‘open’ drone category" [ref=e127] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/en/domains/civil-drones/drones-regulatory-framework-background/open-category-civil-drones
                  - text: . If the risk of the operation is even higher, the drone must be operated in the ‘certified’ category. Hereafter you can find information only on the drone’s specific category.
                - paragraph [ref=e128]: "Examples of UAS operations in the ‘specific’ category are:"
                - list [ref=e129]:
                  - listitem [ref=e130]: BVLOS – Beyond Visual Line Of Sight
                  - listitem [ref=e131]: When using a drone with MTOM (maximum take of mass) > 25 kg
                  - listitem [ref=e132]: flying higher than 120m above ground level
                  - listitem [ref=e133]: when dropping material
                  - listitem [ref=e134]: when operating drone in an urban environment with a MTOM> 4 kg or without a class identification label
                - heading "Registration of drone operators" [level=3] [ref=e135]
                - paragraph [ref=e136]:
                  - text: As for the open category, all drone operators in the specific category need to
                  - link "register" [ref=e137] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/en/the-agency/faqs/registration-requirements
                  - text: themselves (not the actual drone/s). If the operator is already registered (e.g. because they operate a drone in the open category) there is no need to register again, even for operations in the specific category. UAS operators need to register themselves in the Member State where they
                  - text: have their residence for natural persons or where they have their principal place of business for legal persons. Third country operators that do not have their principal place of business in an EASA Member State need to register in the first EASA Member State in which they perform an operation.
                - heading "This is what is needed to operate in the specific category" [level=3] [ref=e138]
                - paragraph [ref=e139]:
                  - text: The
                  - link "‘specific’ category" [ref=e140] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/the-agency/faqs/drones-uas#category-specific-category
                  - text: caters for riskier operations not covered under the ‘open’ category.
                - paragraph [ref=e141]:
                  - text: To fly in the specific category, as a drone operator and before starting the flight/s, an operational authorisation from the
                  - link "National Aviation Authority" [ref=e142] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/domains/civil-drones/naa
                  - text: (NAA) of the state of registration is needed. Even if the intention is to conduct the operation in a state other than the one of registration, the authorisation is issued by the NAA of the state of registration. Please see this link on how to conduct operation in a state different from the one of registration.
                - paragraph [ref=e143]:
                  - text: The authorization is required unless the operation is conducted in accordance with an European
                  - link "Standard Scenario (STS) (applicable from 1st January 2024) or if you have been granted by the NAA a Light UAS operator certificate (LUC) with privileges." [ref=e144] [cursor=pointer]:
                    - /url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32020R0639&from=EN
                - heading "If you are planning a drone operation under the specific category…." [level=3] [ref=e145]
                - paragraph [ref=e146]: "To recap, there are four different ways to operate in the specific category:"
                - list [ref=e147]:
                  - listitem [ref=e148]: Submit a declaration based on a Standard scenario (STS);
                  - listitem [ref=e149]: Obtain an operational authorisation following a PDRA;
                  - listitem [ref=e150]: Obtain an operational authorisation without a PDRA;
                  - listitem [ref=e151]: Have a LUC.
                - paragraph [ref=e152]: Whenever an UAS operator has decided to operate in the specific category, the UAS operator has the responsibility to develop an Operations Manual.
                - paragraph [ref=e153]: "The Operations Manual together with other applicable documents are submitted to the NAA in order to:"
                - list [ref=e154]:
                  - listitem [ref=e155]: obtain an operational authorization following a PDRA (in this case the Operations Manual is sent to the NAA with the PDRA);
                  - listitem [ref=e156]: obtain an operational authorization without a PDRA (in this case the Operations Manual is sent to the NAA together with the SORA procedure);
                  - listitem [ref=e157]: be certified as a Light UAS operator (in this case the Operations Manual is sent together with the documents mentioned in UAS.LUC.010).
                - paragraph [ref=e158]: Please find attached in the “Downloads” section of this page the Operations Manual example/template that can be used. This example is in a word format and represents the Operations Manual developed for a SAIL II UAS operation.
                - heading "Do I need to apply for an operational authorization before each flight?" [level=3] [ref=e159]
                - paragraph [ref=e160]: An operational authorisation covers all flights conducted within the limits defined in it and it may be valid for an unlimited number of flights and time, unless the NAA explicitly limits them. However if the operator intends to operate in an area covered by a geographical zone, they may be required to have a flight authorization.
                - heading "Geographical zones" [level=3] [ref=e161]
                - paragraph [ref=e162]:
                  - text: If the operator intends to operate in an area covered by a
                  - link "geographical zone" [ref=e163] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/en/the-agency/faqs/geographical-zones-where-i-can-fly
                  - text: ", then a flight authorization issued by the authority in charge of the geographical zone is needed. (e.g if the operator has a contract to clean the windows of a prison protected by a geographical zone, they may need the flight authorization from the authority in charge of the prison). This authorization is independent of the category in which the flight is conducted and it’s necessary even if the flight is performed according to an EU STS or in the"
                  - link "open category" [ref=e164] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/en/domains/civil-drones/drones-regulatory-framework-background/open-category-civil-drones
                  - text: .
                - paragraph [ref=e165]:
                  - text: To support States in the publication of information on the UAS geographical zones in the common digital format as required by the drones regulation, EASA issued respective guidance
                  - text: and acceptable means of compliance making reference to the EUROCAE ED-269 standard. At this
                  - link "link" [ref=e166] [cursor=pointer]:
                    - /url: https://ext.eurocontrol.int/swim_confluence/display/UGZ/UAS+GeoZones
                  - text: it is possible to find “Guidelines for GeoZones data sets” giving additional information on the application of the above mentioned standard.
                - heading "Remote identification" [level=3] [ref=e167]
                - paragraph [ref=e168]: Starting from 1 January 2024, all drones operated in the specific category (including those operating in national or EU standard scenarios) need to be equipped with a remote identification system. Some companies have already placed on the market modules providing a direct remote identification system, providing the ‘EU Declaration of Conformity’ and you can find a list below. Please be aware that EASA did not verify the compliance of such components and the declaration of conformity is submitted under the sole responsibility of the manufacturer.
