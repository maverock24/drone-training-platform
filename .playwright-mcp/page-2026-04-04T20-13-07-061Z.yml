              - generic [ref=e188]:
                - paragraph [ref=e189]:  Caution
                - paragraph [ref=e190]:
                  - text: "Finding portfolios on the mean-semivariance frontier is computationally harder than standard mean-variance optimization: our implementation uses"
                  - code [ref=e191]: 2T + N
                  - text: optimization variables, meaning that for 50 assets and 3 years of data, there are about 1500 variables. While
                  - code [ref=e192]: EfficientSemivariance
                  - text: allows for additional constraints/objectives in principle, you are much more likely to run into solver errors. I suggest that you keep
                  - code [ref=e193]: EfficientSemivariance
                  - text: problems small and minimally constrained.
