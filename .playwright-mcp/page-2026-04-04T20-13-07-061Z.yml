              - paragraph [ref=e175]:
                - code [ref=e176]: EfficientSemivariance
                - text: has a slightly different API to
                - code [ref=e177]: EfficientFrontier
                - text: . Instead of passing in a covariance matrix, you should past in a dataframe of historical/simulated returns (this can be constructed from your price dataframe using the helper method
                - code [ref=e178]: expected_returns.returns_from_prices()
                - text: "). Here is a full example, in which we seek the portfolio that minimises the semivariance for a target annual return of 20%:"
              - generic [ref=e181]: "from pypfopt import expected_returns, EfficientSemivariance df = ... # your dataframe of prices mu = expected_returns.mean_historical_returns(df) historical_returns = expected_returns.returns_from_prices(df) es = EfficientSemivariance(mu, historical_returns) es.efficient_return(0.20) # We can use the same helper methods as before weights = es.clean_weights() print(weights) es.portfolio_performance(verbose=True)"
