            - heading "General Efficient Frontier" [level=1] [ref=e69]
            - paragraph [ref=e70]: The mean-variance optimization methods described previously can be used whenever you have a vector of expected returns and a covariance matrix. The objective and constraints will be some combination of the portfolio return and portfolio volatility.
            - paragraph [ref=e71]: However, you may want to construct the efficient frontier for an entirely different type of risk model (one that doesn’t depend on covariance matrices), or optimize an objective unrelated to portfolio return (e.g tracking error). PyPortfolioOpt comes with several popular alternatives and provides support for custom optimization problems.
            - generic [ref=e72]:
              - heading "Efficient Semivariance" [level=2] [ref=e73]
              - paragraph [ref=e74]: Instead of penalising volatility, mean-semivariance optimization seeks to only penalise downside volatility, since upside volatility may be desirable.
              - paragraph [ref=e75]:
                - text: "There are two approaches to the mean-semivariance optimization problem. The first is to use a heuristic (i.e “quick and dirty”) solution: pretending that the semicovariance matrix (implemented in"
                - code [ref=e76]: risk_models
                - text: ) is a typical covariance matrix and doing standard mean-variance optimization. It can be shown that this
                - emphasis [ref=e77]: does not
                - text: yield a portfolio that is efficient in mean-semivariance space (though it might be a good-enough approximation).
              - paragraph [ref=e78]:
                - text: Fortunately, it is possible to write mean-semivariance optimization as a convex problem (albeit one with many variables), that can be solved to give an “exact” solution. For example, to maximise return for a target semivariance
