  - dialog "Danske Bankin evästeiden käyttö ja henkilötietojen käsittely Käytämme omista evästeistämme ja kolmannen osapuolen evästeistä saatavia tietoja. Käytämme evästeitä ja käsittelemme henkilötietoja asetustesi muistamiseen, palvelujemme parantamiseen, sivuston liikenteen seurantaan, sinulle kohdennettujen viestien näyttämiseen (mukaan lukien profilointi) ja sivuston käyttösi seurantaan. Voit hyväksyä kaikkien evästeiden käytön, toiminnallisten, tilastollisten ja markkinointievästeiden käytön tai vain välttämättömien evästeiden käytön. Suostumuksesi kattaa sekä evästeiden käytön että niihin liittyvien henkilötietojen käsittelyn. Voit lukea lisätietoja evästeiden käytöstä ja henkilötietojen käsittelystä. Jos haluat lisätietoja suostumuksesi peruuttamisesta, napsauta sivuston alareunassa olevaa evästekäytäntö-linkkiä." [ref=e300]:
