                - paragraph [ref=e94]: The largest segment of the commercial drone market is the commercial service market, projected to generate US$29.4 billion by 2025. The second largest and fastest-growing segment is commercial hardware, valued at US$6.7 billion as of 2025. The smallest segment is the commercial software market, expected to reach US$1.7 billion in size by 2025.
