          - generic [ref=e108]:
            - heading "Mikä on yhtiölaina?" [level=2] [ref=e111]
            - generic [ref=e113]:
              - paragraph [ref=e114]: Yhtiölaina on taloyhtiön ottama laina mikä jakaantuu taloyhtiön osakkaille eli asuntojen omistajille osakemäärien tai neliöiden mukaisesti.
              - paragraph [ref=e115]:
                - text: Poikkeuksetta RS-kohteina myytävät uudiskohteet sisältävät yhtiölainaa.
                - strong [ref=e116]: Uudiskohteissa yhtiölainan määrä on yleensä ollut n. 60-70% asunnon velattomasta hinnasta.
                - text: Yhtiölainan osuus saattaa olla suurempikin, esimerkiksi 80-85% jos asunnon pääsee ostamaan alennushinnalla.
              - paragraph [ref=e117]:
                - text: Heinäkuussa
                - link "uusien yhtiölainarajoitusten myötä taloyhtiölainaa voi uudisrakentamisessa olla enintään 60 prosenttia" [ref=e118] [cursor=pointer]:
                  - /url: https://valtioneuvosto.fi/-//10623/kotitalouksien-ja-taloyhtioiden-lainoihin-rajoituksia-heinakuun-alussa
                - text: myytävien asuntojen velattomasta hinnasta.
              - paragraph [ref=e119]: Yhtiölaina mahdollistaa sen, että ostaja voi valita rahoittaako omarahoitusosuuden lisäksi asunnon oston taloyhtiön ottamalla yhtiölainalla vai omalla pankkilainalla.
              - paragraph [ref=e120]:
                - strong [ref=e121]: Myös käytetyissä kohteissa voi olla
                - strong [ref=e122]: yhtiölainaa
                - text: ", koska vanhemmat taloyhtiöt ottavat lähes poikkeuksetta lainaa taloyhtiössä tehtäviin isompiin remontteihin. Lisäksi myös vanhojen kokonaisten vuokrakiinteistöjen ostojen yhteydessä, kun kiinteistö muutetaan asunto-osakeyhtiömuotoon, hankintaan käytetty laina muutetaan joissain tapauksissa yhtiölainaksi, jolloin asuntoihin kohdistuu yhtiölainaa."
              - paragraph [ref=e123]: Me toimimme usein näin eli yhtiölainoitamme kokonaiset kohteet, jotka myymme verkostomme sijoittajille eteenpäin, koska sijoittaja saa yhtiölainasta selvää verohyötyä. Teemme poikkeuksen sellaisten taloyhtiöiden kohdalla, joihin on tulossa paljon isompia remontteja, että taloyhtiölle jää mahdollisuus ottaa lainaa tulevia remontteja varten.
          - generic [ref=e127]:
            - heading "Mikä on rahoitusvastike?" [level=2] [ref=e130]
            - generic [ref=e132]:
              - paragraph [ref=e133]: Rahoitusvastike on asunto-osakkeen omistajalle kohdistuva kuukausittainen maksuerä, jolla lyhennetään asunto-osakkeeseen kohdistuvaa taloyhtiölainan osuutta. Rahoitusvastikkeesta voidaan käyttää myös termiä pääomavastike.
              - paragraph [ref=e134]: Asuntoon kohdistuvaa yhtiölainaa voi maksaa pois myös kertasuorituksina tai isompina osasuorituksina taloyhtiön määrittäminä ajankohtina. Asuntosijoittajalle järkevämpi tapa on kuitenkin maksaa yhtiölainaa kuukausittain rahoitusvastikkeella, koska kertasuoritukset eivät ole yhtä lailla verovähennyskelpoisia.
          - generic [ref=e142]:
            - heading "Rahoitusvastike ei ole kulu" [level=2] [ref=e145]
            - generic [ref=e147]:
              - paragraph [ref=e148]: Uudiskohteiden myynti-ilmoituksissa käytetään usein termiä ”vastikekulut”. Vastikekuluilla tarkoitetaan yhtiövastikkeen kuukausittain maksettavaa määrää. Yhtiövastike on maksuerä, joka sisältää sekä hoitovastikkeen että rahoitusvastikkeen osuuden yhdessä ja samassa maksuerässä. Hoitovastikkeen osuus kattaa taloyhtiön ylläpitokulut, kuten lämmityksen, isännöinnin, huollon, kiinteistöveron ja vakuutukset.
              - paragraph [ref=e149]:
                - text: On tärkeää ymmärtää, että hoitovastike on kulu, mutta rahoitusvastike ei.
                - strong [ref=e150]: Rahoitusvastike on lainanlyhennyserä, joka kasvattaa varallisuuttasi
                - text: pienentäen asuntoon kohdistuvaa lainaa, samalla tavalla kuin normaalin pankkilainankin lyhennyserä. Yhtiölaina eroaa pankkilainasta kuitenkin esimerkiksi helppouden, laina-ehtojen ja tärkeimpänä verohyötyjen osalta.
          - generic [ref=e154]:
            - heading "Rahastoitu vai tuloutettu rahoitusvastike?" [level=2] [ref=e157]
            - generic [ref=e159]:
              - paragraph [ref=e160]: "Tämä on se kysymys, jonka asuntosijoittajat usein yhtiölainakohteissa kysyvät. Ja hyvä että kysyvät, koska asia on tärkeä sillä se vaikuttaa veroihin. Yksinkertaistettuna:"
              - list [ref=e161]:
                - listitem [ref=e162]:
                  - strong [ref=e163]: Jos yhtiölainasuoritukset tuloutetaan taloyhtiön kirjanpidossa => ovat vähennyskelpoisia
                - listitem [ref=e164]:
                  - strong [ref=e165]: Jos yhtiölainasuoritukset rahastoidaan taloyhtiön kirjanpidossa => eivät ole vähennyskelpoisia
              - paragraph [ref=e166]: Uudiskohteissa yhtiölainat ovat käytännössä aina tuloutettu eli rahoitusvastikkeet ovat vähennyskelpoisia. Joissain uudiskohteissa asia on kirjattu jopa yhtiöjärjestykseen. Rahastointi tulee kysymykseen enemmänkin vanhoihin kohteisiin tehtävissä korjaushankkeissa. Allekirjoittaneelle ei ole toistaiseksi tullut vastaan ainoatakaan kohdetta, jossa yhtiölainasuoritukset rahastoitaisiin. Tämä kannattaa kuitenkin aina varmistaa.
              - paragraph [ref=e167]: Yhtiölainasuoritusten kirjaamistavan päättää yhtiökokous, joten voit vaikuttaa kirjaamistapaan osallistumalla yhtiökokoukseen, pyrkimällä taloyhtiön hallitukseen tai muuten vain esittämällä asian taloyhtiön hallitukselle ja isännöitsijälle.
              - paragraph [ref=e168]:
                - text: Yksityishenkilö täydentää vähennyskelpoiset rahoitusvastikkeet vuokratulojen,
                - link "hoitovastikkeiden" [ref=e169] [cursor=pointer]:
                  - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/hoitovastike/
                - text: ja muiden kulujen tavoin esitäytettyyn veroilmoitukseen vuosittain.
              - paragraph [ref=e170]:
                - text: Yksityiskohtaisempaa ja syvällisempää sanaa asiasta löytyy
                - link "raha.fi" [ref=e171] [cursor=pointer]:
                  - /url: https://raha.fi/oma-talous/tulouttaminen-vai-rahastointi-kumpi-on-parempi/
                - text: sekä
                - link "Verohallinnon" [ref=e172] [cursor=pointer]:
                  - /url: https://www.vero.fi/henkiloasiakkaat/omaisuus/vuokratulot/vahennykset/hoitovastike-ja-paaomavastike/
                - text: sivuilta.
          - generic [ref=e176]:
            - heading "Rahoitusvastike tuoton laskennassa" [level=2] [ref=e179]
            - generic [ref=e181]:
              - paragraph [ref=e182]:
                - text: Kun lasketaan sijoitusasunnon vuokratuottoa, rahoitusvastike täytyy jättää laskennan ulkopuolelle. Joskus tulee vastaan tilanteita, joissa sijoittaja on laskenut uudiskohteen vuokratuoton vähentäen myös rahoitusvastikkeen. Tällöin
                - link "vuokratuottolaskuri" [ref=e183] [cursor=pointer]:
                  - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/vuokratuotto/
                - text: antaa vääristettyjä lukemia. Tällä laskutavalla uudiskohteen vuokratuotto olisi parempi lyhennysvapaiden aikana kuin lyhennysten alettua. Tilanne on siitä hassunkurinen, että kyseessä olisi sama asia jos laskisi pankkilainoitetun sijoitusasunnon vuokratuottoon pankkilainan lyhennyserän mukaan. Rahoitusvastike on samalla tavalla lyhennyserä, joten jätä se vuokratuoton laskennassa pois.
              - paragraph [ref=e184]: Eri asia on, kun lasketaan sijoitusasunnon kassavirtaa tai kassavirtatuottoa. Rahoitusvastikkeet vaikuttavat ilman muuta kassavirtaan, samalla tavalla kuin vaikuttaa myös normaalin pankkilainan maksuerä.
              - paragraph [ref=e185]:
                - link "Oman pääoman tuottoa" [ref=e186] [cursor=pointer]:
                  - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/oman-paaoman-tuotto/
                - text: laskettaessa myös rahoitusvastike täytyy huomioida. Oman pääoman tuoton laskennassa täytyy selvittää vieraan pääoman kulu eli toisin sanoen lainan vuosittaiset korkomenot.
          - heading "Yhtiölainan verohyödyt" [level=2] [ref=e193]
          - generic [ref=e195]:
            - generic [ref=e199]:
              - paragraph [ref=e200]:
                - text: Sijoitusasunnon ostoa varten otetun pankkilainan eli tulonhankkimislainan korot ovat vähennyskelpoisia kaikista pääomatuloista sekä lisäksi alijäämähyvityksenä ansiotuloista, jos korkokuluja on enemmän kuin pääomatuloja.
                - strong [ref=e201]: Yhtiölainan verohyödyt ovat normaalia pankkilainaa parempia sillä voit vähentää rahoitusvastikkeet kokonaisuudessaan kyseisen vuoden vuokratuloista.
                - text: Tästä syystä asuntosijoittajan ei kannata maksaa yhtiölainaa pois kerralla vaan kuukausittain rahoitusvastikkeella.
              - paragraph [ref=e202]:
                - strong [ref=e203]: Omistusasuja ei voi vähentää rahoitusvastiketta ollenkaan
                - text: ", joten omistusasujan kannattaa uudiskohteissa maksaa yhtiölaina pois normaalilla pankkilainalla, jonka korot ovat vähennyskelpoisia."
              - paragraph [ref=e204]: Asuntosijoittaja ei pääse kuitenkaan kokonaan välttämään veroa sillä vero tulee maksuun asunnon myyntihetkellä lyhentyneen yhtiölainan osalta. Veron siirtäminen eteenpäin on kuitenkin aina järkevää ja yhtiölainan avulla se onnistuu hyvin.
            - img "Kuva Jyväskylässä sijaitsevasta uudiskohteesta" [ref=e209]
          - generic [ref=e215]:
            - 'heading "Esimerkki: Uudiskohde alle 10v" [level=3] [ref=e216]':
              - strong [ref=e217]: "Esimerkki: Uudiskohde alle 10v"
            - paragraph [ref=e218]: Ostat velattomalta hinnaltaan 100.000€ maksavan uudisasunnon, johon kohdistuu yhtiölainaa 70.000€. Sijoitat itse siis 30.000€. Muutamien vuosien päästä päätät myydä asunnon ja saat siitä 110.000€ velattoman hinnan. Yhtiölaina on lyhentynyt 50.000 euroon, joten saat 60.000€ eli sijoittamasi summan tuplana takaisin. Maksat luovutusvoittoveroa sekä arvonnousun (10.000€) että lyhentyneestä yhtiölainaosuudesta (20.000€) eli yhteensä 30.000 eurosta vuoden 2026 verotuksella (30-34%) 9.000 – 10.200€ riippuen pääomatulojen määrästä.
            - paragraph [ref=e219]:
              - text: Pitkän aikavälin asuntosijoittajille uudiskohteet tarjoavat siis oikein hyvän verohyödyn. Erityisesti
              - strong [ref=e220]: yli 10 vuotta asunnon omistaneet yksityishenkilöt (ei yritykset) voivat hyödyntää asunnon myyntihetkellä hankintameno-olettamaa
              - text: ", joka on 40% asunnon luovutushinnasta."
          - generic [ref=e226]:
            - 'heading "Esimerkki: Uudiskohde yli 10v" [level=3] [ref=e227]':
              - strong [ref=e228]: "Esimerkki: Uudiskohde yli 10v"
            - paragraph [ref=e229]: Olet ostanut velattomalta hinnaltaan 100.000€ maksavan uudisasunnon, johon kohdistuu yhtiölainaa 70.000€, jonka laina-aika on 25 vuotta. Sijoitat itse siis 30.000€. Olet pitkän tähtäimen sijoittaja ja pidät asuntoa vuokrattuna koko yhtiölainan laina-ajan verran eli 25 vuotta. Olet onnistunut ostamaan asunnon kehittyvältä alueelta ja saat myydessäsi asunnosta 200.000 euron hinnan. Koska yhtiölaina on maksettu kokonaan pois, saat koko summan itsellesi. Normaalisti maksaisit veroa sekä arvonnousun (100.000€) että lyhentyneen yhtiölainan (70.000€) osalta eli yhteensä 170.000 eurosta eli 57.800€ tämän hetken verotuksella.
            - paragraph [ref=e230]:
              - strong [ref=e231]: Koska olet omistanut asunnon yli 10 vuotta, voit käyttää hankintameno-olettamaa.
              - text: Oletettu hankintameno on siis 40% luovutushetken hinnasta eli 80.000€. Maksat luovutusvoittoveroa siis 120.000 eurosta (200.000 – 80.000€) 40.800 euroa eli 17.000 euroa vähemmän kuin ilman hankintameno-olettamaa. Tämän lisäksi olet maksanut vuokratulosta veroa vain todella pienestä osuudesta, koska olet koko yhtiölainan laina-ajan verran voinut vähentää rahoitusvastikkeet vuokratuloista. Todella verotehokasta siis!
            - paragraph [ref=e232]:
              - strong [ref=e233]: Yhtälö on vielä mielenkiintoisempi jos satut omistusaikana asumaan asunnossa yhtenäisesti vähintään kaksi vuotta
              - text: ", koska et joudu nykyverotuksella maksamaan luovutusvoittoveroa ollenkaan. Tunnen useita, jotka ovat ostaneet uudisasunnon omaksi asunnokseen kahdeksi vuodeksi, jonka jälkeen ovat jättäneet asunnon sijoitusasunnoksi."
            - paragraph [ref=e234]: Ei varsinaisesti verotukseen liittyvä etu, mutta yhtiölainan lisähyöty suhteessa pankkilainaan on lisäksi se, että vältät lainan toimitusmaksun minkä joutuisit normaalista pankkilainasta maksamaan.
          - generic [ref=e240]:
            - heading "Rahoitusvastikkeen verovähennysoikeuden poistoa suunniteltiin" [level=3] [ref=e241]:
              - strong [ref=e242]: Rahoitusvastikkeen verovähennysoikeuden poistoa suunniteltiin
            - paragraph [ref=e243]: Valtionvarainministeriö teki esityksen rahoitusvastikkeen verovähennysoikeuden poistamisesta.
            - paragraph [ref=e244]: Ehdotuksen mukaan rahoitusvastiketta ei voisi enää jatkossa vähentää kokonaisuudessaan, vaan pelkät korot olisivat enää vähennyskelpoisia. Käytäntö olisi siis sama kuin normaalissa pankkilainassa.
            - paragraph [ref=e245]: Lisäksi esitettiin tiukennuksia uudiskohteiden yhtiölainoitukseen. Lyhennysvapaita ei saisi olla enää laina-ajan alussa, laina-aika saisi olla enintään 25 vuotta ja yhtiölaina-aste maksimissaan 60% asuntojen velattomasta hinnasta.
            - paragraph [ref=e246]:
              - text: Kirjoitimme tästä aiheesta aiemmin blogitekstin
              - link "Rahoitusvastikkeiden verovähennysoikeuden poisto – hyvä tarkoitus, synkkä lopputulos." [ref=e247] [cursor=pointer]:
                - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/rahoitusvastikkeiden-verovahennysoikeus/
            - paragraph [ref=e248]:
              - text: Rahoitusvastikkeiden verovähennysoikeutta ei kuitenkaan päädytty poistamaan vaan
              - strong [ref=e249]: "yhtiölainoihin tehtiin seuraavia rajoituksia, jotka astuivat voimaan muutama vuosi sitten:"
            - list [ref=e250]:
              - listitem [ref=e251]: Uusien asuntolainojen takaisinmaksuaika saa olla enintään 30 vuotta.
              - listitem [ref=e252]: Taloyhtiölainat voivat olla uudisrakentamisessa enintään 60 prosenttia myytävien asuntojen velattomasta hinnasta.
              - listitem [ref=e253]: Taloyhtiölainojen takaisinmaksuaika saa olla uudisrakentamisessa enintään 30 vuotta. Lyhennysvapaita ei voi olla ensimmäisinä viitenä vuotena rakennuksen valmistumisesta paitsi ensimmäisen vuoden aikana.
            - paragraph [ref=e254]:
              - text: Jos haluat opiskella laajemmin asuntosijoittamisen verotusasioita, kannatta lukea kirjoituksemme
              - link "vuokratulojen verotuksesta" [ref=e255] [cursor=pointer]:
                - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/sijoitusasunnon-verotus/
              - text: .
          - generic [ref=e259]:
            - heading "Yhtiölainojen ehdot" [level=2] [ref=e262]
            - generic [ref=e264]:
              - paragraph [ref=e265]: Tämän artikkelin kirjoitushetkellä uudiskohteiden yhtiölainojen ehdot ovat sijoittajan kannalta edullisella tasolla. Laina-ajat ovat pääsääntöisesti n. 20-25 vuotta. Korkomarginaali on pääsääntöisesti 1%:n molemmin puolin. Matalin meillä vastaan tullut yhtiölainan korko oli vain 0,58%.
              - paragraph [ref=e266]:
                - text: Yhtiölainoissa on lähes poikkeuksetta myös
                - link "lyhennysvapaata" [ref=e267] [cursor=pointer]:
                  - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/lyhennysvapaa-taloyhtiolaina/
                - text: laina-ajan alussa, jolloin rahoitusvastikkeella maksetaan vain yhtiölainan korkoa. Lyhennysvapaat ovat olleet yleisimmin 1-3 vuotta, joskus jopa 5 vuotta. Nykyisin lyhennysvapaata voi olla enintään yksi vuosi kohteen valmistumisen jälkeen.
          - generic [ref=e271]:
            - heading "Piileekö yhtiölainoissa riskejä?" [level=2] [ref=e274]
            - generic [ref=e276]:
              - paragraph [ref=e277]:
                - text: Uudiskohteissa kannattaa olla tarkkana kassavirtojen kanssa. Lyhennysvapaiden aikana kassavirrat ovat luonnollisesti selvästi plussan puolella. Joskus lyhennysten alkaessa kassavirta menee nollaan tai jopa miinukselle. Mitä lyhyempi laina-aika, korkeampi korko ja suurempi yhtiölainaosuus, sitä korkeampi rahoitusvastike ja
                - link "sijoitusasunnon kassavirta" [ref=e278] [cursor=pointer]:
                  - /url: https://asuntosalkunrakentaja.fi/asuntosijoittaminen/kassavirta/
                - text: menee todennäköisesti miinuksen puolelle. Toisaalta tällöin ei myöskään vuokratuloista aiheudu veroja, koska sekä hoito- että rahoitusvastikkeet ovat verovähennyskelpoisia.
              - paragraph [ref=e279]: Suojautumiskeino korkojen nousua vastaan olisi pitkään kiinteään korkoon sidottu taloyhtiölaina mikä on tullut jo vastaan joissain uudiskohteissa, mutta voisi ehkä käyttää enemmänkin. Mikäli kassavirta kääntyisi rahoitusvastikkeen nousun myötä miinukselle, voisi sijoittajan takaporttina olla maksaa taloyhtiölaina pois henkilökohtaisella pankkilainalla, johon olisi neuvoteltu pidempi laina-aika kuin taloyhtiölainassa.
              - paragraph [ref=e280]:
                - strong [ref=e281]: Eräs riski saattaa myös kohota yhtiölainoitetuissa kohteissa
                - text: ", joissa on yksi suuri omistaja, esimerkiksi yksityissijoittaja, instituutio tai vaikkapa asuntorahasto. Jos iso omistaja ajautuu vaikeuksiin ja rahoitusvastikkeet jäävät maksamatta, tulevat ne lopulta muiden osakkaiden maksettaviksi. On siis sijoittajan etu mikäli taloyhtiön omistus on hajaantunut. Se pienentää riskiä myös yhtiölainan myöntäneen pankin näkökulmasta, jolloin taloyhtiöllä on parempi neuvotteluasema yhtiölainaehtojen suhteen."
              - paragraph [ref=e282]: Uudiskohteiden kassavirtariski realisoitui 2023-2024, kun euribor-korot nousivat parhaimmillaan yli 4 prosenttiin mikä vei uudiskohdesijoittajien kassavirrat pahasti miinuksen puolelle kohteissa, joissa lyhennysvapaat olivat jo ohi. Tämä vaikutti voimakkaasti uudiskohteiden sijoittajakysyntään, mutta antoi toisaalta mahdollisuuden ostaa laadukkaita kohteita hyviltä sijainneilta kovillakin alennuksilla.
