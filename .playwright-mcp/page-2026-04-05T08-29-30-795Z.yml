      - heading "Unelmien vuokrakoti Oikotien avulla" [level=2] [ref=e252]
      - paragraph [ref=e253]: Oikotie on tukenasi unelmien vuokrakodin etsinnässä. Löydät tältä sivulta kaikki vapaat vuokra-asunnot. Voit etsiä vapaita vuokra-asuntoja rajaamalla hakuasi sijainnin, talotyypin, vuokran, asunnon koon, asunnon ominaisuuksien ja ilmoituksen iän mukaan. Klikkaamalla “Hae kohteet” näet kaikki hakuasi vastaavat vapaat vuokra-asunnot. Löytäessäsi sopivan vuokra-asunnon, ota ripeästi yhteyttä vuokranantajaan kohdesivun yhteydenottolomakkeen kautta. Unelmiesi vuokrakoti on vain muutaman klikkauksen päässä!
      - heading "Uusimmat vuokra-asunnot Oikotiellä" [level=2] [ref=e254]
