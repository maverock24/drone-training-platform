                                    - generic:
                                      - paragraph: Yllä olevat hinnat eivät koske Private Banking- eikä Active Trading -asiakkaita. Kaupankäyntipalkkiot osakkeille, warranteille, ETF- ja ETC-tuotteille kotimaan markkinoilla.
                                      - paragraph: Palkkiotasoa laskettaessa saman henkilötunnuksen alla olevien salkkujen ja osakesäästötilin kaikki toteutuneet toimeksiannot lasketaan yhteen. Myös vähintään 1 000 euron rahastotoimeksiannot lasketaan mukaan toimeksiantojen määrään. Rahastotoimeksiannot lasketaan kaupan kirjauspäivän mukaisen kalenterikuukauden toimeksiantoihin.
                                      - paragraph: Määrässä ei huomioida kampanjatoimeksiantoja 0 euron välityspalkkioilla, kauppoja Nordnet Markets -tuotteilla, ETF-kuukausisäästösopimusten kautta tehtyjä toimeksiantoja eikä alle 1 000 euron rahastotoimeksiantoja. Pidempiaikaisten toimeksiantojen tapauksessa hinnaston mukainen välityspalkkio veloitetaan jokaiselta toteutuspäivältä erikseen.
