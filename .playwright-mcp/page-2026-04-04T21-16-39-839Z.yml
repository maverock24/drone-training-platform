            - paragraph [ref=e485]: Luovutussopimusten kellonajat eivät yleensä ole jälkikäteen luotettavasti selvitettävissä, joten käytännön syistä määräaikojen täyttymistä arvioidaan vakiintuneen verotuskäytännön mukaan luovutusvoittoverotuksessa kokonaisin päivin.
