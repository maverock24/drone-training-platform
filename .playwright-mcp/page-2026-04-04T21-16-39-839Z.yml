            - paragraph [ref=e860]: Perintö- ja lahjaverolain 21 a §:ssä ovat säännökset siitä, miten lahjaverotusta kevennetään, jos tuloverotuksessa sovelletaan TVL 47 §:n 1 momentin säännöstä. Lahjaverotuksessa omaisuuden arvosta vähennetään luovutusvoitosta maksuunpantu vero. Vähentää ei voida kuitenkaan enempää kuin se veron määrä, joka luovutusvoitosta olisi määrätty, jos luovutushintana olisi ollut lahjaverotuksessa käytetty verotusarvo.
            - heading "11.1.9 Lahjana saadun omaisuuden luovuttaminen vuoden kuluttua lahjan saamisesta" [level=4] [ref=e861]
            - paragraph [ref=e862]: Jos lahjansaaja luovuttaa omaisuuden sen jälkeen, kun vuosi on kulunut lahjoituksesta, lahjansaajan hankintamenona pidetään pääsäännön mukaisesti lahjaverotuksessa käytettyä verotusarvoa luvun 11.1 mukaisesti.
            - paragraph [ref=e863]:
              - text: Korkein hallinto-oikeus on todennut oman asunnon luovutusvoiton verotusta koskevassa päätöksessään
              - link "KHO 1991-B-532" [ref=e864] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1991/199101869
              - text: ", että luovutuskauppakirjan laatiminen ennen laissa asetetun määräajan täyttymistä ei estä luovutuksen verovapautta, jos asunnon omistusoikeus siirtyy ostajalle vasta määräajan täytyttyä ja myyjä asuu asunnossa kaupan jälkeen, jolloin vaadittu määräaika täyttyy. Tätä asiaa ja verovapauteen liittyviä tarkkoja rajauksia on käsitelty tarkemmin ohjeessa"
              - link "Verovapaa oman asunnon luovutus" [ref=e865] [cursor=pointer]:
