            - heading "6.2 Lisäkauppahinnan verotus" [level=3] [ref=e426]
            - paragraph [ref=e427]: Vuoden 2026 alusta alkaen tuloverolakiin on lisätty säännös sellaisen ehdollisen luovutushinnan verotuksesta, jonka suorittamisvelvollisuus ja määrä vahvistuvat vasta kaupantekovuoden jälkeen luovutussopimuksessa määritellyn ehdon täyttyessä. TVL 110 a §:n 2 momentin mukaan luovutusvoitto verotetaan tältä osin sen verovuoden tulona, jona ehdollisen luovutushinnan suorittamisvelvollisuus ja määrä ovat vahvistuneet.
            - paragraph [ref=e428]: Jos luovutussopimuksessa on sovittu lisäkauppahinnan vähimmäismäärästä, ei tällainen erä ole lisäkauppahintaa, vaikka lisäkauppahinnan kokonaismäärä vahvistuisi vasta kaupantekohetkeä myöhemmin. Lisäkauppahinnan vähimmäismäärän maksuajankohdalla ei ole merkitystä. Luovutusvoiton jaksottamista koskevan pääsäännön mukaisesti luovutussopimuksessa sovittu lisäkauppahinnan vähimmäismäärä otetaan luovutusvoittoa laskettaessa huomioon luovutushintana jo kaupantekovuoden verotuksessa.
            - paragraph [ref=e429]: TVL 110 a §:n 3 momentissa säädetään luovutusvoiton laskemisesta. Koko luovutusvoitto lasketaan uudelleen käyttämällä luovutushintana vahvistuneiden luovutushinnan osien yhteismäärää. Verovuodelle kohdistetaan se osa uudelleen lasketusta luovutusvoitosta, joka ylittää aiempina verovuosina samasta luovutuksesta verotetun luovutusvoiton määrän.
            - paragraph [ref=e430]: Luovutusvoitto kuitenkin realisoituu sinä verovuonna, jona kauppa tai vaihto on tehty tai muu luovutus on tapahtunut. Tämän vuoksi esimerkiksi hankintameno-olettamaa sovellettaessa myyjän omistusaika päättyy nykyiseen tapaan luovutussopimuksen tekemiseen.
            - generic [ref=e431]:
              - paragraph [ref=e432]: Huomio osio alkaa
              - paragraph [ref=e433]:
                - strong [ref=e434]: Esimerkki 7
              - paragraph [ref=e435]: Henkilö A on 15.3.2015 ostanut Yritys Oy:n osakkeet 60 000 eurolla. Hän myy osakkeet 1.2.2026 tehtävällä kaupalla. Kauppakirjan mukaan kauppahinnasta maksetaan 100 000 euroa kaupanteon yhteydessä. Lisäkauppahintana sovitaan maksettavaksi 30 prosenttia Yritys Oy:n tilikausien 2026 ja 2027 vahvistettujen tilinpäätöksien mukaisista tilikausien voitoista. Kauppakirjan mukaan tilikaudelta maksettava lisäkauppahinta todetaan tilikautta seuraavan huhtikuun lopussa eli 30.4.2027 ja 30.4.2028, kun tilinpäätökset vahvistetaan.
              - paragraph [ref=e436]: A:n vuoden 2026 verotuksessa luovutushinnaksi katsotaan kaupanteon yhteydessä maksettu 100 000 euroa. Hankintameno-olettama (40 prosenttia, 40 000 euroa) on A:lle epäedullisempi, joten voitto lasketaan A:n todellisen hankintamenon (60 000 euroa) mukaan. A:n vuoden 2026 veronalaisen luovutusvoiton määrä on siten 40 000 euroa (= 100 000 - 60 000).
              - paragraph [ref=e437]: Yritys Oy:n 30.4.2027 vahvistettu tilikauden 2026 tilinpäätös osoittaa tilikauden voitoksi 100 000 euroa. Lisäkauppahintaehdon mukaisesti A:lle suoritetaan vahvistetun tilinpäätöksen perusteella lisäkauppahintana 30 000 euroa. Lisäkauppahinnan vahvistumisen perusteella luovutusvoitto lasketaan uudelleen A:n verovuoden 2027 verotuksessa. Luovutusvoiton määrä lasketaan siten, että luovutushinnaksi katsotaan kaikkien vahvistuneiden luovutushinnan osien yhteismäärä 130 000 euroa (= 100 000 + 30 000). Hankintameno-olettama (40 prosenttia, 52 000 euroa) on A:lle epäedullisempi, joten voitto lasketaan A:n todellisen hankintamenon (60 000 euroa) mukaan. Uudelleen lasketusta luovutusvoitosta (70 000 euroa) verotetaan verovuoden 2027 verotuksessa se osa, joka ylittää verovuoden 2026 verotuksessa samasta luovutuksesta verotetun luovutusvoiton (40 000 euroa) määrän. Vuonna 2027 verotettavan luovutusvoiton määrä on siten 30 000 euroa (= 70 000 - 40 000).
              - paragraph [ref=e438]: Yritys Oy:n 30.4.2028 vahvistettu tilikauden 2027 tilinpäätös osoittaa tilikauden voitoksi 150 000 euroa. Lisäkauppahintaehdon mukaisesti A:lle suoritetaan vahvistetun tilinpäätöksen perusteella lisäkauppahintaa 45 000 euroa. Lisäkauppahinnan vahvistumisen johdosta luovutusvoitto lasketaan uudelleen A:n verovuoden 2028 verotuksessa. Luovutusvoiton määrä lasketaan siten, että luovutushinnaksi katsotaan kaikkien vahvistuneiden luovutushinnan osien yhteismäärä 175 000 euroa (= 100 000 + 30 000 + 45 000). Hankintameno-olettama (40 prosenttia, 70 000 euroa) on A:lle edullisempi kuin todellinen hankintameno (60 000 euroa), joten voitto lasketaan A:n hankintameno-olettaman mukaan. Uudelleen lasketusta luovutusvoitosta 105 000 euroa (= 175 000 - 70 000) verovuoden 2028 verotuksessa verotetaan se osa, joka ylittää verovuosien 2026 ja 2027 verotuksissa samasta luovutuksesta verotetun luovutusvoiton määrän 70 000 euroa (= 40 000 + 30 000) määrän. Vuonna 2028 verotettavan luovutusvoiton määrä on siten 35 000 euroa (= 105 000 – 70 000).
              - paragraph [ref=e439]: Huomio osio päättyy
            - paragraph [ref=e440]: Kauppahinta saattaa kaupan ehtojen mukaan myös alentua jonkin tulevaisuudessa tapahtuvan epävarman seikan perusteella. Näissä tapauksissa kaupantekovuoden verotus toimitetaan kauppakirjasta ilmenevän myyntihinnan mukaisesti. Jos kauppahinta on kauppakirjassa olevan ehdon mukaisesti myöhemmin alentunut, verovelvollinen voi säädettyjen muutoksenhakuaikojen rajoissa vaatia verotusta muutettavaksi.
            - heading "6.3 Lisäkauppahinnan verottaminen tappiollisessa kaupassa" [level=3] [ref=e441]
            - paragraph [ref=e442]: Jos luovutuksesta on aiempana verovuonna vahvistettu tappio, Verohallinto oikaisee vahvistetun tappion vastaamaan uudelleen lasketun luovutusvoiton tai luovutustappion määrää. Oikaisu tehdään noudattaen, mitä verotusmenettelystä annetussa laissa säädetään verotuksen oikaisusta. Oikaisu tehdään, vaikka verotuksen oikaisun edellytykset puuttuvat. (TVL 110 a §:n 3 momentti), Tappioiden määrää voidaan siten oikaista verotusmenettelystä annetun lain (1558/1995) 56 §:ssä verotuksen oikaisulle säädetyn määräajan ja uudelleen harkinnan kiellon estämättä. Oikaisu voidaan tehdä myös siitä huolimatta, että luovutusvuodelta vahvistettava luovutustappio ja sen määrä olisi oikaisua tehtäessä jo ehditty ratkaista valitukseen annetulla päätöksellä muun asian kuin lisäkauppahintaan perustuvan oikaisun vuoksi.
            - paragraph [ref=e443]: Jos luovutuksesta vahvistetaan kaupantekovuoden verotuksessa luovutustappio, voi tappio tulla vähennetyksi kaupantekovuotta seuraavien vuosien verotuksessa ennen ehdollisen lisäkauppahinnan vahvistumista. Kun vahvistettua tappiota oikaistaan ehdollisen lisäkauppahinnan vahvistumisen vuoksi, voi tappion määrä muuttua myöhempinä vuosina vähennettyä määrää pienemmäksi. Tällaisessa tilanteessa Verohallinto muuttaa seurannaismuutoksin tappioiden vähentämisvuosien verotusta siltä osin kuin luovutustappiosta käytetty määrä ylittäisi oikaistun luovutustappion määrän.
