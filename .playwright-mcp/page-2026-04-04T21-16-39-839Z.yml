            - heading "12.11 Kaupan purkaminen" [level=3] [ref=e1018]
            - paragraph [ref=e1019]: Tuomioistuin voi riita-asiassa antamallaan tuomiolla purkaa kaupan. Tuomioistuimen normaalin oikeudenkäynnin päätteeksi purkama kauppa mitätöityy verotuksessa.
            - paragraph [ref=e1020]:
              - text: Asianosaisten vapaaehtoisella sopimuksella purkama kauppa ei mitätöi kauppaa ja purkusopimus tulkitaan lähtökohtaisesti uudeksi kaupaksi. Sopimuksella puretuksi kaupaksi katsotaan myös tuomioistuimen vahvistama osapuolten sovinto tai vastaajan myöntämisen tai passiivisuuden takia annettu oikeuden päätös, jolla kauppa puretaan. Jos kaupan purkaminen sopimuksin on kuitenkin johtunut syystä, jonka perusteella purkaminen oikeusistuimen tuomiolla olisi ollut mahdollista, sopimus rinnastetaan verotuksessa oikeuden tuomioon (mm.
              - link "KHO 1980-B-II-573" [ref=e1021] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeuskaytanto/korkein-hallinto-oikeus/ennakkopaatokset/1980/B-II-573
              - text: ja
              - link "KHO 1980-B-II-574" [ref=e1022] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/1980/198004134
              - text: ).
            - paragraph [ref=e1023]: Tuomiolla purkamisen perusteita ovat esimerkiksi luovuttajan oikeustoimikelvottomuus, olennaiset virheet kaupan kohteessa sekä joissakin tapauksissa myös ostajan jo kaupantekohetkellä olemassa ollut salattu maksukyvyttömyys ja muut vastaavat syyt. Kun kaupan purku on perustunut sopimukseen, purkuun vetoavan on esitettävä veroasiassaan samankaltaiset selvitykset ja kirjalliset todisteet, joita myös tuomioistuinkäsittelyssä olisi edellytetty. Tällaisia ovat esimerkiksi kaupan kohteen virheitä ja mahdollisia korjaustoimia ja niiden kustannuksia selvittävät asiantuntijalausunnot.
            - paragraph [ref=e1024]:
              - text: Kauppakirjaan sisältyneen lykkäävän ehdon takia omistusoikeus saattaa siirtyä vasta esimerkiksi kauppahinnan tultua kokonaan maksetuksi. Ennen omistusoikeuden siirtymistä toteutettu kaupan purkaminen mitätöi alkuperäisen kaupan. Tässä tilanteessa kauppaa ja sen purkamista ei kumpaakaan veroteta luovutuksena (ks. varainsiirtoverotusta koskeva päätös
              - link "KHO 2009:27" [ref=e1025] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2009/200900621
              - text: ).
            - paragraph [ref=e1026]: Pelkkä kauppakirjan ehdon täyttyminen kaupan purkamisesta ei pura kauppaa vaan antaa vain osapuolille mahdollisuuden ryhtyä purun edellyttämiin toimenpiteisiin. Purku toteutuu, kun kauppa puretaan vastaavin menettelyin kuin se on solmittu. Esimerkiksi kiinteistön kauppa ja kaupan purkaminen tehdään määrämuotoisesti kaupanvahvistajan todistamana tai sähköisen järjestelmän avulla.
            - heading "12.12 Kaupan purkamisen takia maksettavien korvausten ja myyjälle jäävän käsirahan verotus" [level=3] [ref=e1027]
            - paragraph [ref=e1028]: Vahingonkorvaus on verovapaa, jos sitä ei makseta veronalaisen tulon sijaan (TVL 78 §). Vahingonkorvauslain mukaan korvausta voidaan maksaa esine- tai henkilövahingosta sekä muusta taloudellisesta vahingosta. Sopimussakko sen sijaan liittyy sopimuksen rikkomiseen. Sopimussakon verovapaudesta ei ole erityisiä säännöksiä, joten se on TVL 29 §:n nojalla veronalaista tuloa. Sopimussakko on veronalaista, vaikka sen perusteena oleva tulo olisi verovapaa.
            - paragraph [ref=e1029]:
              - text: Jos myyjä saa kaupan purkamisen yhteydessä osan kauppahinnasta korvauksena saamatta jääneestä myyntivoitosta, korvaus on sen vuoden veronalaista pääomatuloa, jonka aikana kauppa puretaan (
              - link "KVL 74/1993" [ref=e1030] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ennakkoratkaisut/53280/
              - text: ). Kaupan purkamisen yhteydessä myyjälle jäävä käsiraha tai myyjän saama käyttöajan korvaus on myös myyjän saamaa muuta pääomatuloa.
            - paragraph [ref=e1031]:
              - text: Jos osakkeiden myynnistä on tehty esisopimus mutta lopullista osakekauppaa ei tehdäkään ja myyjä saa pitää sopimussakkona ja vahingonkorvauksena ostajalta käsirahana saamansa suorituksen, on tällainen suoritus veronalaista tuloa (
              - link "KHO 1993 B 518" [ref=e1032] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/1993/199301986
              - text: ).
            - paragraph [ref=e1033]: Ostajalle kaupan peruuntumisen takia maksettava vahingonkorvaus ei sen sijaan ole veronalainen. Tämä ilmenee päätöksestä KHO 2015:169. Vahingonkorvauksen määrää ei lisätä myyjällä huoneiston hankintamenoon.
            - paragraph [ref=e1034]:
              - link "KHO 2015:169" [ref=e1035] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2015/201503415
            - paragraph [ref=e1036]: Ostaja A sai myyjältä käsirahaa vastaavan suuruisen hyvityksen, kun myyjä oli hyväksyttyään ostajan ostotarjouksen kieltäytynyt myymästä huoneistoa A:lle. Korkein hallinto-oikeus katsoi, että oli tarkoitus korvata asunto-osakkeiden ostajalle myyjän tekemän sopimusrikkomuksen johdosta aiheutunut vahinko ilman, että ostajan tarvitsi esittää näyttöä vahingon perusteesta tai määrästä. Hyvitystä pidettiin tuloverolain 78 §:ssä tarkoitettuna vahingonkorvaukseen verrattavana korvauksena. Koska hyvitystä ei ollut saatu veronalaisen tulon sijaan, sitä ei ollut pidettävä A:n veronalaisena tulona.
            - paragraph [ref=e1037]:
              - text: Katso myös ohje
              - link "Vahingonkorvaukset verotuksessa" [ref=e1038] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48907/
              - text: .
            - heading "12.13 Apportti" [level=3] [ref=e1039]
            - paragraph [ref=e1040]:
              - text: Osakeyhtiön osakkeeseen voi liittyä oikeus tai velvollisuus sijoittaa yhtiöön osaketta vastaan muuta omaisuutta kuin rahaa. Tällaisen apporttiomaisuuden sijoittamista osakeyhtiöön pidetään verotuksessa vaihtona, jossa annetaan vastikkeellisesti omaisuutta ja saadaan vastikkeellisesti osakkeita. Apporttina osakeyhtiöön sijoitetun omaisuuden luovutushinnaksi katsotaan sen käypä arvo luovutushetkellä (
              - link "KHO 29.12.1993 taltio 5330" [ref=e1041] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/lyhyet/1993/199305330
              - text: ). Samaa arvoa pidetään osakkaan apporttia vastaan saamien osakkeiden hankintamenona.
            - paragraph [ref=e1042]:
              - text: Luovutuksen katsottiin olevan alihinnan osalta apporttiin verrattava sijoitus, kun osakas myi osakkeensa perustamalleen yhtiölle käypää hintaa alempaan hintaan. Luovutusvoittoa laskettaessa osakkeiden luovutushintana pidettiin niiden käypää arvoa luovutushetkellä (
              - link "KHO 2009:66." [ref=e1043] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2009/200901634
              - text: )
            - paragraph [ref=e1044]:
              - text: Kun henkilö myy omaisuutta alle käyvän arvon sellaiselle osakeyhtiölle, jossa on itse osakkaana, kyse on apportista, vaikka yhtiössä olisi muitakin osakkaita. Sekä lahjanluonteinen kauppa että alihintainen kauppa käsitellään apporttina, joten merkitystä ei ole sillä, onko kauppahinta yli vai alle 75 % kaupan kohteen käyvästä arvosta. Apportiksi katsottu osa käyvästä arvosta lisätään aiemmin omistettujen osakkeiden hankintamenoon, jos kaupan yhteydessä ei anneta uusia osakkeita. (
              - link "KHO 2019:50" [ref=e1045] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2019/201901479
              - text: ).
            - paragraph [ref=e1046]:
              - text: Pääomansijoitus osakeyhtiöön esimerkiksi sijoitetun vapaan pääoman rahastoon (svop) lisää osakkeiden hankintamenoa, jos sijoittajalla on omistuksessaan tai hän hankkii samassa yhteydessä osakeyhtiön osakkeita. Aihetta on käsitelty tarkemmin ohjeessa
              - link "Arvopaperien luovutusten verotus" [ref=e1047] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: .
            - paragraph [ref=e1048]: Sijoitus trustiin voi olla apporttiin rinnastuva, jos trusti vastaa tuloverolain 3 §:n 7 kohdassa tarkoitettua erityiseen tarkoitukseen varattua varallisuuskokonaisuutta (KHO 2024:100),
            - heading "12.14 Jako-osa osakeyhtiöstä" [level=3] [ref=e1049]
            - paragraph [ref=e1050]: Luovutusvoittoa syntyy myös silloin, jos osakas saa osakeyhtiön purkautuessa jako-osana enemmän kuin hänen omistamiensa osakkeiden hankintameno on ollut.
            - paragraph [ref=e1051]: Purkautuvan yhteisön verotuksessa jaettavan omaisuuden luovutushinnaksi katsotaan sen todennäköistä luovutushintaa vastaava määrä eli käypä arvo (TVL 27 § ja EVL 51d §). Samaa arvoa pidetään osakkaan verotuksessa purkautuvan yhtiön osakkeiden luovutushintana.
            - paragraph [ref=e1052]: Saantoajankohtana, jonka mukaan myyntivoiton verottamisen edellytykset ratkaistaan, on pidetty yhtiökokousta, jossa selvitysmiehet ovat esittäneet lopputilityksen (KVL 72/1986).
            - paragraph [ref=e1053]: Jako-osan ennakko verotetaan luovutuksena sinä verovuotena, jona jako-osa maksetaan. Hankintamenona vähennetään osakkeiden hankintamenoa enintään saadun ennakon määrään asti tai vaihtoehtoisesti vähennetään hankintameno-olettaman (20 % tai 40 %) mukainen määrä, jos se on todellista hankintamenoa suurempi. Jos lopputilityksessä vahvistettu jako osan määrä ylittää ennakolta maksetun jako-osan, sovelletaan jälkisuorituksen luovutusvoittoverotuksessa lisäkauppahinnan verotuksessa noudatettuja periaatteita kohdan 6.2 mukaisesti.
            - paragraph [ref=e1054]:
              - text: Osakeyhtiön purkautumista käsitellään ohjeessa
              - link "Osakeyhtiön purkautuminen verotuksessa" [ref=e1055] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60312/
              - text: .
            - heading "12.15 Pääomanpalautus osakeyhtiöstä" [level=3] [ref=e1056]
            - paragraph [ref=e1057]:
              - text: Osakeyhtiölain (
              - link "624/2006" [ref=e1058] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/laki/ajantasa/2006/20060624
              - text: ", OYL) mukaan yhtiön oma pääoma jakautuu sidottuun omaan pääomaan ja vapaaseen omaan pääomaan. Osakepääoma sekä kirjanpitolain mukainen arvonkorotusrahasto, käyvän arvon rahasto ja uudelleenarvostusrahasto ovat sidottua omaa pääomaa. Muut rahastot sekä tilikauden ja edellisten tilikausien voitto ovat vapaata omaa pääomaa."
            - paragraph [ref=e1059]:
              - text: Sidottua omaa pääomaa voidaan palauttaa osakkaalle ilman, että osakas luopuu osakkeistaan. Oikeuskäytännössä tällainen sidotun oman pääoman palautus on katsottu osakkeiden luovutukseen rinnastettavaksi tuloksi ja palautettu määrä on rinnastettu osakkeiden luovutushintaan (
              - link "KHO 2001:28" [ref=e1060] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2001/200101244
              - text: ja KHO 23.5.2001 taltio 1245). Mainituissa tapauksissa verovelvollinen sai vähentää osakkeiden hankintamenon pääoman palautusta vastaavalta osalta (katso myös
              - link "KVL 60/2004" [ref=e1061] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ennakkoratkaisut/53162/
              - text: ). Pääoman palautuksesta tehty vähennys toisaalta alentaa osakkeiden hankintamenoa.
            - paragraph [ref=e1062]:
              - text: Vapaan oman pääoman palauttamista on käsitelty Verohallinnon ohjeessa
              - link "Vapaan oman pääoman rahaston varojenjako verotuksessa" [ref=e1063] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60520/
              - text: . Omien osakkeiden hankkiminen ja lunastaminen sekä osakepääoman alentaminen ovat kysymyksiä, joita on käsitelty myös ohjeessa
              - link "Peitelty osinko" [ref=e1064] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48147/
              - text: .
            - heading "12.16 Omien osakkeiden lunastaminen tai hankkiminen" [level=3] [ref=e1065]
            - paragraph [ref=e1066]: Jos osakeyhtiö toimintansa aikana lunastaa tai hankkii osakkailtaan omia osakkeitaan (OYL 15 luvun 1 §), osakkaan verotuksessa luovutukseen sovelletaan luovutusvoiton verotusta koskevia säännöksiä. Jos kuitenkin on ilmeistä, että osakkeiden lunastamiseen tai hankkimiseen on ryhdytty osingosta menevän veron välttämiseksi, jaetut varat katsotaan tältä osin osakkaan tuloksi peiteltynä osinkona VML 29 §:n 2 momentin mukaan.
            - paragraph [ref=e1067]:
              - text: Osakkeiden hankkimisesta puhutaan silloin, kun osakeyhtiö hankkii omia osakkeitaan vapaaehtoisilla kaupoilla. Osakkeiden lunastus toteutetaan ilman osakkaan myötävaikutusta. Omien osakkeiden hankkimiseen ja lunastamiseen liittyviä kysymyksiä on käsitelty tarkemmin ohjeessa
              - link "Osakeyhtiön sukupolvenvaihdos verotuksessa" [ref=e1068] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60519/
              - text: ja ohjeessa
              - link "Peitelty osinko" [ref=e1069] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48147/
              - text: .
            - heading "12.17 Osuuskunnan jakamien varojen verotus" [level=3] [ref=e1070]
            - paragraph [ref=e1071]:
              - text: Osuuskunnan jäsenen osuuskunnan vapaan pääoman rahastosta saaman suorituksen sekä osuuskunnan jäsenen osuuskunnasta eroamisen tai osuuskunnan purkautumisen yhteydessä saaman jäsenosuuden verotusta käsitellään Verohallinnon ohjeessa
              - link "Osuuskunnan ja sen jäsenen verotuksesta" [ref=e1072] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48011/
              - text: .
            - paragraph [ref=e1073]:
              - text: Kulutusosuuskuntien jäsenyyden edellyttämät osuudet ovat yleensä pieniä, minkä vuoksi niiden luovutuksiin voi tulla sovellettavaksi TVL 48 §:n 6 momentin mukainen pienten luovutusvoittojen verovapaus. (Katso tarkemmin Verohallinnon ohje
              - link "Kokonaan tai osittain verovapaat luovutusvoitot henkilöverotuksessa" [ref=e1074] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48930/
              - text: ).
            - heading "12.18 Yhdistyksen purkautumisen yhteydessä saatu jako-osa" [level=3] [ref=e1075]
            - paragraph [ref=e1076]: Yhdistys on TVL 3 §:n mukaan yhteisö. Yhdistyksen jäsenet eivät omista yhdistystä samalla tavoin, kuin esimerkiksi osakeyhtiön osakkaat omistavat osakeyhtiön. Jos yhdistyksellä on sen purkautuessa varoja, joita se voi sääntöjensä ja yhdistyslain mukaan jakaa jäsenelleen, on kyseessä jäsenen saama veronalainen tulo. Verotuksessa ratkaisu siitä, verotetaanko jäsenen saamaa tuloa ansiotulona, pääomatulona vai sovelletaanko siihen luovutusvoittoverosäännöksiä, tehdään yhdistyksen sääntöjen, yhdistyslain ja sen perusteella, mistä jaettavat varat ovat kertyneet.
            - paragraph [ref=e1077]:
              - text: Yhdistyksen jäsenmaksu tai liittymismaksu tulkitaan hankintamenoksi.
              - strong
              - text: Jos sovelletaan luovutusvoittoverotusta koskevia säännöksiä,
              - strong
              - text: hankintamenona voidaan käyttää jäsenyyden alkamisajankohdan mukaan määräytyvän omistusajan mukaista hankintameno-olettamaa.
            - heading "12.19 Vakuutuskorvaukset" [level=3] [ref=e1078]
            - paragraph [ref=e1079]: Omaisuuserien vakuutuskorvausten verotukseen sovelletaan TVL 36 §:n 1 momentin 2-kohdan erityissäännöstä, jonka mukaan vakuutuskorvaus on verovapaa, ellei sitä ole saatu veronalaisen tulon sijaan.
            - paragraph [ref=e1080]:
              - text: Esimerkiksi liikennevahingon korvaamiseen liittyvää ajoneuvon luovutusta vakuutusyhtiölle ei ole pidetty sellaisena luovutuksena, johon sovelletaan myyntivoiton verotusta koskevia säännöksiä (
              - link "KHO 1984-B-II-569" [ref=e1081] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1984/198400331
              - text: ). Verovelvolliselle ei siten voi tässä yhteydessä syntyä luovutusvoittoa eikä -tappiota (katso myös edellä luku 5.5.3 Luovutushintaan lisättävä vahingonkorvaus).
            - heading "12.20 Henkilöyhtiöön sijoitettu tai sieltä otettu omaisuus" [level=3] [ref=e1082]
            - heading "12.20.1 Siirretyn omaisuuden omistusaika" [level=4] [ref=e1083]
            - paragraph [ref=e1084]:
              - text: Omaisuuden siirto yhtiömiehen ja yhtiön välillä edellyttää osapuolten välistä asianmukaista luovutussopimusta. Omaisuuden siirron on toteuduttava siviili- ja yhtiöoikeudellisesti pätevällä tavalla. Tästä on kerrottu enemmän Verohallinnon ohjeessa
              - link "Taselainaus elinkeinotoiminnassa" [ref=e1085] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48436/
              - text: .
            - paragraph [ref=e1086]: Omaisuuden sijoittaminen henkilöyhtiöön (esimerkiksi avoimeen yhtiöön tai kommandiittiyhtiöön) ja omaisuuden ottaminen yhtiöstä katkaisee luovutusvoiton verotuksessa omistusajan (TVL 46 §:n 3 momentti). Esimerkiksi jos avoin yhtiö tai kommandiittiyhtiö luovuttaa omaisuutta, jonka yhtiömies on sijoittanut yhtiöön sitä perustettaessa tai myöhemmin, yhtiön omistusaika lasketaan ajankohdasta, jolloin yhtiömies on sijoittanut omaisuuden yhtiöön.
            - paragraph [ref=e1087]: Vastaavasti kun yhtiömies tai entinen yhtiömies luovuttaa omaisuutta, jonka hän on ottanut yhtiöstä, omistusaika lasketaan hetkestä, jolloin hän on ottanut omaisuuden yhtiöstä.
            - heading "12.20.2 Sijoituksen luovutushinta ja hankintameno" [level=4] [ref=e1088]
            - paragraph [ref=e1089]: Säännökset, joita sovelletaan yhtymän ja sen osakkaan välisissä varallisuuden siirroissa ja yhtymän purkautuessa, ovat TVL 26 ja 27 §:issä. Vastaavat säännökset ovat EVL 51 b ja 51 d §:issä.
            - paragraph [ref=e1090]: Tuloverolain 26 §:n mukaan yhtymän osakkaan sijoittaessa omaisuutta tai oikeuksia yhtymään luovutushinnaksi katsotaan osakkaan verotuksessa todennäköinen luovutushinta eli käypä arvo sijoituksen ajankohtana. Yhtymän verotuksessa hankintamenoksi katsotaan sama määrä. Säännös koskee sekä yhtymää perustettaessa, että sen toiminnan aikana tapahtuneita sijoituksia.
            - paragraph [ref=e1091]: Yhtymän osakkaan ottaessa yhtymästä kiinteistön, rakennuksen, rakennelman, arvopaperin tai oikeuden luovutushinnaksi katsotaan omaisuuden tai oikeuden todennäköinen luovutushinta. Muun yhtymästä otetun omaisuuden, palvelun tai etuuden luovutushinnaksi katsotaan alkuperäinen hankintameno tai sitä alempi todennäköinen luovutushinta. Yhtymän osakkaan verotuksessa hankintamenoksi katsotaan yhtymän verotuksessa luovutushinnaksi luettava määrä.
            - heading "12.20.3 Osakkaan ja henkilöyhtiön välinen kauppa" [level=4] [ref=e1092]
            - paragraph [ref=e1093]: Henkilöyhtiön ja osakkaan välisistä kaupoista ei ole nimenomaisia omaisuuden arvostamista koskevia säännöksiä. Elinkeinotulon verottamisesta annetun lain 51 b ja 51 d §:ien muuttamisesta annetun hallituksen esityksen (HE 106/1996) perusteluissa todetaan kuitenkin, että käypää arvoa koskevat säännökset vaikuttavat osaltaan myös hyväksyttävinä pidettäviin siirtohintoihin osakkaan ja yhtymän välisissä kaupoissa.
            - heading "12.20.4 Henkilöyhtiön purkautuminen" [level=4] [ref=e1094]
            - paragraph [ref=e1095]: Purkautuvan avoimen yhtiön ja kommandiittiyhtiön verotuksessa omaisuuden, etuuden ja oikeuden luovutushinnaksi katsotaan määrä, joka vastaa luvun 12.20.2 viimeisessä kappaleessa kuvatulla tavalla osakkaan yhtymästä ottaman omaisuuden luovutushinnaksi luettavaa määrää (TVL 27 §).
            - heading "12.20.5 Työsuhteeseen liittyvän sairauskassan ja lisäeläkekassan purkautuminen" [level=4] [ref=e1096]
            - paragraph [ref=e1097]: Työntekijä tai entinen työntekijä saattaa olla työnantajan organisoiman sairauskassan tai lisäeläkekassan jäsen. Kassan purkautumisen yhteydessä jäsen saattaa saada kertasuorituksena osuuden kassan varallisuudesta.
            - paragraph [ref=e1098]: Jako-osia on verotus- ja oikeuskäytännössä verotettu saajansa luovutusvoittoverotuksen alaisena tulona. Hankintamenoa ovat jäsenen kassaan maksamat jäsenmaksut sen mukaan, kuin niitä on käytetty jako-osuuden maksuperusteena. Vaihtoehtoisesti hankintamenona käytetään hankintameno-olettamaa.
            - generic [ref=e1099]:
              - paragraph [ref=e1100]: Huomio osio alkaa
              - paragraph [ref=e1101]:
                - strong [ref=e1102]: "Esimerkki 28:"
              - paragraph [ref=e1103]: X Oy:n työntekijöiden sairauskassa puretaan. Kassan jäseninä ovat X Oy:n nykyiset ja entiset työntekijät. Varojen jakoperusteena käytetään 60 kuukauden (5 vuotta) ennen purkamista maksettujen jäsenmaksujen määrää. Kassan jäsenyysaika ei vaikuta jako-osan määrään.
              - paragraph [ref=e1104]: Jako-osa on luovutusvoittoveron alaista tuloa. A on maksanut 60 kuukauden aikana jäsenmaksuja yhteensä 4 800 euroa. A:n saama jako-osa on 12 000 euroa. Hankintameno olettamaa laskettaessa omaisuuden omistusajaksi katsotaan jako-osuuden laskentaperusteen mukainen aika eli 5 vuotta. 20 prosentin suuruinen hankintameno olettama on 2 400 euroa. Voiton määräksi kertyy 7 200 euroa (12 000–4 800).
              - paragraph [ref=e1105]: Huomio osio päättyy
            - heading "12.21 Lunastuslauseke" [level=3] [ref=e1106]
            - paragraph [ref=e1107]: Osakeyhtiön yhtiöjärjestyksessä voi olla osakeyhtiölain 3 luvun 7 §:n tai asunto-osakeyhtiölain 2 luvun 5 §:n mukainen lunastuslauseke. Tällöin yhtiöjärjestyksessä mainittu taho (yleensä osakas tai yhtiö) voi lunastaa osakkeen, kun omistusoikeus osakkeeseen siirtyy toiselle muulta omistajalta kuin yhtiöltä. Jos lunastusoikeutta käytetään, myyjänä on alkuperäinen myyjä ja ostajana lunastusoikeuttaan käyttänyt taho. Kauppa, jolla alkuperäinen myyjä luovuttaa osakkeet alkuperäiselle ostajalle, on mitätön. Alkuperäiselle ostajalle ei aiheudu mitätöidyn kaupan vuoksi veroseuraamuksia.
            - paragraph [ref=e1108]: Kun lunastusoikeutta käytetään, luovuttajana on alkuperäinen myyjä. Sitovan luovutussopimuksen ajankohta on päivä, jolloin lunastuskirja laaditaan. Jos lunastuskirjaa ei laadita, luovutusajankohtana pidetään lunastusajan päättymispäivää.
            - heading "13 Luovutustappiot" [level=2] [ref=e1109]
            - heading "13.1 Yleistä luovutustappioiden vähentämisestä" [level=3] [ref=e1110]
            - paragraph [ref=e1111]: Omaisuuden luovutuksesta syntynyt tappio vähennetään omaisuuden luovutuksesta saadusta voitosta verovuonna ja viitenä seuraavana vuotena sitä mukaa kuin voittoa kertyy (TVL 50 §:n 1 momentti).
            - generic [ref=e1112]:
              - paragraph [ref=e1113]: Huomio osio alkaa
              - paragraph [ref=e1114]:
                - strong [ref=e1115]: "Esimerkki 29:"
              - paragraph [ref=e1116]: Vuonna 2018 muodostunut luovutustappio voidaan vähentää viimeistään vuoden 2023 luovutusvoitosta. Vuoden 2023 verotus toimitetaan kalenterivuoden 2024 aikana.
              - paragraph [ref=e1117]: Huomio osio päättyy
            - paragraph [ref=e1118]: Luonnollisten henkilöiden ja kuolinpesien luovutustappiot vähennetään ensisijaisesti verovuoden luovutusvoitoista. Sen lisäksi luovutustappiot voidaan vähentää luovutusvoittojen kokonaan tai osin puuttuessa myös muista pääomatuloista. Tappion vähentäminen kohdennetaan pääomatuloon, josta on jo vähennetty tulon hankinnasta ja säilyttämisestä aiheutuneet luonnolliset vähennykset. Muut pääomatuloon kohdistuvat vähennykset tehdään vasta luovutustappion vähentämisen jälkeen.
            - paragraph [ref=e1119]: Jos luovutustappiota jää tämänkin jälkeen vähentämättä, vahvistetaan jäännös verovuoden luovutustappioksi, joka vähennetään viitenä seuraavana vuotena luovutusvoitoista ja muista pääomatuloista. Eri vuosien tappiot vähennetään siinä järjestyksessä, jossa ne ovat syntyneet. Luovutustappiota ei oteta huomioon pääomatulolajin alijäämää vahvistettaessa eikä niiden perusteella saa ansiotuloista vähennettävää alijäämähyvitystä.
            - generic [ref=e1120]:
              - paragraph [ref=e1121]: Huomio osio alkaa
              - paragraph [ref=e1122]:
                - strong [ref=e1123]: "Esimerkki 30:"
              - paragraph [ref=e1124]: A:lle on muodostunut 15 000 euron luovutustappio vuonna 2022. Hänellä on samana vuonna 8 000 euron suuruiset nettovuokratulot. Luovutustappio vähennetään vuoden 2022 luovutusvoittojen puuttuessa nettovuokratuloista. Koska muita pääomatuloja ei ole, vähentämättä jäävä määrä eli 7 000 euroa vahvistetaan verovuoden 2022 luovutustappioksi ja vähennetään viimeistään vuoden 2027 luovutusvoitoista tai muista pääomatuloista.
              - paragraph [ref=e1125]: Tappio vähennetään heti, kun mahdollisuus siihen tulee eikä verovelvollinen voi valita vähennysvuotta. Jos A:lla ei ole luovutusvoittoa vuonna 2023, mutta hän saa myös silloin 8 000 euroa nettovuokratuloja, vähennetään tappion loppuosa vuoden 2023 pääomatuloista ja koko tappio on tullut käytetyksi. Esimerkin mukaisessa tilanteessa vuonna 2023 vuokratuloa ei siis jää verotettavaksi lainkaan mutta vuonna 2023 vuokratuloa jää verotettavaksi 1 000 euroa.
              - paragraph [ref=e1126]: Huomio osio päättyy
            - paragraph [ref=e1127]: Yhtiömiehen tai yksityisen elinkeinonharjoittajan henkilökohtainen luovutustappio voidaan vähentää kaikista pääomatuloista ja siis myös elinkeinotoiminnasta yhtiömiehelle tai elinkeinonharjoittajalle kertyvästä pääomatulo-osuudesta sekä osinkotulojen pääomatulo-osuudesta.
            - paragraph [ref=e1128]: Luovutustappio on vähennyskelpoinen vain saman verovelvollisen saamasta luovutusvoitosta tai pääomatuloista. Luovutustappiota ei voi siirtää vähennettäväksi esimerkiksi verovelvollisen puolison saamista luovutusvoitoista.
            - paragraph [ref=e1129]:
              - text: Luovutustappio vähennetään luovutusvuoden jälkeisinä vuosina sitä mukaa kuin voittoa tai muuta pääomatuloa kertyy. Jos verovelvollisella on eri vuosilta vähentämättä jääneitä luovutustappioita, ne vähennetään syntymisjärjestyksessä vanhimman vuoden tappioista alkaen. Verovuonna syntynyt luovutustappio vähennetään viimeisenä (
              - link "KHO 2007:54" [ref=e1130] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2007/200701942
              - text: ). Vähennysjärjestys on verovelvollisille edullinen, koska näin kunkin vuoden tappio on mahdollisimman kauan hyödynnettävissä.
            - paragraph [ref=e1131]: Tuloverolain 17 §:n mukaan verovuoden aikana kuolleen henkilön kuolinpesää verotetaan kuolinvuodelta sekä perinnön jättäjän että kuolinpesän tulosta. Tällöin kuolinpesään sovelletaan niitä tuloverolain säännöksiä, joita perinnön jättäjään olisi sovellettu. Perinnön jättäjän elinaikana viiden viimeisen vuoden aikana syntyneet luovutustappiot sekä kuolinvuonna syntyneet luovutustappiot ovat siten vähennyskelpoisia perinnön jättäjän kuolinvuoden verotuksessa. Kuolinvuonna syntyneet luovutustappiot ovat vähennyskelpoisia perinnön jättäjän kuolinvuoden verotuksessa riippumatta siitä, ovatko luovutustappiot syntyneet ennen tai jälkeen kuolinpäivän.
            - paragraph [ref=e1132]: Kuolinvuoden jälkeen kuolinpesä ei saa vähentää kuolinvuotta edeltäviä perinnön jättäjän luovutustappioita. Kuolinvuoden aikana syntyneet luovutustappiot ovat sen sijaan kuolinpesän vähennettävissä viiden vuoden ajan riippumatta siitä, ovatko luovutustappiot syntyneet ennen vai jälkeen perinnön jättäjän kuoleman.
            - paragraph [ref=e1133]: Perilliset eivät saa vähentää perinnön jättäjälle tai kuolinpesälle vahvistettuja luovutustappiota omassa verotuksessaan.
            - paragraph [ref=e1134]: Luovutustappio lasketaan samalla tavalla kuin luovutusvoitto. Luovutushinnasta vähennetään omaisuuden hankintamenon poistamatta olevan osan ja voiton hankkimisesta aiheutuneiden menojen yhteismäärä. Osituksessa saadun omaisuuden hankintameno määräytyy ositusta edeltäneen saannon mukaan. Perintönä tai lahjana saadun omaisuuden hankintamenoksi katsotaan perintö- tai lahjaverotuksessa käytetty verotusarvo kuitenkin siten, että myynnin tapahtuessa ennen kuin lahjan saamisesta on kulunut vuosi, hankintamenona käytetään lahjan antajalla ollutta hankintamenoa.
            - paragraph [ref=e1135]: Luovutustappion laskemisesta ei ole erityissäännöksiä niissä tapauksissa, joissa luovutusvoitto on osittain verovapaa. Jos esimerkiksi pakkolunastusluovutuksissa tai luovutuksissa julkisyhteisöille syntyy tappiota, sen koko määrä on vähennyskelpoinen. Sukupolvenvaihdosluovutuksessa syntyvän tappion vähentämisestä ei myöskään ole erityissäännöstä, joten luovutustappio on vähennyskelpoinen myös näissä tapauksissa.
            - paragraph [ref=e1136]: Kokonaan verovapaaksi säädetyistä luovutuksista aiheutuneita luovutustappioita käsitellään jäljempänä luvussa 13.3 Vähennyskelvottomat luovutustappiot.
            - heading "13.2 Luovutustappioon rinnastettavat menetykset" [level=3] [ref=e1137]
            - paragraph [ref=e1138]: Verotuksessa luovutustappioon rinnastetaan tuloverolain 50 §:n 3 momentin mukaan myös
            - list [ref=e1139]:
              - listitem [ref=e1140]: johdannaissopimuksen (esimerkiksi option tai termiinin) raukeaminen tai johdannaissopimuksesta aiheutunut tappio, jos johdannaisella käydään kauppaa säännellyllä markkinakauppapaikalla (laki kaupankäynnistä rahoitusvälineillä 12.2012/748)
              - listitem [ref=e1141]: sellainen arvopaperin arvonmenetys, jota voidaan konkurssin tai muun siihen verrattavan syyn vuoksi pitää
            - paragraph [ref=e1142]:
              - text: Johdannaissopimuksista kerrotaan ohjeessa
              - link "Johdannaisten verotus" [ref=e1143] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48914/
              - text: .
            - heading "13.2.1 Arvopapereiden arvonmenetykset" [level=4] [ref=e1144]
            - paragraph [ref=e1145]: Tuloverolain 50 §:n 3 momentissa tarkoitettuja arvopapereita ovat esimerkiksi osakkeet, merkintäoikeudet, vaihtovelkakirjat, optiovelkakirjat ja optiotodistukset sekä muut joukkovelkakirjat. Myös warrantin ja pörssissä noteeratun minifutuurin sekä sertifikaatin arvonmenetys voidaan rinnastaa luovutustappioon.
            - paragraph [ref=e1146]:
              - text: Päätöksen
              - link "KHO 2018:11" [ref=e1147] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2018/201800164
              - text: mukaan arvopaperin käsitettä on tuloverolain 50 §:ssä tulkittava niin, että se kattaa myös siviilioikeudellisesti juoksevina velkakirjoina pidettävät saamistodisteet. Juoksevaksi velkakirjaksi kutsutaan velkakirjaa, joka on asetettu maksettavaksi velkakirjan haltijalle tai nimetylle velkojalle tai tämän (siirron yhteydessä) määräämälle henkilölle (Velkakirjalaki 11 §).
            - paragraph [ref=e1148]:
              - text: Arvopaperin arvonmenetys on vähennyskelpoinen, kun se on todettu lopulliseksi. Konkurssitilanteessa arvopaperin arvonmenetys on yleensä lopullinen vasta kun toimitsijamiehet antavat lopputilityksensä velkojainkokouksessa (
              - link "KVL 111/1996" [ref=e1149] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ennakkoratkaisut/52954/
              - text: ).
            - paragraph [ref=e1150]:
              - text: Poikkeuksellisesti osakkeiden arvonmenetys on katsottu lopulliseksi jo, kun osakeyhtiö on asetettu konkurssiin, jos jo silloin on ollut selvää, että konkurssipesästä ei jää jako-osuutta osakkeenomistajille (
              - link "KHO 2011:55" [ref=e1151] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2011/201101711
              - text: ). Korkeimman hallinto-oikeuden päätöksessä tarkoitettuna selvityksenä voidaan pitää konkurssipesänhoitajan antamaa ilmoitusta siitä, että osakeyhtiön osakkeenomistajat eivät tule saamaan jako-osuutta yhtiön varoista konkurssin lopputilityksessä. Pesänhoitaja voi antaa ilmoituksen konkurssipesän pesäluettelon tai jakoluettelon perusteella.
            - paragraph [ref=e1152]: Pesänhoitajan on mainittava ilmoituksessaan, mistä lähtien ja millä perusteella on ollut selvää, että osakkeenomistajille ei tule kertymään jako-osuutta. Tappion vahvistamisen verovuotta määritettäessä ratkaisevaa ei siten ole pesänhoitajan ilmoituksen allekirjoituspäivä vaan ilmoituksessa mainittu ajankohta, mistä lähtien osakkeiden arvonmenetys on ollut lopullinen.
            - paragraph [ref=e1153]:
              - text: Korkein hallinto-oikeus antoi päätöksen
              - link "KHO 2022:107" [ref=e1154] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2022/202202624h
              - text: arvopaperin arvonmenetyksestä saneerausmenettelyssä. Siinä todettiin, että arvonmenetyksen lopullisuus jäi kyseisessä tilanteessa epäselväksi, koska käräjäoikeus oli saneerausohjelmalla kyllä leikannut saatavaa, mutta leikatulle osalle voitiin kuitenkin maksaa lisäjako-osuutta saneerauksen edetessä.
            - paragraph [ref=e1155]:
              - strong [ref=e1156]: KHO 2022:107
            - paragraph [ref=e1157]: A oli vuonna 2019 sijoittanut 10 000 euroa B Oy:n arvo-osuuspohjaiseen velkakirjaohjelmaan. B Oy oli taloudellisten vaikeuksiensa vuoksi hakeutunut yrityksen saneerauksesta annetun lain mukaiseen saneerausmenettelyyn, joka oli alkanut maaliskuussa vuonna 2020. Käräjäoikeus oli lokakuussa vuonna 2020 vahvistanut B Oy:n saneerausohjelman, jossa A:n saatavaa oli leikattu 30 prosenttia.
            - paragraph [ref=e1158]: Saneerausohjelman tavoitteena oli velallisen liiketoiminnan tervehdyttäminen, ja velkojille oli saneerausohjelmassa leikattujen velkasaatavien osalta mahdollista maksaa lisäjako-osuutta. Korkein hallinto-oikeus katsoi, ettei asiassa ollut selvää, ettei A voinut saada suoritusta juoksevaan velkakirjaan perustuvalle saatavalleen siltä osin kuin käräjäoikeus oli saneerausohjelmassa leikannut saatavaa. Tämän vuoksi saneerausohjelmassa tehty A:n velkasaatavan pääoman leikkaus ei ollut tuloverolain 50 §:n 3 momentin 2 kohdassa tarkoitettu luovutustappioon rinnastettava arvopaperin arvonmenetys, jota olisi voitu pitää konkurssiin verrattavan syyn vuoksi lopullisena verovuonna 2020.
            - paragraph [ref=e1159]: Jos osakeyhtiön konkurssi raukeaa varojen vähäisyyden takia, katsotaan osakkeiden arvo lopullisesti menetetyksi, kun yhtiö poistetaan kaupparekisteristä. Osakkeiden hankintamenosta voidaan siis vahvistaa luovutustappio sille verovuodelle, jona osakeyhtiö poistetaan kaupparekisteristä rauenneen konkurssin takia. Jos tällaisessa tilanteessa yhtiöön ilmenee jälkikäteen omaisuutta, se käytetään ensisijaisesti velkojen maksuun. Jos osakkeenomistajat kuitenkin saavat jako-osuuksia, ne käsitellään verotuksessa luovutusvoittoina, jota laskettaessa voidaan vähentää vain hankintameno-olettama.
            - paragraph [ref=e1160]:
              - text: Arvopapereiden arvonmenetyksen verotusta käsitellään ohjeessa
              - link "Arvopaperien luovutusten verotus" [ref=e1161] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: .
            - heading "13.2.2 Arvonmenetykset, jotka eivät ole vähennyskelpoisia" [level=4] [ref=e1162]
            - paragraph [ref=e1163]: Omaisuuden luovutus esimerkiksi myymällä on verotuksessa eri tavoin kohdeltu tapahtuma kuin omistuksessa olevan omaisuuden arvon menettäminen. Arvonmenetystä ei käsitellä luovutuksena, joten omaisuuden arvonmenetys voi johtaa luovutustappion vahvistamiseen vain tilanteessa, jossa asiasta on erillinen säännös. Edellisessä luvussa on käsitelty arvopapereiden arvonmenetyksiä, jotka ovat vähennyskelpoisia erillisen säännöksen takia (TVL 50 § 3 momentti). Muut arvonmenetykset ovat tuloverolain mukaan pääsääntöisesti vähennyskelvottomia.
            - paragraph [ref=e1164]: Luovutustappioon ei rinnasteta velallisen maksukyvyttömyydestä johtuvaa muun kuin arvopaperina pidettävän saamisen raukeamista tai menetystä. Jos esimerkiksi tuomioistuin alentaa maksamatta olevan ei-arvopaperimuotoisen velan määrää yksityishenkilön velkajärjestelystä annetun lain mukaan vahvistamassaan maksuohjelmassa, velkojalla ei ole tuloverolain mukaan oikeutta vähentää saamisen osittaisesta raukeamisesta aiheutunutta menetystä. Katso kuitenkin, mitä kauppahintasaatavan menetyksen verotuksesta on luvussa 5.1 mainittu.
            - paragraph [ref=e1165]:
              - text: Pääomalaina tai muu kahden nimetyn tahon välinen lainasaaminen ei ole arvopaperi (
              - link "KHO 2018:170" [ref=e1166] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2018/201805892
              - text: ) joten niiden arvonmenetystä ei voida rinnastaa TVL 50 §:n 3 momentissa tarkoitettuun arvopaperin lopulliseen arvonmenetykseen. Lainasaamisen menetystä ei voi vähentää. Sama koskee kapitalisaatiosopimuksen arvonmenetystä (
              - link "KHO 2019:79" [ref=e1167] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2019/201902897
              - text: ). Aihetta käsitellään tarkemmin ohjeessa
              - link "Pääomalainojen ja muiden yhtiölle annettujen lainojen luovutukset ja menetykset tuloverotuksessa" [ref=e1168] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/78615/
              - text: .
            - heading "13.2.3 Muita arvonmenetystilanteita" [level=4] [ref=e1169]
            - paragraph [ref=e1170]:
              - text: Kommandiittiyhtiön purkaminen on oikeuskäytännössä (
              - link "KHO 2000:71" [ref=e1171] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2000/200003310
              - text: ) katsottu vastikkeelliseen vaihtoon rinnastettavaksi toimenpiteeksi, jossa osuus yhtymässä vaihdettiin purussa saatavaan jako-osuuteen. Vastuunalaisella yhtiömiehellä oli oikeus vähentää yhtiötä purettaessa syntyvä tappio luovutustappiona TVL 50 §:n mukaisesti.
            - paragraph [ref=e1172]:
              - text: Oikeuskäytännössä (
              - link "KHO 1997:33" [ref=e1173] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1997/199700985
              - text: ) on katsottu, että verovelvollinen, joka myi hankkimansa työsuhdeoptiot tappiolla tai antoi niiden raueta arvottomina, sai vähentää luovutustappion tai menetyksen palkkatulon hankkimisesta ja säilyttämisestä johtuneena menona. Työsuhdeoptioita on käsitelty ohjeessa
              - link "Työsuhdeoptioiden verotus" [ref=e1174] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/47752/
              - text: .
            - paragraph [ref=e1175]:
              - text: Valuuttatalletuksen lopettaminen ei ole tapahtuma, joka aiheuttaa luovutustappion. Korkein hallinto-oikeus on päätöksessään
              - link "KHO 2015:178" [ref=e1176] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2015/201503671
              - text: katsonut, että valuuttakurssitalletuksesta aiheutunut tappio ei ole tuloverotuksessa vähennyskelpoinen meno.
            - paragraph [ref=e1177]:
              - strong [ref=e1178]: KHO 2015:178
            - paragraph [ref=e1179]: A oli vaihtanut 460 000 euroa Yhdysvaltain dollareiksi ja tallettanut varat valuuttatilille. A:lle oli valuuttatilin lopettamisen ja valuutan euroiksi vaihdon yhteydessä kertynyt 31 026,39 euron suuruinen kurssitappio. A vaati kurssitappion vähentämistä verotettavista tuloistaan. Korkein hallinto-oikeus katsoi, että tuloverolain mukaan toimitettavissa verotuksissa kurssitappiot eivät ole laajemmin vähennyskelpoisia kuin mitä tuloverolain 54 b §:ssä on säädetty ja ettei valuuttatalletuksesta kertynyt kurssitappio näin ollen ollut A:n tuloverotuksessa vähennyskelpoinen meno.
            - heading "13.3 Vähennyskelvottomat luovutustappiot" [level=3] [ref=e1180]
            - heading "13.3.1 Oman asunnon luovutustappio" [level=4] [ref=e1181]
            - paragraph [ref=e1182]: Vähennyskelpoisena luovutustappiona ei pidetä TVL 50 §:n 2 momentin mukaan tappiota sellaisen asunnon luovutuksesta, josta saatu luovutusvoitto olisi TVL 48 §:n nojalla verovapaa.
            - paragraph [ref=e1183]: Tuloverolain 50 §:n 2 momentin säännös ei estä vähentämästä omana vakituisena asuntona käytetyn asunnon luovutustappiota tilanteissa, joissa oman asunnon luovutusvoiton verovapauden edellytykset eivät täyty. Oman vakituisen asunnon luovutustappio on vähennyskelpoinen, jos verovelvollinen on omistanut asunnon alle kaksi vuotta tai jos hän on käyttänyt pidempään omistamaansa asuntoa omana tai perheensä vakituisena asuntona omistusaikanaan yhtäjaksoisesti alle kaksi vuotta.
            - paragraph [ref=e1184]: Oman asunnon luovutus on veronalaista myös silloin, kun yhtäjaksoinen kahden vuoden asumisaika ei täyty sen vuoksi, että asunnon hallinta on luovutettu vuokraamalla asunto vaikka lyhytaikaisestikin (KHO 2021:75). Tällöin mahdollinen luovutuksesta syntyvä tappio on vähennyskelpoinen. Luovutustappio voidaan kuitenkin jättää vahvistamatta, jos VML 28 §:n soveltamisedellytykset täyttyvät. Veronkiertosäännöstä voidaan soveltaa esimerkiksi silloin, kun asunto vuokrataan hyvin lyhyeksi ajaksi juuri ennen kahden vuoden asumisajan täyttymistä ja asunto on jo myynnissä tai tulee myyntiin pian tämän jälkeen. Veronkiertosäännöksen soveltamisen edellytyksenä näissä tilanteissa on lisäksi, että verovelvolliselle on kertynyt tai kertymässä luovutusvoittoja, joista hän joutuisi maksamaan veroa kyseiseltä verovuodelta tai hänellä on verovuonna muuta pääomatuloa, josta luovutustappio tulisi vähennettäväksi.
            - heading "13.3.2 Perintönä saadun asunnon luovutustappio" [level=4] [ref=e1185]
            - paragraph [ref=e1186]: Jos perillinen on perinnön jättäjän kuoleman jälkeen käyttänyt luovutettua asuntoa omana tai perheensä vakituisena asuntona niin, että luovutusvoitto olisi TVL 48 §:n nojalla verovapaa, luovutustappio on hänen osaltaan vähennyskelvoton. Ennen perinnönjättäjän kuolemaa toteutuneella perillisen asumisella ei ole merkitystä.
            - paragraph [ref=e1187]: Kuolinpesään kuuluvan tai perintönä saadun asunnon luovutuksesta syntyvän tappion vähentämistä ei estä se, että asunto on ollut perinnön jättäjän vakituisena asuntona.
            - heading "13.3.3 Tavanomaisen koti-irtaimiston luovutustappio" [level=4] [ref=e1188]
            - paragraph [ref=e1189]: Tavanomaisen koti-irtaimiston tai muun siihen rinnastettavan henkilökohtaiseen käyttöön tarkoitetun omaisuuden luovutuksesta aiheutunut tappio ei ole myöskään vähennyskelpoinen TVL 50 §:n 2 momentin mukaan. Tavanomaiseen koti-irtaimistoon eivät kuulu esimerkiksi tavanomaista arvokkaammat taide- ja arvoesineet.
            - heading "13.3.4 Perheen käyttämän auton tai veneen myynnistä syntynyt tappio" [level=4] [ref=e1190]
            - paragraph [ref=e1191]:
              - text: Tavanomaisen koti-irtaimiston lisäksi myös muun siihen rinnastettavana henkilökohtaiseen käyttöön tarkoitetun omaisuuden luovutustappio on vähennyskelvoton. Oikeuskäytännössä (
              - link "KHO 17.11.1997 taltio 2901" [ref=e1192] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1997/199702901
              - text: ) verovelvollisen ja hänen perheensä käyttöön hankittu henkilöauto on katsottu tavanomaiseen koti-irtaimistoon rinnastettavaksi, henkilökohtaiseen käyttöön tarkoitetuksi omaisuudeksi, jonka luovutuksesta syntynyt tappio ei ole vähennyskelpoinen.
            - paragraph [ref=e1193]: Yllä mainitusta ratkaisusta ilmenevää periaatetta voidaan soveltaa myös esimerkiksi verovelvollisen tai hänen perheensä käyttöön hankitun soutu-, moottori- tai purjeveneen luovutuksesta syntyvään tappioon riippumatta siitä, omistetaanko vene vai veneen käyttöön oikeuttavia veneosakkeita. Myöskään henkilökohtaisessa käytössä olleiden moottoripyörien, perämoottorien, moottorikelkkojen, mönkijöiden, moottorikäyttöisten ruohonleikkureiden, jyrsinten taikka muiden työkoneiden luovutuksesta syntynyt tappio ei ole vähennyskelpoinen.
            - paragraph [ref=e1194]: Niin ikään harrastuksia varten hankittuja hevosia tai golf-osakkeita pidetään TVL 50 §:n 2 momenttia sovellettaessa lähinnä koti-irtaimistoon rinnastettavana henkilökohtaiseen käyttöön tarkoitettuna omaisuutena. Niiden tappiollisesta luovutuksesta ei vahvisteta luovutustappiota.
            - paragraph [ref=e1195]: Autotalliosakkeet, varastotilaosakkeet, laituripaikkaosakkeet ja hevostalliosakkeet eivät ole tavanomaiseen koti irtaimistoon rinnastettavaa omaisuutta, joten niiden luovutusvoittoja ja -tappioita verotetaan yleisten luovutusvoittoverosäännösten mukaisesti (TVL 46 §, 47 §, 48 § 6 momentti ja 50 §).
            - heading "13.3.5 Pienten luovutustappioiden rajoitettu vähennyskelpoisuus" [level=4] [ref=e1196]
            - paragraph [ref=e1197]: Tuloverolain 48 §:n 6 momentin mukaan verovapaita ovat luovutukset, joiden yhteenlaskettu vuotuinen luovutushinta on enintään 1 000 euroa. Rajan täyttymistä laskettaessa ei oteta huomioon luovutuksia, jotka on muualla laissa säädetty verovapaiksi tai jotka ovat tavanomaisen koti-irtaimiston ja siihen rinnastettavan henkilökohtaiseen käyttöön tarkoitetun omaisuuden luovutuksia.
            - paragraph [ref=e1198]: Tuloverolain 50 §:n 2 momentin mukaan vähennyskelpoista luovutustappiota ei muodostu edellä kuvatuista verovapaista, yhteensä enintään 1 000 euron vuotuisista myynneistä. Tappio voidaan kuitenkin vahvistaa, jos luovutetun omaisuuden yhteenlasketut hankintamenot ylittävät 1 000 euroa.
            - generic [ref=e1199]:
              - paragraph [ref=e1200]: Huomio osio alkaa
              - paragraph [ref=e1201]:
                - strong [ref=e1202]: "Esimerkki 31:"
              - paragraph [ref=e1203]: A myy vuonna 2023 B Oy:n ja C Oy:n osakkeet. Osakkeiden myyntihinnat ovat 500 euroa ja 450 euroa. Osakkeiden hankintahinnat ovat 600 euroa ja 350 euroa. C Oy:n osakkeiden myynnistä syntyvä voitto ei ole veronalaista tuloa, koska yhteenlasketut luovutushinnat eivät verovuonna ylitä 1 000 euroa. B Oy:n osakkeiden myynnistä syntyvä luovutustappio ei ole vähennyskelpoinen, koska myöskään luovutetun omaisuuden hankintamenot yhteensä eivät ylitä 1 000 euroa.
              - paragraph [ref=e1204]: Jos mainittujen osakkeiden hankintahinnat olisivat olleet 650 euroa ja 400 euroa, B Oy:n osakkeiden luovutuksesta syntyvä tappio olisi vähennyskelpoinen, koska verovuonna luovutetun omaisuuden hankintahinnat yhteensä ylittävät 1 000 euroa. C Oy:n osakkeiden luovutuksesta syntyvä voitto olisi verovapaa, koska osakkeiden yhteenlasketut luovutushinnat eivät ylitä 1 000 euroa.
              - paragraph [ref=e1205]: Huomio osio päättyy
            - heading "13.4 Luovutustappio alihintaisesta luovutuksesta" [level=3] [ref=e1206]
            - paragraph [ref=e1207]: Luovutus voi muodostua tappiolliseksi sen takia, että myyntihinta on lahjoitustarkoituksen takia käypää arvoa pienempi. Käypä arvo tarkoittaa arvoa, joka omaisuudesta riippumattomien osapuolten kesken tehdyssä kaupassa maksettaisiin. Seuraavissa alaluvuissa on käsitelty luovutustappion laskentaa, kun luovutushinta on enintään tai yli ¾ käyvästä arvosta.
            - heading "13.4.1 Luovutushinta on enintään ¾ luovutushetken käyvästä arvosta" [level=4] [ref=e1208]
            - paragraph [ref=e1209]: Luovutusvoiton laskentaa tilanteissa, joissa luovutushinta on enintään ¾ omaisuuden käyvästä arvosta, on käsitelty aiemmin luvussa 12.1 (Lahjanluonteinen kauppa). Näissä tilanteissa tappio lasketaan tavanomaiseen tapaan sen jälkeen, kun vähennyskelpoisen hankintamenon osuus on ensin selvitetty. (TVL 47 §:n 5 momentti).
            - heading "13.4.2 Luovutushinta ylittää ¾ luovutushetken käyvästä arvosta, mutta jää alle käyvän arvon" [level=4] [ref=e1210]
            - paragraph [ref=e1211]:
              - text: Ei ole olemassa erillistä säännöstä luovutusvoiton laskennasta, jos luovutushinta ylittää ¾ omaisuuden myyntihetken käyvästä arvosta, mutta jää kuitenkin alle luovutushetken käyvän arvon. Näissä ¾ ylittävien kauppahintojen tilanteissa muodostuvan tappion vähennyskelpoisuudesta on korkein hallinto-oikeus antanut päätöksen
              - link "KHO 2014:85" [ref=e1212] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2014/201401633
              - text: . Siinä korkein hallinto-oikeus totesi, että tappio on vähennettävissä vain siinä määrin, kuin tappiota muodostuu myyntihetken käyvän arvon ja alkuperäisen hankintamenon erotuksena. Sitä osaa tappiosta, joka johtuu myyntihetkellä lahjan vuoksi alennetun kauppahinnan takia, ei saa vähentää. Tilannetta kuvaa alla oleva esimerkki 33, jossa mainittujen pörssiosakkeiden tilalla voi olla myös muuta omaisuutta.
            - generic [ref=e1213]:
              - paragraph [ref=e1214]: Huomio osio alkaa
              - paragraph [ref=e1215]:
                - strong [ref=e1216]: "Esimerkki 32:"
              - paragraph [ref=e1217]: Isä myy pojalleen 1 000 A Oyj:n osaketta 5 500 eurolla. Isä on aikoinaan hankkinut osakkeet 7 000 eurolla. A Oyj on pörssiyhtiö ja sen osakkeen kurssi myyntipäivänä on 6,20 euroa/osake. Siten 1 000 osakkeen käypä arvo on myyntipäivänä 6 200 euroa.
              - paragraph [ref=e1218]: Koska myyntihinta ylittää ¾ myyntihetken käyvästä arvosta, isä vähentää hankintamenon kokonaisuudessaan. Isälle syntyy luovutuksesta tappiota 1 500 euroa. Jos isä olisi myynyt osakkeet niiden käyvästä arvosta 6 200 eurosta, hänelle olisi syntynyt luovutustappiota 800 euroa. Isän tappiosta on verotuksessa vähennyskelpoista vain tämä määrä eli 800 euroa. Luovutuksen alihintaisuudesta johtuva osa tappiosta (700 euroa) ei ole verotuksessa vähennyskelpoinen.
              - paragraph [ref=e1219]: Huomio osio päättyy
            - paragraph [ref=e1220]: Perheen sisäisistä tai muutoin lähipiirin kesken tehdyissä kaupoissa on syytä esittää riippumattoman ulkopuolisen tahon antama selvitys luovutushetken käyvästä arvosta, jotta lahjan muodostumista ja tappion hyväksyttävää määrää koskevat laskelmat voidaan tehdä. Kiinteistön ja asunto-osakkeen kohdalla selvityksenä voidaan esittää kiinteistönvälittäjän perusteltua arviokirjaa.
            - heading "13.4.3 Luovutustappioon lisättävä käytetty metsävähennys tai ylisuuret yksityisotot henkilöyhtiöstä" [level=4] [ref=e1221]
            - paragraph [ref=e1222]: Metsäkiinteistön luovutusvoiton laskennassa tulee käytetty metsävähennys lisätä luovutusvoiton määrään (TVL 46 §:n 8 momentti). Vastaavasti avoimen yhtiön tai kommandiittiyhtiön osuuden luovutusvoiton laskennassa tulee yhtiömiehen ylisuuret yksityisotot lisätä luovutusvoiton määrään (TVL 46 §:n 4 momentti).
            - paragraph [ref=e1223]: Otsikossa mainitut erät lisätään myös tappiollisen luovutuksen luovutustappioon. Näin saadaan korjattu luovutustappio, tai lisäyksen määrän ylittäessä tappion määrän, korjattu luovutusvoitto.
            - paragraph [ref=e1224]: Jos tappiolliseksi osoittautunut luovutus on tehty vastikkeesta, jonka määrä on enintään 3/4 käyvästä arvosta, luovutustappio lasketaan käyttäen hankintamenona vastaavaa osuutta hankintamenosta kuin luovutushinta on käyvästä arvosta. Metsävähennyksestä tai ylisuurista yksityisotoista johtuva lisäys tehdään näin laskettuun tappioon ja saadaan korjattu luovutustappio tai -voitto.
            - paragraph [ref=e1225]: Jos luovutus on tehty vastikkeesta, joka on alle käyvän arvon, mutta ylittää 3/4 käyvästä arvosta, voiton tai tappion määrä lasketaan edellisessä luvussa kerrotulla tavalla. Tappioksi hyväksytään siten vain aidon tappion määrä, joka saadaan luovutushinnan ja käyvän arvon erotuksesta. Alihintaisuuden eli lahjan osuus ei kasvata tappion määrää. Näin laskettuun luovutusvoittoon tai -tappioon lisätään metsävähennyksestä tai ylisuurista yksityisotoista johtuva lisäys ja saadaan korjattu luovutusvoitto tai -tappio.
            - heading "13.5 Tappiollinen luovutus ja veron kiertäminen" [level=3] [ref=e1226]
            - paragraph [ref=e1227]: Luovutustappiota ei oikeuskäytännön mukaan pidetä vähennyskelpoisena, jos verovelvollinen on ryhtynyt esimerkiksi osakkeiden myyntiin, väliluovutukseen tai lahjoitukseen hänen intressipiiriinsä kuuluvalle taholle ilmeisesti siinä tarkoituksessa, että hän saisi TVL 50 §:ssä tarkoitetun vähennyskelpoisen luovutustappion ja siten vapautuisi suoritettavasta verosta.
            - paragraph [ref=e1228]: Näissä tilanteissa tappion vähennyskelpoisuus voidaan evätä verotusmenettelystä annetun lain veron kiertämistä koskevan 28 §:n nojalla. Veroviranomaisella on VML 28 §:n 1 momentin mukaan velvollisuus osoittaa, että verosta vapautumisen tarkoitus on ollut olemassa.
            - paragraph [ref=e1229]: Kun tällaisen tarkoituksen olemassaolo on todennäköistä, verovelvollisella on puolestaan velvollisuus osoittaa, että käytetylle menettelylle on verotuksesta riippumattomia perusteita.
            - paragraph [ref=e1230]: Jos esimerkiksi osakkeiden luovutus on katsottu VML 28 §:n mukaiseksi veron kiertämiseksi, osakkeet myynyt henkilö saa vähentää luovutustappion sinä vuonna, jona osakkeiden arvonmenetys tulee luvussa 13.2.1 kuvatulla tavalla lopulliseksi. Vähentäminen on mahdollinen siitäkin huolimatta, että osakkeiden siviilioikeudellinen omistus on tuossa vaiheessa jo sillä taholla, jolle osakkeet on luovutettu.
            - paragraph [ref=e1231]:
              - text: Tappiollisia luovutuksia ja veron kiertämistä on käsitelty tarkemmin Verohallinnon ohjeessa
              - link "Veron kiertämissäännöksen soveltaminen" [ref=e1232] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/49027/
              - text: .
            - paragraph [ref=e1233]: johtava veroasiantuntija Tero Määttä
            - paragraph [ref=e1234]: johtava veroasiantuntija Mervi Hakkarainen
