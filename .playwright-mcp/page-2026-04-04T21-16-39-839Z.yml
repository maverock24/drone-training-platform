            - heading "8.2 Perusparannusmenot hankintamenona" [level=3] [ref=e506]
            - paragraph [ref=e507]: Hankintamenoon luetaan myös omaisuuden perusparannusmenot verovelvollisen omistusajalta (TVL 47 §:n 1 momentti). Perusparannusmenoja ovat kulut sellaisista toimenpiteistä, joilla omaisuus saatetaan parempaan ja arvokkaampaan kuntoon kuin missä se on aikaisemmin ollut saman omistajan hallussa. Perusparannusta ovat esimerkiksi huoneiston tai rakennuksen varustetason, tilankäytön tai rakennusmateriaalien tason parantaminen.
            - paragraph [ref=e508]:
              - text: Menot välittömästi ostamisen jälkeen suoritetuista korjauksista katsotaan hankintamenoon lisättäviksi perusparannusmenoiksi, vaikka samanlaisista toimenpiteistä myöhemmin omistusaikana aiheutuvia menoja pidetään tavallisina korjausmenoina (esimerkiksi
              - link "KHO 15.5.1992 taltio 1849" [ref=e509] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1992/199201849
              - text: ). Samoin vuokratuloa koskevassa päätöksessä
              - link "KHO 2000:51" [ref=e510] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2000/200002157
              - text: on katsottu hankintamenoon rinnastettaviksi kulut, jotka olivat aiheutuneet maalaus-, tapetointi- yms. korjaustöistä, joita oli tehty testamentilla saadussa huoneistossa omistajanvaihdoksen jälkeen, mutta ennen huoneiston ottamista vuokrauskäyttöön.
            - paragraph [ref=e511]:
              - text: Vuokratuloa koskevassa päätöksessä
              - link "KHO 2001:2" [ref=e512] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2001/200100051
              - text: hyväksyttiin perusparannusmenoiksi katsottu parvekelasien hankintameno vähennettäväksi poistoina huoneistosta saadusta vuokratulosta. Luovutusvoiton verotuksessa saadaan tällaisessa tapauksessa vähentää vain vuokratulon verotuksessa poistamatta jäänyt osa.
            - paragraph [ref=e513]: Verovelvollisen vakituisen asunnon tai vapaa-ajan asunnon perusparannuksen työkustannusten perusteella on voitu saada kotitalousvähennys. Perusparannusmenot luetaan omaisuuden hankintamenoon siitä huolimatta, että samojen menojen perusteella on mahdollisesti myönnetty kotitalousvähennys.
            - paragraph [ref=e514]: Omaisuuden hankintamenoon ei lueta tavallisia vuosittaisia korjausmenoja, jotka johtuvat omaisuuden kulumisesta verovelvollisen omistusaikana. Vuosikorjauksella tarkoitetaan sellaisia toimenpiteitä, joilla vain ylläpidetään omaisuuden kuntoa ja tasoa. Vuosikorjausta ovat esimerkiksi huoneiston tai rakennuksen maalaus, tapetointi tai kuluneen laitteen uusiminen.
            - paragraph [ref=e515]: Korjaustoimenpiteisiin voi sisältyä sekä vuosikorjausta että perusparannusta. Jos esimerkiksi kylpyhuoneen korjauksen yhteydessä huoneistoon rakennetaan sauna, kustannukset saunan rakentamisesta katsotaan perusparannusmenoiksi. Kulut omaisuuden myyntiin välittömästi liittyvistä korjauksista ovat vähennyskelpoisia voiton hankkimisesta aiheutuneina menoina (katso jäljempänä luku 9).
            - heading "8.3 Yhteisesti omistetun esineen perusparannusmenot" [level=3] [ref=e516]
            - paragraph [ref=e517]: Pääsääntöisesti yhteisomistajat maksavat perusparannusmenot omistusosuuksiensa suhteessa. Kullekin yhteisomistajalle hankintamenoon lisätään hänen omistusosuutensa suhteessa maksamansa perusparannusmeno.
            - paragraph [ref=e518]: Omistusosuuden mukainen perusparannusmenojen jakautuminen toteutuu myös, jos osapuolet sopivat maksuhetkellä omistusosuuksista poikkeavien maksuosuuksien jäävän keskinäiseksi velaksi tai jos joku yhteisomistajista antaa maksuosuuden toiselle osaomistajalle lahjaksi. Tässäkin tapauksessa kullekin yhteisomistajalle lisätään hankintamenoon omistusosuuden mukainen osuus perusparannusmenosta.
            - paragraph [ref=e519]: Joskus yhteisomistaja maksaa omistusosuuttaan enemmän perusparannusmenoja. Jos kyse ei ole lahjasta tai lainasta toisille osaomistajille, poikkeava maksuosuus ei vaikuta omistusosuuksien suuruuteen. Tällöin lisäys hankintamenoon tehdään yksinomaan sille osaomistajalle, joka on maksanut perusparannusmenon.
            - heading "8.4 Asunto-osakkeiden hankintameno" [level=3] [ref=e520]
            - paragraph [ref=e521]: Asunto-osakkeiden hankintamenoon luetaan hankintahinnan lisäksi osakkaan yhtiöön tekemät lisäsijoitukset tietyin alla selvitetyin ehdoin.
            - paragraph [ref=e522]: Asunto osakeyhtiölain (22.12.2009/1599) mukaan osakkeenomistaja on velvollinen maksamaan yhtiön menojen kattamiseksi yhtiövastiketta yhtiöjärjestyksessä määrättyjen perusteiden mukaan.
            - paragraph [ref=e523]: Yhtiövastike voi olla hoitovastiketta tai pääomavastiketta (rahoitusvastiketta). Pääomavastike voi kohdistua huoneistokohtaisen yhtiölainaosuuden maksamiseen. Pääomavastike voidaan maksaa kuukausittain hoitovastikkeen yhteydessä tai vaihtoehtoisesti yhtiön määräämänä ajankohtana kertasuorituksena. Yhtiön kirjanpidossa vastike voidaan lukea yhtiön tuloksi (tulouttaa) tai se voidaan käsitellä osakkaan yhtiöön tekemänä pääomansijoituksena (rahastointi). Tiedon yhtiön kirjanpitomenettelystä osakkeiden omistaja saa taloyhtiön isännöitsijältä.
            - paragraph [ref=e524]:
              - text: Osakkaan yhtiölle kuukausittain suorittama pääomavastike lisää osakkeiden hankintamenoa, jos yhtiö rahastoi kirjanpidossa pääomavastikkeet taseeseen. Pääomavastikkeen käyttötarkoituksella ei ole enää korkeimman hallinto-oikeuden antaman julkaisemattoman päätöksen antamisen jälkeen merkitystä (
              - link "KHO 936/2024" [ref=e525] [cursor=pointer]:
                - /url: https://www.edilex.fi/uutiset/89966?allWords=p%C3%A4%C3%A4omavastikkeet&offset=1&perpage=20&sort=relevance&typeIds%5b%5d=127%3Afi&searchSrc=2&advancedSearchKey=1927070
              - text: ", Edilex). Rahastointimenettelyä käsitellään Vero.fi:n sivuilla kohdassa"
              - link "Asunto-osakeyhtiön rahastoimien varojen tuloverotus" [ref=e526] [cursor=pointer]:
                - /url: /yritykset-ja-yhteisot/verot-ja-maksut/taloyhtioiden-verotus/tuloverotus/asunto-osakeyhtion-rahastoimien-varojen-tuloverotus/
              - text: .
            - paragraph [ref=e527]:
              - text: Jos yhtiö tulouttaa kuukausittaisen pääomavastikkeen kirjanpidossaan, sitä ei voida lisätä osakkeiden omistajalla asunto-osakkeiden hankintamenoon (
              - link "KHO 2016:169" [ref=e528] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2016/201604706
              - text: ). Korkein hallinto-oikeus totesi päätöksen perusteluissa, että hankintamenon lisääntyminen on voitu hyväksyä tilanteissa, joissa luovutuksen yhteydessä osakkeenomistaja on maksanut jäljellä olevan yhtiölainan kertasuorituksena. Pääomavastike voidaan siis lukea osakkeiden hankintamenoon, jos osakas maksaa yhtiölainan kertasuorituksena asunnon oston tai myynnin yhteydessä. Tällöin asunto-osakeyhtiön kirjanpitomenettelyllä ei ole asiassa merkitystä, joten myös asunto osakeyhtiön tulouttama lainanlyhennys on osakkeiden hankintamenoa (
              - link "KHO 2.12.2004 taltio 3113" [ref=e529] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/2004/200403113
              - text: ja KHO 1971-II-556).
            - paragraph [ref=e530]: Jokaista yhtiölainan kertamaksu arvioidaan erikseen. Jos huoneistolla on useita omistajia, on kaikkien osaomistajien maksettava huoneistokohtainen yhtiölainaosuus kokonaan pois. On tavanomaista, että asunto-osakeyhtiön osakkaat voivat maksaa yhtiölainaosuuksia määräajoin, esimerkiksi kerran vuodessa. Lainan poismaksun tulkitaan tapahtuvan oston yhteydessä, kun se tapahtuu ostoa seuraavana lainanlyhennyspäivänä. Lainan poismaksun tulkitaan tapahtuvan myynnin yhteydessä, kun maksu tapahtuu ennen myyntiä lähinnä olevana lainanlyhennyspäivänä.
            - generic [ref=e531]:
              - paragraph [ref=e532]: Huomio osio alkaa
              - paragraph [ref=e533]:
                - strong [ref=e534]: "Esimerkki 12:"
              - paragraph [ref=e535]: A ja B omistavat As Oy:n huoneiston 82 hallintaan oikeuttavat osakkeet. Osakkeisiin kohdistuu 50 000 euron tonttilainaosuudesta jäljellä oleva määrä 40 000 euroa sekä perusparannuksen remonttilainaosuus 10 000 euroa. As Oy ei rahastoi lainojen hoitoon kerättyjä pääomavastikkeita, vaan ne tuloutetaan As Oy:n kirjanpidossa.
              - paragraph [ref=e536]: Aja B myyvät asunnon vuonna 15.3.2025. Ennen myyntiä he ovat maksaneet tonttilainaosuuden eli 40 000 euroa As Oy:lle 20.12.2024. Lainaa saa yhtiön päätöksen perusteella lyhentää kerran vuodessa ennen vuoden vaihteessa tapahtuvaa tilikauden vaihtumista.
              - paragraph [ref=e537]: Sekä A että B saavat omaan osakkeiden hankintamenoonsa lisäykseksi puolet poismaksetun lainan kertalyhennyksestä eli kummankin hankintamenoon lisätään 20 000 euroa sen estämättä, että 10 000 euron perusparannuksen remonttilaina laina jää rasittamaan myytyä huoneistoa.
              - paragraph [ref=e538]: Huomio osio päättyy
            - paragraph [ref=e539]: Yllä esitetty ei vaikuta vuokratulojen ja niihin kohdistuvien vähennysten vakiintuneeseen verotuskäytäntöön. Vuokratuloista voidaan vähentää hoitovastikkeen lisäksi ne pääomavastikkeet, jotka asunto-osakeyhtiö tulouttaa. Tiedon yhtiön kirjanpitoratkaisusta saa asunto-osakeyhtiön isännöitsijältä. Vuokratuloista vähennettyjä pääomavastikkeita tai yhtiölainan kertamaksuja ei voi lisätä osakkeiden hankintamenoon.
            - paragraph [ref=e540]: Osakkeenomistajan yhtiölle suorittamia hoitovastikkeita ei lisätä hankintamenoon, mutta ne voidaan katsoa voiton hankkimisesta aiheutuneiksi luovutusvoittoa pienentäviksi kuluiksi siltä osin, kuin niitä on maksettu myyntiä varten tehdyn korjauksen ja asunnon myynnin ajalta. Edellytys on, että huoneisto on ollut vastaavan ajan tyhjänä. Voiton hankkimisesta aiheutuneita menoja käsitellään jäljempänä.
            - paragraph [ref=e541]: Jos henkilö ostaa huoneiston, joka on otettu yhtiön haltuun edellisen omistajan laiminlyöntien vuoksi, hänen on maksettava ostoa edeltävältä ajalta syntyneet vastikevelat ja hallintaanoton kustannukset saadakseen huoneisto hallintaansa. Tässä tilanteessa maksetut vastikevelat ja hallintaanoton kustannukset luetaan hankintamenoon.
            - paragraph [ref=e542]: Asunto- tai kiinteistöosakeyhtiön osakkeet voidaan hankkia merkitsemällä ne yhtiön perustamisvaiheessa. Osakkeiden hankintamenoa on tällöin yhtiölle maksettu osakkeiden merkintähinta ja mahdolliset myöhemmät yhtiön rahastoimat pääomasijoitukset yhtiöön.
            - paragraph [ref=e543]: Kiinteistön omistava keskinäinen yhtiö voi saada osakkaiden hallinnassa olevien huoneistojen arvonlisäverovähennykseen oikeuttavan käytön perusteella arvonlisäveropalautuksen rakennuskustannuksista. Yhtiölle palautuvan arvonlisäveron määrällä korjataan yhtiön omistaman kiinteistön hankintamenoa. Yhtiön yhtiöjärjestys ratkaisee, millä tavoin sen saama arvonlisäveropalautus käsitellään yhtiön kirjanpidossa ja miten palautus vaikuttaa suhteessa osakkeenomistajiin.
            - paragraph [ref=e544]:
              - text: Yhtiöjärjestyksen perusteella osakkeenomistajalla saattaa olla yhtiön saamaan arvonlisäveron palautukseen perustuva oikeus pääomanpalautukseen keskinäiseltä kiinteistöyhtiöltä. Osakkaalle maksetun pääomanpalautuksen määrä pienentää osakkeenomistajan kyseisen huoneiston osakkeiden hankintamenoa, jos arvonlisäveron osuus on sisältynyt osakkeen omistajalla osakkeiden hankintamenoon. Varojen jakamista osakeyhtiön omasta pääomasta on käsitelty tarkemmin Verohallinnon ohjeen
              - link "Arvopaperien luovutusten verotus" [ref=e545] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: luvuissa 15 ja 16.
            - heading "8.4.1 Kaupassa saadun kylkiäisen vaikutus asunto-osakkeiden hankintamenoon" [level=4] [ref=e546]
            - paragraph [ref=e547]:
              - strong [ref=e548]: Vähäiset edut eli kaupan kylkiäiset
            - paragraph [ref=e549]: Esimerkiksi rakennusliikkeillä on myyntikampanjoita, joissa ne lupaavat maksaa uuden asunnon ostajan puolesta määräajan asuinhuoneiston hoitovastikemaksut tai rakennusliike tarjoaa määräajaksi asunnon siivouspalvelun. Myös autoliikkeet saattavat tarjota asiakkailleen kaupanteon yhteydessä esimerkiksi vuoden huoltoja tai polttoaineita.
            - paragraph [ref=e550]: Kuvatun kaltainen etu on omaisuuden hankintamenoon vaikuttamaton kaupan kylkiäinen. Edellytyksenä on, että etuus on kaupan kohteen arvoon nähden vähäinen. Vähäinen etu on kaupan kohteen arvoon verrattuna pieni etu, jollainen voi olla uuden asunnon kaupassa esimerkiksi huoneiston siivouspalvelu enintään vuoden ajaksi tai alkuvaiheen vähäisen, kahden- tai kolmensadan euron suuruisen kuukausittaisen hoitovastikkeen maksaminen vuoden ajan.
            - paragraph [ref=e551]:
              - strong [ref=e552]: Merkittävät kaupan yhteydessä saadut edut
            - paragraph [ref=e553]: Moni rakennusliike on asuntokaupan kysynnän hiipuessa tarjonnut vuodesta 2022 alkaen uudisasuntojen ostajille merkittäviä alennuksia, joita on toteutettu eri tavoin ja erilaisin ehdoin. Eri tavoin toteutetuissa alennuksissa saattaa olla kyse jopa kymmenien tuhansien eurojen eduista. Osa eduista kirjataan suoraan kauppahinnan alennuksiksi, mutta osassa tapauksia kauppahintaa ei muuteta vaan ostajalle tarjotaan vapautuksia voimakkaasti kohonneista taloyhtiövastikkeista, jotka voivat olla paitsi hoitovastikkeita, myös rahoitusvastikkeita.
            - paragraph [ref=e554]: Jos ostajan maksamaa kauppahintaa ei muuteta vaan se jää alun perin tarkoitetun suuruiseksi, mutta myyjä ottaa vastattavakseen merkittävien omistajalle kuuluvien yhtiövastikkeiden tai muiden maksujen suorittamisen kaupan jälkeiseltä ajalta, on asiaa arvioitava seuraavasti. Kaupan kohteena olevan asunnon kauppahinta alenee sillä maksujen määrällä, jotka myyjä suorittaa ostajan puolesta. Ostajan kannalta maksetusta kauppahinnasta osa kohdistuu myyjän vastuulle jäävien rahanarvoisten suoritusten hankintaan. Ostajan on ilmoitettava asunnon hankintamenon alentuminen asuntoa aikanaan myytäessä (ellei myynti ole vakituisen oman asunnon verovapaa myynti).
            - generic [ref=e555]:
              - paragraph [ref=e556]: Huomio osio alkaa
              - paragraph [ref=e557]:
                - strong [ref=e558]: "Esimerkki 13:"
              - paragraph [ref=e559]: A ostaa uuden asunto-osakkeen, jonka alkuperäinen myyntihinta on 300 000 euroa. Myyjäyhtiö ei alenna maksettavaa kauppahintaa, mutta lupautuu maksamaan ostajan puolesta yhtiövastikkeita yhteensä 40 000 euron arvosta.
              - paragraph [ref=e560]: Koska kaupassa saatu etu ei ole vähäinen kylkiäinen, se vaikuttaa verotukseen alentamalla asunto-osakkeelle kuuluvaa hankintamenoa. A:n ostaman asunto-osakkeen hankintamenoksi luetaan vastaisessa luovutusvoittoverotuksessa siten 260 000 euroa. Koska A maksaa kaupassa 300 000 euroa, erotus eli 40 000 euroa on myyjän vastuulle jäävien suoritusten hankintamenoa.
              - paragraph [ref=e561]: Huomio osio päättyy
            - paragraph [ref=e562]:
              - text: Jos ostaja vuokraa hankkimaansa asuntoa, vastikkeiden vähennyskelpoisuuteen vaikuttaa se, että myyjä maksaa ostajan puolesta vastikkeita. Aiheesta kerrotaan tarkemmin
              - link "Vuokratulojen verotus" [ref=e563] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/49336/
              - text: "-ohjeessa."
            - paragraph [ref=e564]:
              - text: Ostajan maksettavaksi tulevaan varainsiirtoverotukseen vastikealennus vaikuttaa vain silloin, jos se on merkitty kauppakirjaan kauppahintaa pienentäväksi eräksi. Toisin sanoen ostaja ilmoittaa ja maksaa varainsiirtoveron sopimukseen merkityn kauppahinnan mukaan. Varainsiirtoverotusta käsitellään ohjeessa
              - link "Varainsiirtovero arvopapereiden luovutuksessa" [ref=e565] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/79871/
              - text: .
            - paragraph [ref=e566]:
              - text: Rakennusliikkeiden tarjoamia vastikealennuksia ja -etuja ei pidetä lahjaveron alaisina lahjoina, koska alennuksia ja etuja ei anneta lahjoitustarkoituksessa vaan myynninedistämisen vuoksi. Lahjaverotusta käsitellään ohjeessa Verovapaat lahjat. Rakennusliikkeen arvonlisäverotusta tullaan käsittelemään ohjeessa
              - link "Rakentamispalvelun myynti ja oma käyttö arvonlisäverotuksessa" [ref=e567] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/77184/
              - text: .
            - heading "8.4.2 Asunto-osakkeen kaupan yhteydessä luovutetut muut omaisuuserät" [level=4] [ref=e568]
            - paragraph [ref=e569]: Jos kaupan yhteydessä saadaan erillisiä omaisuuseriä, on hankintameno jaettava asunto-osakkeiden ja etuutena saadun muun omaisuusesineen hyödykkeen kesken niiden käypien arvojen suhteessa.
            - generic [ref=e570]:
              - paragraph [ref=e571]: Huomio osio alkaa
              - paragraph [ref=e572]:
                - strong [ref=e573]: "Esimerkki 14:"
              - paragraph [ref=e574]: Asunto-osakkeen kaupassa ostaja saa huoneiston hallintaan oikeuttavat osakkeet sekä autopaikkaosakkeet ja vuoden hoitovastikevapauden. Kauppahintana on asuinhuoneiston osakkeiden alkuperäinen listahinta. Hoitovastikevapautus ei koske vesi- ja sähkömaksuja, laajakaistavastikkeita, pääomavastiketta ja tontinvuokravastiketta, joten se voidaan tulkita vähäiseksi kylkiäiseksi.
              - paragraph [ref=e575]: Kauppahinta on 200 000 euroa, asunnon listahinta on 200 000 euroa ja autopaikkaosakkeiden listahinta on 4 000 euroa. Vastikevapauden arvo vuoden ajalta on 4 000 euroa.
              - paragraph [ref=e576]:
                - img "Tekstiä havainnollistava kuva" [ref=e577]
              - paragraph [ref=e578]: Kauppahinta eli 200 000 euroa jaetaan huoneiston ja autopaikan hankintamenoksi niiden arvojen suhteessa. Asunnon hankintamenoa on 196 078 euroa (200/204 x 200) ja autopaikan hankintamenoa on 3 922 euroa (4/204 x 200). Kylkiäisenä kaupan yhteydessä saatu vähäinen vastikevapaus ei vaikuta ostajan A verotukseen.
              - paragraph [ref=e579]: Jos A vuokraa asunnon, hän ei saa vähentää myyjän maksamia vastikkeita vuokratulosta siinäkään tapauksessa, että asunto-osakeyhtiö tulouttaa kirjanpidossaan vastikemaksut.
              - paragraph [ref=e580]: Huomio osio päättyy
            - heading "8.5 Puhelinosuuskunnan osuustodistusten hankintameno" [level=3] [ref=e581]
            - paragraph [ref=e582]:
              - text: Ratkaisussa
              - link "KVL 1999/38" [ref=e583] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ennakkoratkaisut/53696/
              - text: puhelinosuuskunnan osuustodistuksen hankintamenoksi on katsottu osuusmaksun ja liittymismaksun yhteismäärä, kun osuustodistus ja osuusliittymäsopimus oli erotettu toisistaan. Ratkaisun lopputuloksen kannalta merkityksellistä oli, että liittymäsopimusta ei voinut myydä eikä siirtää kolmannelle, eikä siitä saanut rahoja takaisin osuuskunnalta.
            - paragraph [ref=e584]: Ratkaisusta ilmenevää periaatetta voidaan soveltaa määritettäessä puhelinyhteisön osuustodistuksen tai osakkeen hankintamenoa vastaavissa olosuhteissa. Jos puhelinliittymäsopimuksen voi myydä erikseen tai siirtää kolmannelle taikka siitä saa rahat takaisin puhelinyhteisöltä, liittymismaksua ei katsota osuustodistuksen tai osakkeiden hankintamenoksi.
            - heading "8.6 Kulkuneuvon hankintameno" [level=3] [ref=e585]
            - paragraph [ref=e586]:
              - text: Kulkuneuvon luovutuksesta saadun voiton määrää laskettaessa ei oteta huomioon työnantajan maksamaa matkustamiskustannusten korvausta (TVL 46 §:n 6 momentti). Auton tai muun kulkuneuvon luovutuksesta saatua voittoa laskettaessa hankintamenoa ei siten alenneta sillä perusteella, että verovelvollinen on saanut työnantajalta korvausta auton käyttämisestä työ- tai virkamatkoilla. Hankintamenona pidetään yleensä todellista poistamatonta hankintamenoa. Esimerkiksi invalidin saama autoveron palautus vähennetään hankintamenosta (
              - link "KHO 1983-B-II-577" [ref=e587] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1983/198302440
              - text: ).
            - heading "8.7 Vahingon takia saadun korvauksen vaikutus omistusesineen tai sen tilalle hankitun tai valmistetun uuden esineen hankintamenoon" [level=3] [ref=e588]
            - paragraph [ref=e589]: Tuloverolaissa on kaksi säännöstä, jotka määrittelevät vahingonkorvauksen verolaisuutta ja veronalaisen vahingonkorvauksen vaikutusta luovutusvoiton verotukseen.
            - list [ref=e590]:
              - listitem [ref=e591]: "TVL 36 §:n 1 momentin 2 kohta: Vahingon takia saatu vakuutuskorvaus ei ole veronalaista tuloa, jos sitä ei makseta veronalaisen tulon sijaan."
              - listitem [ref=e592]: "TVL 46 § 5 momentti: Jos omaisuutta verovelvollisen hallinta-aikana on kohdannut vahinko, josta hän on saanut korvausta, korvaus lisätään luovutushintaan luovutusvuodelta ja sitä edeltäneiltä viideltä vuodelta, sikäli kuin korvausta ei ole käytetty tuhoutuneen tai vahingoittuneen omaisuuden uudistamiseen tai kunnostamiseen tai lisätty metsätalouden pääomatuloon."
            - paragraph [ref=e593]: Jatkossa omaisuuden sijaan puhutaan rakennuksesta, koska rakennuksen vahingoittumisesta tyypillisesti maksetaan vakuutuskorvauksia, joita käytetään rakennuksen korjaamiseen tai uuden rakennuksen rakentamiseen.
            - paragraph [ref=e594]: Jos korvaus käytetään kokonaisuudessaan uuden rakennuksen rakennuskuluihin, vakuutuskorvausta ei myöhemmin tapahtuvan myynnin luovutusvoittoverotuksessa lisätä luovutushintaan, vaikka korvauksen ja myynnin välinen aika olisikin alle viisi vuotta.
            - paragraph [ref=e595]:
              - text: Korkeimman hallinto-oikeuden päätöksessä
              - link "KHO 2022:84" [ref=e596] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2022/202202067h
              - text: asiakysymyksenä oli kiinteistön myyntivoiton laskenta, kun rakennus oli tuhoutunut tulipalossa ennen kiinteistön myyntiä, vahingosta oli saatu vahingonkorvaus ja rakennuksen tilalle oli rakennettu uusi rakennus. Erityisenä ratkaistavana kysymyksenä oli
              - strong [ref=e597]: uuden rakennuksen hankintamenon vähentäminen.
            - paragraph [ref=e598]:
              - link "KHO 2022:84" [ref=e599] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2022/202202067h
            - paragraph [ref=e600]: A:n omistamalla kiinteistöllä hankintahetkellä ollut rakennus oli tuhoutunut tulipalossa. A oli saanut tuhoutuneesta rakennuksesta verovapaan vakuutuskorvauksen, jonka hän oli kokonaisuudessaan käyttänyt tuhoutuneen rakennuksen tilalle rakennetun uuden rakennuksen rakentamiskustannusten kattamiseen. A oli sittemmin luovuttanut kiinteistön.
            - paragraph [ref=e601]: Korkeimmassa hallinto-oikeudessa oli erityisesti ratkaistavana, miltä osin uuden rakennuksen rakentamiskustannukset tuli tuloverolain 46 §:n 1 momentissa tarkoitettua luovutusvoittoa laskettaessa lukea rakennuksen hankintamenoon. Korkein hallinto-oikeus katsoi, että uuden rakennuksen hankintamenoon oli luettava sen rakentamiskustannukset kokonaan eli myös siltä osin kuin ne oli katettu verovapaalla vakuutuskorvauksella.
            - paragraph [ref=e602]: Verovuosi 2017. Tuloverolaki 29 § 1 momentti, 36 § 1 momentti 2 kohta ja 46 § 1 momentti
            - paragraph [ref=e603]:
              - text: Korkein hallinto-oikeus perusteli päätöstään sillä, että hyväksyttäessä uuden rakennuksen rakennuskustannukset siitä myöhemmin tehtyjä poistoja lukuun ottamatta kokonaan hankintamenoksi, vakuutuskorvauksen verovapautta ei mitätöidä luovutusvoittoa verotettaessa. Vastaavaan lopputulokseen on päädytty tulonhankkimistoimintaa koskevassa päätöksessä
              - link "KHO 1983-B-II-549" [ref=e604] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1983/198301442
              - text: ", jonka mukaan verovapaasta korvauksesta huolimatta uuden esineen hankintamenosta saatiin tehdä poistoja."
            - paragraph [ref=e605]:
              - strong [ref=e606]: Vanhan rakennuksen hankintamenon
              - text: vähennyskelvottomuus ilmenee edellä siteeratun päätöksen KHO 2022:84 taustalla olleesta hallinto-oikeuden päätöksestä, jossa sitä ei kuitenkaan tarkemmin perustella. Verohallinto katsoo, että vanhan tuhoutuneen rakennuksen hankintamenoa ei voida enää jatkossa vähentää, jos
              - text: vanha rakennus on korvattu uudella rakennuksella ennen kiinteistön myyntiä.
            - paragraph [ref=e607]:
              - text: "Jos korvaavaa rakennusta ei ole rakennettu, voidaan vanhan rakennuksen poistamaton hankintameno kuitenkin vähentää. Mahdollinen verovapaa vakuutuskorvaus ei vaikuta vähennyksen määrään. Verotuskohtelu on saman kaltainen kuin oman vakituisen asunnon verovapautta koskevassa oikeuskäytännössä: oman asunnon verovapaus säilyy siihen asti, kunnes uusi rakennus on rakennettu tuhoutuneen tai puretun rakennuksen tilalle ("
              - link "KHO 2012:62" [ref=e608] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2012/201202121
              - text: ).
            - paragraph [ref=e609]:
              - text: Jos rakennus on tulonhankkimistoiminnan käytössä, sen vahingoittumisesta aiheutunut käyvän arvon muutos voi oikeuttaa lisäpoiston tekemiseen. Asiasta on kerrottu tarkemmin
              - link "Vuokratulojen verotus -ohjeen" [ref=e610] [cursor=pointer]:
