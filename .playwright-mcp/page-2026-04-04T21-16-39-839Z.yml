            - paragraph [ref=e461]: Luovutusvoittoverotuksessa omistusajan pituudella on merkitystä, kun selvitetään hankintameno-olettaman suuruutta (alle 10 vuotta tai vähintään 10 vuotta), oman asunnon luovutusvoiton verovapautta (2 vuotta) ja sukupolvenvaihdossäännöksen soveltamista koskevia säännöksiä (10 vuotta / 5 vuotta). Näissä säännöksissä edellytetään tietyn ajanjakson täyttymistä, jotta säännöksissä tarkoitetut veroedut tulisivat sovellettavaksi. Samoin hankintamenoon lisätään perusparannusmenoja vain omistusajalta.
            - paragraph [ref=e462]: Luovutusvoittoverotuksessa sovellettava omistusaika alkaa vakiintuneen verotus- ja oikeuskäytännön mukaan sitovan osto- tai muun hankintasopimuksen tekemisestä ja päättyy sitovan luovutussopimuksen tekemiseen. Kauppakirjaan otetut sopimuksenvaraiset ehdot, joiden mukaan kauppahinta maksetaan tai omistusoikeus siirtyy myöhempänä ajankohtana, eivät yleensä muuta omistusajan alkamis- tai päättymisajankohtaa. Luovutuksen verovuosi määräytyy myös sitovan luovutussopimuksen tekemisajankohdan mukaan (katso luku 6.1).
            - paragraph [ref=e463]: Lahjana saadun omaisuuden omistusaika alkaa lahjan saamisesta haltuun. Tämä on käytännössä useimmiten lahjakirjan allekirjoituspäivä.
            - paragraph [ref=e464]: Perintönä saadun omaisuuden omistusaika alkaa perittävän kuolemasta. Omistusaika alkaa kuitenkin osakkaan pesän ulkopuolisin varoin maksamaa vastiketta vastaavalta osin perinnönjakokirjan allekirjoitushetkestä, jos osakas käyttää ulkopuolisia varoja saadakseen pesästä varoja enemmän, kuin hänen laskennallinen perintöosuutensa on.
            - paragraph [ref=e465]: Osituksessa avio-oikeuden nojalla toiselta osapuolelta saadun omaisuuden omistusajan alkuhetken määrää ositusta edeltäneen saannon ajankohta (TVL 46 § 2 momentti). Omaisuutta osituksessa luovuttaneen osapuolen omistusajan alkuhetki siis siirtyy omaisuuden osituksessa saaneelle osapuolelle. Osituksessa ulkopuolisia varoja käyttäen lunastetun omaisuuden omistusaika alkaa kuitenkin ositussopimuksen allekirjoitushetkestä.
            - paragraph [ref=e466]: Perinnönjakokirja tai ositussopimus katsotaan allekirjoitetuksi, kun viimeinenkin osapuolista on allekirjoittanut asiakirjan.
            - heading "7.1.1 Omistusajan alkaminen kiinteistön kaupassa" [level=4] [ref=e467]
            - paragraph [ref=e468]: Kiinteistön omistusaikaa määritettäessä ratkaisevaa on lainmukaisen, osapuolia sitovan kauppakirjan allekirjoittamisajankohta. Kiinteistökauppa on pätevä, kun se on kaupanvahvistajan todistama tai sähköisen kaupankäyntijärjestelmän kautta toteutettu.
