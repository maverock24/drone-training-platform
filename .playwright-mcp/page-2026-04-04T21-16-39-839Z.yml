              - text: ja varainsiirtoveroa koskevassa julkaisemattomassa päätöksessä KHO 2013 taltio 140, että siviilioikeudellinen omistaja oli vastuussa kiinteistö- ja varainsiirtoveron suorittamisesta siitä huolimatta, että omaisuus ulosmitattiin myöhemmin toisen henkilön velasta. Tämän mukaisesti myös omaisuudesta saatu juokseva tulo eli esimerkiksi vuokratulo verotetaan sillä, jolla siviilioikeudellinen omistus on tuloa saataessa. Myöhemmin tapahtuva toisen velasta ulosmittaaminen ei siis muuta tulon verotusta.
            - heading "12.7 Luonnonsuojelualueen luovutuksen verotus" [level=3] [ref=e991]
            - paragraph [ref=e992]: Luonnonsuojelulain (9/2023) nojalla voidaan muuttaa luonnonsuojelualueeksi laissa määritettyjä kohteita. Lain voimaatulosäännöksen (136 §) mukaan muissa laeissa olevat viittaukset vanhaan luonnonsuojelulakiin kohdistuvat 1.6.2023 alkaen nyt voimassa olevaan uuteen lakiin. Myös ns. Natura-alueet kuuluvat menettelyn piiriin.
            - paragraph [ref=e993]:
              - text: Luonnonsuojelulain nojalla suojellun alueen omistajalle voidaan maksaa kertakaikkista verovapaata korvausta suojelun aiheuttamista taloudellisen hyödyn menetyksistä (tuloverolaki 80 § 7-kohta ja
              - link "KHO 27.5.2005 taltio 1280" [ref=e994] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/2005/200501280
              - text: ). Kiinteistön luovuttamista luonnonsuojelualueeksi käsitellään ohjeessa
              - link "Kokonaan tai osittain verovapaat luovutusvoitot henkilöverotuksessa" [ref=e995] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48930/
              - text: .
            - paragraph [ref=e996]: "Kun luonnonsuojelualueen omistaja myöhemmin myy suojellun alueen, joudutaan ratkaisemaan saadun korvauksen vaikutus maa-alueen luovutusvoiton verotuksessa. Tuloverolain 46 §:n 5 momentissa säädetään, että: jos omaisuutta verovelvollisen hallinta-aikana on kohdannut vahinko, josta hän on saanut korvausta, korvaus lisätään luovutushintaan luovutusvuodelta ja sitä edeltäneiltä viideltä vuodelta, sikäli kuin korvausta ei ole käytetty tuhoutuneen tai vahingoittuneen omaisuuden uudistamiseen tai kunnostamiseen tai lisätty metsätalouden pääomatuloon."
            - paragraph [ref=e997]: Suojellun alueen myyntiä koskevia julkaistuja korkeimman hallinto-oikeuden päätöksiä ei ole. Luonnonsuojelulain mukainen korvaus kohdistuu käytännössä tulevaan aikaan ja saamatta jääviin taloudellisiin hyötyihin. Vahingonkorvaus kohdistuu pääsääntöisesti jo tapahtuneisiin vahinkoihin. Korvauksen lisääminen luovutusvoittoon aiheuttaisi korvauksen verovapauden menetyksen, minkä ei voida katsoa olevan lainsäätäjän tarkoitus. Luonnonsuojelukorvaus ei ole sellainen vahingosta maksettu korvaus, että se lisättäisiin omaisuuden myynnin verotuksessa luovutushintaan TVL 46 §:n 5 momentin tarkoittamalla tavalla.
            - paragraph [ref=e998]: Koska luonnonsuojelualueen taloudellinen käyttö on rajattua, ei siihen kohdistuva kauppahinnan osa yleensä voi muodostua vähäistä suuremmaksi. Maa-alueen alkuperäinen poistamaton hankintameno on kuitenkin käytettävissä luovutusvoittoa tai -tappiota laskettaessa. Tästä seuraa, että suojellun alueen myöhemmän luovuttamisen yhteydessä verotuksessa muodostuu yleensä luovutustappio. Intressipiirissä eli esimerkiksi lähiomaisten kesken tehtyihin luovutuksiin voidaan soveltaa veronkiertoa koskevaa VML 28 §:ä, jos järjestelyllä on pyritty aikaansaamaan keinotekoinen luovutustappio.
            - paragraph [ref=e999]: Luonnonsuojelualueen ostaneelle henkilölle katsotaan luonnonsuojelualueen hankintahinnaksi ostossa käytetty, käytännössä nimellinen kauppahinta.
            - heading "12.8 Kertakorvaus maanomistajalle itärajan esteaidasta" [level=3] [ref=e1000]
            - paragraph [ref=e1001]: Rajavartiolaitos rakentaa Suomen itärajalle esteaidan nykyisen raja-aukon läheisyyteen. Esteaidan rakentaminen ei muuta kiinteistöjen omistussuhteita rajavyöhykkeellä.
            - paragraph [ref=e1002]: Rajavartiolaitos maksaa maanomistajille kertakorvauksen pysyvästä haitasta, jonka aidan rakentaminen aiheuttaa. Kertakorvauksen määrä perustuu esteaidan tarvitseman alueen käypään arvoon. Maanomistaja saa esteaidan rakentamisesta päätöksen, ja korvaus lasketaan sen mukaan, mikä on ollut alueen käypä arvo päätöksen allekirjoituspäivänä. Puustoisella alueella korvataan maapohjan arvon lisäksi puuston hakkuuarvo, taimikoiden arvo ja nuoren puuston odotusarvo.
            - paragraph [ref=e1003]: Vaikka Rajavartiolaitos ei lunasta maata itselleen, koko kertakorvaus verotetaan maanomistajalla samalla tavalla kuin lunastustoimituksessa maksettu korvaus. Korvaus katsotaan myyntihinnaksi, jonka perusteella lasketaan luovutusvoitto.
            - paragraph [ref=e1004]: Jos korvauksen saaja on yksityishenkilö tai kuolinpesä, luovutusvoiton laskennassa käytetään 80 %:n hankintameno-olettamaa, koska Rajavartiolaitoksella on rajavartiolakiin perustuen oikeus saada esteaidan tarvitsema alue käyttöönsä. Aidan sijoittamisesta maksettava kertakorvaus rinnastetaan lunastustoimituksissa maksettaviin korvauksiin.
            - generic [ref=e1005]:
              - paragraph [ref=e1006]: Huomio osio alkaa
              - paragraph [ref=e1007]:
