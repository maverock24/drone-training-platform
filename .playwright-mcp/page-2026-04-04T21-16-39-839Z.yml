            - heading "6 Luovutusvoiton verovuosi" [level=2] [ref=e411]
            - heading "6.1 Pääsääntönä kaupantekovuosi" [level=3] [ref=e412]
            - paragraph [ref=e413]: Luovutusvoitto katsotaan sen verovuoden tuloksi, jona kauppa tai vaihto on tehty tai muu luovutus on tapahtunut (TVL 110 a §:n 1 momentti). Sanamuotonsa mukaan säännös edellyttää koko luovutusvoiton verottamista luovutusvuonna. Luovutusvuotta määritettäessä merkityksellinen on sitovan lopullisen kauppakirjan tekemisajankohta. Sopimuksenvaraisilla kaupan ehdoilla ei ole vaikutusta luovutusvuotta ratkaistaessa. Sopimuksenvarainen ehto on muun muassa sopimus loppukauppahinnan maksamisesta määräajassa kauppakirjan tekemisen jälkeen.
            - paragraph [ref=e414]: DIAS-järjestelmässä ja Maanmittauslaitoksen kiinteistönvaihdantapalvelussa tehdyissä kaupoissa sitova sopimus kaupasta syntyy vasta kun kaikki kaupan osapuolet ovat sähköisesti allekirjoittaneet samansisältöisen kauppakirjan. Näissä viimeisimmän allekirjoituksen päivämäärä on kaupantekopäivämäärä. Myös muu sähköisessä järjestelmässä allekirjoitettu kauppakirja on sitova sopimus vasta kun kaikki kaupan osapuolet ovat allekirjoittaneet kauppakirjan. Jos kuitenkin kauppakirjaan on merkitty kaupantekopäivä, joka molempien osapuolten käsityksen mukaan on ajankohta, jolloin kauppa on tapahtunut, tätä päivämäärää voidaan pitää sitovan sopimuksen päivämääränä.
            - paragraph [ref=e415]:
              - text: Oikeuskäytännössä luovutusvoittoa on myös pidetty kaupantekovuoden tulona, vaikka osa kauppahinnasta oli talletettu sen suorittamiseksi myönnetyn velan vakuudeksi ja käytetty velan maksuksi (
              - link "KHO 1996-B-519" [ref=e416] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1996/199601641
              - text: ). Yrityskaupoissa osa osakkeiden myyntihinnasta voidaan siirtää esimerkiksi escrow-tilille odottamaan kaupan ehtojen täyttymistä ja sen jälkeistä talletetun summan tilitystä myyjälle. Tämäkään sopimusmenettely ei vaikuta siihen, minkä vuoden tulona luovutus verotetaan.
            - paragraph [ref=e417]: Seuraavassa on kaksi erityistilanteeseen annettua, pääsäännöstä poikkeavaa päätöstä ja ratkaisua.
            - paragraph [ref=e418]:
              - link "KHO 1994-B-532" [ref=e419] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1994/199405284
              - strong
              - text: Kauppa sitoi ostajana ollutta kaupunkia vasta, kun kaupunginvaltuusto oli hyväksynyt sen.
            - paragraph [ref=e420]:
              - link "KVL 31/2013 (KHO 3.3.2014 taltio 648, ei muutosta)" [ref=e421] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ennakkoratkaisut/54314/
              - text: Osakekaupan ehtona oli, että 90 päivän kuluessa kauppakirjan allekirjoittamisesta ostajan kotivaltion arvopaperipörssi ja myyjäyhtiön yhtiökokous hyväksyisivät kaupan. Kauppakirjan ehtojen mukaan ostajalla ei olisi ollut mitään velvoitteita myyjää kohtaan, jos kauppa olisi jäänyt toteutumatta mainituista syistä. Kumpaakin osapuolta sitova sopimus syntyi ja osakkeiden luovutuksen katsottiin tapahtuneen siinä vaiheessa, kun sekä pörssi että yhtiökokous olivat hyväksyneet kaupan.
            - paragraph [ref=e422]: Jos kauppa on toteutettu kaksivaiheisin signing- ja closing-asiakirjoin, joudutaan luovutusvoiton verovuosi ratkaisemaan tapauskohtaisesti verovelvollisen esittämän selvityksen perusteella. Näissä tapauksissa myyjän on varauduttava esittämään luovutusvoiton verottamisen yhteydessä sekä kauppaa koskevat asiakirjat että sen täytäntöönpanon (closing) ehdoiksi määriteltyjen edellytysten täyttymistä koskeva asiakirjat. Ratkaisevaa on, milloin omistusoikeuden siirrosta on sovittu osapuolia sitovasti. Siten kaupantekohetkeksi voi tilanteen mukaan muodostua myös jokin ajankohta signing‑asiakirjan ja closing-asiakirjan väliseltä ajalta.
            - paragraph [ref=e423]: Vieraalla valuutalla maksettua ja saatua kauppahintaa käsitellään luvussa 8.11
            - paragraph [ref=e424]:
              - text: Varainsiirtoveron osalta vaiheittaisia luovutuksia käsitellään ohjeessa
              - link "Varainsiirtovero arvopapereiden luovutuksessa, luku 3.6" [ref=e425] [cursor=pointer]:
