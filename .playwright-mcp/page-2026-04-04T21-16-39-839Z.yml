            - heading "11.1.8 Lahjana saadun omaisuuden luovuttaminen ennen vuoden kulumista lahjoituksesta" [level=4] [ref=e844]
            - paragraph [ref=e845]: Lahjana saadun omaisuuden hankintamenoksi katsotaan pääsääntöisesti lahjaverotuksessa käytetty verotusarvo. Lahjaverotusarvoa ei kuitenkaan vähennetä omaisuuden hankintamenona, jos lahjaksi saatua omaisuutta luovutetaan ennen kuin vuosi on kulunut lahjoituksesta. Hankintameno lasketaan TVL 47 §:n 1 momentin mukaan lahjoittajan hankintamenosta, jos lahjansaaja luovuttaa saamansa omaisuuden ennen kuin lahjoituksesta on kulunut yksi vuosi. Samoin menetellään, jos lahjaverotuksessa sukupolvenvaihdossäännösten nojalla huojennettua omaisuutta luovutetaan ennen yhden vuoden kulumista lahjoituksesta (ks. luku 11.1.5).
            - paragraph [ref=e846]: Lahjoittajalta siirtyvää hankintamenoa vähentävät esimerkiksi lahjanantajan verotuksessaan tekemät poistot ja lisäävät hänen tekemiensä perusparannusten menot. Myös lahjansaajan omistusaikana mahdollisesti tapahtuneet hankintamenon vähennykset ja lisäykset otetaan huomioon.
            - paragraph [ref=e847]: Lahjansaajalla vuoden määräajan laskenta alkaa lahjoituksen ajankohdasta. Lahjoittajan omistusajalla ei ole merkitystä. Lahjansaaja saa vähentää vaihtoehtoisesti hankintameno-olettamana 20 prosenttia luovutushinnasta.
