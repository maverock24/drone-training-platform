              - text: .
            - paragraph [ref=e866]: Edellä mainittu päätös koskee vain oman asunnon luovutusta eikä sitä voida pitää yleisenä perusteena poiketa luovutuksen verotukseen vaikuttavasta ajankohdasta omistuksenpidätysehdon perusteella. Tämän takia myös lahjana saadun omaisuuden edelleen luovutustilanteessa yhden vuoden määräaikaa tarkastellaan kaupantekohetken eikä mahdollisen myöhemmän omistuksensiirtohetken mukaan.
            - heading "11.2 Osituksessa ja erottelussa siirtyvä omaisuus" [level=3] [ref=e867]
            - heading "11.2.1 Ositus, kun ei käytetä ulkopuolisia varoja" [level=4] [ref=e868]
            - paragraph [ref=e869]:
              - text: Osituksella tarkoitetaan avioliittolain (234/1929) mukaista määrämuotoista, kahden todistajan allekirjoittamaa ositussopimusta tai käräjäoikeuden määräämän pesänjakajan tekemää toimitusositusta. Osituksessa puretaan puolisoiden aviovarallisuussuhde, jos puolisolla on avio-oikeus toisen puolison omaisuuteen. Ositus voidaan toimittaa avio-oikeuden toteuttamiseksi, jos puoliso on kuollut tai puolisot ovat eronneet tai avioero on vireillä. Ositusta on käsitelty ohjeissa
              - link "Vastikkeellinen saanto osituksessa ja erottelussa" [ref=e870] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48583/
              - text: sekä
              - link "Vastikkeellinen saanto jäämistöosituksessa ja perinnönjaossa" [ref=e871] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/108338/
              - text: .
            - paragraph [ref=e872]: Puoliso, jonka avio-oikeuden alaisen omaisuuden arvo on pienempi, on oikeutettu osituksessa saamaan toiselta puolisolta omaisuutta tasinkona siten, että puolisoiden osuudet heidän avio oikeuden alaisesta omaisuudestaan tulevat yhtä suuriksi. Osituksessa voidaan myös purkaa puolisoiden yhteisomistus.
            - paragraph [ref=e873]: Ositus on luovutusvoittoverotuksen kannalta verovapaa yleisseuraanto, ellei sen yhteydessä käytetä avio-oikeuden ulkopuolisia varoja. Luovutusvoiton verotusta varten ositustilanteista on tuloverolaissa erityissäännöksiä, joiden takia osituksessa saadun omaisuuden luovutusvoiton verotus poikkeaa muun omaisuuden luovutusten verotuksesta.
            - paragraph [ref=e874]: Jos luovutettu omaisuus on saatu osituksessa, omistusaika ja hankintameno lasketaan ositussaantoa edeltäneestä saannosta (TVL 46 §:n 2 momentti). Toisin sanoen, kun puoliso saa avio-oikeuden nojalla puolisonsa omaisuutta osituksessa, entisen puolison hankintameno siirtyy sellaisenaan omaisuuden osituksessa saaneelle puolisolle. Omistusaikaa määritettäessä ratkaiseva on myös edellisen omistajan, eli puolison saannon ajankohta. Siten jäämistöosituksessa leskelle siirtyneen toisen puolison jo kuolinhetkellään omistaman avio-oikeuden alaisen omaisuuden hankinta-aika ja hankintameno ovat leskellä samat, jotka ne olivat aikanaan ensin kuolleella. Hankintamenona ei käytetä perintöverotusarvoa, koska leskellä saantoperusteena ei ole perintö vaan ositus.
            - paragraph [ref=e875]: Sanamuotonsa mukaan TVL 46 §:n 2 momentin säännös tulee sovellettavaksi, jos ositus on tosiasiallisesti toimitettu ennen omaisuuden myyntiä. Osituksessa luovuttajalle ei muodostu veronalaista luovutusta.
            - paragraph [ref=e876]: Koska osituksessa saadun omaisuuden todellinen hankintameno määräytyy ositussaantoa edeltäneen saannon mukaan, ratkaiseva on edellisen omistajan eli puolison saannon luonne. Jos puolison saanto on ollut vastikkeeton, luovutetun hyödykkeen hankintameno lasketaan tuolloin toimitetussa perintö- tai lahjaverotuksessa käytetyn arvon mukaan. Osituksessa siirtyvää hankintamenoa vähentävät luovuttavan henkilön omassa verotuksessaan tekemät poistot ja lisäävät hänen tekemiensä perusparannusten menot. Myös osituksessa omaisuuden saaneen puolison omistusaikana mahdollisesti tapahtuneet hankintamenon vähennykset ja lisäykset otetaan huomioon.
            - paragraph [ref=e877]: Ositussaantoa koskeva TVL 46 §:n 2 momentin erityissäännös ei estä hankinta-meno-olettaman käyttämistä, jos se on verovelvolliselle edullisempi vaihtoehto. Omistusaika, jonka perusteella hankintameno-olettaman suuruus määräytyy, lasketaan myös ositussaantoa edeltäneestä puolison saannosta.
            - generic [ref=e878]:
