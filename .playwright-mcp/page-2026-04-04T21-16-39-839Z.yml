              - paragraph [ref=e490]: Oman asunnon verovapaa myynti on kahden vuoden säännön nojalla mahdollinen, kun asuntoa on käytetty omistusaikana omana vakituisena asuntona yhtäjaksoisesti vähintään kahden vuoden ajan. Asunto on ostettu 11.1.2019. Kahden vuoden ajanjakso alkaa 11.1.2019 ja päättyy 10.1.2021 päivän lopussa, joten tuon aikavälin asunnon on oltava asuinkäytössä ja omistuksessa. Verovapaa myynti on siten mahdollinen ostopäivän kanssa saman numeroisena päivänä eli aikaisintaan 11.1.2021.
