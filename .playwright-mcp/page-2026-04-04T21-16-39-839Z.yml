            - paragraph [ref=e988]:
              - text: Edellä kuvatusta luovutusvoittoverotusta koskevasta päätöksestä poiketen korkein hallinto-oikeus katsoi luovutusvoittoverotusta koskevassa päätöksessä
              - link "KHO 1996-B-520" [ref=e989] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1996/199601872
              - text: ", kiinteistöveroa koskevassa päätöksessä"
              - link "KHO 2013:4" [ref=e990] [cursor=pointer]:
