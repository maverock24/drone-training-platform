            - paragraph [ref=e858]:
              - text: Jos lahjanantaja on hankkinut lahjoitettavia saman yhtiön osakkeita eri aikaan, niillä on usein toisistaan poikkeavat hankintamenot. Tällöin lahjan saamisesta lahjansaajalla alle vuoden olleiden osakkeiden luovutuksessa joudutaan ratkaisemaan kysymys siitä, millä tavoin luovuttajalta siirtyvä hankintameno jakaantuu lahjansaajan tai lahjansaajien osakkeiden kesken.
              - link "Arvopaperien luovutusvoittojen verotus" [ref=e859] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
