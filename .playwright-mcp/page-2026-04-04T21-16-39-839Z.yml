              - paragraph [ref=e984]: M:n täysi-ikäinen lapsi O:n osti kiinteistön X Oy:ltä 100 000 eurolla vuonna 2018.
              - paragraph [ref=e985]: Vuonna 2023 toimitetun ulosmittauksen yhteydessä O ei kyennyt osoittamaan, että ulosmittaus loukkaisi hänen oikeuttaan. Hän ei itse ollut maksanut kauppahintaa, joten hänen kannaltaan kyse oli näennäisoikeustoimesta. O:n nimissä oleva kiinteistö ulosmitattiin ja myytiin M:n velkojen maksamiseksi 150 000 eurolla.
              - paragraph [ref=e986]: Kiinteistön ulosottomyynti verotetaan M:n luovutusvoittona. Myyntihinta on 150 000 euroa, hankintameno O:n kaupassa käytetty kauppahinta 100 000 euroa ja saantoajankohta vuosi 2018. Hankintameno-olettama on 20 prosenttia myyntihinnasta eli 30 000 euroa. Todellinen hankintameno eli 100 000 euroa on suurempi, joten luovutusvoitoksi muodostuu 50 000 euroa (150 000–100 000). M:n vuoden 2023 luovutusvoittona verotetaan 50 000 euroa.
