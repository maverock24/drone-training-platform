                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60797/
              - text: ). Vastaavasta syystä verotettavaa luovutusta ei mahdollisesta ulkopuolisen vastikkeen maksamisesta huolimatta muodostu, jos verovelvollinen pitää aikaisemmin omistamansa omaisuuden.
            - paragraph [ref=e900]:
