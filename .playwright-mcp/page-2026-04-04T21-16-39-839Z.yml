              - paragraph [ref=e1009]: Matti saa Rajavartiolaitokselta 3 000 euron kertakorvauksen. Hän voi vähentää kertakorvauksesta hankintameno-olettaman. Se on 80 % korvauksesta eli 2 400 euroa (80 % x 3 000 euroa). Luovutusvoitoksi jää 600 euroa. Matilla ei ole verovuonna muita pääomatuloja. Luovutusvoitosta maksettava vero on 30 % eli 180 euroa (30 % x 600 euroa).
