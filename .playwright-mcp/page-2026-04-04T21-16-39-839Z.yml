              - paragraph [ref=e884]: Bertan avio-oikeuden alaiseen omaisuuteen kuuluu kesämökkikiinteistö (arvo ositushetkellä 40 000 euroa) ja henkilöauto (arvo 20 000 euroa).
              - paragraph [ref=e885]: Puolisoiden avio-oikeuden alaisen omaisuuden yhteenlaskettu säästö on 170 000 euroa (Antin omaisuus 110 000 euroa + Bertan omaisuus 60 000 euroa). Kummallakin on oikeus saada osituksessa puolet yhteenlasketusta säästöstä eli 85 000 euroa.
              - paragraph [ref=e886]: Antti suorittaa Bertalle tasinkoa 25 000 euroa luovuttamalla Bertalle 500 Yhtiö Oy:n osaketta.
