            - heading "7.2 Omistuksen määräajan laskenta" [level=3] [ref=e481]
            - paragraph [ref=e482]: Tuloverolaissa ei ole säännöstä määräaikojen laskennasta. Lakia säädettyjen määräaikain laskemisesta ei sovelleta luovutusvoittoverotuksessa. Kyseinen laki käsittelee prosessuaalisten määräaikojen laskentaa asioitaessa tuomioistuimessa tai muun viranomaisen luona. Prosessuaalisia määräaikoja ovat esimerkiksi laissa asetetut muutoshakemuksen jättöajat. Määräaikalaissa annetut ohjeet esimerkiksi pyhäpäivien vaikutuksesta määräajan laskentaan eivät siten vaikuta luovutusvoittoverotuksen määräaikojen laskentaan.
