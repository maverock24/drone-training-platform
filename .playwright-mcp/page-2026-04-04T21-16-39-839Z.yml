              - text: luvussa 3.9.6.
            - paragraph [ref=e611]:
              - strong [ref=e612]: Yhteenveto hankintamenon vähentämisestä eri tilanteissa
            - paragraph [ref=e613]: Kun vahingoittunut kiinteistö, rakennus tai muu esine myydään korjattuna tai kokonaan uusittuna, luovutusvoittoverotusta laskettaessa menetellään seuraavasti. Alla olevissa kohdissa käytetään havainnollisuuden vuoksi termiä rakennus tarkoittamaan erilaisia esineitä.
            - list [ref=e614]:
              - listitem [ref=e615]: Vahingoittuneesta rakennuksesta myyntivuonna tai viitenä sitä edeltävänä vuonna saatu korvaus lisätään luovutusvoittoa laskettaessa myyntihintaan siltä osin, kuin sitä ei ole käytetty rakennuksen korjaus- tai uudisrakennuskulujen kattamiseen.
              - listitem [ref=e616]: Rakennuksen peruskorjauksen tai täysin uuden rakennuksen rakennuskulut vähennetään hankintamenona riippumatta siitä, onko vahingosta saatu verovapaata korvausta. Näin muodostunutta hankintamenoa ei kuitenkaan vähennetä siltä osin, kuin se on vähennetty tulonhankkimistoiminnassa poistoina.
              - listitem [ref=e617]: Jos uusi rakennus on hankittu korvaamaan tuhoutunut tai vahingoittunut rakennus, vanhan rakennuksen poistamatta olevaa hankintamenoa ei vähennetä luovutusvoittoa laskettaessa. Vanhaa rakennusta ei ole luovutettu siten, että luovutusvoiton verotus tulisi kyseeseen. Rakennuksen arvon alentuminen johtaa rakennuksen jäännösarvon lisäpoistoon, joka on vähennyskelpoinen tuloverolain mukaisen tulonhankkimistoiminnan ja elinkeinotoiminnan käytössä olevasta rakennuksesta (laki elinkeinotulon verottamisesta 32 §, 40 §, 41 §). Lisäpoistoa ei kuitenkaan voida tehdä tuloverolain mukaisessa yksityiskäytössä olevasta rakennuksesta.
              - listitem [ref=e618]: Jos vahingoittunutta rakennusta ei korjata tai rakenneta uudelleen, säilyy sen poistamatta oleva hankintameno käytettäväksi luovutusvoittoverotuksessa siinäkin tapauksessa, että vahingoittunut rakennus puretaan.
              - listitem [ref=e619]: Jos rakennus on tuhoutunut ja korjattu vain osittain, menetellään tuhoutuneen suhteellisen osan kohdalla edellä kuvatulla tavalla, mutta silleen jääneen osan osuus hankintamenosta säilyy sellaisena, kuin se olisi ollut ilman vahinkoa.
