            - paragraph [ref=e351]: Kesämökin yhteenlaskettu myyntivoitto on siten 70 000 euroa (50 000 + 20 000).
            - paragraph [ref=e352]: Jos myynti koskee vain osaa esineestä, myyntihinta, hankintameno sekä hankintameno-olettamat määräytyvät vastaavien suhteellisten osuuksien mukaan.
            - generic [ref=e353]:
              - paragraph [ref=e354]: Huomio osio alkaa
