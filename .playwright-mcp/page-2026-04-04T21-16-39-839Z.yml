            - heading "11.1.5 Hankintameno ja perintö- ja lahjaverolain 55 §:n sukupolvenvaihdoshuojennus" [level=4] [ref=e822]
            - paragraph [ref=e823]: Perintö- tai lahjaverotuksessa osa verosta voidaan sukupolvenvaihdosta koskevan perintö- ja lahjaverolain 55 §:n nojalla jättää maksuunpanematta.
            - paragraph [ref=e824]: Luovutettaessa vastikkeetta saatu maatila tai muu yritys tai sellaisen osa, hankintamenona käytetään sitä huojennettua arvoa, joka sukupolvenvaihdostilanteessa on saajan vaatimuksesta perintö- ja lahjaverolain 55 §:n 2 momentin mukaisesti määritetty (TVL 47 § 1 mom.).
            - paragraph [ref=e825]: Jos sukupolvenvaihdos on ollut osittain vastikkeellinen, hankintameno määräytyy lahjaosuuteen sovelletun lahjaverotusarvon ja maksetun kauppahinnan summana. Jos vastike ylitti saantohetkellä ¾ käyvästä arvosta, verotettavaa lahjaa ei muodostunut eikä perintö ja lahjaverolain 55 §:n soveltamiselle ollut tarvetta. Tällöin hankintamenona on luovutuksessa käytetty kauppahinta.
            - paragraph [ref=e826]: Perintö- ja lahjaverotuksen mukaista huojennettua perintöverotusarvoa käytetään hankintamenona kuitenkin vain luovutuksissa, joissa perinnön tai lahjan saamisesta on kulunut enemmän kuin yksi vuosi ennen omaisuuden myyntiä edelleen (katso luku 11.1.9).
            - paragraph [ref=e827]:
              - text: Jos perintö- ja lahjaverolain mukaisen sukupolvenvaihdoshuojennuksen kohteena ollutta omaisuutta luovutetaan ennen kuin TVL 47 §:ssä todettu vuoden karenssiaika on kulunut, luovutetun omaisuuden hankintamenona pidetään lahjoittajan hankintamenoa. Hankintamenona ei siis voida käyttää omaisuuden käypää arvoa, jota on käytetty perintö- ja lahjaverolain sukupolvenvaihdoshuojennusta laskettaessa. Hankintamenon määräytymistä käsitellään ohjeessa
              - link "Sukupolvenvaihdoshuojennuksen vaikutus maatilan hankintamenoon" [ref=e828] [cursor=pointer]:
