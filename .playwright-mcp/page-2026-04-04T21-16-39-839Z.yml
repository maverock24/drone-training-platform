            - paragraph [ref=e471]: Kiinteistön omistusaikaa määritettäessä ratkaisevaa on maapohjan hankinta-aika. Siitä lasketaan myös kiinteistön kaupassa luovutettavien rakennusten hankinta-aika, vaikka rakennukset olisi rakennettu myöhemmin. Jos kiinteistö muodostuu rakennuksesta ja siirtokelpoisesta maanvuokraoikeudesta, siirtokelpoista vuokraoikeutta koskevan sopimuksen tekeminen aloittaa omistusajan. Vuokrattuna olleen maapohjan ostaminen myöhemmin omaksi ei muodosta uutta saantoa.
