            - heading "5.6.4 Syytinki" [level=4] [ref=e404]
            - paragraph [ref=e405]: Kiinteistön myyjän luovutuksen yhteydessä syytinkinä määräajaksi tai eliniäksi pidättämä asumisoikeus ei ole luovutusvoittoverotuksessa osa kauppahintaa. Kyseessä on kiinteistön käyttöä rajoittava ominaisuus, joka voidaan kirjata Maanmittaushallinnon ylläpitämään kiinteistörekisteriin rasituksena.
            - paragraph [ref=e406]: Rahana (eläke) tai muuna tavarana kuin luonnontuotteina maksettava aktiivisyytinki on kauppahintaa. Sitä ei kuitenkaan oteta huomioon myyjän luovutusvoittoa laskettaessa luovutushintana, koska mainitut kauppahinnan osat verotetaan myyjällä maksuvuosien pääomatulona TVL 37 §:n nojalla. Luonnontuotteina (ruoka) maksettava aktiivisyytinki on luovutusvoittoa laskettaessa osa myyjän saamaa luovutushintaa, koska sitä ei veroteta saantivuosinaan pääomatulona.
            - paragraph [ref=e407]: Ostajalla saantoa pidetään vastikkeellisena myös siltä osin kuin luovutuksen yhteydessä sovittu aktiivisyytinki on myyjällä erikseen verotettavaa vuosittaista pääomatuloa. Aktiivisyytingin luovutushetken mukaan pääomitetut arvot otetaan huomioon ostetun hyödykkeen hankintamenona. Aktiivisyytinki ei ole ostajalle vuosittain vähennyskelpoista menoa.
