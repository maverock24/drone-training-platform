            - heading "8.8 Rakennuksen purkamisen vaikutus kiinteistön luovutusvoiton verotukseen" [level=3] [ref=e650]
            - paragraph [ref=e651]: Kiinteistön hankintameno muodostuu tontin hankintamenon lisäksi rakennuksen hankintamenosta ja perusparannusmenoista. Kun tontilta on purettu rakennukset ja kiinteistö tai sen osa myydään rakentamattomana, puretun rakennuksen hankintameno-osuus ja purkukustannukset luetaan hankintamenoon, kuten edellisessä alaluvussa todettiin. Kun luovutuksen kohteena on osa maapohjasta, hankintameno jyvitetään myydylle osalle pääsääntöisesti pinta-alojen suhteessa.
            - paragraph [ref=e652]: Rakennuksen purkukustannuksia voidaan pitää voiton hankkimisesta aiheutuneina menoina, jos tontilla kaupanteon ajankohtana olevat rakennukset sovitaan purettaviksi myyjän kustannuksella. Tällöin purkukustannukset kohdistetaan sen tontin osan luovutukseen, jolla rakennukset ovat sijainneet.
            - heading "8.9 Omaisuuden hankkimisesta aiheutuneet velan korot" [level=3] [ref=e653]
            - paragraph [ref=e654]:
              - text: Omaisuuden hankkimisesta aiheutuneiden velkojen korkoja ei lueta hankintamenoon (esimerkiksi
              - link "KHO 1977-B-II-568" [ref=e655] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1977/197701682
              - text: ).
            - paragraph [ref=e656]: Kauppakirjassa saatetaan sopia, että ostajan vastattavaksi siirtyy koroksi nimettyjä eriä, joiden maksuperuste on syntynyt jo myyjän omistusaikana. Tällaisia suorituksia voi sisältyä kauppaan esimerkiksi luovutettaessa valmistumassa olevaa uudisasuntoa edelleen jo ennen sen valmistumista. Nämä suoritukset ovat luonteeltaan osa kauppahintaa ja ne luetaan ostajalla omaisuuden hankintamenoon.
            - paragraph [ref=e657]:
              - text: Vastaavasti hyvityskorko, jonka ostaja sai maksaessaan asunto-osakkeiden kauppahintaa rakennusaikana ennen eräpäiviä, on oikeuskäytännössä katsottu kauppahinnan alennukseksi (
              - link "KHO 1994-B-525" [ref=e658] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1994/199400823
              - text: ).
            - heading "8.10 Korkohyvitys ja jälkimarkkinahyvitys" [level=3] [ref=e659]
            - paragraph [ref=e660]:
              - text: Luovutusvoittoa laskettaessa ei oteta huomioon korkona pidettävää suoritusta (
              - link "KHO 1986-B-II-560" [ref=e661] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1986/198605698
              - text: ).
            - paragraph [ref=e662]: Joukkovelkakirjan luovutuksen yhteydessä saatu jälkimarkkinahyvitys on saajalle veronalaista pääomatuloa ja maksajalle TVL 54 a §:n nojalla pääomatuloista vähennettävä meno.
            - paragraph [ref=e663]: Osakesidonnaisen joukkovelkakirjalainan luovutus juoksuajan kuluessa käsitellään luovutusvoittoa koskevien säännösten mukaisesti, jos indeksihyvitykseen rinnastuva tuotto maksetaan lunastushintaan sisältyvänä lainan takaisinmaksun yhteydessä. Laskennallista tuottoa vastaavaa osuutta ei luovutuksen yhteydessä eroteta jälkimarkkinahyvitykseksi (KVL 87/2003).
            - paragraph [ref=e664]:
              - text: Kuten edellä esitetystä ilmenee, joukkovelkakirjojen luovutuksissa on erotettava toisistaan pääoma-arvo, korko-osuus ja jälkimarkkinahyvitys. Joukkovelkakirjalainojen verotuksesta on lisää tietoa Verohallinnon ohjeessa
              - link "Joukkovelkakirjalainojen verotuksesta tuloverolain mukaan" [ref=e665] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48339/
              - text: .
            - heading "8.11 Kurssivoitto tai -tappio luovutusvoiton laskennassa" [level=3] [ref=e666]
            - paragraph [ref=e667]:
              - text: Valuuttakurssivoittojen ja -tappioiden käsittely luovutusvoiton verotuksen yhteydessä on ollut esillä päätöksessä
              - link "KHO 1997:25" [ref=e668] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1997/199700735
              - text: . Siinä ratkaistiin, miten ulkomaan valuutalla hankitun sijoituskohteen hankintameno määräytyy ja syntyykö sijoituskohteen myynnissä luovutusvoiton tai -tappion lisäksi erillistä kurssivoittoa tai -tappiota. Korkein hallinto-oikeus katsoi, että hankintamenoa laskettaessa käytetään kyseisen valuutan kurssia sijoituskohteen hankintahetkellä. Erillistä kurssivoittoa tai -tappiota ei luovutuksessa katsottu syntyvän.
            - paragraph [ref=e669]: Vieraan valuutan määräisenä maksettava kauppahinta muutetaan euromääräiseksi kauppapäivän kurssin mukaan. Kauppapäivän jälkeen maksamatta olevan kauppahintasaatavan kurssimuutokset eivät vaikuta myyjän luovutusvoiton laskentaan eivätkä ostajan hankintamenon määräytymiseen. Kauppapäivän jälkeiset kauppahintasaatavan muutoksista seuraava valuuttakurssivoitto tai -tappio syntyy, kun vieras valuutta vaihdetaan euroihin. Tällaiset valuuttakurssin nousut ja laskut ilmoitetaan ja käsitellään muuna pääomatulona tai vähennyskelvottomina menetyksinä riippuen siitä, onko kyse velallisen vai velkojan verotuksesta.
            - heading "9 Voiton hankkimisesta aiheutuneet menot (myyntikulut)" [level=2] [ref=e670]
            - paragraph [ref=e671]: Luovutushinnasta saadaan TVL 46 §:n 1 momentin mukaan vähentää todellisen hankintamenon poistamatta olevan osan lisäksi voiton hankkimisesta aiheutuneet menot. Todellisena hankintamenolla tarkoitetaan tässä yhteydessä myös perintö- ja lahjaverotuksessa käytettyä verotusarvoa.
            - paragraph [ref=e672]: "Voiton hankkimisesta aiheutuneet menot ovat sellaisia omaisuuden luovutuksen ja sen valmistelun kustannuksia, joista myyjä on vastannut. Voiton hankkimisesta aiheutuneita menoja ovat esimerkiksi myyjän suorittamat:"
            - list [ref=e673]:
              - listitem [ref=e674]: myynnin välityspalkkio
              - listitem [ref=e675]: myyntiä varten tehdyn kuntotarkastuksen ja omaisuuden arvioinnin kulut
              - listitem [ref=e676]: kauppakirjan laatimispalkkio
              - listitem [ref=e677]: myyntiä varten tarvittavien asiakirjojen hankinnan kulut (isännöitsijäntodistus, lainhuutotodistus, rasitustodistus)
              - listitem [ref=e678]: myynti-ilmoitusten ja esittelyiden menot
              - listitem [ref=e679]: omaisuuden myyntikuntoon saattamisen korjausmenot
              - listitem [ref=e680]: myyntiajalta tai myyntiä varten suoritetun korjauksen ajalta tyhjillään olleen osakehuoneiston hoitovastikkeet.
            - paragraph [ref=e681]:
              - text: Ratkaisukäytännössään korkein hallinto-oikeus on johdonmukaisesti hyväksynyt lainoista aiheutuvien oheiskulujen vähentämisen tulonhankkimismenoina, jos laina on kohdentunut tulonhankkimistoimintaan (näin mm.
              - link "KHO 13.5.1991 taltio 1603" [ref=e682] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1991/199101603
              - text: ","
              - link "KHO 1991-A-536" [ref=e683] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1991/199100287
              - text: ","
              - link "KHO 18.3.1992 taltio 998" [ref=e684] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1992/199200998
              - text: ja
              - link "KHO 1992-B-517" [ref=e685] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1992/199202985
              - text: ).
            - paragraph [ref=e686]: Myös omaisuuden hankintaan kohdentuvien lainojen muut kulut voivat olla vähennettävissä oikeuskäytännön mukaisesti ainoastaan tulonhankkimismenoina. Niitä ei hyväksytä omaisuuden hankintamenoksi luovutusvoittoverotusta laskettaessa. Omaisuuden hankintaan otetun lainan lisävakuudesta maksettu korvaus ei ole voiton hankkimisesta johtunut kustannus (KHO 2025:68).
            - paragraph [ref=e687]:
              - strong [ref=e688]: Oikeudenkäyntikulut luovutusvoittoverotuksessa
            - paragraph [ref=e689]: Jos oikeudenkäyntikulut liittyvät veronalaisen luovutusvoiton hankintaan, ne vähennetään myyjällä luovutusvoiton hankkimisesta aiheutuneina kuluina. Niitä ei siten vähennetä TVL 54 §:n 1 momentin mukaisina yleisinä tulonhankkimismenoina.
            - paragraph [ref=e690]: Jos kauppaan kohdistuu oikeudenkäynti, jossa annetun lainvoimaisen tuomion perusteella kauppa puretaan, ei myyjälle muodostu luovutusvoittoa, josta oikeudenkäyntikulut voisi vähentää. Tällöin oikeudenkäyntikulut lisätään kaupan purun kohteena olleen omaisuuden hankintamenoon ja kulut tulevat vähennettäväksi tulevaisuudessa kyseisen omaisuuden luovutuksen yhteydessä (oikeuskäytännössä näin on tulkittu esimerkiksi julkaisemattomassa päätöksessä KHO 18.6.2015 taltio 1747)
            - paragraph [ref=e691]: Jos oikeudenkäynti liittyy ostajan kannalta omaisuuden hankintaan, oikeudenkäyntikulut lisätään osaksi ostajan hankkiman omaisuuden hankintamenoa. Jos kauppa puretaan, ostajan maksamia oikeudenkäyntikuluja ei voida huomioida kaupan kohteen hankintamenon lisäyksinä. Näissäkään tilanteissa verovelvollisella ei ole oikeutta vähentää oikeudenkäyntikuluja TVL 54 §:n 1 momentin mukaisina tulonhankkimismenoina.
            - paragraph [ref=e692]: Tulonhankkimistoimintaa harjoittavan ostajan maksamat, tuohon toimintaan tarkoitetun omaisuuden hankintaan liittyvät oikeudenkäyntikulut voivat kuitenkin olla tulonhankkimismenona vähennyskelpoisia, jos kyseisen omaisuuden kauppa on purkautunut.
            - paragraph [ref=e693]:
              - text: Oikeudenkäyntikulujen käsittelystä verotuksessa on kerrottu lisää ohjeessa
              - link "Sakkojen, oikeudenkäyntikulujen sekä välimies- ja sovittelumenettelyn kulujen vähentäminen henkilöverotuksessa" [ref=e694] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/87000/
              - text: .
            - heading "10 Hankintameno-olettama" [level=2] [ref=e695]
            - paragraph [ref=e696]: Luovutusvoittoa laskettaessa voidaan todellisen, poistamattoman hankintamenon ja voiton hankkimisesta aiheutuneiden menojen sijasta käyttää niin sanottua hankintameno-olettamaa. Hankintameno olettamaa voidaan käyttää, jos omaisuuden luovuttajana on luonnollinen henkilö, kotimainen kuolinpesä tai yhteisetuus ja jos luovutusvoitto verotetaan tuloverolain mukaan.
            - paragraph [ref=e697]: Hankintameno-olettama lasketaan aina omaisuuden luovutushinnasta, eikä hankintameno-olettaman lisäksi siis saa vähentää omaisuuden hankintamenoa tai voiton hankkimisesta olleita menoja.
            - paragraph [ref=e698]: Hankintameno-olettamaa voidaan aina käyttää riippumatta siitä, miten luovutettu omaisuus on aikanaan saatu. Myös vastikkeettomasti saadun omaisuuden luovutusvoittoa laskettaessa voidaan käyttää hankintameno-olettamaa.
            - paragraph [ref=e699]: Hankintameno-olettaman määrä riippuu luovutettavan omaisuuden luovutushinnasta ja siitä, kuinka pitkään luovuttaja on omistanut luovuttamansa omaisuuden. Verovelvollisen saamasta luovutushinnasta hankintameno-olettamana vähennettävä määrä on aina vähintään 20 prosenttia luovutushinnasta. Jos luovutettu omaisuus on ollut luovuttajalla vähintään 10 vuoden ajan, vähennettävä määrä on kuitenkin vähintään 40 prosenttia luovutushinnasta (TVL 46 §:n 1 momentti).
            - paragraph [ref=e700]:
              - text: Hankintameno-olettamana käytetään 80 prosenttia, kun kiinteää omaisuutta pakkolunastetaan, myydään valtiolle, maakunnalle, kunnalle tai kuntayhtymälle (TVL 49 §). Ks. myös Verohallinnon ohje
              - link "Kokonaan tai osittain verovapaat luovutusvoitot henkilöverotuksessa" [ref=e701] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48930/
              - text: "- luku 4.3."
            - paragraph [ref=e702]: Vastikkeellisesti saadun omaisuuden omistusaika lasketaan pääsääntöisesti sitovan lopullisen osto- tai muun hankintasopimuksen tekemisestä luovutussopimuksen tekemiseen. Omistusajan laskemiseen liittyviä seikkoja selvitetään tarkemmin kohdassa 7 Luovutetun omaisuuden omistusajan merkitys.
            - paragraph [ref=e703]: Luovutusvoiton määrää laskettaessa käytetään hankintameno-olettamaa, jos se on suurempi kuin todellisen, poistamattoman hankintamenon ja voiton hankkimisesta olleiden menojen yhteismäärä.
            - generic [ref=e704]:
              - paragraph [ref=e705]: Huomio osio alkaa
              - paragraph [ref=e706]:
                - strong [ref=e707]: "Esimerkki 17:"
              - paragraph [ref=e708]: Antti osti kesämökkikiinteistön vuonna 2012. Kiinteistön ostohinta oli 30 000 euroa ja varainsiirtovero 1 200 euroa. Kiinteistön hankintameno on siten 31 200 euroa.
              - paragraph [ref=e709]: Antti myi kesämökkikiinteistön 120 000 eurolla vuonna 2023. Hän maksoi myynnistä välityspalkkiota kiinteistönvälittäjälle 4 800 euroa.
              - paragraph [ref=e710]: Kiinteistön hankintameno ja voiton hankkimisesta olleet menot ovat yhteensä 36 000 euroa. Hankintameno-olettama on 40 % prosentin mukaan laskettuna 48 000 euroa (120 000 euroa x 40 % = 48 000 euroa). Luovutusvoitto lasketaan vähentämällä luovutushinnasta todellista hankintamenoa suurempi hankintameno-olettama, jolloin luovutusvoittoa syntyy 72 000 euroa (120 000 euroa - 48 000 euroa = 72 000 euroa).
              - paragraph [ref=e711]: Jos Antti olisi hankkinut kesämökkikiinteistön vasta vuonna 2014 ja myynyt sen vuonna 2023 eli omistettuaan sen alle 10 vuoden ajan, hankintameno-olettama olisi ollut 20 prosenttia luovutushinnasta eli 24 000 euroa. Luovutusvoittoa laskettaessa olisi tällöin vähennetty hankintameno-olettaman sijasta suurempi todellisen hankintamenon ja voiton hankkimisesta johtuneiden menojen yhteismäärä 36 000 euroa. Luovutusvoittoa olisi tällöin syntynyt 84 000 euroa (120 000 euroa – 36 000 euroa = 84 000 euroa).
              - paragraph [ref=e712]: Huomio osio päättyy
            - paragraph [ref=e713]: Hankintameno-olettamaa voidaan käyttää myös silloin, kun todellista hankintamenoa ei ole mahdollista selvittää, eikä todellisen hankintamenon määrää voida myöskään luotettavasti arvioida.
            - paragraph [ref=e714]:
              - text: Oikeuskäytännössä on hyväksytty todellisen hankintamenon käyttäminen, vaikka sen määrä on täsmällisen selvityksen puuttuessa jouduttu arvioimaan, kun on luotettavasti selvitetty, että todellinen hankintameno on ollut hankintameno-olettamaa suurempi (
              - link "KHO 1989-B-532" [ref=e715] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1989/198902515
              - text: ). Jos verovelvollinen pystyy selvittämään, että hankintamenon poistamatta oleva osa ja voiton hankkimisesta aiheutuneet menot ovat suuremmat kuin hankintameno-olettama, käytetään selvitettyä todellista määrää.
            - paragraph [ref=e716]:
              - text: Termiinisopimuksesta saatua voittoa laskettaessa ei vähennetä hankintameno-olettamaa. Hankintameno-olettamaa ei myöskään käytetä kapitalisaatiosopimuksen luovutuksen verotuksessa (TVL 4 § 7 momentti) eikä jaettaessa varoja vapaan oman pääoman rahastosta (TVL 45a § ja 46a §). Lisää tietoa näiden verottamisesta on Verohallinnon ohjeissa
              - link "Johdannaisten verotus" [ref=e717] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48914/
              - text: ","
              - link "Kapitalisaatiosopimuksen verotus" [ref=e718] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48548/
              - text: ja
              - link "Vapaan oman pääoman rahaston varojenjako verotuksessa" [ref=e719] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60520/
              - text: .
            - heading "11 Vastikkeettomat ja alihintaiset saannot" [level=2] [ref=e720]
            - heading "11.1 Perintönä, testamentilla tai lahjana saadun omaisuuden luovutusvoiton verotus" [level=3] [ref=e721]
            - paragraph [ref=e722]:
              - text: Perintönä ja testamentilla saadun omaisuuden omistusaika lasketaan perittävän kuolemasta. Perinnönjaolla, testamentin tiedoksiannolla yms. toimenpiteillä ei ole merkitystä omistusaikaa määritettäessä (mm.
              - link "KHO 1990-B-536" [ref=e723] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1990/199002795
              - text: ", katso myös ohje"
              - link "Kuolinpesän omaisuuden luovutuksen verotus" [ref=e724] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48076/
              - text: ). Ohjeen alaluvussa 11.1.4 käsitellään tilanteita, joissa perinnönjaon yhteydessä toteutetaan omaisuuden luovutuksia.
            - paragraph [ref=e725]: Lahjana saadun omaisuuden omistusaika alkaa lahjan saamisesta haltuun. Tämä on käytännössä useimmiten lahjakirjan allekirjoituspäivä.
            - paragraph [ref=e726]: Luovutusvoittoa laskettaessa vastikkeetta saadun omaisuuden hankintamenoksi katsotaan perintö- ja lahjaverotuksessa käytetty verotusarvo (TVL 47 § 1 momentti).
            - paragraph [ref=e727]:
              - text: Oikeuskäytännön (
              - link "KHO 2000:59" [ref=e728] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2000/200002921
              - text: ) mukaan lahjaverotusarvo voidaan vähentää vain, jos lahjaverotus on toimitettu. Edellytyksenä ei kuitenkaan ole, että lahjasta olisi määrätty maksettavaksi veroa. Verovelvollinen voi vaatia luovutusvoiton verotusta oikaistavaksi, jos perintö- tai lahjaverotus toimitetaan vasta tuloverotuksen päätyttyä.
            - paragraph [ref=e729]: Vaikka lahjaverotusta ei ole toimitettu, saadun omaisuuden lahjaverotusarvo voi kuitenkin olla selvä ja riidaton esimerkiksi, jos lahjaksi on saatu julkisesti noteerattuja arvopapereita. Jos Suomen lahjaverotuksessa veronalaisen lahjan arvo on alle laissa määrätyn 7 500 euron rajan, jolloin lahjaveroa ei tule maksettavaksi, ei ole tarkoituksenmukaista edellyttää lahjaveroilmoituksen antamista ja verotuksen toimittamista vain luovutusvoiton verotusta varten. Luovutusvoittoverotuksessa omaisuuden vähennyskelpoiseksi hankintamenoksi voidaan näissä selvissä tapauksissa hyväksyä se arvo, joka lahjaverotuksessa olisi tullut määrättäväksi.
            - paragraph [ref=e730]: Perintö- tai lahjaverotuksessa käytetty verotusarvo rinnastetaan todelliseen hankintamenoon. Tämän takia luovutushinnasta vähennetään perintö- tai lahjaverotuksen verotusarvo ja voiton hankkimisesta olleiden menojen yhteismäärä tai näiden vaihtoehtona niitä suurempi hankintameno-olettama. Hankintamenoon voidaan lukea myös verotuksessa poistamatta oleva osa verovelvollisen suorittamista lahjana tai perintönä saaman omaisuuden perusparannusmenoista. Hallintaoikeuden jääminen muulle taholle kuin omaisuuden perintönä tai lahjana saaneelle henkilölle vaikuttaa omaisuuden hankintamenon määräytymiseen. Tätä asiaa käsitellään luvussa 11.1.7.
            - paragraph [ref=e731]:
              - text: Vastikkeettomasti saadun omaisuuden hankintamenoon lisättäviä omaisuuden hankinnasta välittömästi johtuvia kuluja voivat olla omaisuuden käyttökuntoon saattamisesta aiheutuneet menot. Perintö- tai lahjaveroa ei TVL 47 §:n 1 momentin sanamuodon mukaan voida lukea hyödykkeen hankintamenoon. Pesänselvitykseen, perinnönjakoon ja ositukseen liittyvät kulut eivät myöskään ole luovutusvoiton verotuksessa vähennyskelpoisia, sillä tällaiset kulut ovat verotuksessa vähennyskelvottomia elantomenoja (
              - link "KHO 16.11.1999 taltio 3072" [ref=e732] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1999/199903072
              - text: ).
            - paragraph [ref=e733]: Jakamaton kuolinpesä on voinut hankkia omaisuutta kuolinpesään kuuluvilla varoilla perinnönjättäjän kuolinhetken jälkeen. Tällöin omaisuus on saatu vastikkeellisesti ja omaisuuden hankintameno on hankinnan yhteydessä maksettu vastike ja saantoaikana on ostohetki. Kuolinpesässä voi siten olla sekä vastikkeettomasti ja vastikkeellisesti saatua omaisuutta.
            - paragraph [ref=e734]:
              - text: Osittain vastikkeettomia saantoja ovat sellaiset alihintaan tapahtuneet kaupat, joissa omaisuus katsotaan saaduksi osittain lahjana (katso luku 12.1). Osakkeiden saantoa on pidetty osittain vastikkeettomana myös, jos verovelvollinen on saanut merkintäoikeudet lahjana, mutta maksanut merkintähinnan itse (
              - link "KHO 9.3.1984 taltio 924" [ref=e735] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1984/198400924
              - text: ).
            - heading "11.1.1 Omaisuuden luovutuksen verotus, kun omaisuus on saatu ulkomailla perintönä tai lahjana" [level=4] [ref=e736]
            - paragraph [ref=e737]: Jos perintö tai lahja on verotettu muussa maassa kuin Suomessa, on asiakkaan selvitettävä omaisuuden luovutuksen yhteydessä, mitä arvoa luovutetun omaisuuden perintö- tai lahjaverotuksessa verotuksessa on kyseisessä maassa käytetty. Tätä käytettyä arvoa voidaan käyttää Suomen luovutusvoittoverotuksessa hankintamenona.
            - paragraph [ref=e738]:
              - text: Päätöksessä
              - link "KHO 2021:120" [ref=e739] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2021/202102982h
              - text: ratkaistiin, millä tavoin perityn omaisuuden hankintameno määräytyy, kun perintöä tai lahjaa ei ollut verotettu toisessa maassa eikä myöskään Suomessa. Päätöksen mukaan hankintamenona käytetään perintönä saadun omaisuuden saantohetken käypää arvoa riippumatta siitä, että veroa ei ollut määrätty missään maassa.
            - paragraph [ref=e740]:
              - strong [ref=e741]: KHO 2021:120
            - paragraph [ref=e742]: A oli saanut yhdysvaltaiselta perinnönjättäjältä testamentin nojalla pörssiosakkeita. Osakkeista ei ollut Yhdysvaltojen lainsäädännön mukaan maksettava sinne perintöveroa eikä A ollut antanut Yhdysvaltoihin perintöveroilmoitusta. Perintöveroa ei ollut maksettava myöskään Suomeen Suomen Tasavallan ja Amerikan Yhdysvaltain välillä jäämistön ja perinnön kaksinkertaisen verotuksen ehkäisemiseksi ja veron kiertämisen estämiseksi tehdyn sopimuksen vuoksi. A oli antanut saannostaan Verohallinnolle veroilmoituksen, jossa hän oli ilmoittanut testamentilla saamiensa osakkeiden arvoksi 683 827,21 euroa. Verohallinto oli vahvistanut A:n testamentilla saamien osakkeiden käyväksi arvoksi nolla euroa päätöksen perustelujen mukaan sen vuoksi, että osakkeista ei ollut maksettava Suomeen perintöveroa. A:n tarkoituksena oli luovuttaa testamentilla saamansa osakkeet.
            - paragraph [ref=e743]: Korkein hallinto-oikeus katsoi, että A:n myydessä mainitut osakkeet luovutusvoiton verotuksessa osakkeiden tuloverolain 47 §:n 1 momentissa tarkoitettuna hankintamenona voitiin pitää niiden saantohetken todellista käypää arvoa siitä huolimatta, että saannosta ei ollut maksettava perintöveroa Suomeen. Keskusverolautakunnan päätös, jonka mukaan osakkeiden hankintamenona voitiin vähentää tuloverolain 46 §:n 1 momentissa tarkoitettu hankintameno-olettama, kumottiin.
            - paragraph [ref=e744]: "Jos ulkomailla saatua lahjaa tai perintöä ei ole lahja- tai perintöverotettu Suomessa tai muussa maassa, saadun omaisuuden saantohetken käypä arvo hyväksytään hankintamenoksi tuloverolain mukaisessa luovutusvoittoverotuksessa seuraavin edellytyksin:"
            - list [ref=e745]:
              - listitem [ref=e746]: Perinnön tai lahjan on oltava jossakin tapaukseen liittyvässä maassa veronalainen. Tämä tarkoittaa, että jossakin asiaan liittyvässä valtiossa on olemassa perintö- tai lahjaverolaki, ja kyseinen omaisuuslaji ja perintö- tai lahjatapahtuma on sen piirissä.
              - listitem [ref=e747]: Sillä ei ole merkitystä, että veroa ei tosiasiallisesti makseta toisessa valtiossa siellä noudatettavan veroasteikkorajan tai muun lakiin sisältyvän tapauskohtaisen huojennuksen takia. Silläkään ei ole merkitystä, onko perintö- tai lahja sikäläisten säännösten mukaan ilmoitusvelvollisuuden piirissä toisessa valtiossa. Sen sijaan perityn tai lahjana saadun omaisuuden jääminen kokonaan toisen valtion verotuspohjan ulkopuolelle estää hankintamenon määräytymisen saantohetken käyvän arvon mukaan.
              - listitem [ref=e748]: Asiakkaan on esitettävä luovutusvoittoverotuksen yhteydessä selvitys perinnön tai lahjan veronalaisuudesta ja mahdollisesta verotuksesta toisessa maassa samalla tavoin kuin esitetään tieto Suomessa omaisuudesta suoritetusta perintö- tai lahjaverotuksesta silloin, kun se on toimitettu. Asiakkaan on esitettävä myös selvitys omaisuuden saantohetken käyvästä arvosta, ellei konkreettista verotusta ole toisessa maassa tehty. Verohallinto arvioi selvityksen ja muun tiedon perusteella, voidaanko esitetty käypä arvo hyväksyä. Vaihtoehtoisena hankintamenona käytetään hankintameno-olettamaa joko silloin, kun käypää arvoa ei esitetä tai se on pienempi kuin hankintameno-olettaman määrä.
              - listitem [ref=e749]: Perinnön saantohetki määräytyy samoin periaattein kuin yleensäkin. Perinnön jättäjän kuolinhetki määrää pääsääntöisesti perinnön saantohetken eikä sillä ole merkitystä, millä hetkellä omaisuus konkreettisesti siirtyy perijän hallintaan.
            - heading "11.1.2 Perilliset myyvät perintöön kuuluvaa omaisuutta kummankin vanhemman kuoleman jälkeen" [level=4] [ref=e750]
            - paragraph [ref=e751]: Perintönä tai testamentilla saadun omaisuuden hankintameno on kyseiselle omaisuudelle vahvistettu perintöverotusarvo riippumatta siitä, luovuttaako omaisuuden jakamaton kuolinpesä, legaatinsaaja tai omaisuuden perinnönjaossa saanut perillinen. Hankintamenona käytettävä perintöverotusarvo määräytyy perinnönjättäjän kuolinhetken mukaan. Tämän vuoksi jäämistöosituksessa tai perinnönjaossa käytettyä omaisuuden jakohetken arvoa ei voida vähentää perintönä saadun omaisuuden hankintamenona. Seuraavassa tarkastellaan perintönä saadun omaisuuden myyntiä eri tilanteissa.
            - paragraph [ref=e752]: Omistus voi koostua eri aikaan saaduista osista, kun omaisuus on peritty molemmilta vanhemmilta (vertaa luku 5.4). Vaikka perintö olisikin saatu yksin toiselta vanhemmalta, luovutusvoiton verotuksessa on otettava huomioon avio-oikeuden vaikutus hankintamenona käytettävän perintöveroarvon määräytymiseen ja omistusajan alkamishetkeen. Lopputuloksen määräytymiseen vaikuttaa, onko ositus tai sekä ositus että perinnönjako toimitettu ennen omaisuuden myyntiä.
            - paragraph [ref=e753]:
              - text: Jos omaisuus luovutetaan ennen perinnönjakoa, luovutusvoitto luetaan omaisuuden omistaneen tai sen osituksessa saaneen puolison jakamattoman kuolinpesän tuloksi, joten mahdollinen vero määrätään kuolinpesälle eikä osakkaille. Näitä tilanteita on käsitelty ohjeessa
              - link "Kuolinpesän omaisuuden luovutuksen verotus" [ref=e754] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48076/
              - text: .
            - paragraph [ref=e755]: Jos perillinen luovuttaa omaisuuden sen jälkeen, kun hän on saanut sen perinnönjaossa, luovutusvoitto luetaan verotuksessa hänen tulokseen. Hankintameno ja saantoajankohta määräytyvät alla olevien vaihtoehtojen mukaan.
            - list [ref=e756]:
              - listitem [ref=e757]:
                - strong [ref=e758]: Ainoa perillinen myy omaisuutta
            - paragraph [ref=e759]:
              - text: Jos myyjänä on vanhempiensa yhteinen ja ainoa perillinen, verotetaan luovutus päätöksessä
              - link "KHO 2007:21" [ref=e760] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2007/200700822
              - text: kuvatulla tavalla.
            - paragraph [ref=e761]: Puolisoiden välillä on avio-oikeus. Ositusta ja perinnönjakoa ei ollut toimitettu, koska pesissä oli vain yksi perillinen. Vaikka kiinteistön oli omistanut vain toinen vanhemmista, hankintamenona käytetty perintöverotusarvo määräytyi puoliksi kummankin vanhemman perintöverotuksesta ja omistusaika puoliosuuksittain kummankin vanhemman kuolinhetkestä. Omistusaika ja hankintameno lasketaan samalla tavoin riippumatta siitä, kumpi puolisoista (omaisuuden omistanut puoliso vai toinen puoliso) on kuollut ensin. Silläkään ei päätöksen mukaan ole merkitystä, kumman omistuksessa kiinteistö on tai onko kiinteistö ollut heidän yhteisessä omistuksessaan.
            - paragraph [ref=e762]:
              - strong [ref=e763]: KHO 2007:21
            - paragraph [ref=e764]: A:n isä oli kuollut vuonna 1978 ja äiti vuonna 2001. Äidillä oli yksin ollut lainhuuto kiinteistöön. Isällä ja äidillä oli ollut avio-oikeus toistensa omaisuuteen. Puolisoiden välillä ei ollut toimitettu ositusta. A oli myynyt mainitun kiinteistön vuonna 2004. Luettaessa kiinteistön myynnistä saatu luovutusvoitto A:n tuloksi hankintamenona kiinteistön toisen puolikkaan osalta oli - kun otettiin huomioon, että A:n isä oli kuollut vuonna 1978 - pidettävä 50 prosenttia tämän puolikkaan luovutushinnasta eikä sitä alempaa isän jälkeen toimitetussa perintöverotuksessa vahvistettua arvoa.
            - paragraph [ref=e765]: Kummankin puolikkaan hankintameno määritetään erikseen siten, että puolikkaalle vahvistettua perintöverotusarvoa verrataan puolikkaalle kohdistuvasta luovutushinnasta laskettavaan hankintameno-olettamaan ja hankintamenoksi katsotaan näistä määristä suurempi.
            - paragraph [ref=e766]: Hankintameno-olettaman suuruus määräytyy kumpaisenkin puolikkaan osalta erikseen kyseisen puolison kuolinhetken mukaan. Näin saadut hankintamenot kumpaisellekin puolikkaalle lasketaan yhteen ja yhteenlaskettu määrä vähennetään omaisuuden luovutushinnasta.
            - list [ref=e767]:
              - listitem [ref=e768]:
                - strong [ref=e769]: Yksilöidyn osituksen jälkeisessä perinnönjaossa omaisuutta saanut perillinen myy saamaansa omaisuutta
            - paragraph [ref=e770]: Kun kuolinpesässä tai -pesissä on useita perillisiä ja toimitetussa perinnönjaossa omaisuuden saanut yksittäinen perillinen myy perimäänsä omaisuutta, menetellään seuraavasti.
            - paragraph [ref=e771]: Perinnönjakoa edeltää puolisoiden kuolinpesien kesken tehtävä avioliittolain puolittamisperiaatteen mukainen ositus. Siinä kummankin kuolinpesän varallisuudeksi ositetaan puolet pesien yhteenlasketusta avio-oikeuden alaisesta säästöstä, jossa on huomioitu myös aikaisemmat osittaiset ositukset, ennakkoperinnöt ja muut avioliittolain mukaisessa osituksessa huomioon otettavat seikat.
            - paragraph [ref=e772]: Kun vanhempien kuolinpesissä on toimitettu ositus, jonka kulku ja lopputulos on asiakirjasta selkeästi nähtävissä, kunkin esineen hankintameno määräytyy yksin sen vanhemman kuolinpesän perintöveroarvon mukaan, missä kyseinen esine on osituksen jälkeen ennen perinnönjakoa ja omistusajan alkuhetki määräytyy saman vanhemman kuolinhetken mukaan.
            - paragraph [ref=e773]: Jos esine on jäänyt osituksessa kuolinpesien yhteisomistukseen, omistusaika ja perintöveroarvo määräytyvät osituksen jälkeisiä omistusosuuksia vastaavin suhteellisin osin kummankin perinnön jättäjän kuolinhetkestä ja kummankin kuolinpesän perintöveroarvoista.
            - list [ref=e774]:
              - listitem [ref=e775]:
                - strong [ref=e776]: Yksilöimättömän osituksen jälkeisessä perinnönjaossa omaisuuden saanut perillinen myy saamaansa omaisuutta
            - paragraph [ref=e777]: Perilliset tekevät usein yhdellä asiakirjalla molempien vanhempiensa kuolinpesien välisen osituksen sekä perinnönjaon. Tällöin ositus- ja jakokirjassa luetellaan kummankin puolison perinnönajon kohteena oleva omaisuus. Jos puolisoiden välillä oli avio-oikeus (ei ole laadittu avio-oikeuden poissulkevaa avioehtoa) ja perilliset ovat kummankin puolison yhteisiä eikä testamenttia ole laadittu, jako toimitetaan usein vain toteamalla, kuka perillisistä saa puolisoiden pesistä tietyt mainitut omaisuuserät. Ositusta ei siis kirjata näkyville erillisenä omaisuuserittäin tehtynä välivaiheena.
            - paragraph [ref=e778]: Asiakirjalla saatetaan loppuun perillisten perintöoikeus molempien vanhempien jälkeen. Se on puolittamisperiaatteen ja päätöksessä KHO 2007:21 noudatetun ratkaisuperusteen mukaisesti muodostunut puoliksi molemmilta vanhemmilta, joiden jälkeisissä perintöverotuksissa omaisuus on myös puolesta määrin verotettu. Siten perillisen perinnönjaossa saaman esineen omistusajan alkuhetki ja hankintamenona käytettävä perintöverotusarvo määräytyvät puoliksi kummankin vanhemman perintöverotuksessa käytetyn kyseisen esineen perintöverotusarvon mukaan. Laskenta tehdään siten samalla tavoin kuin korkeimman hallinto-oikeuden päätöksessä KHO 2007:21.
            - heading "11.1.3 Perintöverotuksen oikaisun vaikutus perityn omaisuuden hankintamenoon" [level=4] [ref=e779]
            - paragraph [ref=e780]: Jos perintöverotusta on osakkaan oikaisuvaatimuksen perusteella tai viranomaisen aloitteesta tapahtuvalla veronoikaisulla korotettu tai alennettu, muutettua omaisuuseräkohtaista perintöverotusarvoa käytetään alla kuvatulla tavalla.
            - list [ref=e781]:
              - listitem [ref=e782]:
                - strong [ref=e783]: Perillinen myyjänä
            - paragraph [ref=e784]: Kun myyjänä on omaisuuden perinnönjaossa saanut perillinen, luovutusvoiton laskennassa käytetään saadun omaisuuserän tai omaisuuserän osuuden oikaistua perintöverotusarvoa. Oikaisun tulee olla tehty hänen omassa verotuksessaan, joten toisen osakkaan perintöverotuksessa tehdyt oikaistut arvostukset eivät siirry osakkaalle, jonka verotus on syystä tai toisesta jäänyt alkuperäisen perintöveropäätöksen mukaiseksi.
            - generic [ref=e785]:
              - paragraph [ref=e786]: Huomio osio alkaa
              - paragraph [ref=e787]:
                - strong [ref=e788]: "Esimerkki 18:"
