            - paragraph [ref=e99]: Tässä ohjeessa käsitellään luonnollisen henkilön omaisuuden luovutusvoittojen ja ‑tappioiden yleisiä kysymyksiä ja periaatteita tuloverotuksessa.
            - paragraph [ref=e100]: Ohjetta on päivitetty 1.1.2026 voimaan tulleen lakimuutoksen vuoksi. Uusi säännös TVL 110 a § korvasi aiemman säännöksen (TVL 110 §:n 2 momentti), jossa säädettiin luovutusvoiton jaksottamisesta. Uudessa pykälässä säädetään myös lisäkauppahinnan vaikutuksesta luovutusvoittoverotuksessa, ja tästä johtuvat muutokset on tehty ohjeen lukuihin 6.2 ja 6.3.
            - paragraph [ref=e101]: Ohjeen lukuun 2.3 (Veronalaiset luovutusvoitot) on lisätty tekstiä Funded Trading ‑toiminnasta, johon ei sovelleta luovutusvoittoverotusta koskevia säännöksiä.
            - paragraph [ref=e102]: Ohjeesta on poistettu luvut 2.4.8 (Ulkomailla asuvan henkilön Suomessa sijaitsevan omaisuuden luovutuksen verotus), 4.4 (Yleishyödyllinen yhteisö) ja 4.5 (Yhteisetuus).
            - paragraph [ref=e103]: Lukuun 6.1 on lisätty ohjaus siitä, milloin luovutussopimuksen katsotaan syntyneen, kun osapuolet allekirjoittavat sopimuksen sähköisesti.
            - paragraph [ref=e104]: Luvussa 8.4 kerrotaan, mitä otetaan huomioon hankintamenona, kun verovelvollinen ostaa yhtiön aiemmin haltuunottaman huoneiston.
            - paragraph [ref=e105]: Lukuun 12.13 on lisätty maininta, että sijoitus trustiin voidaan rinnastaa apporttiin tekstissä mainituin edellytyksin.
            - paragraph [ref=e106]: Ohjeeseen on lisätty luku 12.21 (Lunastuslauseke).
            - paragraph [ref=e107]: Lyhytaikainen vuokraus katkaisee asumisen ja sillä voi siten olla vaikutusta paitsi luovutusvoiton veronalaisuuteen niin myös luovutustappion vahvistamiseen. Tästä kerrotaan luvussa 13.3.1.
            - paragraph [ref=e108]: Verohallinto on antanut tämän ohjeen lisäksi useita ohjeita luovutusvoittojen erityiskysymyksistä, katso tarkemmin ohjeen luku 1.1.
            - paragraph [ref=e109]:
