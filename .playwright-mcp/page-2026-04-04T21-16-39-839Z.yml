            - heading "12.9 Tuuli- ja aurinkovoimalan siirtolinjaan liittyvät korvaukset" [level=3] [ref=e1011]
            - paragraph [ref=e1012]: Tuuli- ja aurinkovoimaloiden tuottama sähkö siirretään jakeluverkkoon siirtolinjoja pitkin. Jos siirtolinjaa varten luovutetaan maata tai pysyvä käyttöoikeus siirtolinjan tarvitsemalle alueelle, siitä maksetaan kertakorvaus. Korvaus verotetaan molemmissa vaihtoehdoissa luovutusvoittona.
            - paragraph [ref=e1013]: Koska korvauksen maksajalla on lunastusmahdollisuus tarvittavaan alueeseen, luovutusvoiton laskennassa käytetään 80 %:n hankintameno-olettamaa.
            - paragraph [ref=e1014]: Korvaus ilmoitetaan luovutuksena sen vuoden verotuksessa, jolloin korvauspäätös on tehty. Korvausta ei ilmoiteta metsätalouden veroilmoituksessa.
