            - heading "12 Luovutusvoittoverotuksen erityistilanteita" [level=2] [ref=e924]
            - heading "12.1 Lahjanluonteinen kauppa" [level=3] [ref=e925]
            - paragraph [ref=e926]: Jos omaisuus on luovutettu vastikkeellisesti käypää arvoa alempaan hintaan siten, että vastike on enintään kolme neljäsosaa omaisuuden käyvästä arvosta, kyseessä on perintö- ja lahjaverolain 18 §:n 3 momentissa tarkoitettu lahjanluonteinen kauppa- tai vaihto. Tällöin luovutus jaetaan maksetun hinnan ja käyvän arvon suhteen perusteella vastikkeelliseen ja vastikkeettomaan osaan (TVL 47 §:n 5 momentti).
            - paragraph [ref=e927]: Luovutusvoiton määrä lasketaan tällöin siten, että saadusta luovutushinnasta vähennetään vain vastikkeellisesti luovutettua osuutta vastaava osa omaisuuden hankintamenosta.
            - generic [ref=e928]:
              - paragraph [ref=e929]: Huomio osio alkaa
              - paragraph [ref=e930]:
                - strong [ref=e931]: "Esimerkki 24:"
              - paragraph [ref=e932]: A on ostanut vuonna 2015 kiinteistön 50 000 eurolla ja myy sen 60 000 eurolla vuonna 2022. Kiinteistön käypä arvo on myyntipäivänä 100 000 euroa. Myyntikauppahinta on alle kolme neljännestä omaisuuden käyvästä arvosta.
              - paragraph [ref=e933]: Luovutus jaetaan vastikkeelliseen ja vastikkeettomaan osaan saadun kauppahinnan ja omaisuuden käyvän arvon suhteessa (60 000 / 100 000). A:n saama luovutusvoitto lasketaan siten, että luovutushinnasta vähennetään vastikkeellista osaa vastaava suhteellinen osuus kiinteistön ostohinnasta, eli 30 000 euroa (60 000 / 100 000 x 50 000). Tapaukseen soveltuva 20 %:n suuruinen hankintameno-olettama olisi vain 12 000 euroa, joten oikaistua todellista hankintamenoa käytetään voiton laskennassa. A:n luovutusvoiton määrä on 30 000 euroa (60 000 – 30 000 = 30 000).
              - paragraph [ref=e934]: Jos hankintameno-olettama olisi edullisempi, se vähennettäisiin sellaisenaan ilman edellä kuvatun kaltaista suhteutusta.
              - paragraph [ref=e935]: Huomio osio päättyy
            - paragraph [ref=e936]: Jos omaisuutta myydään sen käypää arvoa alemmalla hinnalla, mutta luovutushinta on kuitenkin suurempi kuin kolme neljäsosaa omaisuuden käyvästä arvosta, luovutukseen ei sovellu lahjanluonteista luovutusta koskeva säännös. Näissä tilanteissa luovutusta ei jaeta vastikkeelliseen ja vastikkeettomaan osaan. Luovutushinnasta vähennetään omaisuuden koko hankintameno, mutta luovutuksen alihintaisuudesta johtunut tappio ei kuitenkaan ole vähennyskelpoinen (katso myös luku 13.4).
            - heading "12.2 Kauppahinta on nolla euroa" [level=3] [ref=e937]
            - paragraph [ref=e938]:
              - text: Korkeimman hallinto-oikeuden päätöksessä
              - link "KHO 2020:145" [ref=e939] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2020/202004374
              - text: oli kyse siitä, verotetaanko kauppa luovutusvoittoa koskevien sääntöjen mukaisesti, jos kauppahinta on nolla euroa.
            - paragraph [ref=e940]: Korkeimman hallinto-oikeuden mukaan osakkeiden omistusoikeuden siirtoon liittyvän asiakirjan otsikointi kauppakirjaksi ei ratkaissut asiaa. Korkein hallinto-oikeus lausui, että vastikkeella tulee olla taloudellista arvoa. Koska kauppahinnaksi oli merkitty nolla euroa, luovuttajalle ei ollut maksettu osakkeiden omistuksen siirrosta lainkaan vastiketta. Siten kyseessä ei ollut luovutusvoittoverotuksen piiriin kuuluva luovutus eikä luovutustappiota siten voitu vahvistaa.
            - paragraph [ref=e941]: Jos kauppahinnaksi on merkitty nimellinen euromäärä, joudutaan tilanne arvioimaan tapauskohtaisesti olosuhteiden perusteella. Jos nimellisen kauppahinnan taustalla ei ole riittäviä verotuksesta riippumattomia syitä, veron kiertämistä koskevan säännöksen soveltaminen on mahdollista (VML 28 §).
            - heading "12.3 Kauppahinta on negatiivinen" [level=3] [ref=e942]
            - paragraph [ref=e943]: Omaisuutta saatetaan myydä myös negatiivisella kauppahinnalla. Kyseessä on usein myyntiarvonsa menettäneen omaisuuden luovutus tilanteessa, jossa omistaja on valmis maksamaan omaisuuden vastaanottajalle vapautuakseen esimerkiksi omaisuuden ylläpidosta tai uhkaamassa olevista remontoinnin, maaperän puhdistamisen tai purkamisen kustannuksista.
            - paragraph [ref=e944]: Negatiivisella kauppahinnalla tehdyn kaupan verotuksesta ei ole oikeuskäytäntöä. Negatiivista kauppahintaa käytettäessä myyjä ei saa vastiketta. Negatiivisen kauppahinnan tilanteissa menetellään siten samalla tavalla kuin nollan euron kauppahintatilanteissa (ks. edellinen luku). Luovutustappiota ei siten voida vahvistaa.
            - paragraph [ref=e945]: Negatiivinen kauppahinta ei ole myöskään muuna tulonhankkimiskuluna vähennyskelpoinen tuloverolain mukaan verotettavan myyjän verotuksessa. Elinkeinotoiminnan yhteydessä tilanne arvioidaan elinkeinotulon verottamisesta annetun lain mukaan, joten negatiivinen kauppahinta voi olla vähennettävissä tulosta.
            - paragraph [ref=e946]:
              - text: Arvonsa menettäneen omaisuuden myyntiä lähipiirille käsitellään enemmän ohjeen
              - link "Veron kiertämissäännöksen soveltaminen" [ref=e947] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/49027/
              - text: luvussa 3.5.
            - heading "12.4 Osakeyhtiön tai asunto-osakeyhtiön konkurssi" [level=3] [ref=e948]
            - paragraph [ref=e949]:
              - text: Osakeyhtiön ja asunto-osakeyhtiön konkurssia käsitellään tämän ohjeen luvuissa 13.2 ja 13.2.1 sekä ohjeen
              - link "Arvopaperien luovutusten verotus" [ref=e950] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: luvussa 25.2 (Luovutustappio osakeyhtiön konkurssin takia).
            - paragraph [ref=e951]: Kun osakkeet oikeuttavat oman vakituisen asunnon hallintaan, niiden luovutus on tietyin ehdoin verovapaata ja luovutustappiota ei vahvisteta. Oman vakituisen asunnon verovapausehdon täyttyessä myöskään konkurssimenettelyn päättyminen osakkeiden arvon lopulliseen menetykseen ei mahdollista tappion vahvistamista. Katso tämän ohjeen luku 13.3.1 (Oman asunnon luovutustappio). Asunto-osakkeiden arvonmenetystilanteita on käsitelty myös ohjeen luvussa 12.2 (Kauppahinta on nolla euroa) ja luvussa 12.3 (Kauppahinta on negatiivinen).
            - heading "12.5 Omaisuuden pakkohuutokauppa" [level=3] [ref=e952]
            - paragraph [ref=e953]:
              - text: Omaisuuden luovutuksesta saatu voitto on veronalaista tuloa ja tappio on vähennyskelpoinen luovutustappio, vaikka luovutus tapahtuisi vastoin verovelvollisen tahtoa, esimerkiksi pakkohuutokaupalla (
              - link "KHO 1974-B-II-559" [ref=e954] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1974/197401081
              - text: ).
            - paragraph [ref=e955]:
              - text: Tuloverolain 49 §:ssä on erityissäännös, joka koskee pakkolunastusta ja siihen rinnastettavaa menettelyä. Säännöksen mukaan luovutusvoiton määrä voidaan laskea näissä tilanteissa 80 prosentin hankintameno-olettamaa käyttäen (katso tarkemmin Verohallinnon ohje
              - link "Kokonaan tai osittain verovapaat luovutusvoitot" [ref=e956] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48930/
              - text: ).
            - paragraph [ref=e957]:
              - text: TVL 49 §:n erityissäännöstä ei sovelleta pakkohuutokaupalla tai siihen verrattavalla menettelyllä tapahtuneeseen omaisuuden luovutukseen (mm.
              - link "KHO1975-B-II-546" [ref=e958] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1975/197502299
              - text: ). Yksityishenkilön velkajärjestelystä annetun lain (57/1993) mukainen tuomioistuimen vahvistama maksuohjelma voi sisältää mm. omaisuuden muuttamisen rahaksi laissa tarkemmin säädetyllä tavalla. Myös vapaaehtoinen velkojen järjestely voi johtaa omaisuuden rahaksi muuttamiseen. Näissäkään tilanteissa TVL 49 §:n erityissäännöstä ei voida käyttää.
            - paragraph [ref=e959]:
              - text: Luovutusvoitto on verovelvollisen veronalaista tuloa, vaikka luovutushinta menisi velkojen suoritukseksi (mm.
              - link "KHO 1996-B-520" [ref=e960] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1996/199601872
              - text: ).
            - paragraph [ref=e961]: Pakkohuutokaupan luovutuspäivänä on päivä, jona ulosottomies on allekirjoittanut ostajalle annettavan kauppakirjan. Luovutuksissa, joista ei ulosottokaaren mukaan ole annettava kauppakirjaa (esim. muiden osakkeiden kuin asunto-osakkeiden luovutukset), voidaan luovutuspäivänä pitää päivää, jona ulosottomies antaa ostajalle todistuksen saannosta. Sillä ei ole merkitystä, milloin ostaja saa kauppakirjan tai ulosottomiehen antaman todistuksen haltuunsa.
            - heading "12.6 Omaisuuden myynti toisen henkilön ulosotossa olleiden velkojen kattamiseksi" [level=3] [ref=e962]
            - paragraph [ref=e963]:
              - text: Luovutusvoittoverotuksessa nimiperiaatteen noudattaminen on hyvin vahva pääsääntö. Tämä tarkoittaa, että luovutus verotetaan sillä henkilöllä, jonka omistuksessa (nimissä) omaisuus on myyntihetkellä. Omaisuuden hankinnan rahoittaminen toisen henkilön varoilla ei vaikuta omistusoikeuteen eikä siten myöskään luovutusvoiton verotukseen. Toisen omaisuuden ostohinnan tai peruskorjauksen rahoittaminen voi olla lahja tai se voi muodostaa henkilöiden välille velkasuhteen, mutta tämä ei vaikuta omistusoikeuteen. Nimiperiaatteen luonnetta on käsitelty korkeimman oikeuden päätöksessä
              - link "KKO 2010:57" [ref=e964] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kko/kko/2010/20100057
              - text: .
            - paragraph [ref=e965]: Poikkeuksen edellisessä luvussa ja edellisessä kappaleessa esitettyyn nimiperiaatteen mukaiseen pääsääntöön muodostaa ulosottokaaren (2007/705) 4 luvun 14 pykälän mukainen tilanne, jossa henkilön nimissä olevaa omaisuutta voidaan ulosmitata toisen henkilön velkojen suoritukseksi. Näin voidaan menetellä, jos omaisuutta on siirretty keinotekoisin järjestelyin ulosoton välttämiseksi tai omaisuuden pitämiseksi velkojien ulottumattomissa.
            - paragraph [ref=e966]: Ulosmittausta ei kuitenkaan saa toimittaa, jos järjestelyssä mukana oleva sivullinen saattaa todennäköiseksi, että ulosmittaus loukkaa hänen todellista oikeuttaan. Tällöin omaisuus voi tulla myydyksi ulosottolain säännösten nojalla siten, että myynnistä saadut varat käytetään muun tahon kuin omaisuuden omistajan velkojen suoritukseksi ilman että nimiperiaatteen mukaista omistusta kumottaisiin.
            - paragraph [ref=e967]: Luovutusvoittoverotusta koskevassa päätöksessä KHO 2014 taltio 1529 (ei julkaistu) katsottiin, että siviilioikeudellista omistajaa (A) ei voitu verottaa omaisuuden luovutuksesta, kun omistus oli silloisen ulosottolain 4 luvun 9 §:n (vastaa nykyistä ulosottokaaren 4 luvun 14 §:ää) perusteella sivuutettu. A ei ollut maksanut B:lle kauppahintaa eikä hänellä siten voinut olla B:n velasta tehdyn ulosmittauksen jälkeen sellaista saatavaa, jonka hän olisi oikeutettu B:ltä saamaan. A oli näennäisomistaja, mutta muodollinen omistusoikeus oli kirjattu hänen nimiinsä. Tapauksessa korkein hallinto-oikeus pysytti hallinto-oikeuden päätöksen. Perusteluissa korkein hallinto-oikeus viittasi hallinto-oikeuden päätökseen, jossa todettiin seuraavaa.
            - paragraph [ref=e968]: ”Hallinto-oikeus toteaa, että tilanteessa, jossa kauppahintaa käytetään jonkun muun kuin omistajan velkojen suoritukseksi, omistajalle syntyy tätä muuta kohtaan saamisoikeus. Tämä saamisoikeus vastaa luovutushintaa luovutusvoittoa laskettaessa. Näin ollen sillä seikalla, onko pakkohuutokaupassa saadusta myyntihinnasta velkojen kattamisen jälkeen jäänyt tilitettäväksi A:lle osaakaan, ei ole omistajuuden kannalta ratkaisevaa merkitystä.
            - paragraph [ref=e969]: A:lle vuonna 2001 asianmukaisen kiinteistökaupan perusteella myönnetty lainhuuto G tilaan on saanut aikaan perustellun olettaman siitä, että hän on kiinteistön oikea omistaja. Hänen omistajuutensa on tullut kyseenalaiseksi B:n velkojen kattamiseksi vuonna 2005 tapahtuneen ulosoton yhteydessä. Tila on tuolloin ulosmitattu sillä perusteella, että tilan vuonna 2001 tapahtuneen myynnin A:lle on katsottu olleen ulosottomenettelyssä sivuutettava järjestely. Ulosmittaus ja sitä koskevat tuomioistuinratkaisut eivät kuitenkaan merkitse tuon kiinteistökaupan purkautumista, eikä kauppaa ole muullakaan tuomioistuimen päätöksellä määrätty purkautumaan.
            - paragraph [ref=e970]: G tila on vuoden 2005 jälkeenkin jäänyt A:n nimiin, ja lainhuutonsa perusteella hän on edelleen ollut kiinteistön omistaja. Ulosottoasian käsittelyssä ilmi tulleiden seikkojen perusteella on kuitenkin todennäköistä, että kiinteistön todelliseksi omistajaksi olisi vahvistettu B, mikäli tämä kysymys olisi tullut tuomioistuimen ratkaistavaksi. Kun A:lla ei tällöin myöskään olisi kauppahinnan käyttämisestä B:n velkojen kattamiseen perustuvaa saamisoikeutta B:tä kohtaan, hallinto-oikeus katsoo, että A:ta ei tässä tilanteessa ole pidettävä kyseisen omaisuuden luovuttajana siten, että hänelle voitaisiin määrätä veroa omaisuuden luovutusvoitosta.”
            - paragraph [ref=e971]: Verotuskäytännössä on katsottu, että edellä kuvattu korkeimman hallinto-oikeuden päätös KHO 2014 taltio 1529 ilmaisee hyväksyttävän perusteen poiketa luovutusvoiton verottamisesta nimiperiaatteen mukaisella omistajalla. Omistuksen nimiinsä saaneella henkilöllä on hyvin harvoin mahdollisuus osoittaa maksaneensa omaisuudesta mitään, koska ulosottokaaren 4 luvun 14 §:n soveltaminen käytännössä tarkoittaa, että kustannuksista on vastannut ulosottovelallinen eikä nimellinen omistaja. Nimellisellä omistajalla ei siten ole luovutusvoittoverotuksessa käytettävää hankintamenoa eikä myöskään oikeutta vaatia korvausta ulosottovelalliselta omistuksen menetyksestä. Luovutus ei kokonaisuutena arvioiden täytä luovutusvoittoverotuksen edellytyksiä.
            - paragraph [ref=e972]: Korkeimman hallinto-oikeuden päätöksessä ei ollut esillä ulosottovelallisen verotus. Päätöksen mukaisissa tilanteissa luovutus verotetaan ulosottovelallisella. Ulosottovelallisella omaisuuden hankintamenona käytetään sitä kauppahintaa, jolla hän on omaisuuden hankkinut joko omiin nimiinsä tai nimellisen omistajan nimiin. Saantoajankohta määräytyy saman saannon mukaan.
            - paragraph [ref=e973]: Jos ulosottovelallista on aiemmin verotettu luovutuksesta nimelliselle omistajalle, ulosottomyynnin luovutusvoittoverotuksen yhteydessä aiempi luovutusvoiton verotus poistetaan viranomaisaloitteisella veronoikaisulla, jos määräajat sen mahdollistavat.
            - generic [ref=e974]:
              - paragraph [ref=e975]: Huomio osio alkaa
              - paragraph [ref=e976]:
                - strong [ref=e977]: "Esimerkki 25:"
              - paragraph [ref=e978]: A osti kiinteistön 100 000 eurolla vuonna 2012. Hän myi kiinteistön (täysi-ikäisille) lapsilleen B:lle ja C:lle 110 000 eurolla vuonna 2021. A:n luovutusvoitto verotettiin vuoden 2021 tulona.
              - paragraph [ref=e979]: Vuonna 2023 kiinteistö ulosmitataan A:n velkojen maksuun ulosottolainsäädännön perusteella. Lapset B ja C eivät ole voineet osoittaa ulosoton loukkaavan heidän etuaan. He eivät ole maksaneet A:lle kauppahintaa, joten verotuksen kannalta kysymys on näennäisoikeustoimesta.
              - paragraph [ref=e980]: Ulosotettu kiinteistö myydään samana vuonna 150 000 eurolla. Kiinteistön ulosottomyynti verotetaan A:n eikä nimellisten omistajien eli B:n ja C:n luovutusvoittona. Myyntihinta on 150 000 euroa, hankintameno A:n alun perin maksama kauppahinta 100 000 euroa ja saantoajankohta vuosi 2012. Hankintameno-olettama on siten 40 prosenttia myyntihinnasta eli 60 000 euroa. Todellinen hankintameno eli 100 000 euroa on suurempi, joten luovutusvoitoksi muodostuu 50 000 euroa (150 000–100 000). A:n vuoden 2023 luovutusvoittona verotetaan 50 000 euroa.
              - paragraph [ref=e981]: Koska vuoden 2021 verotus voidaan kolmen vuoden muutosajan puitteissa oikaista, Verohallinto oikaisee vuoden 2021 verotusta poistamalla siellä verotetun samaa kiinteistöä koskevan A:n luovutusvoittoverotuksen.
              - paragraph [ref=e982]:
