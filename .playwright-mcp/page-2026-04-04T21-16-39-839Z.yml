              - text: käsitellään perinnönjaon ja siihen liittyvän jäämistöosituksen yhteydessä muodostuvia vastikkeellisia saantoja varainsiirtoverotuksessa. Ohjeita voidaan hyödyntää soveltuvin osin myös muussa verotuksessa, kun määritetään, onko kyseessä vastikkeellinen saanto.
            - heading "11.2.3 Omaisuuden erottelu" [level=4] [ref=e905]
            - paragraph [ref=e906]: Ositussaantoa koskeva lainsäännös ei sovellu silloin kun puolisoilla ei ole avio-oikeutta toistensa omaisuuteen. Avio-oikeus on voitu sulkea pois esimerkiksi avioehtosopimuksella. Tällöin toimitetaan osituksen sijaan omaisuuden erottelu. Jos avio-oikeuden ulkopuolista omaisuutta siirretään omaisuuden erottelussa puolisolta toiselle, omaisuuden siirrot ovat vastikkeellisia vaihtoja tai lahjoja.
            - paragraph [ref=e907]:
              - text: Omaisuuden erottelussa tapahtuvassa vaihdossa omaisuutta saavan osapuolen osalta kyseessä on vastikkeellinen saanto ja vastaavasti omaisuuttaan luovuttavan osapuolen osalta kyseessä on vastikkeellinen luovutus (
              - link "KHO 1.10.1999 taltio 2655" [ref=e908] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/1999/199902655
              - text: ). Vaihdon verotusta on käsitelty luvussa 5.3. Jos omaisuuden erottelussa omaisuutta siirtyy vastikkeettomasti osapuolelta toiselle, kyseessä voi olla veronalainen lahja.
            - paragraph [ref=e909]:
