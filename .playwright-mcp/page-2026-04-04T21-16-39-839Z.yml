            - paragraph [ref=e836]: Kun ostaja luovuttaa samaa omaisuutta edelleen ennen kuin hän on omistanut omaisuuden vähintään viisi vuotta, myyjällä verovapaaksi katsottu luovutusvoitto suurentaa luovutusvoittoa, joka ostajalle syntyy tästä jatkoluovutuksesta. Ostajan luovutusvoittoa laskettaessa hankintamenosta tai hankintameno-olettamasta vähennetään se määrä, joka olisi verotettu myyjän luovutusvoittona edellisessä kaupassa, ellei kauppaan olisi sovellettu verovapaussäännöstä.
