            - heading "11.2.2 Ositus, jossa käytetään ulkopuolisia varoja" [level=4] [ref=e889]
            - paragraph [ref=e890]: Jos osituksessa toiselle osapuolelle siirtyy omaisuutta enemmän kuin tasinko-oikeuden toteuttaminen vaatii ja samalla omaisuutta saava maksaa luopuvalle osapuolelle tasingon nimellä vastiketta ulkopuolisin varoin, on kyse tältä osin tavanomaisesta kaupasta.
            - paragraph [ref=e891]: Ulkopuolisia varoja yli avio-osansa määrän saavalle osapuolelle muodostuu luovutusvoitto. Omaisuutta saavalle ja siitä ulkopuolista vastiketta maksavalle osapuolelle muodostuu uutta hankintamenoa ja saadun omaisuuden laadun mukaan myös velvollisuus ilmoittaa ja maksaa varainsiirtovero oma-aloitteisesti. Avio-oikeuden ulkopuolisia varoja ovat avioehtosopimuksen, lahjakirjan sekä testamentin nojalla avio-oikeudesta vapautettu omaisuus ja kaikki avioeron vireille tulon jälkeen osapuolille kertynyt uusi varallisuus tai nostetut lainat.
            - paragraph [ref=e892]: Jos puoliso käyttää osituksessa pesän ulkopuolisia varoja yli lakimääräisen tasinkovelvoitteen saadakseen toisen puolison omaisuutta, saadun omaisuuden omistusaika lasketaan osituksen toimittamisajankohdasta.
            - paragraph [ref=e893]:
              - text: Ositussaantoa ei pidetty vastikkeellisena, kun verovelvollinen oli saanut kiinteistön sitä vastaan, että hän luopui vaatimasta lapsen elatusmaksuja (
