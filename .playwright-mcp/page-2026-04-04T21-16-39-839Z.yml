            - heading "8 Luovutetun omaisuuden hankintameno" [level=2] [ref=e493]
            - heading "8.1 Yleistä hankintamenon määräytymisestä" [level=3] [ref=e494]
            - paragraph [ref=e495]: Luovutusvoittoa laskettaessa luovutushinnasta vähennetään luovutetun omaisuuden verotuksessa poistamatta oleva hankintameno. Omaisuuden hankintameno määräytyy eri tavoin riippuen siitä, miten se on aikanaan saatu. Jos omaisuus on hankittu usealla eri saannolla, hankintameno määritetään jokaiselle saannolle erikseen.
            - paragraph [ref=e496]: Kaupalla saadun omaisuuden hankintamenoa on myyjälle suoritettu ostokauppahinta. Vaihdossa saadun omaisuuden hankintamenoa on vaihdossa luovutetun omaisuuden vaihtohetken mukainen käypä arvo. Jos vaihdossa on maksettu välirahaa, myös maksettu väliraha luetaan osaksi saadun omaisuuden hankintamenoa. Jos vaihdossa on saatu välirahaa, saadun omaisuuden hankintamenoa on vaihdossa luovutetun omaisuuden vaihtohetken mukainen käypä arvo vähennettynä saadulla välirahalla. (Katso myös luku 5.3).
            - paragraph [ref=e497]: Hankintamenoa ovat myös ostoon tai vaihtoon välittömästi liittyvät kustannukset, kuten esimerkiksi ostajan maksama varainsiirtovero tai leimavero, kirjausmaksu ja muut kirjauksesta aiheutuneet menot, Maanmittauslaitokselle maksetut kiinteistön erottamiskulut, ostajan maksamat välitys-, tarkastus-, arviointi- ja asianajopalkkiot sekä kuljetus-, asennus-, puhdistus- yms. menot. Veroille maksettua veronlisäystä, viivästyskorkoa, laiminlyöntimaksua ja viivästyskorotusta ei voida vähentää hankintamenona. Hankintamenoa ei ole myöskään luovutetun omaisuuden hankintaan otetun lainan lisävakuudesta maksettu korvaus (KHO 2025:68).
            - paragraph [ref=e498]: Kiinteistön hankintamenoa ovat myös verovelvolliselle kiinteistön rakentamisesta aiheutuneet kustannukset. Rakennuskustannuksia voivat olla esimerkiksi maksettu urakkahinta, työkorvaukset, työpalkat sivukuluineen sekä kulut rakennusaineista ja ‑tarvikkeista. Edellä mainittuihin sisältyvä arvonlisävero on osa vähennyskelpoista hankintamenoa. Jos kiinteistön omistaja on saanut arvonlisäveron palautuksen kiinteistön käyttöoikeuden luovutuksen perusteella, hankintamenosta vähennetään palautettua arvonlisäveroa vastaava määrä. Verovelvollisen oman työn arvoa ei lueta osaksi kiinteistön hankintamenoa, eikä oman työn arvoa muutoinkaan vähennetä luovutusvoiton verotuksessa.
            - paragraph [ref=e499]: Hankintamenoa tai sen osaa, joka on jo aikaisemmin vähennetty verotuksessa, ei vähennetä toistamiseen luovutusvoiton verotuksessa. Esimerkiksi vuokratun rakennuksen hankintamenoa on voitu vähentää ennen rakennuksen luovutusta vuokratulon verotuksessa poistoina.
            - generic [ref=e500]:
              - paragraph [ref=e501]: Huomio osio alkaa
              - paragraph [ref=e502]:
                - strong [ref=e503]: "Esimerkki 11:"
              - paragraph [ref=e504]: Antti on hankkinut vuokralle antamansa sijoituskiinteistön 200 000 eurolla vuonna 1990. Hän myi kiinteistön 250 000 eurolla vuonna 2025. Hän on vähentänyt saamistaan vuokratuloista rakennuksen hankintamenon poistoja yhteensä 60 000 euroa vuosien 1990–2024 verotuksissa. Kiinteistön poistamatta oleva hankintameno on luovutushetkellä 140 000 euroa (200 000 euroa – 60 000 euroa = 140 000 euroa). Antille syntyy luovutusvoittoa kiinteistön myynnistä 110 000 euroa (250 000 euroa – 140 000 euroa = 110 000 euroa). Hankintameno-olettama 40 % myyntihinnasta on 100 000 euroa, mikä on epäedullisempi kuin laskettu vähennyskelpoinen poistamaton hankintameno.
