            - paragraph [ref=e796]: Jos pesää ei jaeta ja perintöön kuuluvan esineen luovuttaa jakamaton kuolinpesä, luovutusvoitto verotetaan kuolinpesällä. Hankintamenona käytetään perintöverotuksessa vahvistettua kyseisen omaisuuserän perintöverotusarvoa. Jos perintöverotusta on oikaistu, käytetään oikaisupäätöksen mukaista korjattua perintöverotusarvoa hankintamenona.
            - paragraph [ref=e797]: Perintöverotus on kullakin perillisellä oma päätöksensä. Jos vain jonkin tai joidenkin perillisten perintöverotusta oikaistaan, perintöön kuuluvien mahdollisesti muuttuneet perintöverotusarvot koskevat vain niitä perillisiä, joita oikaistu verotuspäätös koskee. Muiden perillisten alkuperäisen perintöverotuksen arvot ovat edelleen voimassa. Tästä seuraa, että kuolinpesän myydessä perintöön kuuluva omaisuuserän, hankintameno on laskettava suhteuttamalla omistusosuuksien mukaiset arvostukset koko omaisuuserän arvoksi.
