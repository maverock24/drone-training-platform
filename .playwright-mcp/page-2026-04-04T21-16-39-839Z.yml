            - heading "2 Yleistä luovutusvoitoista ja -tappioista" [level=2] [ref=e148]
            - heading "2.1 Sovellettavat tuloverolain säännökset" [level=3] [ref=e149]
            - paragraph [ref=e150]: Luovutusvoiton ja varojenjaon veronalaisuudesta on säädetty tuloverolain (1535/1992, TVL) 45 ja 45 a §:issä. Luovutustappion vähentämisestä on säädetty TVL 50 §:ssä. Tuloverolain 46 ja 46 a §:issä on säädetty luovutusvoiton ja tappion laskemisesta. Tuloverolain 47 § on puolestaan omaisuuden hankintamenoa erityistilanteissa koskeva säännös. Kokonaan tai osittain verovapaista luovutusvoitoista on säädetty TVL 48–49 §:issä. Luovutusvoiton ja tappion verovuotta koskeva säännös on TVL 110 a §:ssä.
            - paragraph [ref=e151]: Omistusaikana tapahtuneista omaisuuden arvon menetyksistä ei ole tuloverolaissa säännöstä lukuun ottamatta TVL 50 §:n 3 momentissa mainittuja säännellyllä markkinapaikalla kaupan kohteena olevien johdannaissopimusten raukeamisia ja tappioita sekä sellaisia arvopapereiden arvonmenetyksiä, jotka ovat lopullisia. Mainittuja poikkeuksia lukuun ottamatta arvonmenetykset ovat luovutustappioina vähennyskelvottomia tuloverolain mukaisessa verotuksessa. Elinkeinotulon verotuksesta annetun lain 17 ja 7 pykälissä määritellään menetysten vähennyskelpoisuus elinkeinotoiminnan tulolähteessä.
            - heading "2.2 Luovutusvoiton tai -tappion syntyminen" [level=3] [ref=e152]
            - paragraph [ref=e153]: Luovutusvoittoa syntyy, jos luovutetun omaisuuden myyntihinta ylittää sen hankintamenon ja voiton hankkimisesta aiheutuneet menot. Luovutustappiota puolestaan syntyy, jos luovutetun omaisuuden myyntihinta alittaa sen hankintamenon ja voiton hankkimisesta aiheutuneet menot.
            - paragraph [ref=e154]: Luovutusvoittoa tai tappiota voi syntyä vastikkeellisissa luovutuksissa, joista tavallisimpia ovat kauppa ja vaihto. Vastikkeen laadulla ei ole merkitystä, kunhan se vain on rahanarvoinen etuus.
            - paragraph [ref=e155]: Vastikkeettomiin luovutuksiin ei sen sijaan kohdistu luovutusvoiton verotusta. Vastikkeettomia luovutuksia ovat perintö, lahja ja ositus. Jos luovutus on osittain vastikkeellinen ja osittainen vastikkeeton (esimerkiksi lahjanluonteiset kaupat) luovutusvoiton verotus kohdistuu luovutuksen vastikkeelliseen osaan. Katso jäljempänä luku 12.1 (Lahjanluonteinen kauppa).
            - paragraph [ref=e156]: Luovutusvoitto on veronalaista tuloa riippumatta siitä, kuinka kauan luovuttaja on omistanut omaisuuden. Omaisuuden hankinta- tai saantotavalla (esimerkiksi kauppa, perintö, lahja) ei ole merkitystä, sillä luovutusvoittoverotuksen piiriin kuuluvat sekä vastikkeellisesti että vastikkeettomasti saadun omaisuuden luovutukset.
            - paragraph [ref=e157]: Luovutettava omaisuus voi olla kiinteää tai irtainta eikä sillä, kummasta omaisuuslajista on kysymys, ole yleensä merkitystä luovutusvoittoa verotettaessa. Kiinteän ja irtaimen omaisuuden erojen tunnistamisella on merkitystä lähinnä osittain verovapaita luovutusvoittoja ja sukupolvenvaihdosluovutusta koskevia tuloverolain säännöksiä sovellettaessa.
            - paragraph [ref=e158]:
              - text: Kiinteää omaisuutta ovat Maamittaushallinnon ylläpitämään kiinteistötietojärjestelmään kirjattavat kiinteistöt. Tällaisia ovat maa- ja metsätilat, koskiosuudet, tontit ja muut maa-alueet, kuten erottamattomat määräalat, ja niillä olevat maanomistajalle kuuluvat rakennukset. Osuus yhteismetsään (
              - link "KHO 1974-B-II-557" [ref=e159] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1974/197402554
              - text: ) ja osuus yhteisesti omistettuun kiinteistöön on osakkaan kiinteää omaisuutta. Tuloverotuksessa pidetään kiinteänä omaisuutena myös sellaista toisen maalla olevaa rakennusta, rakennelmaa tai muuta laitosta, joka hallintaoikeuksineen maahan voidaan maanomistajaa kuulematta luovuttaa kolmannelle henkilölle (TVL 6 §).
            - paragraph [ref=e160]:
              - text: lrtaimeen omaisuuteen kuuluvat irtainten esineiden lisäksi esimerkiksi osakkeet, merkintäoikeudet, osuuskunnan osuudet sekä osuudet avoimissa yhtiöissä, kommandiittiyhtiöissä ja jakamattomissa kuolinpesissä, joukkovelkakirjat ja sijoitusrahaston rahasto-osuudet. Rakennuksen luovuttaminen erikseen ilman siirtokelpoista vuokraoikeutta on niin ikään irtaimen omaisuuden luovutus. Maa-aineksen myynnistä saatua pääomatuloa verotettaessa ei sovelleta luovutusvoiton laskentaa koskevia säännöksiä (katso
              - link "KHO 1994-B-519" [ref=e161] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1994/199403007
              - text: ).
            - paragraph [ref=e162]:
              - text: Maa-aineksista saatava tuloa käsitellään ohjeessa
              - link "Maa-aineksista saatavat tulot luonnollisen henkilön verotuksessa" [ref=e163] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48904/
              - text: .
            - heading "2.3 Veronalaiset luovutusvoitot" [level=3] [ref=e164]
            - paragraph [ref=e165]: Yleensä on selvää, milloin on kysymys omaisuuden myynnistä. Tällöin omaisuuden luovutuksiin sovelletaan luovutusvoittoja ja tappioita koskevia tuloverolain säännöksiä. Luovutusvoittoverotusta koskevia säännöksiä ei sovelleta, jos henkilö käy kauppaa toisen omaisuudella ja saa palkkiona prosenttiosuuden voitosta (esimerkiksi Funded Trading, Proprietary Trading). Tällaisesta toiminnasta saatu tulo on ansiotuloa.
            - paragraph [ref=e166]: Omaisuuden menetys eli esimerkiksi esineen tuhoutuminen tai esineen arvon häviäminen on verotuksen kannalta erilainen tilanne kuin omaisuuden luovutus. Omaisuuden menetyksiä käsitellään luvussa 13.2.
            - paragraph [ref=e167]: Verotettavaksi tulevaa omaisuuden myyntihinnan osaa nimitetään luovutusvoitoksi. Kaikki omaisuuden luovutuksesta saadut voitot ovat veronalaisia, ellei niitä ole erikseen säädetty verovapaiksi. TVL 45 §:n 1 momentin mukaan omaisuuden luovutuksesta saatu voitto on veronalaista pääomatuloa.
            - paragraph [ref=e168]: Omaisuuden luovutusvoiton ohella muita veronalaisia pääomatuloja ovat esimerkiksi vuokratulot ja puunmyyntitulot. Verovelvollisen yhteenlaskettuja pääomatuloja verotetaan 30 prosentin verokannalla verotettavan pääomatulon ollessa enintään 30 000 euroa. Ylimenevältä osin veroprosentti on 34 (TVL 124 §:n 2 momentti).
            - generic [ref=e169]:
              - paragraph [ref=e170]: Huomio osio alkaa
              - paragraph [ref=e171]:
                - strong [ref=e172]: "Esimerkki 1:"
              - paragraph [ref=e173]: Kiinteistön myyntihinta on 100 000 euroa, ostohinta 70 000 euroa, perusparannusmenot 10 000 euroa ja myyntikulut 1 000 euroa. Luovutusvoiton määrä on 19 000 euroa (100 000–70 000–10 000–1 000). Veron määrä on 5 700 euroa (19 000 x 30 %), jos verovelvollisella ei ole muita pääomatuloja.
              - paragraph [ref=e174]: Huomio osio päättyy
            - paragraph [ref=e175]: Jos luovutusvoittoverotusta koskevia säännöksiä ei sovelleta, luovutuksesta saatua tuloa käsitellään yleensä muuna pääomatulona.
            - heading "2.4 Luovutusvoittoverotuksen kohteen oleva omaisuus" [level=3] [ref=e176]
            - heading "2.4.1 Pääomalaina, muu lainasaatava sekä virtuaalivaluutta" [level=4] [ref=e177]
            - paragraph [ref=e178]:
              - text: Tuloverolain 45 §:n ja 50 §:n 1 momentissa tarkoitettua omaisuutta ovat myös osakeyhtiölain 12 luvun mukaiset pääomalainat sekä muut lainasaamiset, joihin liittyy aito takaisinmaksutarkoitus. Samoin tuloverolain 50 §:n 1 momentissa tarkoitettua omaisuutta ovat virtuaalivaluutat. Tästä seuraa, että mainitun kaltaisen omaisuuden luovutukset verotetaan luovutusvoittoina ja tappiollisista luovutuksista vahvistetaan tappio. Tällaisen omaisuuden luovutuksia käsitellään tarkemmin erillisissä ohjeissa
              - link "Pääomalainojen ja muiden yhtiölle annettujen lainojen luovutukset ja menetykset tuloverotuksessa" [ref=e179] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/78615/
              - text: ja
              - link "Virtuaalivaluuttojen verotus" [ref=e180] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48411/
              - text: .
            - heading "2.4.2 Vertaislaina ja lainamuotoinen joukkorahoitus" [level=4] [ref=e181]
            - paragraph [ref=e182]: Vertaislainatoiminta tarkoittaa sitä, että toisilleen tuntemattomat yksityishenkilöt lainaavat rahaa toisille yksityishenkilöille palveluntarjoajan ylläpitämän sähköisen alustan kautta.
            - paragraph [ref=e183]: Lainamuotoinen joukkorahoitus puolestaan tarkoittaa sitä, että yritykset tai sijoittajat lainaavat varoja yrityksille elinkeinotoiminnan rahoittamiseen joko sähköisen alustan kautta tai muutoin.
            - paragraph [ref=e184]:
              - text: Vertaislainasaamiset ja lainamuotoiseen joukkorahoitukseen perustuvat saamiset ovat omaisuutta, jonka luovutus käsitellään luovutusvoiton verotusta koskevien säännösten mukaisesti (
              - link "KHO 2018:11" [ref=e185] [cursor=pointer]:
                - /url: https://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2018/201800164
              - text: ).
            - paragraph [ref=e186]:
              - text: Vertaislainauksen ja lainamuotoisen joukkorahoituksen verotusta käsitellään ohjeessa
              - link "Joukkorahoituksena rahoitusta antavan henkilön verotus" [ref=e187] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/278766/
              - text: .
            - heading "2.4.3 Hallintaoikeus" [level=4] [ref=e188]
            - paragraph [ref=e189]:
              - text: Vastike, jonka verovelvollinen saa luopuessaan omaisuuden lahjoituksen yhteydessä pidättämästään hallintaoikeudesta, verotetaan myös luovutusvoittoa koskevien säännösten mukaan (
              - link "KHO 2009:13" [ref=e190] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2009/200900211
              - text: ). Hallintaoikeuksien ja hallintaoikeuden kohteena olevan omaisuuden luovutuksen verotuksesta on annettu Verohallinnon ohje
              - link "Hallintaoikeus omaisuuden luovutuksen verotuksessa" [ref=e191] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/75136/
              - text: .
            - heading "2.4.4 Kapitalisaatiosopimus" [level=4] [ref=e192]
            - paragraph [ref=e193]:
              - text: Kapitalisaatiosopimuksen luovutuksia verotetaan luovutusvoittoverotusta koskevien säännösten mukaan. Hankintameno-olettamaa ei kuitenkaan sovelleta luonnollisen henkilön tai kuolinpesän luovuttaessa kapitalisaatiosopimuksen edelleen. (TVL 45 §:n 7 momentti). Kapitalisaatiosopimuksia käsitellään ohjeessa
              - link "Kapitalisaatiosopimuksen verotus" [ref=e194] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48548/
              - text: .
            - paragraph [ref=e195]: Koska kapitalisaatiosopimus ei ole luonteeltaan arvopaperi, sen kohteena olevan omaisuuden arvon täydellinen menetys ei oikeuta kapitalisaatioon sijoitetun summan vähentämiseen luovutustappiona tuloverolain 50 §:n 3 momentin 2-kohdan mukaan. Katso tarkemmin luku 13.2.2.
            - heading "2.4.5 Säästöhenkivakuutus" [level=4] [ref=e196]
            - paragraph [ref=e197]:
              - text: Säästöhenkivakuutuksen luovutuksia verotetaan luovutusvoittoverotusta koskevien säännösten mukaan. Myös hankintameno-olettaman soveltaminen on mahdollista, jos luonnollinen henkilö tai kuolinpesä luovuttaa säästöhenkivakuutuksen edelleen. Säästöhenkivakuutuksia käsitellään ohjeessa
              - link "Henkivakuutuksen verotus" [ref=e198] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48901/
              - text: .
            - paragraph [ref=e199]: Koska säästöhenkivakuutus ei ole luonteeltaan arvopaperi, sen kohteena olevan omaisuuden arvon täydellinen menetys ei oikeuta sijoitussumman vähentämiseen luovutustappiona tuloverolain 50 §:n 3 momentin 2-kohdan mukaan. Katso tarkemmin luku 13.2.2.
            - heading "2.4.6 Työsuhdeoptioiden luovutus" [level=4] [ref=e200]
            - paragraph [ref=e201]: Työsuhdeoption käyttämiseen rinnastetaan sen luovutus (TVL 66 §:n 3 momentti). Työsuhdeoptioiden luovutuksesta saatu tulo on yleensä ansiotuloa. Jos työsuhdeoptioita kuitenkin luovutetaan vastikkeellisesti intressipiiriin kuuluvalle taholle ennen niiden käyttämistä, optioiden luovuttajalle voi kuitenkin aiheutua luovutusvoittoveroseuraamuksia.
            - paragraph [ref=e202]:
              - text: Työsuhdeoptioita on käsitelty ohjeissa
              - link "Työsuhdeoptioiden verotus" [ref=e203] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/47752/
              - text: ja
              - link "Työsuhdeoption ja työsuhteeseen perustuvan osakeannin verotus kansainvälisissä tilanteissa" [ref=e204] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/77581/
              - text: .
            - heading "2.4.7 Aineettomien oikeuksien luovutusvoitot" [level=4] [ref=e205]
            - paragraph [ref=e206]: Aineettomista oikeuksista saatavia tuloja ovat patentista, tekijänoikeudesta, mallisuojasta ja muista niihin verrattavista oikeuksista saatavat tulot. Tällaisia tuloja saavat esimerkiksi keksijät, säveltäjät, kirjailijat ja taiteilijat. Siltä osin kuin tulo perustuu verovelvollisen omaan toimintaan, se on ansiotuloa. Jos aineettoman oikeuden alkuperäinen omistaja tai tekijä itse luovuttaa aineettoman oikeuden, on sekä käyttökorvaus (esimerkiksi rojalti tai vuokra) että omistusoikeuden luovutushinta ansiotuloa.
            - paragraph [ref=e207]: Jos verovelvollinen on saanut aineettoman oikeuden perintönä tai testamentilla tai hankkinut sen vastikkeellisesti, oikeuden luovutus verotetaan luovutusvoittoverotusta koskevien säännösten mukaan.
            - paragraph [ref=e208]:
              - text: Aineettomien oikeuksien kerryttämän juoksevan tulon sekä oikeuksien luovutuksista saatujen tulojen verotusta on käsitelty tarkemmin Verohallinnon ohjeessa
              - link "Aineettomista oikeuksista saatavien tulojen verotus" [ref=e209] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48945/
              - text: .
            - heading "2.5 Kokonaan tai osittain verovapaat luovutukset" [level=3] [ref=e210]
            - paragraph [ref=e211]: Tuloverolain 48–49 §:t sisältävät säännökset siitä, milloin luovutusvoitto voi olla joko kokonaan tai osittain verovapaa. Verovapaita ovat laissa säädetyin edellytyksin oman asunnon luovutusvoitto ja sukupolvenvaihdosluovutuksissa syntyvät voitot.
            - paragraph [ref=e212]: "Lisäksi seuraavat erikseen tuloverolain 48 §:ssä mainitut luovutukset ovat verovapaita:"
            - list [ref=e213]:
              - listitem [ref=e214]: Tavanomaisen koti-irtaimiston luovutusvoitot on säädetty verovapaiksi 5 000 euroon saakka.
              - listitem [ref=e215]: Luonnollisen henkilön ja kuolinpesän saama omaisuuden luovutusvoitto ei ole veronalainen, jos samana verovuonna saadut luovutushinnat ovat yhteensä enintään 1 000 euroa. Tällöin yhteissummassa ei oteta huomioon muutoin verovapaaksi säädettyä luovutusta eikä tavanomaisen koti-irtaimiston tai muun siihen rinnastettavan henkilökohtaiseen käyttöön tarkoitetun omaisuuden luovutusta (TVL 48 § 6 momentti). Vastaavasti tällaisista rajan alle jäävistä luovutuksista ei voida vahvistaa luovutustappiota edellyttäen, että luovutusten yhteissummaan luettavan omaisuuden yhteenlaskettu hankintameno on enintään 1 000 euroa (TVL 50 § momentti).
              - listitem [ref=e216]: Luonnonsuojelualueeksi luonnonsuojelulain (9/2023 ja sitä edeltävä 1096/1996) mukaan valtiolle tai valtion liikelaitokselle tapahtuva kiinteän omaisuuden luovutus on verovapaa (TVL 48 § 1 momentin 4-kohta). Luovutuskirjassa ja luonnonsuojelualuetta koskevissa asiakirjoissa ilmaistaan menettelyn edellytykset. Luonnonsuojelualueiden hankinnasta valtiolle päättää ympäristöministeriö ja luonnonsuojelualueiden kiinteistönmuodostuksesta vastaa Maanmittaushallinto.
            - paragraph [ref=e217]: Osittain verovapaita ovat pakkolunastuksessa ja laissa mainituille julkisyhteisöille tapahtuneissa luovutuksissa syntyneet voitot (TVL 49 §).
            - paragraph [ref=e218]: "Kokonaan tai osittain verovapaita luovutusvoittoja on käsitelty tarkemmin seuraavissa Verohallinnon ohjeissa:"
            - list [ref=e219]:
              - listitem [ref=e220]:
                - link "Arvopaperien luovutusten verotus" [ref=e221] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - listitem [ref=e222]:
                - link "Henkilöyhtiön ja yksityisliikkeen sukupolvenvaihdos verotuksessa" [ref=e223] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60521/
              - listitem [ref=e224]:
                - link "Kokonaan tai osittain verovapaat luovutusvoitot henkilöverotuksessa" [ref=e225] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48930/
              - listitem [ref=e226]:
                - link "Kuolinpesän omaisuuden luovutuksen verotus" [ref=e227] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48076/
              - listitem [ref=e228]:
                - link "Maatilan sukupolvenvaihdos verotuksessa" [ref=e229] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48496/
              - listitem [ref=e230]:
                - link "Osakeyhtiön sukupolvenvaihdos verotuksessa" [ref=e231] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60519/
              - listitem [ref=e232]:
                - link "Verovapaa oman asunnon luovutus" [ref=e233] [cursor=pointer]:
                  - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48921/
            - heading "2.6 Vähennyskelpoiset luovutustappiot" [level=3] [ref=e234]
            - paragraph [ref=e235]: Tuloverolain 50 §:n 1 momentin mukaan omaisuuden luovutuksesta syntyneet tappiot ovat vähennyskelpoisia, ellei niitä ole erikseen säädetty vähennyskelvottomiksi. Vähennyskelpoinen luovutustappio vähennetään verovelvollisen saamasta omaisuuden luovutusvoitosta tai muista pääomatuloista verovuonna ja viitenä seuraavana vuonna. Luovutustappiota on käsitelty tarkemmin jäljempänä ohjeen luvussa 13.
            - paragraph [ref=e236]:
              - text: Omistajallaan edelleen olevan omaisuuden arvon menettäminen ei ole luovutusvoittoverotuksen piiriin kuuluva tapahtuma muissa kuin laissa erikseen säädellyissä poikkeustilanteissa (TVL 50 § 3 momentti). Menetyksiä on käsitelty jäljempänä luvussa 13.2 sekä ohjeessa
              - link "Arvopaperien luovutusten verotus" [ref=e237] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48262/
              - text: .
            - heading "3 Tulolähdejaon merkitys luovutusvoiton verotuksessa" [level=2] [ref=e238]
            - heading "3.1 Yleistä tulolähdejaon merkityksestä" [level=3] [ref=e239]
            - paragraph [ref=e240]: "Tuloverotuksessa on kolme tulolähdettä: elinkeinotoiminnan tulolähde, maatalouden tulolähde sekä henkilökohtainen tulolähde, josta käytetään myös nimitystä muun toiminnan tulolähde."
            - paragraph [ref=e241]: Säännökset elinkeinotoiminnan tuloksen laskemiselle ovat elinkeinotulon verottamisesta annetussa laissa (360/1968, EVL). Maatalouden tuloksen laskemissäännökset ovat maatilatalouden tuloverolaissa (543/1967, MVL) ja muun toiminnan tulolähteen tuloksen laskemisen säännökset ovat tuloverolaissa.
            - paragraph [ref=e242]: Elinkeinotoiminnan tulolähteeseen kuuluu liike- ja ammattitoiminta. Maatalouden tulolähteeseen kuuluu varsinainen maatalous sekä sellainen erikoismaatalous taikka maa- tai metsätalouteen liittyvä muu toiminta, jota ei ole pidettävä elinkeinotoimintana. Henkilökohtaiseen tulolähteeseen kuuluvat elinkeinotulon verottamisesta annetun lain 1 §:n 2 momentin perusteella siinä mainittujen yhteisöjen tulot, jotka eivät ole elinkeinotoimintaa tai maataloutta.
            - paragraph [ref=e243]: "Elinkeinotulon verotuksesta annettua lakia muutettiin verovuodesta 2020 alkaen siten, että tulolähdejako poistettiin elinkeinotulon verottamisesta annetun lain 1 §:n 2 momentissa tarkoitetuilta yhteisöiltä, joita ovat esimerkiksi osakeyhtiöt ja osuuskunnat lukuun ottamatta lainkohdassa mainittuja poikkeuksia: osittain verovapaa yhteisö, ulkomainen kuolinpesä, tuloverolain 22 §:ssä tarkoitettu yleishyödyllinen yhteisö sekä asunto-osakeyhtiölain (1599/2009) 1 luvun 2 §:ssä tarkoitettu asunto-osakeyhtiö, 28 luvun 2 §:ssä tarkoitettu keskinäinen kiinteistöosakeyhtiö sekä sellainen osuuskunta, joka on verrattavissa asunto-osakeyhtiöön."
            - paragraph [ref=e244]:
              - text: Muutoksen takia laissa tarkoitettujen yhteisöjen verotettava muun toiminnan kuin maatalouden tulo lasketaan elinkeinoverolain mukaan yhteisön harjoittaman toiminnan luonteesta riippumatta. Tästä seuraa, että kyseisillä yhteisöillä ei voi olla muun toiminnan tulolähdettä eikä siten tuloverolain mukaan verotettavia luovutusvoittoja tai ‑tappioita. Muutoksesta on kerrottu tarkemmin ohjeessa
              - link "Eräiden yhteisöjen tulolähdejaon poistaminen" [ref=e245] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/77302/
              - text: .
            - paragraph [ref=e246]: Edellä lueteltujen pääsäännöstä poikkeavien yhteisöjen on selvitettävä, verotetaanko luovutus tuloverolain mukaisena luovutusvoittona vai elinkeinotulon verottamisesta annetun lain mukaisena elinkeinotoiminnan tulona. Tällaisia rajanvetotilanteita on käsitelty lyhyesti seuraavissa kappaleissa 3.2 ja 3.3.
            - paragraph [ref=e247]: Luovutusvoiton laskeminen hankintameno-olettamaa käyttämällä on mahdollista vain tuloverolain mukaisessa verotuksessa ja muilla kuin yhteisöillä, avoimilla yhtiöillä ja kommandiittiyhtiöillä. Lisäksi tuloverolain mukaisessa verotuksessa luovutusvoitto verotetaan aina pääomatulona. Elinkeinotoiminnan tulo taas jaetaan verovuotta edeltäneen verovuoden nettovarallisuuden perusteella ansio- ja pääomatulona verotettavaksi.
            - heading "3.2 Rakennustoiminta ja kiinteistöjen jalostaminen" [level=3] [ref=e248]
            - paragraph [ref=e249]:
              - text: Yksityishenkilöiden harjoittama rakentamistoiminta ja kiinteistöjen jalostustoiminta voivat tulla verotetuiksi elinkeinotoimintana. Tällöin tuloverolain luovutusvoiton verotusta koskevia säännöksiä ei sovelleta niistä saatujen tulojen verotukseen. Elinkeinotoiminnan ja muun toiminnan välistä rajanvetoa on käsitelty ohjeessa
              - link "Yksityishenkilön kiinteistöjen ja huoneistojen osto-, jalostus- ja myyntitoiminnan verotus" [ref=e250] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/152765/
              - text: .
            - heading "3.3 Arvopaperikauppa" [level=3] [ref=e251]
            - paragraph [ref=e252]:
              - text: Yksityishenkilön laajamittaista sijoitustoimintaa, jolle ovat luonteenomaisia pitkäaikaiset osakeomistukset, ei pääsääntöisesti pidetä elinkeinotoimintana. Luonnollisen henkilön harjoittamaan sijoitustoimintaan sovelletaan luovutusvoiton verotusta koskevia tuloverolain säännöksiä (
              - link "KHO 2000:67" [ref=e253] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2000/200003191
              - text: ).
            - paragraph [ref=e254]:
              - text: Yksityishenkilön päätoimisesti harjoittama arvopaperikauppa voi joissain tilanteissa saavuttaa sellaisen laajuuden tai aktiivisuuden asteen, että kauppaa voidaan pitää elinkeinotoimintana. Ollakseen elinkeinotoimintaa arvopaperikaupan on oltava jatkuvaa, suunnitelmallista, aktiivista, taloudellisen riskin ottavaa (esimerkiksi suuri velkapääoman määrä) ja voittoa tavoittelevaa. Tulolähteen valinnalle ei voida asettaa euromääräisiä rajoja. Toimintaa arvioidaan kokonaisuutena edellä mainittujen tunnusmerkkien täyttymisen perusteella. Arvopaperisijoittamista käsitellään ohjeessa
              - link "Arvopaperisijoittamisen tulolähde" [ref=e255] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48514/
              - text: .
            - heading "3.4 Maatilatalouden luovutukset, jotka verotetaan tuloverolain mukaisesti" [level=3] [ref=e256]
            - paragraph [ref=e257]: Tuloverolain mukaan verotetaan myös maatilan tai sen osan luovutuksesta saadut voitot (MVL 21 §). Jos maatilan tai sen osan kauppaan sisältyy maatalouteen kuuluva rakennus tai rakennelma, myös sen luovutuksesta saatuun voittoon sovelletaan tuloverolain säännöksiä. Maatilalla tarkoitetaan säännöksissä itsenäistä taloudellista yksikköä, jolla harjoitetaan maa- tai metsätaloutta (MVL 2 §:n 2 momentti). Maatiloja ovat siten myös metsätilat.
            - paragraph [ref=e258]: Maatalouteen kuuluvasta rakennuksesta tai rakennelmasta tai sen osasta saadut luovutushinnat ovat maatilatalouden tuloverolain mukaan verotettavaa maatalouden tuloa, jos tällainen omaisuus myydään erikseen ilman maapohjaa (MVL 5 §:n 1 momentin 2 kohta). Maatilatalouden tuloverolain säännöksiä sovelletaan myös mm. maatalouden koneista, kalustosta ja laitteista saatuihin luovutushintoihin (MVL 5 §:n 1 momentin 3 kohta). Tuloverolain luovutusvoittoa koskevia säännöksiä sovelletaan metsätalouden rakennusten, koneiden ja kaluston luovutuksesta saatuihin voittoihin.
            - paragraph [ref=e259]:
              - text: Maatalouden varallisuuden ja henkilökohtaisen varallisuuden rajanvedosta on kysymys osakkeita koskevassa päätöksessä
              - link "KHO 14.9.2001 taltio 2183" [ref=e260] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/lyhyet/2001/200102183
              - text: . Osakkeet olivat henkilökohtaista varallisuutta päätöksessä tarkoitetuissa olosuhteissa, kun osakeomistus ei ollut maatalouden harjoittamisen takia välttämätöntä.
            - paragraph [ref=e261]:
              - text: Maatalouden käyttöomaisuuteen kuuluvien osakkeiden luovutusta koskevassa päätöksessä
              - link "KHO 2003:76" [ref=e262] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2003/200302719
              - text: MVL 4 §:n säännöstä tulojen verottamisesta sovellettiin siten, että maatalouden puhtaaseen tuloon lisättiin tuloverolain säännösten mukaan lasketun veronalaisen luovutusvoiton määrä. Luovutusvoittoa laskettaessa vähennettiin TVL 46 §:n 1 momentin mukaisesti hankintameno-olettama.
            - heading "4 Luovutusvoitosta verovelvolliset tahot" [level=2] [ref=e263]
            - heading "4.1 Luonnollinen henkilö" [level=3] [ref=e264]
            - paragraph [ref=e265]: Jokainen luonnollinen henkilö on erillinen verovelvollinen. Luovutusvoitosta verotetaan luovutettavan hyödykkeen omistajaa. Omistajana pidetään sitä, jonka nimiin omaisuus on hankittu laillisella saannolla (nimiperiaate). Toisen nimiin tehtävän kaupan rahoittaminen ei luo rahoittajalle omistussuhdetta kaupan kohteeseen. Rahoittaja antaa näissä tilanteissa joko lahjan tai lainan ostajalle.
            - paragraph [ref=e266]: Yhteisesti omistetun omaisuuden luovutuksesta verotetaan kutakin omistajaa siitä osuudesta, joka hänellä oli luovutettuun omaisuuteen. Kullakin osaomistajalla on yhteisesti omistettuun esineeseen oma hankintamenonsa ja omistusaikansa sen mukaan, miten ja milloin hän on osuutensa saanut. Luvussa 8.3 käsitellään yhteisesti omistetun esineen perusparannusmenojen vaikutusta osaomistajien hankintamenoon. Yhteinen omistus muodostuu myös, jos kaksi henkilöä rakentaa yhteisen rakennuksen toisen yksin omistamalle tontille. Tällöin rakennus on kahden henkilön omistuksessa, mutta maapohjan omistaa yksin toinen henkilöistä.
            - paragraph [ref=e267]: Erillisverotus koskee myös puolisoita sekä vanhempia ja heidän lapsiaan. Perheenjäsenten yhdessä omistaman hyödykkeen myynnistä saatu luovutusvoitto lasketaan siten kullekin perheenjäsenelle erikseen. Jos luovutettu omaisuus on esimerkiksi puolisoiden yhdessä omistamaa tavanomaista koti-irtaimistoa, kummankin saamasta luovutusvoitosta on verovapaata 5 000 euroa vuodessa (TVL 48 §).
            - heading "4.2 Kuolinpesä" [level=3] [ref=e268]
            - paragraph [ref=e269]: Kuolinpesä on erillinen verovelvollinen (TVL 17 §:n 2 momentti). Jakamattomaan kuolinpesään kuuluvan omaisuuden luovutuksesta saatu voitto verotetaan kuolinpesän tulona.
            - paragraph [ref=e270]: Osuus jakamattomaan kuolinpesään on osakkaan irtainta omaisuutta ja sen luovutuksesta syntyvä luovutusvoitto on osakkaan tuloa.
            - paragraph [ref=e271]:
              - text: Kuolinpesän jakamisen jälkeen luovutusvoitosta verotetaan osakkaita ja omaisuuden omistusaika lasketaan perittävän kuolinpäivästä. Jos kuolinpesä on jaettu osittain, jo jaetun omaisuuden luovutusvoitto on osakkaiden tulona verotettavaa tuloa (
              - link "KHO 1992-B-521" [ref=e272] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1992/199203309
              - text: ) ja jakamatta olevan omaisuuden luovutusvoitto on kuolinpesän verotettavaa tuloa.
            - paragraph [ref=e273]: Kuolinpesän luovutusvoittoverotukseen vaikuttavaa metsävähennyksen lisäämistä ja luovutustappion vähentämistä käsitellään tämän ohjeen luvuissa 5.5.1 ja 13.1.
            - paragraph [ref=e274]:
              - text: Kuolinpesän luovutusvoiton verotuksesta on kerrottu tarkemmin ohjeessa
              - link "Kuolinpesän omaisuuden luovutuksen verotus" [ref=e275] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48076/
              - text: ja
              - link "Sukupolvenvaihdos perintötilanteissa" [ref=e276] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/60537/
              - text: . Kuolinpesäosuuksien luovutusten verotusta käsitellään ohjeessa
              - link "Kuolinpesäosuuden luovutuksen verotus" [ref=e277] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/78126/
              - text: .
            - heading "4.3 Verotusyhtymä" [level=3] [ref=e278]
            - paragraph [ref=e279]: Verotusyhtymä on kahden tai useamman henkilön muodostama yhteenliittymä, joka harjoittaa maatilatalouden tuloverolain (543/1967) 2 §:n 2 momentissa tarkoitetun maatilan viljelyä tai hallintaa, metsätaloutta tai sellaisen kiinteistön hallintaa, josta yhteenliittymä on arvonlisäverovelvollinen tai hakeutunut arvonlisäverovelvolliseksi kiinteistön käyttöoikeuden luovuttamisesta arvonlisäverolain 30 §:n tarkoittamalla tavalla. Maatilalla tarkoitetaan maatilatalouden tuloverolain 2 §:n 2 momentin (543/1967) mukaan itsenäistä taloudellista yksikköä, jolla harjoitetaan maa- tai metsätaloutta. Maatiloja ovat siten myös metsätilat.
            - paragraph [ref=e280]: TVL 4 §:n 1 momentin 2 kohdan mukaisesti muun kiinteistön kuin maatilan yhteisestä omistuksesta tai hallinnasta ei muodostu verotusyhtymää, ellei kiinteistöön liity arvonlisäverollista vuokrausta tai muuta arvonlisäverollista toimintaa. Puolisoiden yhdessä omistamasta kiinteistöstä ei muodostu verotusyhtymää.
            - paragraph [ref=e281]:
              - text: Verotusyhtymä ei ole oikeussubjekti, joka voisi hankkia omaisuutta tai ottaa velkaa omiin nimiinsä. Verotusyhtymä ei ole myöskään erillinen verovelvollinen. Se on verotuksessa ainoastaan laskentasubjekti tuloja ja menoja laskettaessa.
              - text: Verotusyhtymän tulo tai tappio jaetaan osakkaiden kesken heidän osuuksiensa mukaisessa suhteessa. Verotusyhtymien verotusta käsitellään tarkemmin ohjeessa
              - link "Verotusyhtymän verotus" [ref=e282] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/99022/
              - text: .
            - paragraph [ref=e283]: Kun verotusyhtymän osakkaat luovuttavat kiinteistön määräosia, kutakin osakasta verotetaan erikseen omasta luovutuksestaan. Yhteisesti omistetun omaisuuden luovutusta käsitellään luvuissa 4.1 ja 8.2.1.
            - heading "5 Luovutusvoiton laskeminen" [level=2] [ref=e284]
            - heading "5.1 Luovutushinta" [level=3] [ref=e285]
            - paragraph [ref=e286]: Luovutusvoiton määrän laskemiseksi on välttämätöntä selvittää omaisuuden luovutushinta. Luovutushinta on vastike, jonka omaisuuden luovuttaja saa luovutuksen takia. Luovutushinta ilmenee yleensä selvästi omaisuuden kauppakirjasta. Kaupalla luovutetun omaisuuden luovutushinta on rahana tai muuna vastikkeena saatu kauppahinta. Käytännössä kauppakirjasta ei aina ilmene luovutushinnan tarkka määrä tai kauppahinta voi koostua erilaisista eristä.
            - paragraph [ref=e287]:
              - text: Jos ostaja on ottanut kaupan yhteydessä vastattavakseen myyjän veloista tai myyjän velkojen kauppakirjan allekirjoituspäivää edeltävään aikaan kohdistuvista koroista, nämä suoritukset on katsottu kauppahinnan osaksi (esimerkiksi
              - link "KHO 1988-B-560" [ref=e288] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1988/198802287
              - text: ). Jäljempänä tässä luvussa on käsitelty kaupan kohteena olevan asunto-osakeyhtiön osakkeisiin kohdistuvaa yhtiölainaosuutta, joka ei ole tässä tarkoitettu myyjältä ostajalle siirtyvä vastuu.
            - paragraph [ref=e289]:
              - text: Kun osa myyjän saamasta kauppahinnasta oli talletettu ostajien kauppahinnan maksamiseksi ottamien velkojen vakuudeksi ja talletus ostajien maksukyvyttömyyden vuoksi käytettiin heidän velkojensa maksuksi, ei talletuksen pääomaa ja korkoa otettu huomioon kauppahinnan vähennyksenä (
              - link "KHO 1994-B-536" [ref=e290] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1994/199405101
              - text: ). Samoin luovutusvoiton laskennassa käytettävä myyntihintaa ei pienene sen takia, että myydyn omaisuuden kauppahinta tai osa siitä käytetään myyjän antaman vakuuden takia ulosottovelkojen maksuksi (ks. luku 12.6 ja
              - link "KHO 1996-B-520" [ref=e291] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1996/199601872
              - text: ).
            - paragraph [ref=e292]: Yrityskaupoissa saatetaan osa kauppahinnasta tallettaa määräaikaisesti escrow-tilille. Talletuksen tarkoituksena on mahdollistaa kaupan kohteessa määräaikana havaittavien kauppahintaa alentavien perusteiden turvattu ja sujuva käsittely. Escrow-tililtä kauppahinta vapautetaan myyjälle tai siitä palautetaan selvitykseen perustuva osa ostajalle. Tuloverotuksessa escrow-talletus ei vaikuta luovutusvoittoverotukseen, vaan kaupantekovuoden luovutushintana pidetään koko sovittua kauppahintaa. Luovutusvoittoverotukseen ei vaikuta myöskään se, että ostaja on pidättänyt osan jo sovituista kauppahintaeristä tai maksuista siihen saakka, kunnes tietty kauppakirjassa sovittu ehto täyttyy (esimerkiksi holdback). Jos kauppahintaa kuitenkin sopimuksen ehtojen mukaisesti myöhemmin alennetaan, myyjä voi pyytää luovutusvoiton verotusta oikaistavaksi muutoksenhakua koskevien määräaikojen puitteissa.
            - paragraph [ref=e293]: Luovutusvoiton verotusta voidaan muuttaa oikaisuvaatimuksen perusteella, jos kauppahintaa on tuomioistuimen päätöksellä tai osapuolten sopimuksin alennettu olosuhteissa, joissa oikeus olisi voinut määrätä kauppahinnan alennettavaksi. Määräys sisältyy varainsiirtoverolain 40 § 2 momenttiin, jota sovelletaan vakiintuneesti myös tuloverotuksessa. Kauppahinnan aleneminen alentaa myös ostajalle muodostunutta omaisuuden hankintamenoa. Jos ostajaa on jo verotettu omaisuuden edelleen myynnistä ennen myyjän verotuksen oikaisua, hänen luovutusvoittonsa verotusta korjataan seurannaismuutosta koskevan säännöksen nojalla pienentämällä laskennassa käytettävää omaisuuden hankintamenoa.
            - paragraph [ref=e294]: Jos kauppahinta on jäänyt kaupantekohetkellä ostajan velaksi myyjälle, ei velan maksamatta jääminen ole peruste poistaa myyjältä luovutusvoiton verotusta. Saamatta jäävä kauppahintavelka jää myyjän menetykseksi, joka ei henkilöverotuksessa ole vähennyskelpoinen. Jos kauppahintavelka jää kuitenkin saamatta ostajalla jo kauppahetkellä olleen, mutta salatun maksukyvyttömyyden tai petollisuuden vuoksi, voidaan myyjän luovutusvoiton verotusta oikaista, vaikka kauppasopimusta ei olisikaan korjattu. Myyjän on selvitettävä ja todennettava tällaisen poikkeuksellisen perusteen olemassaolo.
            - paragraph [ref=e295]: Kaupan purkamista on käsitelty luvussa 12.11.
            - paragraph [ref=e296]: Varainsiirtoverotuksessa asunto- tai kiinteistöyhtiön osakkeiden luovutuksesta suoritettavan veron laskentaperusteeseen luetaan kauppahinnan lisäksi luovutettuihin osakkeisiin kohdistuva yhtiölainaosuus. Tuloverotuksessa asunto- tai kiinteistöyhtiön osakkeiden luovutushintaan ei kuitenkaan lueta osakkeisiin luovutushetkellä kohdistuvaa osuutta yhtiön lainoista. Yhtiölainaosuuden määrä ilmenee kaupantekohetkellä laaditusta isännöitsijän todistuksesta.
            - paragraph [ref=e297]: Kauppahinnan lopullinen määrä on saatettu kauppakirjassa sitoa johonkin tulevaisuudessa toteutuvaan epävarmaan seikkaan. Tällaisia luovutushinnan muutoksia on käsitelty jäljempää luvussa 6.
            - heading "5.2 Luovutusvoiton määrä" [level=3] [ref=e298]
            - paragraph [ref=e299]: Omaisuuden luovutuksesta saadun voiton tai tappion määrä lasketaan siten, että luovutushinnasta vähennetään omaisuuden hankintamenon poistamatta olevan osan ja voiton hankkimisesta syntyneiden menojen yhteismäärä. Omaisuuden hankintamenoa on käsitelty tarkemmin luvussa 8 ja voiton hankkimisesta aiheutuneita menoja luvussa 9.
            - paragraph [ref=e300]: Jos luovutettu omaisuus on saatu usealla eri saannolla, luovutusvoitto tai tappio lasketaan kunkin saannon osalta erikseen. Saannolla tarkoitetaan tässä ostokauppaa, saatua lahjaa tai perintöä tai muuta omaisuuden saantotapaa. Asiaa käsitellään tarkemmin luvussa 5.4.
            - paragraph [ref=e301]: Luovutusvoittoa ja tappiota laskettaessa hankintameno ja luovutushinta otetaan huomioon nimellisestä määrästään. Hankintamenoa ei muunneta myyntihetken reaaliarvoa vastaavaksi, joten kauan omistetun omaisuuden myynti johtaa helposti merkittävään myyntihinnan ja ostohinnan erotukseen eli luovutusvoittoon.
            - paragraph [ref=e302]: Luonnollinen henkilö, kotimainen kuolinpesä ja yhteisetuus voivat kuitenkin käyttää poistamatta olevan hankintamenon ja voiton hankkimisesta syntyneiden menojen yhteismäärän sijaan niin sanottua hankintameno-olettamaa. Hankintameno-olettamaa voidaan käyttää esimerkiksi silloin, kun hankintameno ei ole tiedossa tai hankintameno on reaalisen arvonnousun tai inflaation seurauksena jäänyt myyntihintaan nähden vähäiseksi. Hankintameno-olettamaa voidaan käyttää vain silloin, kun luovutusvoitto verotetaan tuloverolain mukaan. Hankintameno-olettamaa on käsitelty tarkemmin luvussa 10.
            - paragraph [ref=e303]: Hankinta-aika määräytyy luovutusasiakirjan allekirjoituspäivän mukaan riippumatta siitä, milloin kauppahinta maksetaan tai siirtyy tilille.
            - paragraph [ref=e304]: Jos kauppahinta on määritelty muussa valuutassa kuin euroissa, valuutan muuntokurssi määräytyy sekä ostajalle että myyjälle yhdenmukaisesti luovutuskirjan allekirjoituspäivän Euroopan keskuspankin virallisen kurssin mukaan. Valuuttakurssivoitosta ja -tappiosta on kerrottu enemmän luvussa 8.11. Suomen markoissa suoritettu hankintameno muunnetaan euroiksi jakamalla markkamääräinen hankintameno kiinteällä muuntokertoimella 5,94573.
            - heading "5.3 Luovutusvoiton määrä omaisuuden vaihtotilanteissa" [level=3] [ref=e305]
            - paragraph [ref=e306]: Vaihdossa kumpikin vaihdon osapuoli luovuttaa omaisuutta toiselle osapuolelle. Vaihdossa saadun omaisuuden luovutushetken mukainen käypä arvo on luovutetusta omaisuudesta saatu luovutushinta. Jos omaisuuden luovuttaja saa vaihdossa välirahaa, luovutushintaa on saadun omaisuuden lisäksi myös välirahan määrä. Jos luovuttaja maksaa vaihdossa välirahaa, luovutushinta on vaihdossa saadun omaisuuden luovutushetken käypä arvo vähennettynä maksetun välirahan määrällä.
            - generic [ref=e307]:
              - paragraph [ref=e308]: Huomio osio alkaa
              - paragraph [ref=e309]:
                - strong [ref=e310]: "Esimerkki 2:"
              - paragraph [ref=e311]: Antti ja Bertta vaihtavat omaisuutta keskenään. Vaihtokirjassa on todettu kiinteistövälittäjien lausuntoihin perustuvat omaisuuden arvot. Antti luovuttaa Bertalle kesämökkikiinteistön. Kesämökkikiinteistön käypä arvo luovutushetkellä on 100 000 euroa. Bertta luovuttaa Antille rakentamattoman tontin, 1 000 Yhtiö Oy:n osaketta ja 2 700 euroa käteistä rahaa. Rakentamattoman tontin käypä arvo on 70 000 euroa ja Yhtiö Oy:n 1 000:n osakkeen arvo on 27 300 euroa.
              - paragraph [ref=e312]: Antti on aikoinaan ostanut kesämökkikiinteistön 60 000 eurolla ja maksanut ostosta varainsiirtoveroa 2 400 euroa. Kesämökkikiinteistön hankintameno on 62 400 euroa (60 000 euroa + 2 400 euroa = 62 400 euroa).
              - paragraph [ref=e313]: Antti saa kesämökkikiinteistöstä luovutushintana 100 000 euroa (70 000 euroa + 27 300 euroa + 2 700 euroa = 100 000 euroa). Antille syntyy kesämökkikiinteistön luovutuksesta voittoa 37 600 euroa (100 000 euroa ‑ 62 400 euroa = 37 600 euroa).
              - paragraph [ref=e314]: Bertta on aikoinaan hankkinut rakentamattoman tontin 30 000 eurolla ja Yhtiö Oy:n osakkeet 40 000 eurolla. Bertan katsotaan luovuttaneen tontin ja osakkeet ensimmäisessä kappaleessa mainituilla käyvillä arvollaan eli tontin 70 000 eurolla ja osakkeet 27 300 eurolla. Bertalle syntyy luovutusvoittoa tontista 40 000 euroa (70 000 - 30 000 = 40 000 euroa) ja luovutustappiota Yhtiö Oy:n osakkeista 12 700 euroa (27 300 euroa – 40 000 euroa = 12 700 euroa).
              - paragraph [ref=e315]: Huomio osio päättyy
            - paragraph [ref=e316]: Vaihdon luovutusvoittoa määritettäessä luovutushinnaksi katsotaan enintään luovutetun esineen käypä arvo ja sen lisäksi mahdollisesti maksetun välirahan määrä. Jos vastikkeena saatu esine on arvokkaampi kuin vaihdossa luovutettu esine eikä välirahaa makseta, on arvojen erotus yleensä lahjaa.
            - paragraph [ref=e317]: Yksittäisen esineen yhteisomistuksen purkamista siten, että kumpikin omistaja saa kyseisestä esineestä yksin omistukseensa omistusoikeuttaan vastaavan osuuden, ei pidetä vastikkeellisina vaihtoina. Tällaisesta on tyypillisesti kyse silloin, kun esimerkiksi kahden henkilön omistama kiinteistö jaetaan maanmittaustoimituksella kahdeksi yhtä arvokkaaksi kiinteistöksi, jotka tulevat osapuolten erillisomistukseen.
            - paragraph [ref=e318]:
              - text: Luovutusvoittoverotettavaa luovutusta ei tapahdu, kun tavanomaisen osakeyhtiön osakkeiden murto-osainen yhteisomistus (50/50) puretaan jakamalla osakkeet tasan yhteisomistajien kesken (
              - link "KHO 1981 B-II-566" [ref=e319] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1981/198104147
              - text: ). Päätöksestä ilmenevää periaatetta voidaan soveltaa osakkeiden yhteisomistuksen purkamisiin vastaavissa tapauksissa.
            - paragraph [ref=e320]:
              - text: Yhteisomistuksen purkamista pidettiin kuitenkin vaihdonluonteisena luovutuksena, kun omistajat aikoivat jakaa keskenään asunto-osakeyhtiön useiden asuinhuoneistojen hallintaan oikeuttavat osakkeet, jotka he yhdessä omistivat (
              - link "KHO 2001:48" [ref=e321] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2001/200102460
              - text: ). Purkaminen oli tarkoitus toteuttaa siten, että kukin saisi järjestelyssä yksin omistukseensa tiettyjen huoneistojen hallintaan oikeuttavat osakkeet ja luovuttaisi osuutensa muiden täyteen omistukseen tulevista huoneistoista.
            - paragraph [ref=e322]:
              - text: Nykyisin voimassa olevan kiinteistönmuodostamislain 58 §:n 1 momentin mukainen vapaaehtoinen tilusvaihto ei ole tuloverolain 32 §:ssä tarkoitettu luovutus (
              - link "KHO 2006:81" [ref=e323] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2006/200602938
              - text: ). Kiinteistönmuodostamislain mukaisessa tilusvaihdossa ei käytetä vähäistä suurempaa rahavastiketta tasauseränä.
            - paragraph [ref=e324]:
              - text: Korkein hallinto-oikeus katsoi päätöksessään
              - link "KHO 2022:81" [ref=e325] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2022/202202028h
              - text: ", että useiden kiinteistöjen yhteisarvohalkominen kokonaisarvohalkomisen menetelmää käyttäen ei ollut vastikkeellinen luovutus, kun kaikki rekisteriyksiköt oli omistettu samoin omistusosuuksin, raha- tai muita vastikkeita ei suoritettu ja osapuolten varallisuuden määrä säilyi ennallaan."
            - paragraph [ref=e326]:
              - text: Omaisuuden luovutusta ei ole katsottu tapahtuvan, jos omistaja yhteismetsälain mukaisesti liittää metsätilansa yhteismetsään yhteismetsäosuutta vastaan (
              - link "KHO 2002:83" [ref=e327] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/2002/200203066
              - text: ). Päätöksen perusteluissa todetaan, että yhteismetsä on kiinteistöjaotuksellisesti kiinteistöjen yhteinen alue. Se kuuluu murto-osina niihin kiinteistöihin, joilla on osuus yhteismetsään. Yhteisalueosuuden ja siis myös yhteismetsäosuuden luovutus verotetaan kuten kiinteistön luovutus (Maakaari 2 §). Yhteisetuuksien verotusta käsitellään ohjeessa
              - link "Yhteisetuuksien tuloverotus" [ref=e328] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/87053/
              - text: . Mainitussa ohjeessa on selvitetty myös yhteisetuuden purkautumisen verovaikutusta osakkaan kannalta.
            - paragraph [ref=e329]: Vaihto on vastikkeellinen, jos esimerkiksi kaksi kiinteistöä puoliosuuksin omistavat sisarukset purkavat yhteisomistussuhteen siten, että toiselle tulee toinen ja toiselle toinen kiinteistöistä. Vastikkeellinen luovutus tapahtuu myös mm. yhteisen vesijätön jaossa, jos jakoa toimitettaessa käytetään lunastusmenettelyä.
            - paragraph [ref=e330]: Osakevaihto, joka ei täytä EVL 52 f §:n edellytyksiä, käsitellään vastikkeellisena ja veronalaisena luovutuksena. Osapuolten asiana on esittää selvitys luovutusarvosta. Jos arvostusta ei ole selvitetty tai se on epäluotettava, käypä arvo joudutaan arvioimaan. Jos kaupassa käytetään vastikkeena julkisesti noteerattuja osakkeita, voidaan luovutusarvoksi hyväksyä osapuolten esittämän selvityksen perusteella mikä tahansa sitovan kaupantekopäivän kurssi. Toisen osapuolen luovutushintana ja toisen osapuolen ostohintana pidetään siten vähintään kyseisen päivän alinta hintaa ja korkeintaan saman päivän ylintä noteerausta. Jos selvitystä osapuolten sopimasta hinnasta ei ole, käytetään sitovan kaupantekopäivän painotetun keskikurssin mukaan laskettua hintaa.
            - heading "5.4 Vaiheittain saadun omistusoikeuden vaikutus luovutusvoiton ja -tappion laskentaan" [level=3] [ref=e331]
            - paragraph [ref=e332]: Jos luovutettu omaisuus on saatu tai hankittu useassa vaiheessa, kullakin näin muodostuneella omistusosuudella on oma hankintahinta ja omistusaika. Tällöin omaisuuden yhteenlaskettu luovutusvoitto tai -tappio muodostuu kunkin omistusosan erillisestä voitosta tai tappiosta. Kunkin omistusosuuden luovutus on myös syytä ilmoittaa erikseen.
            - paragraph [ref=e333]:
              - text: Kun myydään sellaista omaisuutta, joka on hankittu vaiheittain useilla erillisillä saannoilla, myös hankintameno-olettama lasketaan jokaiselle saannolle erikseen. Tällöin kunkin osahankinnan omistusaika alkaa sen saantohetken mukaan. Poikkeus edellä mainittuun pääsääntöön on tilanne, jossa maapohja on hankittu tai vuokrattu siirtokelpoisella vuokraoikeudella aiemmin ja rakennus on rakennettu myöhemmin
              - link "(KHO 1970-II-523)" [ref=e334] [cursor=pointer]:
                - /url: https://finlex.fi/fi/oikeus/kho/vuosikirjat/1970/197001115
              - text: . Tällaisessa rakentamista koskevassa poikkeustilanteessa myös rakennuksen omistusaika lasketaan maan hankintahetkestä tai vuokrasopimuksen solmimishetkestä.
            - paragraph [ref=e335]:
              - text: Omistus saattaa koostua useista osista esimerkiksi silloin, kun puolisot ostavat omaisuutta toisiltaan joko tavanomaisin kaupoin tai lunastavat osituksessa avio-oikeuden ulkopuolisin varoin toiselta osapuolelta tämän osuuden omaisuudesta. Osituksessa avio-oikeuden ulkopuolisia varoja ovat paitsi lunastusta varten otetun lainan määrä, myös varat, jotka ovat avio-oikeuden ulkopuolella avioehtosopimuksen tai lahjakirjan tai testamentin takia. Ositustilanteita ja sitä, mitä pidetään ulkopuolisten varojen käyttämisenä, käsitellään ohjeessa
              - link "Vastikkeellinen saanto osituksessa ja erottelussa" [ref=e336] [cursor=pointer]:
                - /url: /syventavat-vero-ohjeet/ohje-hakusivu/48583/
              - text: .
            - generic [ref=e337]:
              - paragraph [ref=e338]: Huomio osio alkaa
              - paragraph [ref=e339]:
