            - paragraph [ref=e896]: Jos osituksen yhteydessä toiselle puolisolle luovutetaan omaisuutta tai maksetaan rahaa yli lakimääräisen tasinkovelvoitteen ilman vastavuoroista luovutusta, kyseessä ei ole luovutusvoittoverotukseen liittyvä luovutus vaan kyseessä on yleensä lahja puolisolta toiselle.
            - paragraph [ref=e897]:
              - text: Jos avioero-osituksessa tasinkoon oikeutettu osapuoli luopuu vaatimasta tasinkoa, kyse ei ole osapuolten välisestä lahjasta (ks.
              - link "KHO 2014:135" [ref=e898] [cursor=pointer]:
