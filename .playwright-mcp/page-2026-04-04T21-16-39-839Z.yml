              - paragraph [ref=e913]:
                - strong [ref=e914]: "Esimerkki 23:"
              - paragraph [ref=e915]: A ja B eroavat 2023. Heillä on avio-oikeuden täysin poissulkeva avioehtosopimus. He omistavat puoliosuuksin sekä 200 000 euron arvoisen vuosia omana asuntonaan käyttämänsä asunto-osakkeen että 200 000 euron arvoisen lomakiinteistön.
              - paragraph [ref=e916]: Aja B laativat erottelusopimuksen siten, että kumpikin pitää itsellään kaiken jo aiemmin omistamansa irtaimen omaisuuden. Lisäksi erottelusopimuksessa sovitaan, että A saa asunto-osakkeen kokonaan omistukseensa ja B saa lomakiinteistön kokonaan omistukseensa.
              - paragraph [ref=e917]: Sekä A:lle että B:lle muodostuu luovutus, jossa voiton määrä riippuu omistusosuuden hankintamenosta. B:n osalta oman vakituisen asunnon puoliosuuden luovutus on verovapaa TVL 48 §:n 1-kohdan erityissäännöksen perusteella. A:n osalta loma-asunnon puoliosuuden luovutus on verollinen.
              - paragraph [ref=e918]:
                - text: On huomattava, että A:n ja B:n erottelusopimuksessa ei ole kysymys yhteisomistussuhteen verovapaasta purkamisesta. Tämä johtuu siitä, että yhteisomistussuhteen purkamista arvioidaan aina esine kerrallaan. Nyt kohteena on kahden eri esineen omistusosuudet, jotka vaihdetaan keskenään (
                - link "KHO 2001:48" [ref=e919] [cursor=pointer]:
                  - /url: http://www.finlex.fi/fi/oikeus/kho/vuosikirjat/2001/200102460
                - text: ). Yhteisomistussuhteen verovapaa purkaminen olisi kyseessä, jos A ja B jakaisivat yhdessä omistamansa kiinteistön kummallekin omaksi määräalaksi, joiden arvo vastaa alkuperäistä yhteisomistusosuutta. Tällöin katsotaan, että luovutusta ei tapahdu vaan omistus jatkuu.
