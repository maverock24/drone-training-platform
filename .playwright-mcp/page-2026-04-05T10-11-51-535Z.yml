        - article [ref=e96]:
          - generic [ref=e101]: Popular
          - generic [ref=e103]:
            - text:  
            - generic [ref=e105]:
              - generic [ref=e108]:
                - paragraph [ref=e109]:
                  - text: The
                  - link "‘open’ category" [ref=e110] [cursor=pointer]:
                    - /url: /the-agency/faqs/drones-uas#category-open-category
                  - text: is the main reference for the majority of leisure drone activities and low-risk commercial activities.
                  - text: As a drone operator, remember to check if you need to register yourself. See the
                  - link "registration FAQ" [ref=e111] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/the-agency/faqs/drones-uas#category-registration-requirements
                  - text: .
                  - text: "The ‘open’ category is in turn subdivided in three sub-categories – A1, A2, A3 -- which may be summarised as follows:"
                - list [ref=e112]:
                  - listitem [ref=e113]: "A1: fly over people but not over assemblies of people"
                  - listitem [ref=e114]: "A2: fly close to people"
                  - listitem [ref=e115]: "A3: fly far from people"
                - paragraph [ref=e116]:
                  - text: Each subcategory comes with its own set of requirements. Therefore, in the ‘open’ category, it is important to identify the subcategory of operation your activities will fall under, to determine which rules apply to you, and the type of training the remote pilot needs to undertake. See the FaQ
                  - link "‘Which training I need to fly my drone in the open category’" [ref=e117] [cursor=pointer]:
                    - /url: /faq/116457
                  - text: Start by identifying the type of drone you own.
                - heading "Table for ‘Open’ category applicable since 1 January 2024" [level=5] [ref=e118]
                - paragraph [ref=e119]:
                  - img "Drones_3" [ref=e120]
                - paragraph [ref=e121]:
                  - text: Drones with a class identification label (i.e.
                  - img [ref=e122]
                  - text: ","
                  - img [ref=e123]
                  - text: ","
                  - img [ref=e124]
                  - text: ","
                  - img [ref=e125]
                  - text: ","
                  - img [ref=e126]
                  - text: ","
                  - img [ref=e127]
                  - text: ","
                  - img [ref=e128]
                  - text: ) are already available on the market. Please see the
                  - link "Approved Drones for EU Operations page" [ref=e129] [cursor=pointer]:
                    - /url: https://www.easa.europa.eu/en/domains/drones-air-mobility/drones-evtol-designs/approved-drones-eu-operations
                  - text: that includes the list of drones that received the class identification label. If you want to purchase a drone with class identification, please check that the drone shows on its body the class identification and make sure that the drone has an EU Declaration of Conformity. Several versions of the same drone may be available, with and without class mark. You can find additional information on drones with a class identification label in the
                  - link "Drones Information Notices webpage" [ref=e130] [cursor=pointer]:
                    - /url: /document-library/general-publications/drones-information-notices
                  - text: .
                - paragraph [ref=e131]: "Operations in the open category must be conducted with a drone:"
                - list [ref=e132]:
                  - listitem [ref=e133]: bearing a C0 to C4 class identification label, or;
                  - listitem [ref=e134]: being privately built (built for your own use), or;
                  - listitem [ref=e135]: even without class identification label, but only if placed on the market before 31 December 2023.
                - paragraph [ref=e136]: Drones bearing a class identification label can be already utilised in accordance with the conditions shown in the menus below. Be aware that ‘privately built’ means that you built the drone for your own personal use, so it was not purchased; it does not refer to UASs assembled from sets of parts placed on the market as a single, ready-to-assemble kit.
                - heading "How to operate drones in the open category" [level=3] [ref=e137]
                - list [ref=e138]:
                  - listitem [ref=e139]:
                    - link "Privately built and drones placed on the market before 01/01/2024 (under 250 g) " [ref=e140] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e141]:
                    - link "C0 (under 250 g) " [ref=e142] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e143]:
                    - link "C1 (under 900 g) " [ref=e144] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e145]:
                    - link "C2 (under 4 kg) " [ref=e146] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e147]:
                    - link "C3 (under 25 kg) " [ref=e148] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e149]:
                    - link "C4 (under 25 kg) " [ref=e150] [cursor=pointer]:
                      - /url: "#"
                  - listitem [ref=e151]:
                    - link "Privately built and drones placed on the market before 01/01/2024 (under 25 kg) " [ref=e152] [cursor=pointer]:
                      - /url: "#"
                - paragraph [ref=e153]:
                  - text: ‘Open’ category using drones with a class identification label
                  - text: "* A State may lower the remote pilot minimum age to 12. In that case, the lowered age limit will apply only in that State."
                - paragraph [ref=e154]:
                  - text: You are invited to consult the
                  - link "Provisions applicable to both ‘open’ and ‘specific’ category FAQs" [ref=e155] [cursor=pointer]:
                    - /url: /the-agency/faqs/drones-uas
                  - text: as well as
                  - link "Understanding the ‘open’ category FAQs" [ref=e156] [cursor=pointer]:
                    - /url: /the-agency/faqs/drones-uas#category-open-category
                  - text: for more details. These FAQs take you through all the steps you need to take to be fully compliant and help you identify the regulations that are applicable to the drone operations you intend to conduct.
                - paragraph [ref=e157]:
                  - text: For all our amateur drone pilots,
                  - link "Paul and his new drone Donnie" [ref=e158] [cursor=pointer]:
                    - /url: https://youtu.be/l6xHV61jwGo
                  - text: will help you see how easy it is to become a safe and responsible drone pilot.
                - heading "Remote identification" [level=3] [ref=e159]
                - paragraph [ref=e160]: All drones operating in the open category (with limited exceptions) need to be equipped with a remote identification system. Some companies have already placed on the market modules providing a direct remote identification system, providing the ‘EU Declaration of Conformity’ and you can find a list below. Please be aware that EASA did not verify the compliance of such components and the declaration of conformity is submitted under the sole responsibility of the manufacturer.
