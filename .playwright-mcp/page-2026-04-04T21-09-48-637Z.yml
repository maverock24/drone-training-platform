      - paragraph [ref=e341]: Sijoitustoimintaan liittyy aina taloudellinen riski, ja asiakas vastaa siten itse omien sijoituspäätöstensä taloudellisista tuloksista sekä näiden vaikutuksesta asiakkaan verotukseen. Historiallinen tuotto ei ole tae tulevasta tuotosta. Tuotto voi jäädä saamatta ja sijoitetun pääoman voi jopa menettää. Tällä sivulla esitetyt tiedot eivät ole sijoituspalvelulain mukaista sijoitusneuvontaa. Tutustu ennen sijoituspäätösten tekemistä rahaston rahastoesitteeseen ja sijoittajan avaintietoihin.
