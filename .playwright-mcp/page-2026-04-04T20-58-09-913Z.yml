          - generic [ref=e70]:
            - paragraph [ref=e71]: Tax cards 2026 enter into force at the beginning of the year, on 1 January. The income ceiling stated on the tax card is for the full year, i.e. a period of 12 months.
            - paragraph [ref=e72]: You can change your tax rate and income ceiling by requesting a new tax card at any time in 2026, if necessary. You can change your tax card as many times as necessary.
            - heading "What information are the 2026 tax card and prepayments based on?" [level=2] [ref=e73]
            - paragraph [ref=e74]: The Tax Administration calculates the tax rate for your tax card and the prepayment amount based on the income and deductions in your latest finalised tax assessment. If you requested a change to your tax rate or tax prepayment last year, your this year’s tax card and prepayment calculation are based on the revised data. Occasional income is not included in the taxable income.
            - paragraph [ref=e75]:
              - text: You can see the bases in your prepayment decision, which you may receive with your tax card, for example.
