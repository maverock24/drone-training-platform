            - paragraph [ref=e81]:
              - strong [ref=e82]: Vuokravakuus sen sijaan ei ole vuokranantajan tuloa
              - text: muuten kuin silloin, jos vakuus käytetään maksamattoman vuokran kuittaamiseen.
            - paragraph [ref=e83]:
              - text: Oletko vuokrannut asuntoa tai muuta omaisuutta sovelluksen tai verkkosivuston kautta? Verohallinto saa tietoa digitaalisen alustan kautta saamistasi tuloista sekä Suomesta että ulkomailta ja valvoo näiden tietojen ilmoittamista verotuksessa. Muista aina ilmoittaa tulot esitäytetyllä veroilmoituksella.
              - link "Lue lisää myynneistä digitaalisilla alustoilla." [ref=e84] [cursor=pointer]:
                - /url: /henkiloasiakkaat/verokortti-ja-veroilmoitus/tulot/ansiotulot/myynti-digitaalisilla-alustoilla/
            - heading "Pellon ja metsämaan vuokratulot" [level=2] [ref=e85]
