            - paragraph [ref=e87]: Muutos koskee vain metsää ja maatalousmaata. Maa- ja metsätalouden rakennusten, rakennelmien ja rakennuspaikkojen vuokratulot sekä koneiden vuokratulot ovat jatkossakin maatalouden tuloa.
