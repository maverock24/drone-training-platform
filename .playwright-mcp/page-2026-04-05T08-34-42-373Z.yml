          - generic [ref=e68]:
            - paragraph [ref=e69]: Vuokratuloa saat, kun annat toisen käyttää omistamaasi tai hallitsemaasi asuntoa, kulkuneuvoa tai muuta esinettä ja saat siitä korvaukseksi rahaa tai muuta rahanarvoista etuutta.
            - paragraph [ref=e70]: Vuokralle antamasi omaisuus voi olla esimerkiksi
            - list [ref=e71]:
              - listitem [ref=e72]: asunto tai kesämökki
