                - list [ref=e785]:
                  - listitem [ref=e786]: Vision Transformers process entire images as sets of patches with global self-attention, solving the locality limitation of CNNs for aerial imagery
                  - listitem [ref=e788]: Multi-modal models like CLIP enable zero-shot capabilities where drones respond to natural language commands without task-specific retraining
                  - listitem [ref=e790]: Drone-specific challenges such as small object detection at altitude and wide field-of-view analysis directly benefit from transformer architectures
