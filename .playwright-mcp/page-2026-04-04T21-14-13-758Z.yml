                                    - text: Olemme
                                    - link:
                                      - /url: /blogi/rahapodi/
                                      - text: Rahapodissa
                                    - text: usein suositelleet osingot uudelleensijoittavia ETF:iä/rahastoja verotuksellisista syistä. Onko asia kuitenkaan oikeasti niin esimerkiksi
                                    - link:
                                      - /url: /koulu/sp-500
                                      - text: S&P 500:n
                                    - text: kohdalla?
                                  - paragraph: Tämä kirjoitus on alunperin julkaistu vuonna 2015 Nordnet Blogissa Nordnetin talousasiantuntijan nimissä ja siirretty vuonna 2025 Nordnet Kouluun.
                                  - paragraph: Sijoitusrahastot ja ETF:t eivät tavallisesti maksa veroja rahastoihin kertyvästä osinko- tai korkotuotosta. Tämä pätee myös Irlantiin rekisteröityihin ETF:iin.
                                  - paragraph: Yhdysvaltoihin sijoittavat, Euroopan Unioniin rekisteröidyt rahastot joutuvat kuitenkin maksamaan lähdeveron osingoistaan Yhdysvaltoihin. Lähdeveron määrä on määritelty rahaston rekisteröintimaan ja Yhdysvaltojen välisessä verosopimuksessa. Esimerkiksi irlantilaiset ja suomalaiset sijoitusrahastot maksavat yhdysvaltalaisista osingoista 15 prosenttia lähdeveroa.
                                  - paragraph: EU:n alueelle sijoittavat rahastot eivät maksa lähdeveroja, oli rahasto sitten rekisteröity EU:ssa tai Yhdysvalloissa. Verovapaus on toisin sanoen yksisuuntainen.
                                  - paragraph: Yhdysvaltalaiset osingot karttuvat eurooppalaiseen rahastoon 85-prosenttisesti ja kasvavat kasvu-osuudellisessa rahastossa korkoa korolle, kunnes myyt osuudet. Luovutusvoitosta maksat pääomatuloveron Suomeen.
                                  - paragraph: Mikäli valitset osingot ulos maksavan, tuotto-osuudellisen rahaston, maksat lähde veron lisäksi
                                  - list:
                                    - listitem:
                                      - paragraph: rahaston rekisteröintimaan perimän ennakkoveron ja
                                    - listitem:
                                      - paragraph: Suomen verotuksessa loput.
                                  - paragraph:
                                    - text: Jos vuosittain muistat
                                    - link:
                                      - /url: /faq/verotus/miten-perin-takaisin-verosopimuksen-ylittavat-lahdeverot
                                      - text: anoa oikaisua
                                    - text: Suomen verosopimuksen puitteissa rahaston rekisteröintimaassa väärin tehtyyn ennakonpidätykseen, maksat osingoista vuosittain suomalaisen pääomatuloverotuksen mukaiset 30-33 prosentin verot (osinkotulojen määrästä riippuen).
                                  - paragraph: Rahastosijoituksen kannalta tämä vastaa, yllä esittämälläsi 2–5 prosentin osinkotuotto-olettamalla ylimääräistä 0,3-0,9 prosentin vuotuista kuluerää (2 % x (30 %-15 %) = 0,3 ja 5 % x (33 %-15 %) = 0,9).
                                  - paragraph:
                                    - text: Näin ollen osingot uudelleensijoittavan rahaston veroetu on pitkässä juoksussa
