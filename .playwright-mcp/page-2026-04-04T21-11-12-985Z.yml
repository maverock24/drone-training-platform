    - generic [ref=e322]:
      - paragraph [ref=e323]:
        - generic [ref=e324]: Materiaali on yleistä tietoa eikä se ole täydellinen kuvaus sijoituskohteesta tai siihen liittyvistä riskeistä. Ennen sijoituspäätöksen tekemistä asiakkaan tulee tutustua sijoituskohteen ominaisuuksiin, riskeihin ja verotukseen.
      - paragraph [ref=e325]:
        - generic [ref=e326]: Sijoittamiseen liittyy aina taloudellinen riski. Tavoiteltu tuotto voi jäädä saamatta ja sijoitetun pääoman voi menettää osittain tai kokonaan. On syytä muistaa, että historiallinen tuotto ei ole tae tulevasta. Asiakkaan tulee perustaa sijoituspäätöksensä omaan arvioonsa rahoitusvälineestä ja siihen liittyvistä riskeistä, sillä asiakas vastaa itse sijoituspäätöstensä taloudellisista seuraamuksista.
      - paragraph [ref=e327]:
        - generic [ref=e328]: Tämä materiaali ei ole yksilöllinen suositus eivätkä annetut tiedot liity yksittäisen asiakkaan sijoitustavoitteisiin, taloudelliseen tilanteeseen tai erityistarpeisiin. Vaikka pyrkimyksenä onkin antaa mahdollisimman tarkkoja ja oikeita tietoja, ei pankki takaa ulkopuolisista lähteistä saatujen tietojen täydellisyyttä tai virheettömyyttä. Esitetyt näkemykset edustavat pankin arvioita materiaalin laatimishetkellä ja niitä voidaan muuttaa ilman erillistä ilmoitusta. Pankki ei vastaa mistään kuluista tai tappioista, joita materiaalin tietojen käyttö voi aiheuttaa.
      - paragraph [ref=e329]:
        - generic [ref=e330]: Materiaali sisältää pankin omistamaa immateriaalioikeudellisesti suojattua aineistoa, johon pankki pidättää kaikki oikeudet.
