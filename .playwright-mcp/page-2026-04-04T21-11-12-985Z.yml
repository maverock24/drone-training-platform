      - generic [ref=e229]:
        - heading "Mikä on osake?" [level=2] [ref=e230]
        - paragraph [ref=e231]: Osake on osaomistus yrityksestä. Osakeyhtiö laskee liikkeelle omistusosuuksia yhtiöstä, joita kutsutaan osakkeiksi. Osakkeiden ostaminen tapahtuu pörsseissä esimerkiksi Helsingin pörssissä (OMXH), Lontoon pörssissä (LSE) tai Tukholman pörssissä (OMXS). Ostaessasi osakkeita ostat osan yhtiötä ja olet esimerkiksi oikeutettu yhtiön maksamiin osinkoihin ja äänestämään yhtiökokouksissa.
