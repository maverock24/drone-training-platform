    - generic [ref=e243]:
      - heading "Osakesijoituksen tuotto perustuu osakekurssin mahdolliseen nousuun ja maksettaviin osinkoihin" [level=2] [ref=e244]
      - paragraph [ref=e245]: Yksinkertaistetusti on olemassa kahdenlaisia sijoittajia. Osa sijoittajista etsii matalammin arvostettuja ja esimerkiksi hyvää osinkoa maksavia yhtiöitä eli suosivat ns. arvosijoittamista. Toiset taas suosivat yhtiövalinnoissaan voimakkaita kasvunäkymiä ja hakevat tuottoa osakkeen arvon kasvusta.
      - 'heading "Esimerkki 1: Osakekurssin nousu" [level=3] [ref=e246]'
      - paragraph [ref=e247]: Ostat yrityksen Osake Oyj osaketta 100 kappaletta 10 euron kappalehintaan ja kahdessa vuodessa osakkeen arvo nousee 14%. Omistuksesi arvo on siis kasvanut 1 000 eurosta 1 140 euroon. Päätät myydä osakkeesi ja realisoida osakkeen tuoton, joka tässä esimerkissä on 140 euroa (Omistuksesi arvo myynti hetkellä – omistuksesi arvo osto hetkellä).
      - 'heading "Esimerkki 2: Osakkeille maksettavat osingot" [level=3] [ref=e248]'
      - paragraph [ref=e249]: Ostat yrityksen Equity Oyj osakkeita 50 kappaletta 5 euron kappalehintaan. Yhtiökokous päätti 0,2 euron osingon maksusta per osake. Koska omistat 50 kappaletta yrityksen osakkeita, sinulle maksetaan osinkoa 10 euroa ja osinkotuotto-% on 4% (osakekohtainen osinko / osakkeen hankintahinnalla x 100). Arvoyrityksiin sijoittavat hakevat ensisijaisesti tuottoa yrityksen osakkeenomistajille maksamista osingoista.
      - heading "Osakkeiden verotus" [level=3] [ref=e250]
      - paragraph [ref=e251]: Molemmissa esimerkeissä osakkeiden tuotosta maksetaan pääomavero, jos osakkeita on säilytetty tavallisella arvo-osuustilillä. Myyntivoitosta veroa maksetaan n. 30-34%. Pörssiyhtiön osingoista 15% on verovapaata, jolloin niistä maksettava vero on n. 25,5%-28,9%. Osakesäästötilillä verojen maksu tapahtuu vasta, kun nostat rahaa pois osakesäästötililtä. Osinkosijoittajan on hyvä huomioida, että osakesäästötilillä ei ole mahdollista hyötyä osinkojen verovapaasta osasta, vaan nostoista peritään normaali pääomavero.
